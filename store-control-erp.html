/* Передача задачи другому сотруднику — с обязательным комментарием.
   Прежний исполнитель видит, кому и почему передали. */
function openTaskTransferModal(taskId){
  const t=(DATA.tasks||[]).find(x=>x.id===taskId);
  if(!t) return;
  const cur=taskParticipants(t).map(p=>p.name);
  /* Передавать можно только тем, у кого есть доступ к разделу «Задачи» —
     иначе сотрудник не увидит переданную задачу */
  const ROLE_BY_TITLE={'Продавец':'seller','Старший продавец':'senior','Мастер':'master','Курьер':'courier','Сборщик':'collector'};
  const candidates=DATA.employees.filter(e=>{
    if(e.noAccess || cur.includes(e.name)) return false;
    const rk=ROLE_BY_TITLE[e.role];
    return rk && ROLES[rk].menu.includes('tasks');
  });
  if(!candidates.length){ toast('Некому передать — нет подходящих сотрудников','error'); return; }
  const body='<div class="field-grid">'+
      field('Задача', t.title)+
      field('Сейчас у', cur.join(', ')||'—')+
    '</div>'+
    '<div class="field" style="margin-top:6px;"><label>Передать сотруднику</label>'+
    '<select class="select-mini" id="trEmp" style="width:100%;">'+candidates.map(e=>'<option value="'+escAttr(e.name)+'">'+escHtml(e.name)+' — '+e.role+'</option>').join('')+'</select></div>'+
    '<div class="field"><label>Комментарий <span style="color:var(--negative);">*</span> <span class="tsub">— его увидят и прежний, и новый исполнитель</span></label>'+
    '<textarea class="textarea-mini" id="trNote" rows="3" style="width:100%;font-family:inherit;" placeholder="Почему передаёте задачу"></textarea></div>';
  openModal('Передать задачу','',body,[{label:'Передать', cls:'btn-primary', action:()=>{
    const toName=document.getElementById('trEmp').value;
    const note=document.getElementById('trNote').value.trim();
    if(!note){ toast('Комментарий обязателен — сотрудники должны понимать причину','error'); return; }
    const fromNames=cur.join(', ')||'—';
    logTask(t,'Владелец передал задачу: '+fromNames+' → '+toName+'. Комментарий: '+note);
    cur.forEach(nm=>notifyEmployee(nm,'Задача «'+t.title+'» передана сотруднику '+toName+'. Комментарий владельца: '+note));
    notifyEmployee(toName,'Вам передана задача «'+t.title+'»'+(fromNames!=='—'?' (от: '+fromNames+')':'')+'. Комментарий владельца: '+note);
    t.participants=[{name:toName, at:DATA.today+' '+nowTime()}];
    syncTaskClaimedBy(t);
    t.claimedAt=DATA.today+' '+nowTime();
    t.status='claimed';
    t.extensionRequest=null;
    closeModal(); refreshTasksPage();
    toast('Задача передана: '+toName,'success');
  }}]);
}

/* Каждой задаче — уникальный случайный 4-значный номер */
function ensureTaskNums(){
  const used=new Set((DATA.tasks||[]).map(t=>t.num).filter(Boolean));
  (DATA.tasks||[]).forEach(t=>{
    if(!t.num){
      let n;
      do{ n=1000+Math.floor(Math.random()*9000); }while(used.has(n));
      used.add(n); t.num=n;
    }
  });
}
function taskMe(){
  const e=(typeof currentEmployee==='function')?currentEmployee():null;
  return e?e.name:currentEmployeeName();
}
function hasNewOpenTasks(){
  if(!STATE.seenTaskIds) STATE.seenTaskIds=new Set();
  return (DATA.tasks||[]).some(t=>t.status==='open' && !STATE.seenTaskIds.has(t.id));
}
function taskBadgeText(){
  if(STATE.role==='owner'||STATE.role==='senior'){
    const n=(DATA.tasks||[]).filter(t=>t.status==='review').length;
    return n?String(n):'';
  }
  return hasNewOpenTasks()?'!':'';
}
function taskNow(){ return parseRuDateTime(DATA.today, nowTime()); }
function parseTaskDue(t){
  if(!t.dueAt) return null;
  const p=String(t.dueAt).split(' ');
  return parseRuDateTime(p[0], p[1]||'23:59');
}
function taskIsOverdue(t){
  if(t.status!=='claimed') return false;
  const due=parseTaskDue(t);
  return due!=null && taskNow()>due;
}
function addHoursToNow(hours){
  const d=new Date(taskNow()+hours*3600000);
  const p=n=>String(n).padStart(2,'0');
  return p(d.getDate())+'.'+p(d.getMonth()+1)+'.'+d.getFullYear()+' '+p(d.getHours())+':'+p(d.getMinutes());
}
/* Окно набора команды истекло — задача стартует текущим составом,
   вознаграждение поделится на фактических участников */
function checkTeamJoinDeadlines(){
  (DATA.tasks||[]).forEach(t=>{
    if(t.status!=='open' || taskNeeded(t)<=1 || !t.joinDeadline) return;
    const ps=taskParticipants(t);
    if(!ps.length) return;
    const p=String(t.joinDeadline).split(' ');
    if(taskNow()>=parseRuDateTime(p[0], p[1]||'00:00')){
      logTask(t,'Окно набора истекло — задача стартовала с текущим составом ('+ps.length+' из '+taskNeeded(t)+'): '+ps.map(x=>x.name).join(', '));
      t.status='claimed';
      if(!t.claimedAt) t.claimedAt=DATA.today+' '+nowTime();
      if(t.dueDays && !t.dueAt){ t.dueAt=addDaysToNow(t.dueDays); logTask(t,'Срок исполнения: '+t.dueDays+' дн. — до '+t.dueAt); }
      ps.forEach(x=>notifyEmployee(x.name,'Задача «'+t.title+'» стартовала: набор закрыт, вас в команде '+ps.length+'. Вознаграждение делится на '+ps.length+'.'));
      t.joinDeadline=null;
    }
  });
}
function addDaysToNow(days){
  const d=new Date(taskNow()+days*86400000);
  const p=n=>String(n).padStart(2,'0');
  return p(d.getDate())+'.'+p(d.getMonth()+1)+'.'+d.getFullYear()+' '+p(d.getHours())+':'+p(d.getMinutes());
}

/* ============================================================
   ВНУТРЕННЯЯ ИСТОРИЯ ЗАДАЧИ — видна только владельцу.
   Каждое событие: {at, by, text}. Для старых задач без журнала
   история восстанавливается из имеющихся дат (createdAt, claimedAt...).
============================================================ */
function taskHistoryFor(t){
  if(Array.isArray(t.history) && t.history.length) return t.history;
  const h=[];
  if(t.createdAt) h.push({at:t.createdAt, by:t.createdBy||'—', text:'Задача создана и опубликована на доске'});
  if(t.claimedAt) h.push({at:t.claimedAt, by:t.claimedBy||'—', text:'Задача взята в работу'});
  (t.checkpoints||[]).forEach(cp=>{ if(cp.done) h.push({at:cp.reportedAt||cp.date, by:t.claimedBy||'—', text:'Сдан отчёт по проверке '+cp.date}); });
  (t.extensions||[]).forEach(e=>h.push({at:e.at, by:t.claimedBy||'—', text:'Срок продлён на '+e.days+' дн. — '+(e.comment||'')}));
  if(t.doneAt) h.push({at:t.doneAt, by:t.claimedBy||'—', text:'Работа сдана на проверку'});
  if(t.status==='rejected' && t.rejectReason) h.push({at:t.doneAt||t.createdAt, by:'Владелец', text:'Возвращена на доработку: '+t.rejectReason});
  if(t.approvedAt) h.push({at:t.approvedAt, by:t.approvedBy||'Владелец', text:'Работа принята, начислено '+rub(t.approvedAmount!=null?t.approvedAmount:t.reward)});
  if(t.cancelledAt) h.push({at:t.cancelledAt, by:t.cancelledBy||'Владелец', text:'Задача отменена'+(t.cancelReason?': '+t.cancelReason:'')});
  return h;
}
/* Читабельная лента истории — используется в карточке и в полной карточке задачи */
function taskHistoryHTML(t){
  const hist=taskHistoryFor(t);
  if(!hist.length) return '';
  return '<div class="task-hist">'+hist.map(e=>
    '<div class="task-hist-item">'+
      '<div class="th-meta">'+escHtml(e.at||'')+(e.by?' · '+escHtml(e.by):'')+'</div>'+
      '<div class="th-text">'+escHtml(e.text)+'</div>'+
    '</div>').join('')+'</div>';
}
function logTask(t, text){
  if(!Array.isArray(t.history) || !t.history.length) t.history=taskHistoryFor(t).slice();
  t.history.push({at:DATA.today+' '+nowTime(), by:taskMe(), text:text});
}

const DAY_MS=86400000;
/* Система распознаёт даты проверок/сроков и напоминает:
   в сам день — «сегодня» (красным), и за сутки — «завтра» (оранжевым). */
function dueTaskNotifications(me){
  const out=[];
  const now=taskNow();
  (DATA.tasks||[]).forEach(t=>{
    if(!isTaskParticipant(t, me) || !TASK_ACTIVE_STATUSES.includes(t.status)) return;
    if(t.type==='longterm' && Array.isArray(t.checkpoints)){
      t.checkpoints.forEach(cp=>{
        if(cp.done) return;
        const ts=parseRuDateTime(cp.date,'00:00');
        if(now>=ts) out.push({task:t, kind:'checkpoint', date:cp.date});
        else if(now>=ts-DAY_MS) out.push({task:t, kind:'checkpoint_soon', date:cp.date});
      });
    }
    if(t.type==='oneoff' && t.dueAt && t.status==='claimed'){
      const p=String(t.dueAt).split(' ');
      const ts=parseRuDateTime(p[0],'00:00');
      if(now>=ts) out.push({task:t, kind:'due', date:p[0]});
      else if(now>=ts-DAY_MS) out.push({task:t, kind:'due_soon', date:p[0]});
    }
  });
  const prio={checkpoint:0, due:0, checkpoint_soon:1, due_soon:1};
  return out.sort((a,b)=>prio[a.kind]-prio[b.kind]);
}

    checkpoint_soon: {sub:'Завтра проверка по долгосрочной задаче — ', badge:'ЗАВТРА', st:'background:var(--warning-soft);color:var(--warning);'},
    due_soon:        {sub:'Завтра срок одноразовой задачи — ',   badge:'ЗАВТРА', st:'background:var(--warning-soft);color:var(--warning);'},
  };
  const CP_MAX=3;
  const shown=due.slice(0,CP_MAX);
  const restCount=due.length-shown.length;
  let body='';
  if(bossMsgs.length){
    body+='<div class="tsub" style="font-weight:700;color:var(--accent-2);margin-bottom:6px;font-size:12.5px;">📢 От начальства</div>'+
      bossMsgs.slice(0,2).map(nn=>'<div class="hist-row" data-cp-boss="1" style="cursor:pointer;" title="Открыть уведомления">'+
        '<div><div class="h-main">'+escHtml(nn.text)+'</div><div class="h-sub">'+nn.date+' · от: '+escHtml(nn.from)+'</div></div></div>').join('')+
      (bossMsgs.length>2?'<div class="hist-row" data-cp-boss="1" style="cursor:pointer;justify-content:center;"><span class="tsub" style="color:var(--accent-2);font-weight:600;">… и ещё '+(bossMsgs.length-2)+' ▸</span></div>':'')+
      (due.length?'<div class="drill-divider" style="margin:10px 0;"></div>':'');
  }
  if(due.length) body+='<div class="tsub" style="margin-bottom:12px;font-size:13px;">Приближаются сроки сдачи. Не забудьте отчитаться:</div>';
  body+=shown.map(d=>{
    const ki=KIND_INFO[d.kind]||KIND_INFO.due;
    const isToday=ki.badge==='СЕГОДНЯ';
    return '<div class="hist-row" data-push-task="'+d.task.id+'" style="cursor:pointer;" title="Перейти к задаче"><div>'+
      '<div class="h-main">'+escHtml(d.task.title)+' <span class="hist-caret">▸</span></div>'+
      '<div class="h-sub" style="'+(isToday?'color:var(--negative);':'color:var(--warning);')+'">'+ki.sub+d.date+'</div>'+
    '</div><span class="badge" style="font-weight:800;'+ki.st+'">'+ki.badge+'</span></div>';
  }).join('');
  if(restCount>0){
    body+='<div class="hist-row" data-cp-more="1" style="cursor:pointer;justify-content:center;">'+
      '<span class="tsub" style="color:var(--accent-2);font-weight:600;">… и ещё '+restCount+' — открыть все в «Моих задачах» ▸</span></div>';
  }
  const hasToday=due.some(d=>KIND_INFO[d.kind] && KIND_INFO[d.kind].badge==='СЕГОДНЯ');
  showCornerPush({
    title: due.length? '⏰ Напоминание о сдаче' : '📢 Сообщение от начальства',
    sub: (bossMsgs.length?bossMsgs.length+' сообщени(й) от начальства':'')+
         (bossMsgs.length&&due.length?' · ':'')+
         (due.length?due.length+' напоминани(й) о сдаче':''),
    bodyHtml:body,
    danger:hasToday,
    actions:[
      {label:'Перейти к моим задачам', cls:'btn-primary', action:()=>{
        closeCornerPush(); STATE.taskBoard='mine';
        if(ROLES[STATE.role].menu.includes('tasks')) navigate('tasks');
      }},
      {label:ic('bell')+' Все уведомления', action:()=>{ closeCornerPush(); openNotificationsModal(); }},
      {label:'Позже', action:closeCornerPush},
    ],
    wire:(el)=>{
      el.querySelectorAll('[data-cp-boss]').forEach(row=>row.addEventListener('click',()=>{
        closeCornerPush(); openNotificationsModal();
      }));
      const more=el.querySelector('[data-cp-more]');
      if(more) more.addEventListener('click',()=>{
        closeCornerPush(); STATE.taskBoard='mine';
        if(ROLES[STATE.role].menu.includes('tasks')) navigate('tasks');
      });
      /* Клик по пункту — сразу к этой задаче: доска «Мои», карточка раскрыта */
      el.querySelectorAll('[data-push-task]').forEach(row=>row.addEventListener('click',()=>{
        const id=parseInt(row.dataset.pushTask);
        closeCornerPush();
        if(!STATE.expandedTaskIds) STATE.expandedTaskIds=new Set();
        STATE.expandedTaskIds.add(id);
        STATE.taskBoard='mine';
        if(ROLES[STATE.role].menu.includes('tasks')) navigate('tasks');
        setTimeout(()=>{
          const btn=document.querySelector('[data-texpand="'+id+'"], [data-view-task="'+id+'"]');
          if(btn) btn.closest('.card').scrollIntoView({behavior:'smooth', block:'center'});
        }, 80);
      }));
    },
  });
}

/* Угловой пуш в правом верхнем углу — привлекает внимание, не блокируя работу */
function closeCornerPush(){ const el=document.getElementById('cornerPush'); if(el) el.remove(); }
function showCornerPush(opts){
  closeCornerPush();
  const el=document.createElement('div');
  el.id='cornerPush';
  el.className='corner-push'+(opts.danger?' cp-danger':'');
  el.innerHTML='<div class="cp-head"><div><div class="cp-title">'+opts.title+'</div>'+
      (opts.sub?'<div class="cp-sub">'+opts.sub+'</div>':'')+'</div>'+
      '<div class="cp-close" id="cpClose">'+ic('close')+'</div></div>'+
    '<div class="cp-body">'+(opts.bodyHtml||'')+'</div>'+
    '<div class="cp-actions">'+(opts.actions||[]).map((a,i)=>'<button class="btn btn-sm '+(a.cls||'')+'" id="cpAct'+i+'">'+a.label+'</button>').join('')+'</div>';
  document.body.appendChild(el);
  document.getElementById('cpClose').addEventListener('click', closeCornerPush);
  (opts.actions||[]).forEach((a,i)=>document.getElementById('cpAct'+i).addEventListener('click', a.action));
  if(opts.wire) opts.wire(el);
}

/* Модалка приёмки работы — вызывается с доски и из списка «Ждут приёмки» */
function openTaskApproveModal(taskId, backToList){
  const t=(DATA.tasks||[]).find(x=>x.id===taskId);
  if(!t) return;
  let body='<div class="field-grid">'+
    field('Задача', t.title)+field('Исполнитель', t.claimedBy)+field('Ориентир вознаграждения', rub(t.reward))+
  '</div>'+
  '<div style="margin-top:10px;padding:10px;background:var(--glass-2);border-radius:8px;">'+
    '<div class="tsub" style="font-weight:600;">Отчёт:</div><div class="tsub">'+escHtml(t.report||'—')+'</div></div>';
  if(t.photo) body+='<img src="'+t.photo+'" class="upload-preview" style="margin-top:8px;max-width:220px;">';
  if(Array.isArray(t.attachments) && t.attachments.length){
    body+='<div class="drill-block-label" style="margin-top:10px;">Материалы сотрудника ('+t.attachments.length+')</div>'+
      '<div style="display:flex;gap:10px;flex-wrap:wrap;">'+
        t.attachments.map(a=>'<div style="max-width:140px;"><img src="'+a.src+'" class="upload-preview" style="margin:0;max-width:140px;">'+
          '<div class="tsub" style="font-size:10.5px;margin-top:2px;">'+escHtml(a.note||'')+'</div></div>').join('')+
      '</div>';
  }
  const psA=taskParticipants(t);
  body+='<div class="field" style="margin-top:12px;"><label>Сколько выплатить всего, ₽ <span class="tsub">— можно меньше или больше ориентира</span></label>'+
    '<input class="input-mini" id="taskPayAmount" type="number" min="0" style="width:100%;" value="'+t.reward+'"></div>'+
    '<div class="field"><label>Комментарий к сумме <span class="tsub">(обязателен, если платите меньше ориентира — сотрудник его увидит)</span></label>'+
    '<input class="input-mini" id="taskPayNote" style="width:100%;" placeholder="Например: часть работы пришлось переделывать"></div>'+
    (psA.length>1
      ? '<div class="tsub">Командная задача: сумма разделится поровну между '+psA.length+' участниками ('+psA.map(p=>escHtml(p.name)).join(', ')+').</div>'
      : '<div class="tsub">Сумма уйдёт сотруднику '+escHtml(t.claimedBy)+' в бухгалтерию как премия.</div>');
  openModal('Принять работу','',body,[
    {label:'Принять и начислить', cls:'btn-primary', action:()=>{
      const amt=parseFloat(document.getElementById('taskPayAmount').value);
      if(isNaN(amt)||amt<0){ toast('Укажите сумму выплаты','error'); return; }
      const note=document.getElementById('taskPayNote').value.trim();
      if(amt<t.reward && !note){ toast('Сумма меньше ориентира — обязательно прокомментируйте почему','error'); return; }
      const ps=taskParticipants(t);
      const names=ps.length?ps.map(p=>p.name):[t.claimedBy];
      const per=names.length>1? Math.round(amt/names.length) : amt;
      logTask(t,'Работа принята, начислено '+rub(amt)+(amt!==t.reward?' (ориентир был '+rub(t.reward)+')':'')+(names.length>1?' — по '+rub(per)+' на каждого из '+names.length:'')+(note?' · Комментарий: '+note:''));
      t.status='approved'; t.approvedAt=DATA.today; t.approvedBy=taskMe(); t.approvedAmount=amt;
      if(note) t.payNote=note;
      let pid=Math.max(9000,...(DATA.taskPayouts||[]).map(p=>p.id));
      names.forEach(nm=>{
        DATA.taskPayouts.unshift({
          id:++pid, taskId:t.id, employee:nm, amount:per,
          date:DATA.today, period:MONTH_NAMES[todayDate().getMonth()]+' '+todayDate().getFullYear(),
          paid:false,
        });
        notifyEmployee(nm, 'Задача «'+t.title+'» принята: вам начислено '+rub(per)+(amt<t.reward&&note?'. Комментарий владельца: '+note:''));
      });
      closeModal(); refreshTasksPage();
      toast(rub(amt)+(names.length>1?' разделено на '+names.length+' участников (по '+rub(per)+')':' начислено сотруднику '+names[0]), 'success');
      if(backToList && (DATA.tasks||[]).some(x=>x.status==='review')) openReviewListModal();
    }},
    {label:'На доработку', cls:'btn-danger', action:()=>{
      closeModal(); openTaskRejectModal(t.id, backToList);
    }},
  ]);
}

/* ============================================================
   ЗАПРОСЫ НА ПРОДЛЕНИЕ — решение владельца.
   Сотрудник просрочил, написал почему и сколько ещё нужно времени;
   владельцу приходит отдельный пуш, где он принимает решение.
============================================================ */
function pendingExtensionRequests(){
  return (DATA.tasks||[]).filter(t=>t.extensionRequest && t.extensionRequest.status==='pending');
}
function notifyEmployee(name, text){
  DATA.notifications.unshift({id:(DATA.notifications.length?Math.max(...DATA.notifications.map(x=>x.id)):0)+1,
    from:'Владелец', to:name, text:text, date:DATA.today, read:false});
  updateBellBadge();
}
/* Применение решения по продлению — используется списком и деталкой */
function applyExtensionApprove(t){
  const r=t.extensionRequest;
  const newDue=addDaysToNow(r.days);
  logTask(t,'Владелец разрешил продление до '+newDue+' (+'+r.days+' дн.)');
  if(!Array.isArray(t.extensions)) t.extensions=[];
  t.extensions.push({at:DATA.today+' '+nowTime(), comment:r.comment, days:r.days, newDue:newDue});
  t.dueAt=newDue;
  t.extensionRequest=null;
  notifyEmployee(t.claimedBy, 'Продление по задаче «'+t.title+'» одобрено — новый срок '+newDue);
  refreshTasksPage();
  toast('Продление разрешено, новый срок '+newDue, 'success');
}
function applyExtensionReject(t, note){
  logTask(t,'Владелец отклонил запрос на продление'+(note?': '+note:''));
  t.extensionRequest.status='rejected';
  if(note) t.extensionRequest.rejectNote=note;
  notifyEmployee(t.claimedBy, 'Продление по задаче «'+t.title+'» отклонено'+(note?' ('+note+')':'')+' — сдайте работу или откажитесь от задачи');
  refreshTasksPage();
  toast('Запрос отклонён', 'info');
}

    {label:'Разрешить (+'+r.days+' дн.)', cls:'btn-primary', action:()=>{
      applyExtensionApprove(t);

function openExtensionRequestsModal(){
  const reqs=pendingExtensionRequests();
  if(!reqs.length){ closeModal(); return; }
  let body='<div class="tsub" style="margin-bottom:12px;font-size:13px;">Сотрудники не успели в срок и просят продление. Ваше решение:</div>';
  body+=reqs.map(t=>{
    const r=t.extensionRequest;
    return '<div class="card" style="margin-bottom:10px;">'+
      '<div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;">'+
        '<div style="flex:1;min-width:200px;">'+
          '<div class="tname">'+escHtml(t.title)+'</div>'+
          '<div class="tsub" style="margin-top:3px;">Исполнитель: <b>'+escHtml(t.claimedBy||'—')+'</b> · срок был '+escHtml(t.dueAt||'—')+'</div>'+
          '<div class="tsub" style="margin-top:6px;padding:6px 8px;background:var(--glass-2);border-radius:7px;">Почему не успел: '+escHtml(r.comment)+'</div>'+
          '<div class="tsub" style="margin-top:4px;">Просит ещё: <b>'+r.days+' дн.</b></div>'+
        '</div>'+
        '<div style="display:flex;flex-direction:column;gap:8px;justify-content:center;">'+
          '<button class="btn btn-primary" data-ext-ok="'+t.id+'">Разрешить (+'+r.days+' дн.)</button>'+
          '<button class="btn btn-danger" data-ext-no="'+t.id+'">Отклонить</button>'+
          '<button class="btn btn-ghost btn-sm" data-ext-view="'+t.id+'" style="color:var(--accent-2);">Подробнее ▸</button>'+
        '</div>'+
      '</div></div>';
  }).join('');
  openModal('⏳ Запросы на продление ('+reqs.length+')', 'Требуют вашего решения', body, []);
  document.querySelectorAll('[data-ext-ok]').forEach(el=>el.addEventListener('click',()=>{
    const t=(DATA.tasks||[]).find(x=>x.id===parseInt(el.dataset.extOk));
    applyExtensionApprove(t);
    openExtensionRequestsModal();
  }));
  document.querySelectorAll('[data-ext-no]').forEach(el=>el.addEventListener('click',()=>{
    const t=(DATA.tasks||[]).find(x=>x.id===parseInt(el.dataset.extNo));
    applyExtensionReject(t, '');
    openExtensionRequestsModal();
  }));
  document.querySelectorAll('[data-ext-view]').forEach(el=>el.addEventListener('click',()=>{
    openExtensionDetailModal(parseInt(el.dataset.extView));
  }));
}

/* ============================================================
   МЕСЯЧНАЯ ПРОВЕРКА ДОЛГОСРОЧНЫХ — в конце месяца задачи
   приходят владельцу на проверку с начислением премии.
============================================================ */
function daysToMonthEnd(){
  const t=todayDate();
  const last=new Date(t.getFullYear(), t.getMonth()+1, 0);
  return Math.round((last-t)/86400000);
}
function longtermForMonthlyReview(){
  const period=MONTH_NAMES[todayDate().getMonth()]+' '+todayDate().getFullYear();
  return (DATA.tasks||[]).filter(t=>t.type==='longterm' && t.status==='claimed' &&
    !(DATA.taskPayouts||[]).some(p=>p.taskId===t.id && p.period===period));
}
function openMonthlyReviewModal(){
  const list=longtermForMonthlyReview();
  if(!list.length){ closeModal(); toast('Все долгосрочные задачи за месяц проверены','success'); return; }
  const period=MONTH_NAMES[todayDate().getMonth()]+' '+todayDate().getFullYear();
  let body='<div class="tsub" style="margin-bottom:12px;font-size:13px;">Конец месяца — проверьте работу по долгосрочным задачам и начислите премии за '+period+'.</div>';
  body+=list.map(t=>{
    const cps=(t.checkpoints||[]);
    const doneCnt=cps.filter(c=>c.done).length;
    return '<div class="card" style="margin-bottom:10px;">'+
      '<div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;">'+
        '<div style="flex:1;min-width:200px;">'+
          '<div class="tname">'+escHtml(t.title)+'</div>'+
          '<div class="tsub" style="margin-top:3px;">Исполнитель: <b>'+escHtml(t.claimedBy||'—')+'</b> · отчётов по проверкам: '+doneCnt+' из '+cps.length+'</div>'+
        '</div>'+
        '<div style="display:flex;align-items:center;gap:10px;">'+
          '<div class="mono tname" style="color:var(--positive);">'+rub(t.reward)+'/мес</div>'+
          '<button class="btn btn-primary" data-mrev-pay="'+t.id+'">Проверить и начислить</button>'+
        '</div>'+
      '</div></div>';
  }).join('');
  openModal('📅 Месячная проверка долгосрочных ('+list.length+')', 'Период: '+period, body, []);
  document.querySelectorAll('[data-mrev-pay]').forEach(el=>el.addEventListener('click',()=>{
    openMonthlyPremiumModal(parseInt(el.dataset.mrevPay), true);
  }));
}
/* Модалка месячной премии — вызывается с доски и из месячной проверки */
function openMonthlyPremiumModal(taskId, backToReview){
  const t=(DATA.tasks||[]).find(x=>x.id===taskId);
  if(!t) return;
  const period=MONTH_NAMES[todayDate().getMonth()]+' '+todayDate().getFullYear();
  const already=(DATA.taskPayouts||[]).find(p=>p.taskId===t.id && p.period===period);
  const cps=(t.checkpoints||[]);
  let body='<div class="field-grid">'+field('Задача', t.title)+field('Исполнитель', t.claimedBy)+field('Ставка', rub(t.reward)+' / мес')+field('Период', period)+'</div>';
  if(cps.length){
    body+='<div class="drill-block-label" style="margin-top:8px;">Отчёты по проверкам</div>'+
      cps.map(cp=>'<div class="tsub" style="margin-bottom:4px;"><span class="mono">'+cp.date+'</span> — '+(cp.done?escHtml(cp.report||'сдан'):'<span style="color:var(--negative);">нет отчёта</span>')+'</div>'+
        (cp.done&&cp.photo?'<img src="'+cp.photo+'" class="upload-preview" style="margin:2px 0 8px;max-width:150px;">':'')).join('');
  }
  if(already) body+='<div class="tsub" style="margin-top:8px;color:var(--warning);">'+ic('alert')+' За '+period+' уже начислено '+rub(already.amount)+' — повторное начисление добавится отдельной строкой.</div>';
  body+='<div class="field" style="margin-top:12px;"><label>Сумма премии, ₽ <span class="tsub">— можно меньше или больше ставки</span></label>'+
    '<input class="input-mini" id="monthPayAmount" type="number" min="0" style="width:100%;" value="'+t.reward+'"></div>'+
    '<div class="tsub">Задача останется в работе. Сумма уйдёт в бухгалтерию как премия за '+period+'.</div>';
  openModal('Премия за месяц','',body,[
    {label:'Начислить', cls:'btn-primary', action:()=>{
      const amt=parseFloat(document.getElementById('monthPayAmount').value);
      if(isNaN(amt)||amt<0){ toast('Укажите сумму','error'); return; }
      const psM=taskParticipants(t);
      const namesM=psM.length?psM.map(p=>p.name):[t.claimedBy];
      const perM=namesM.length>1? Math.round(amt/namesM.length) : amt;
      let pidM=Math.max(9000,...(DATA.taskPayouts||[]).map(p=>p.id));
      namesM.forEach(nm=>{
        DATA.taskPayouts.unshift({ id:++pidM, taskId:t.id, employee:nm, amount:perM, date:DATA.today, period:period, paid:false });
      });
      logTask(t,'Начислена месячная премия '+rub(amt)+' за '+period+(namesM.length>1?' — по '+rub(perM)+' на каждого из '+namesM.length:''));
      closeModal(); refreshTasksPage();
      toast(rub(amt)+(namesM.length>1?' разделено на '+namesM.length+' участников':' начислено — премия за '+period+' ('+t.claimedBy+')'),'success');
      if(backToReview) openMonthlyReviewModal();
    }},
    {label:'На доработку', cls:'btn-danger', action:()=>{
      closeModal(); openTaskRejectModal(t.id, false);
    }},
  ]);
}
/* Модалка возврата на доработку */
function openTaskRejectModal(taskId, backToList){
  const t=(DATA.tasks||[]).find(x=>x.id===taskId);
  if(!t) return;
  const body='<div class="field"><label>Что доделать <span style="color:var(--negative);">*</span></label>'+
    '<input class="input-mini" id="rejWhy" style="width:100%;" placeholder="Причина возврата"></div>';
  openModal('Вернуть на доработку','',body,[{label:'Вернуть', cls:'btn-danger', action:()=>{
    const w=document.getElementById('rejWhy').value.trim();
    if(!w){ toast('Укажите причину','error'); return; }
    logTask(t,'Возвращена на доработку: '+w);
    t.status='rejected'; t.rejectReason=w;
    closeModal(); refreshTasksPage(); toast('Возвращено на доработку','info');
    if(backToList && (DATA.tasks||[]).some(x=>x.status==='review')) openReviewListModal();
  }}]);
}
/* Список сданных работ «Ждут вашей приёмки» — с фильтрами по типу и сотруднику */
function openReviewListModal(){
  if(!STATE.reviewFilter) STATE.reviewFilter={type:'all', emp:'all'};
  const f=STATE.reviewFilter;
  const allReview=(DATA.tasks||[]).filter(t=>t.status==='review');
  const emps=[...new Set(allReview.map(t=>t.claimedBy).filter(Boolean))];
  /* Счётчики зависят друг от друга: числа типов — по выбранному сотруднику,
     числа сотрудников — по выбранному типу. Иначе цифры врут. */
  const byEmp = f.emp==='all' ? allReview : allReview.filter(t=>t.claimedBy===f.emp);
  const byType = f.type==='all' ? allReview : allReview.filter(t=>t.type===f.type);
  const list = byEmp.filter(t=>f.type==='all' || t.type===f.type);

  let body='<div class="toolbar" style="margin-bottom:14px;">'+
    '<div class="chip-tabs">'+
      [['all','Все'],['oneoff','Одноразовые'],['longterm','Долгосрочные']].map(p=>{
        const n=p[0]==='all'?byEmp.length:byEmp.filter(t=>t.type===p[0]).length;
        return '<div class="chip-tab '+(f.type===p[0]?'active':'')+'" data-rvtype="'+p[0]+'">'+p[1]+(n?' ('+n+')':'')+'</div>';
      }).join('')+
    '</div>'+
    '<select class="select-mini" id="rvEmpSel" style="min-width:190px;">'+
      '<option value="all"'+(f.emp==='all'?' selected':'')+'>Все сотрудники ('+byType.length+')</option>'+
      emps.map(e=>'<option value="'+escAttr(e)+'"'+(f.emp===e?' selected':'')+'>'+escHtml(e)+' ('+byType.filter(t=>t.claimedBy===e).length+')</option>').join('')+
    '</select>'+
  '</div>';

  if(!list.length){
    body+='<div class="empty"><b>Под выбранный фильтр ничего не попало</b></div>';
  } else {
    body+=list.map(t=>{
      const typeLbl=TASK_TYPES[t.type]||'—';
      return '<div class="card" style="margin-bottom:10px;">'+
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;">'+
          '<div style="flex:1;min-width:180px;">'+
            '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;"><div class="tname">'+escHtml(t.title)+'</div>'+
              '<span class="badge '+(t.type==='longterm'?'b-progress':'b-grey')+'">'+typeLbl+'</span></div>'+
            '<div class="tsub" style="margin-top:3px;">Исполнитель: <b>'+escHtml(t.claimedBy||'—')+'</b> · сдано '+(t.doneAt||'—')+'</div>'+
            (t.report?'<div class="tsub" style="margin-top:6px;padding:6px 8px;background:var(--glass-2);border-radius:7px;">'+escHtml(t.report)+'</div>':'')+
            (t.photo?'<img src="'+t.photo+'" class="upload-preview" style="margin-top:6px;max-width:140px;">':'')+
          '</div>'+
          '<div style="text-align:right;">'+
            '<div class="mono tname" style="color:var(--positive);">'+rub(t.reward)+'</div>'+
            '<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;justify-content:flex-end;">'+
              '<button class="btn btn-sm btn-primary" data-rv-approve="'+t.id+'">Принять</button>'+
              '<button class="btn btn-sm btn-danger" data-rv-reject="'+t.id+'">Вернуть</button>'+
            '</div>'+
          '</div>'+
        '</div>'+
      '</div>';
    }).join('');
  }
  openModal('Ждут вашей приёмки ('+allReview.length+')', 'Сданные работы сотрудников', body, []);
  document.querySelectorAll('[data-rvtype]').forEach(el=>el.addEventListener('click',()=>{ STATE.reviewFilter.type=el.dataset.rvtype; openReviewListModal(); }));
  const es=document.getElementById('rvEmpSel');
  if(es) es.addEventListener('change',()=>{ STATE.reviewFilter.emp=es.value; openReviewListModal(); });
  document.querySelectorAll('[data-rv-approve]').forEach(el=>el.addEventListener('click',()=>openTaskApproveModal(parseInt(el.dataset.rvApprove), true)));
  document.querySelectorAll('[data-rv-reject]').forEach(el=>el.addEventListener('click',()=>openTaskRejectModal(parseInt(el.dataset.rvReject), true)));
}

function newIdeas(){ return taskIdeas().filter(i=>i.status==='new'); }

      '<img id="ideaPreview" class="upload-preview" style="display:none;max-width:140px;"></div>'+
    '<div class="tsub">Идею увидит владелец. Если она понравится — из неё сделают задачу с вознаграждением, а вы получите уведомление.</div>';

    body+='<div class="drill-divider" style="margin-top:16px;"></div><div class="drill-block-label">Мои идеи ('+mine.length+')</div>'+

          '</div></div></div>';
      }).join('');
  }
  openModal('💡 Предложить идею','Владелец рассмотрит и может сделать из идеи задачу с вознаграждением',body,[{label:'Отправить идею', cls:'btn-primary', action:()=>{
    const title=document.getElementById('ideaTitle').value.trim();
    const text=document.getElementById('ideaText').value.trim();
    if(!title){ toast('Назовите идею','error'); return; }
    if(!text){ toast('Опишите суть идеи','error'); return; }
    taskIdeas().unshift({id:(taskIdeas().length?Math.max(...taskIdeas().map(x=>x.id)):0)+1,
      by:me, at:DATA.today+' '+nowTime(), title:title, text:text, photo:window._ideaPhoto||null,

function renderTasks(c){
  ensureTaskNums();
  checkTeamJoinDeadlines();
  const isManager=STATE.role==='owner'||STATE.role==='senior';
  const me=taskMe();
  if(!STATE.seenTaskIds) STATE.seenTaskIds=new Set();
  if(!STATE.taskEmpFilter) STATE.taskEmpFilter='all';
  const all=DATA.tasks||[];

  /* Доски: у исполнителя new|mine|archive, у владельца new|active|archive */
  /* У исполнителя приоритет — «Мои задачи»; у владельца — «В исполнении»,
     а доска объявлений — отдельная вкладка (там же и создание задач) */
  const boards = isManager
    ? [['active','В исполнении'],['new','Доска объявлений'],['archive','Архив']]
    : [['mine','Мои задачи'],['new','Новые'],['archive','Архив']];
  if(!STATE.taskBoard || !boards.some(b=>b[0]===STATE.taskBoard)) STATE.taskBoard=boards[0][0];
  const board=STATE.taskBoard;

  /* Просмотр доски «Новые» снимает «!» */
  if(board==='new') all.forEach(t=>{ if(t.status==='open') STATE.seenTaskIds.add(t.id); });

  const myPayouts=(DATA.taskPayouts||[]).filter(p=>p.employee===me);
  const myEarned=myPayouts.reduce((s,p)=>s+p.amount,0);
  const toReview=all.filter(t=>t.status==='review');
  const openSum=all.filter(t=>t.status==='open').reduce((s,t)=>s+t.reward,0);
  const myActive=all.filter(t=>isTaskParticipant(t, me) && (TASK_ACTIVE_STATUSES.includes(t.status) || t.status==='open'));
  const myOverdue=myActive.filter(taskIsOverdue);

  /* Сводка убрана — цифры сотрудник видит на своей «Главной» */
  let html='';
  /* Закреплённый бар оповещений: виден даже при прокрутке доски */
  const mrLead=(DATA.settings && DATA.settings.monthlyReviewLeadDays!=null)?DATA.settings.monthlyReviewLeadDays:2;
  const alertPills=[];
  if(isManager && toReview.length) alertPills.push({key:'review', cls:'tp-warn', icon:ic('alert'), label:'Ждут приёмки', count:toReview.length, go:'Посмотреть'});
  if(STATE.role==='owner' && pendingExtensionRequests().length) alertPills.push({key:'ext', cls:'tp-danger', icon:'⏳', label:'Продление срока', count:pendingExtensionRequests().length, go:'Решить'});
  if(STATE.role==='owner' && daysToMonthEnd()<=mrLead && longtermForMonthlyReview().length) alertPills.push({key:'monthly', cls:'tp-accent', icon:'📅', label:'Месячная проверка', count:longtermForMonthlyReview().length, go:'Провести'});
  const unseenRefusals=(DATA.taskRefusals||[]).filter(r=>!r.seen);
  if(STATE.role==='owner' && unseenRefusals.length) alertPills.push({key:'refusals', cls:'tp-danger', icon:ic('x'), label:'Отказы от долгосрочных', count:unseenRefusals.length, go:'Смотреть'});
  if(isManager && newIdeas().length) alertPills.push({key:'ideas', cls:'tp-accent', icon:'💡', label:'Новые идеи сотрудников', count:newIdeas().length, go:'Посмотреть'});
  /* У сотрудников закрепа нет: о просрочке им говорят пуш при входе,
     красный колокольчик и красные карточки на «Моих задачах» */
  if(alertPills.length){
    html+='<div class="task-alert-bar">'+alertPills.map(p=>
      '<button class="task-pill '+p.cls+'" data-talert="'+p.key+'">'+p.icon+' '+p.label+
      ' <span class="tp-count">'+p.count+'</span><span class="tp-go">'+p.go+' ▸</span></button>').join('')+
    '</div>';
  }


  /* Плашка «Предложить идею» — только у сотрудников */
  if(!isManager){
    const mineIdeas=taskIdeas().filter(i=>i.by===me);
    const pending=mineIdeas.filter(i=>i.status==='new').length;
    html+='<div class="card" id="ideaBanner" style="margin-bottom:14px;padding:16px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;cursor:pointer;border-style:dashed;">'+
      '<div style="font-size:24px;flex:0 0 auto;">💡</div>'+
      '<div style="flex:1;min-width:200px;"><div class="tname" style="font-size:15px;">Предложить идею</div>'+
      '<div class="tsub" style="margin-top:3px;">Хорошая идея может стать задачей с вознаграждением'+
      (mineIdeas.length?' · Мои идеи: '+mineIdeas.length+(pending?' (на рассмотрении: '+pending+')':''):'')+'</div></div>'+
      '<button class="btn btn-primary" style="padding:10px 18px;pointer-events:none;">Предложить ▸</button></div>';
  }

  /* Один тулбар: доски + создать (тип виден бейджем на карточке) */
  const cnt = b=>{
    if(b==='new') return all.filter(t=>t.status==='open').length;
    if(b==='mine') return myActive.length;
    if(b==='active') return all.filter(t=>TASK_ACTIVE_STATUSES.includes(t.status)).length;
    return all.filter(t=>TASK_ARCHIVE_STATUSES.includes(t.status) && (isManager || isTaskParticipant(t, me))).length;
  };
  if(!STATE.taskSumFilter) STATE.taskSumFilter='all';
  const SUM_RANGES=[['all','Любая сумма'],['0-999','До 1 000 ₽'],['1000-2999','1 000–3 000 ₽'],['3000-9999','3 000–10 000 ₽'],['10000-99999999','От 10 000 ₽']];
  html+='<div class="toolbar" style="margin-bottom:6px;">'+
    '<div class="chip-tabs" style="padding:5px;">'+boards.map(b=>{
      /* Число задач во вкладку не пишем; «!» — если появилась новая задача */
      const alert=(b[0]==='new' && hasNewOpenTasks())?'<span class="nav-badge" style="margin-left:8px;">!</span>':'';
      return '<div class="chip-tab '+(board===b[0]?'active':'')+'" data-tboard="'+b[0]+'" style="padding:11px 22px;font-size:14px;display:inline-flex;align-items:center;">'+b[1]+alert+'</div>';
    }).join('')+'</div>'+
    (board==='new'?'<select class="select-mini" id="taskSumSel" title="Фильтр по вознаграждению" style="padding:12px 14px;font-size:13px;border-radius:11px;">'+
      SUM_RANGES.map(p=>'<option value="'+p[0]+'"'+(STATE.taskSumFilter===p[0]?' selected':'')+'>'+p[1]+'</option>').join('')+
    '</select>':'')+
    '<div class="topbar-spacer"></div>'+
    (isManager?'<button class="btn" id="ideasBtn" title="Идеи сотрудников" style="padding:11px 14px;">💡'+(newIdeas().length?'<span class="nav-badge" style="margin-left:6px;">'+newIdeas().length+'</span>':'')+'</button>':'')+
    (STATE.role==='owner'?'<button class="btn" id="taskSettingsBtn" title="Настройки задач" style="padding:11px 14px;">'+ic('gear')+'</button>':'')+
    (isManager && board==='new'?'<button class="btn btn-primary" id="newTaskBtn" style="padding:11px 22px;font-size:13.5px;">'+ic('plus')+' Создать задачу</button>':'')+
  '</div>';
  /* Числа задач — неприметной строкой под вкладками */
  html+='<div class="tsub" style="margin:0 0 16px 6px;font-size:11px;opacity:.75;">'+
    boards.map(b=>b[1]+': '+cnt(b[0])).join(' · ')+'</div>';

  /* Ближайшая «дата внимания»: несданная проверка или срок сдачи.
     По ней всплывают наверх задачи, по которым скоро отчёт/проверка. */
  const nextAttentionTs=function(t){
    const cands=[];
    if(t.type==='longterm' && Array.isArray(t.checkpoints)){
      t.checkpoints.forEach(cp=>{ if(!cp.done) cands.push(parseRuDateTime(cp.date,'00:00')); });
    }
    if(t.dueAt){ const p=String(t.dueAt).split(' '); cands.push(parseRuDateTime(p[0], p[1]||'23:59')); }
    return cands.length? Math.min.apply(null,cands) : Infinity;
  };

  /* Список текущей доски */
  let list=[];
  if(board==='new'){
    list=all.filter(t=>t.status==='open');
    if(STATE.taskSumFilter!=='all'){
      const [mn,mx]=STATE.taskSumFilter.split('-').map(Number);
      list=list.filter(t=>t.reward>=mn && t.reward<=mx);
    }
    /* Новые — друг за другом: свежие объявления сверху */
    list=list.slice().sort((a,b)=>(parseRuDateTime(b.createdAt,'00:00')-parseRuDateTime(a.createdAt,'00:00')) || (b.id-a.id));
  } else if(board==='mine'){
    /* Наверх — то, что скоро сдавать; сданное на проверку — в конец */
    list=myActive.slice().sort((a,b)=>{
      const ra=a.status==='review'?1:0, rb=b.status==='review'?1:0;
      if(ra!==rb) return ra-rb;
      return nextAttentionTs(a)-nextAttentionTs(b);
    });
  } else if(board==='active'){
    list=all.filter(t=>TASK_ACTIVE_STATUSES.includes(t.status));
    /* Фильтр по сотруднику — сколько и каких задач у работника */
    const emps=[...new Set(list.flatMap(t=>taskParticipants(t).map(p=>p.name)))];
    html+='<div class="toolbar" style="margin-top:-6px;">'+
      '<select class="select-mini" id="taskEmpSel" style="min-width:220px;">'+
        '<option value="all"'+(STATE.taskEmpFilter==='all'?' selected':'')+'>Все сотрудники ('+list.length+')</option>'+
        emps.map(e=>'<option value="'+escAttr(e)+'"'+(STATE.taskEmpFilter===e?' selected':'')+'>'+escHtml(e)+' ('+list.filter(t=>t.claimedBy===e).length+')</option>').join('')+
      '</select></div>';
    if(STATE.taskEmpFilter!=='all') list=list.filter(t=>isTaskParticipant(t, STATE.taskEmpFilter));
    /* Приоритет владельца: сперва требующие коррекции/помощи —
       сданные на проверку и запросы продления, затем просрочки и
       наступившие проверки, потом остальные по близости срока */
    const attentionRank=t=>{
      if(taskIsOverdue(t)) return 0;                 // не сдана вовремя — поднимается на самый верх
      if(t.status==='review') return 0;
      if(t.extensionRequest && t.extensionRequest.status==='pending') return 0;
      if(t.type==='longterm' && (t.checkpoints||[]).some(cp=>!cp.done && taskNow()>=parseRuDateTime(cp.date,'00:00'))) return 1;
      return 2;
    };
    list=list.slice().sort((a,b)=>(attentionRank(a)-attentionRank(b)) || (nextAttentionTs(a)-nextAttentionTs(b)));
  } else {
    list=all.filter(t=>TASK_ARCHIVE_STATUSES.includes(t.status));
    /* Сотрудник видит только СВОЙ архив */
    if(!isManager) list=list.filter(t=>isTaskParticipant(t, me));
    /* Архив: фильтр по итогу (принятые/отменённые) и по сотруднику */
    if(isManager){
      if(!STATE.taskArchEmpFilter) STATE.taskArchEmpFilter='all';
      if(!STATE.taskArchStatus) STATE.taskArchStatus='all';
      const byEmpBase = STATE.taskArchEmpFilter==='all' ? list : list.filter(t=>isTaskParticipant(t, STATE.taskArchEmpFilter));
      const byStBase = STATE.taskArchStatus==='all' ? list : list.filter(t=>t.status===STATE.taskArchStatus);
      const archEmps=[...new Set(list.flatMap(t=>taskParticipants(t).map(p=>p.name)))];
      html+='<div class="toolbar" style="margin-top:-6px;">'+
        '<div class="chip-tabs">'+
          [['all','Все'],['approved','Завершённые'],['cancelled','Отменённые']].map(p=>{
            const n=p[0]==='all'?byEmpBase.length:byEmpBase.filter(t=>t.status===p[0]).length;
            return '<div class="chip-tab '+(STATE.taskArchStatus===p[0]?'active':'')+'" data-archst="'+p[0]+'">'+p[1]+(n?' ('+n+')':'')+'</div>';
          }).join('')+
        '</div>'+
        '<select class="select-mini" id="taskArchEmpSel" style="min-width:220px;">'+
          '<option value="all"'+(STATE.taskArchEmpFilter==='all'?' selected':'')+'>Все сотрудники ('+byStBase.length+')</option>'+
          archEmps.map(e=>'<option value="'+escAttr(e)+'"'+(STATE.taskArchEmpFilter===e?' selected':'')+'>'+escHtml(e)+' ('+byStBase.filter(t=>isTaskParticipant(t,e)).length+')</option>').join('')+
        '</select></div>';
      if(STATE.taskArchEmpFilter!=='all') list=list.filter(t=>isTaskParticipant(t, STATE.taskArchEmpFilter));
      if(STATE.taskArchStatus!=='all') list=list.filter(t=>t.status===STATE.taskArchStatus);
    }
  }

  /* Кнопки действий для карточки — общие для обоих режимов раскладки */
  const cardFor=function(t){
    const mine=t.claimedBy===me;
    let btns='';
    if(board==='new'){
      if(!isManager){
        if(isTaskParticipant(t, me)) btns+='<span class="badge b-done" style="align-self:center;">Вы участвуете</span>';
        else if(taskNeeded(t)>1) btns+='<button class="btn btn-primary" data-claim="'+t.id+'">Присоединиться ('+taskParticipants(t).length+'/'+taskNeeded(t)+')</button>';
        else btns+='<button class="btn btn-primary" data-claim="'+t.id+'">Забрать себе</button>';
      }
      if(isManager) btns+='<button class="btn btn-danger" data-cancel-task="'+t.id+'">Отменить задачу</button>';
    } else if(board==='mine'){
      if(t.status==='claimed'){
        const dueCp=(t.type==='longterm'&&Array.isArray(t.checkpoints))?t.checkpoints.find(cp=>!cp.done&&taskNow()>=parseRuDateTime(cp.date,'00:00')):null;
        if(dueCp) btns+='<button class="btn btn-primary" data-cp-report="'+t.id+'">Отчитаться по проверке '+dueCp.date+'</button>';
        btns+='<button class="btn btn-primary" data-report="'+t.id+'">Сдать работу</button>';
        if(!taskIsOverdue(t)) btns+='<button class="btn" data-unclaim="'+t.id+'">Отказаться</button>';
      }
      if(t.status==='rejected') btns+='<button class="btn btn-primary" data-report="'+t.id+'">Сдать повторно</button>';
      if(t.status==='claimed'||t.status==='rejected') btns+='<button class="btn" data-note="'+t.id+'">Заметка</button>';
    } else if(board==='active'){
      if(t.status==='review') btns+='<button class="btn btn-primary" data-approve="'+t.id+'">Принять и начислить</button>'+
        '<button class="btn btn-danger" data-reject="'+t.id+'">Вернуть на доработку</button>';
      if(t.type==='longterm' && t.status==='claimed') btns+='<button class="btn btn-primary" data-pay-month="'+t.id+'">Начислить премию за месяц</button>';
      if(taskIsOverdue(t)) btns+='<button class="btn" data-takeback="'+t.id+'">Забрать задачу</button>';
      btns+='<button class="btn btn-danger" data-cancel-task="'+t.id+'">Отменить задачу</button>';
    }
    return taskCardHTML(t,{actions:btns, overdueBlock:(board==='mine'&&mine)});
  };

  if(!list.length){
    html+='<div class="card"><div class="empty"><b>'+(board==='archive'?'Архив пуст':'Нет задач')+'</b></div></div>';
  } else if(board==='mine'||board==='active'){
    /* Две колонки: слева одноразовые, справа долгосрочные */
    const oneoff=list.filter(t=>t.type==='oneoff');
    const longterm=list.filter(t=>t.type==='longterm');
    const col=function(title, arr, kind){
      const accent = kind==='longterm' ? 'var(--warning)' : 'var(--teal)';
      return '<div style="background:var(--glass-2);border:1px solid var(--glass-border-soft);border-radius:18px;padding:20px;">'+
        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--glass-border-soft);">'+
          '<span style="width:11px;height:11px;border-radius:4px;background:'+accent+';flex:0 0 auto;"></span>'+
          '<div class="section-title" style="font-size:16px;">'+title+' ('+arr.length+')</div>'+
        '</div>'+
        (arr.length? '<div style="display:flex;flex-direction:column;gap:18px;">'+arr.map(cardFor).join('')+'</div>'
                   : '<div class="card"><div class="empty"><b>Пусто</b></div></div>')+
      '</div>';
    };
    html+='<div class="grid grid-2" style="gap:22px;align-items:start;">'+
      col('Одноразовые', oneoff, 'oneoff')+
      col('Долгосрочные', longterm, 'longterm')+
    '</div>';
  } else {
    /* Общий список — тип подписан бейджем на каждой карточке */
    html+='<div class="grid grid-2" style="grid-template-columns:1fr;gap:18px;">'+list.map(cardFor).join('')+'</div>';
  }

  /* Таблица премий здесь не дублируется — она в Бухгалтерии, отдельной плашкой */

  c.innerHTML=html;
  const rr=()=>renderTasks(c);
  renderSidebar(); renderMobileTabBar();

  c.querySelectorAll('[data-tboard]').forEach(el=>el.addEventListener('click',()=>{ STATE.taskBoard=el.dataset.tboard; rr(); }));
  c.querySelectorAll('[data-view-task]').forEach(el=>el.addEventListener('click',()=>openTaskViewModal(parseInt(el.dataset.viewTask))));
  const sumSel=document.getElementById('taskSumSel');
  if(sumSel) sumSel.addEventListener('change',()=>{ STATE.taskSumFilter=sumSel.value; rr(); });
  const empSel=document.getElementById('taskEmpSel');
  if(empSel) empSel.addEventListener('change',()=>{ STATE.taskEmpFilter=empSel.value; rr(); });
  const archSel=document.getElementById('taskArchEmpSel');
  if(archSel) archSel.addEventListener('change',()=>{ STATE.taskArchEmpFilter=archSel.value; rr(); });
  c.querySelectorAll('[data-archst]').forEach(el=>el.addEventListener('click',()=>{ STATE.taskArchStatus=el.dataset.archst; rr(); }));

  c.querySelectorAll('[data-claim]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    joinTask(parseInt(el.dataset.claim));
  }));

  c.querySelectorAll('[data-unclaim]').forEach(el=>el.addEventListener('click',()=>{
    const t=all.find(x=>x.id===parseInt(el.dataset.unclaim));
    const doRefuse=()=>{
      if(taskNeeded(t)>1){
        logTask(t,me+' вышел(ла) из состава участников');
        t.participants=taskParticipants(t).filter(p=>p.name!==me);
        syncTaskClaimedBy(t);
        t.status='open';
        STATE.seenTaskIds.delete(t.id);
        rr(); toast('Вы вышли из задачи — набор снова открыт', 'info');
        return;
      }
      logTask(t,'Исполнитель отказался — задача вернулась на доску');
      t.status='open'; t.claimedBy=null; t.claimedAt=null; t.participants=[];
      if(t.dueDays) t.dueAt='';   // срок «с момента взятия» отсчитается заново
      STATE.seenTaskIds.delete(t.id);
      rr(); toast('Задача снова свободна', 'info');
    };
    if(t.type==='longterm'){ refuseLongtermTask(t, me, doRefuse); }
    else doRefuse();
  }));

  c.querySelectorAll('[data-giveup]').forEach(el=>el.addEventListener('click',()=>{
    const t=all.find(x=>x.id===parseInt(el.dataset.giveup));
    const doGiveup=()=>{
      logTask(t,'Отказ после просрочки — задача вернулась на доску');
      t.status='open'; t.claimedBy=null; t.claimedAt=null; t.participants=[];
      if(t.dueDays) t.dueAt='';
      STATE.seenTaskIds.delete(t.id);
      rr(); toast('Вы отказались от задачи — она вернулась на доску', 'info');
    };
    if(t.type==='longterm'){ refuseLongtermTask(t, me, doGiveup); }
    else doGiveup();
  }));

  /* Прикрепление материала (фото) к задаче в ходе работы */
  c.querySelectorAll('[data-attach]').forEach(el=>el.addEventListener('click',()=>{
    const t=all.find(x=>x.id===parseInt(el.dataset.attach));
    const body='<div class="field-grid">'+field('Задача', t.title)+field('Материалов уже', String((t.attachments||[]).length))+'</div>'+
      '<div class="field"><label>Фото <span style="color:var(--negative);">*</span></label>'+
        '<div class="upload-box" id="attachBox"><div class="upload-ico">'+ic('camera')+'</div><div class="upload-txt"><b>Прикрепить фото</b><span>Нажмите, чтобы выбрать файл</span></div><input type="file" id="attachInput" accept="image/*" style="display:none;"></div>'+
        '<img id="attachPreview" class="upload-preview" style="display:none;">'+
      '</div>'+
      '<div class="field"><label>Подпись к материалу (по желанию)</label>'+
      '<input class="input-mini" id="attachNote" style="width:100%;" placeholder="Например: промежуточный результат"></div>';
    openModal('Прикрепить материал','',body,[{label:'Сохранить', cls:'btn-primary', action:()=>{
      const prev=document.getElementById('attachPreview');
      if(!prev || prev.style.display==='none'){ toast('Выберите фото','error'); return; }
      if(!Array.isArray(t.attachments)) t.attachments=[];
      const note=document.getElementById('attachNote').value.trim();
      t.attachments.push({src:prev.src, note:note, by:taskMe(), at:DATA.today+' '+nowTime()});
      logTask(t,'Прикреплён материал'+(note?': '+note:''));
      STATE.expandedTaskIds.add(t.id);
      closeModal(); rr(); toast('Материал прикреплён к задаче','success');
    }}]);
    wireUpload('attachBox','attachInput','attachPreview');
  }));

  /* Отчёт по контрольной дате долгосрочной задачи */
  c.querySelectorAll('[data-cp-report]').forEach(el=>el.addEventListener('click',()=>{
    const t=all.find(x=>x.id===parseInt(el.dataset.cpReport));
    const cp=(t.checkpoints||[]).find(x=>!x.done && taskNow()>=parseRuDateTime(x.date,'00:00'));
    if(!cp) return;
    const body='<div class="field-grid">'+field('Задача', t.title)+field('Дата проверки', cp.date)+'</div>'+
      '<div class="field"><label>Что сделано к этой проверке <span style="color:var(--negative);">*</span></label>'+
      '<textarea class="textarea-mini" id="cpReportText" rows="4" style="width:100%;font-family:inherit;" placeholder="Промежуточный отчёт — владелец увидит его на карточке задачи"></textarea></div>'+
      '<div class="field"><label>Материал (фото, по желанию)</label>'+
        '<div class="upload-box" id="cpPhotoBox"><div class="upload-ico">'+ic('camera')+'</div><div class="upload-txt"><b>Прикрепить фото</b><span>Нажмите, чтобы выбрать файл</span></div><input type="file" id="cpPhotoInput" accept="image/*" style="display:none;"></div>'+
        '<img id="cpPhotoPreview" class="upload-preview" style="display:none;">'+
      '</div>';
    openModal('Отчёт по проверке','',body,[{label:'Сдать отчёт', cls:'btn-primary', action:()=>{
      const txt=document.getElementById('cpReportText').value.trim();
      if(!txt){ toast('Опишите, что сделано','error'); return; }
      const prev=document.getElementById('cpPhotoPreview');
      cp.photo=(prev && prev.style.display!=='none')?prev.src:null;
      logTask(t,'Сдан отчёт по проверке '+cp.date);
      cp.done=true; cp.report=txt; cp.reportedAt=DATA.today+' '+nowTime();
      closeModal(); rr(); toast('Отчёт по проверке '+cp.date+' сдан','success');
    }}]);
    wireUpload('cpPhotoBox','cpPhotoInput','cpPhotoPreview');
  }));

  c.querySelectorAll('[data-continue]').forEach(el=>el.addEventListener('click',()=>{
    const t=all.find(x=>x.id===parseInt(el.dataset.continue));
    const body='<div class="tsub" style="margin-bottom:10px;">Запрос уйдёт владельцу — продление начнёт действовать только после его решения.</div>'+
      '<div class="field"><label>Почему затягивается <span style="color:var(--negative);">*</span></label>'+
      '<textarea class="textarea-mini" id="contComment" rows="3" style="width:100%;font-family:inherit;" placeholder="Причина задержки"></textarea></div>'+
      '<div class="field"><label>Сколько ещё нужно времени, дней <span style="color:var(--negative);">*</span></label>'+
      '<input class="input-mini" id="contDays" type="number" min="1" style="width:100%;" placeholder="например, 2"></div>';
    openModal('Продолжить задачу', escHtml(t.title), body, [{label:'Отправить запрос владельцу', cls:'btn-primary', action:()=>{
      const cm=document.getElementById('contComment').value.trim();
      const days=parseInt(document.getElementById('contDays').value);
      if(!cm){ toast('Укажите причину задержки','error'); return; }
      if(!days||days<1){ toast('Укажите, сколько ещё нужно дней','error'); return; }
      logTask(t,'Запрошено продление на '+days+' дн. — '+cm);
      t.extensionRequest={comment:cm, days:days, requestedAt:DATA.today+' '+nowTime(), status:'pending'};
      closeModal(); rr(); toast('Запрос отправлен владельцу — ждите решения', 'info');
    }}]);
  }));

  c.querySelectorAll('[data-report]').forEach(el=>el.addEventListener('click',()=>{
    const t=all.find(x=>x.id===parseInt(el.dataset.report));
    const body='<div class="field-grid">'+field('Задача', t.title)+field('Вознаграждение (ориентир)', rub(t.reward))+'</div>'+
      '<div class="field"><label>Что сделано <span style="color:var(--negative);">*</span></label>'+
      '<textarea class="textarea-mini" id="taskReport" rows="4" style="width:100%;font-family:inherit;" placeholder="Опишите результат — владелец увидит при приёмке">'+escHtml(t.report||'')+'</textarea></div>'+
      '<div class="field"><label>Фото результата <span style="color:var(--negative);">*</span></label>'+
        '<div class="upload-box" id="taskPhotoBox"><div class="upload-ico">'+ic('camera')+'</div><div class="upload-txt"><b>Прикрепить фото</b><span>Нажмите, чтобы выбрать файл</span></div><input type="file" id="taskPhotoInput" accept="image/*" style="display:none;"></div>'+
        '<img id="taskPhotoPreview" class="upload-preview" style="display:'+(t.photo?'block':'none')+';"'+(t.photo?' src="'+t.photo+'"':'')+'>'+
      '</div>';
    openModal('Сдать работу','',body,[{label:'Отправить на проверку', cls:'btn-primary', action:()=>{
      const r=document.getElementById('taskReport').value.trim();
      if(!r){ toast('Опишите, что сделано','error'); return; }
      const prev=document.getElementById('taskPhotoPreview');
      t.photo = (prev && prev.style.display!=='none') ? prev.src : (t.photo||null);
      if(!t.photo){ toast('Прикрепите фото результата — без него работа не принимается','error'); return; }
      logTask(t,'Работа сдана на проверку');
      t.report=r; t.status='review'; t.doneAt=DATA.today; t.rejectReason=null;
      closeModal(); rr(); toast('Отправлено на проверку владельцу','success');
    }}]);
    wireUpload('taskPhotoBox','taskPhotoInput','taskPhotoPreview');
  }));

  c.querySelectorAll('[data-approve]').forEach(el=>el.addEventListener('click',()=>openTaskApproveModal(parseInt(el.dataset.approve))));

  c.querySelectorAll('[data-reject]').forEach(el=>el.addEventListener('click',()=>openTaskRejectModal(parseInt(el.dataset.reject))));

  c.querySelectorAll('[data-talert]').forEach(el=>el.addEventListener('click',()=>{
    const k=el.dataset.talert;
    if(k==='review') openReviewListModal();
    else if(k==='ext') openExtensionRequestsModal();
    else if(k==='monthly') openMonthlyReviewModal();
    else if(k==='refusals') openTaskRefusalsModal();
    else if(k==='ideas') openIdeasListModal();
    else if(k==='myoverdue'){ STATE.taskBoard='mine'; rr(); }
  }));
  const ideasB=document.getElementById('ideasBtn');
  if(ideasB) ideasB.addEventListener('click', openIdeasListModal);
  const ideaBan=document.getElementById('ideaBanner');
  if(ideaBan) ideaBan.addEventListener('click', openIdeaProposeModal);
  const tsb=document.getElementById('taskSettingsBtn');
  if(tsb) tsb.addEventListener('click', ()=>{
    const cur=(DATA.settings && DATA.settings.monthlyReviewLeadDays!=null)?DATA.settings.monthlyReviewLeadDays:2;
    const curHrs=(DATA.settings && DATA.settings.teamJoinHours)||24;
    const body='<div class="field"><label>За сколько дней до конца месяца показывать «Месячную проверку долгосрочных»</label>'+
      '<input class="input-mini" id="setMrLead" type="number" min="0" max="15" style="width:100%;" value="'+cur+'"></div>'+
      '<p class="tsub">0 — только в последний день месяца. Сейчас до конца месяца: '+daysToMonthEnd()+' дн.</p>'+
      '<div class="field" style="margin-top:10px;"><label>Сколько часов на набор команды (командные задачи)</label>'+
      '<input class="input-mini" id="setJoinHrs" type="number" min="1" max="168" style="width:100%;" value="'+curHrs+'"></div>'+
      '<p class="tsub">С момента, как первый сотрудник взял командную задачу. Не набрались — стартует текущим составом.</p>';
    openModal('Настройки задач', '', body, [{label:'Сохранить', cls:'btn-primary', action:()=>{
      const v=parseInt(document.getElementById('setMrLead').value);
      const h=parseInt(document.getElementById('setJoinHrs').value);
      if(isNaN(v)||v<0){ toast('Введите число дней', 'error'); return; }
      if(isNaN(h)||h<1){ toast('Введите число часов', 'error'); return; }
      DATA.settings.monthlyReviewLeadDays=v;
      DATA.settings.teamJoinHours=h;
      closeModal(); rr();
      toast('Сохранено', 'success');
    }}]);
  });

  /* Владелец забирает просроченную задачу — общая модалка */
  c.querySelectorAll('[data-takeback]').forEach(el=>el.addEventListener('click',()=>openTaskTakebackModal(parseInt(el.dataset.takeback))));

  /* Личные заметки сотрудника по задаче — видит только автор */
  c.querySelectorAll('[data-note]').forEach(el=>el.addEventListener('click',()=>{
    const t=all.find(x=>x.id===parseInt(el.dataset.note));
    const myNotes=(t.myNotes||[]).filter(nn=>nn.by===me);
    const body=(myNotes.length?'<div class="drill-block-label">Мои заметки</div>'+
      myNotes.map(nn=>'<div class="hist-row"><div class="h-main" style="font-size:12.5px;">'+escHtml(nn.text)+'</div><div class="h-sub mono">'+nn.at+'</div></div>').join(''):'')+
      '<div class="field" style="margin-top:10px;"><label>Новая заметка <span class="tsub">(видите только вы)</span></label>'+
      '<textarea class="textarea-mini" id="taskNoteText" rows="3" style="width:100%;font-family:inherit;" placeholder="Например: договорился на четверг, перезвонить в 12:00"></textarea></div>';
    openModal('Заметки — '+escHtml(t.title),'',body,[{label:'Сохранить заметку', cls:'btn-primary', action:()=>{
      const txt=document.getElementById('taskNoteText').value.trim();
      if(!txt){ toast('Напишите текст заметки','error'); return; }
      if(!Array.isArray(t.myNotes)) t.myNotes=[];
      t.myNotes.push({by:me, at:DATA.today+' '+nowTime(), text:txt});
      closeModal(); rr(); toast('Заметка сохранена','success');
    }}]);
  }));

  /* Месячная премия — общая модалка (используется и месячной проверкой) */
  c.querySelectorAll('[data-pay-month]').forEach(el=>el.addEventListener('click',()=>openMonthlyPremiumModal(parseInt(el.dataset.payMonth), false)));

  /* Отмена задачи — общая модалка */
  c.querySelectorAll('[data-cancel-task]').forEach(el=>el.addEventListener('click',()=>openTaskCancelModal(parseInt(el.dataset.cancelTask))));

  const nb=document.getElementById('newTaskBtn');
  if(nb) nb.addEventListener('click',()=>{
    const body='<div class="field"><label>Тип задачи</label><select class="select-mini" id="ntType" style="width:100%;"><option value="oneoff">Одноразовая</option><option value="longterm">Долгосрочная</option></select></div>'+
      '<div class="field"><label>Название задачи</label><input class="input-mini" id="ntTitle" style="width:100%;" placeholder="Сфотографировать 20 позиций для Авито"></div>'+
      '<div class="field"><label>Описание</label><textarea class="textarea-mini" id="ntDesc" rows="3" style="width:100%;font-family:inherit;" placeholder="Что именно надо сделать"></textarea></div>'+
      '<div class="field"><label id="ntRewardLabel">Вознаграждение, ₽</label><input class="input-mini" id="ntReward" type="number" style="width:100%;" placeholder="2000"></div>'+
      '<div class="field-grid"><div class="field"><label>Срок исполнения</label>'+
        '<select class="select-mini" id="ntDueMode" style="width:100%;">'+
          '<option value="none">Без срока</option>'+
          '<option value="date">До конкретной даты</option>'+
          '<option value="days">Дней на выполнение (с момента взятия)</option>'+
        '</select></div>'+
      '<div class="field" id="ntDueDateWrap" style="display:none;"><label>Дата</label><input class="input-mini" id="ntDue" style="width:100%;" placeholder="ДД.ММ.ГГГГ"></div>'+
      '<div class="field" id="ntDueDaysWrap" style="display:none;"><label>Сколько дней</label><input class="input-mini" id="ntDueDays" type="number" min="1" style="width:100%;" placeholder="например, 3"></div></div>'+
      '<div class="field"><label>Сколько исполнителей нужно</label><input class="input-mini" id="ntNeeded" type="number" min="1" max="10" style="width:100%;" value="1">'+
      '<div class="tsub" style="margin-top:3px;">Если больше одного: как только задачу возьмёт первый, у остальных есть '+((DATA.settings&&DATA.settings.teamJoinHours)||24)+' ч, чтобы присоединиться (меняется в настройках). Не набрались — задача стартует текущим составом, вознаграждение делится на фактических участников.</div></div>'+
      '<div class="field"><label>Фото к задаче (по желанию, можно несколько)</label>'+
        '<div class="upload-box" id="ntPhotosBox"><div class="upload-ico">'+ic('camera')+'</div><div class="upload-txt"><b>Прикрепить фото</b><span>Например: как должен выглядеть результат</span></div><input type="file" id="ntPhotosInput" accept="image/*" multiple style="display:none;"></div>'+
        '<div id="ntPhotosPreview" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;"></div></div>'+
      '<div class="field" id="ntCheckpointsWrap" style="display:none;"><label>Даты проверок (через запятую)</label>'+
        '<input class="input-mini" id="ntCheckpoints" style="width:100%;" placeholder="05.07.2026, 20.07.2026, 05.08.2026">'+
        '<div class="tsub" style="margin-top:3px;">По каждой дате исполнитель сдаёт промежуточный отчёт — вы контролируете и начисляете месячную премию.</div></div>'+
      '<div class="tsub">Сотрудник заберёт задачу себе. По одноразовой премия начисляется при приёмке; по долгосрочной — ежемесячно, сумму задаёте вы.</div>';
    openModal('Новая задача','',body,[{label:'Опубликовать', cls:'btn-primary', action:()=>{
      const title=document.getElementById('ntTitle').value.trim();
      const reward=parseFloat(document.getElementById('ntReward').value);
      const dueMode=document.getElementById('ntDueMode').value;
      const dueRaw=dueMode==='date'? document.getElementById('ntDue').value.trim() : '';
      const dueDays=dueMode==='days'? parseInt(document.getElementById('ntDueDays').value) : null;
      const type=document.getElementById('ntType').value;
      if(!title){ toast('Введите название','error'); return; }
      if(!reward){ toast('Укажите вознаграждение','error'); return; }
      if(dueMode==='date' && !parseRuDate(dueRaw)){ toast('Срок в формате ДД.ММ.ГГГГ','error'); return; }
      if(dueMode==='days' && (!dueDays||dueDays<1)){ toast('Укажите, сколько дней даёте на выполнение','error'); return; }
      /* Даты проверок — только у долгосрочных, каждая проверяется на формат */
      let checkpoints=[];
      if(type==='longterm'){
        const raw=document.getElementById('ntCheckpoints').value.trim();
        if(raw){
          const parts=raw.split(',').map(x=>x.trim()).filter(Boolean);
          for(const p of parts){
            if(!parseRuDate(p)){ toast('Дата проверки «'+p+'» — формат ДД.ММ.ГГГГ','error'); return; }
          }
          checkpoints=parts
            .sort((a,b)=>parseRuDateTime(a,'00:00')-parseRuDateTime(b,'00:00'))
            .map(d=>({date:d, done:false, report:'', reportedAt:null}));
        }
      }
      const needed=Math.max(1, Math.min(10, parseInt(document.getElementById('ntNeeded').value)||1));
      const ownerAtt=(window._ntPhotos||[]).map(src=>({src:src, note:'От владельца', by:currentEmployeeName(), at:DATA.today+' '+nowTime()}));
      DATA.tasks.unshift({
        id:Math.max(0,...DATA.tasks.map(t=>t.id))+1,
        title, description:document.getElementById('ntDesc').value.trim(),
        type,
        reward, status:'open', createdBy:currentEmployeeName(), createdAt:DATA.today,
        claimedBy:null, claimedAt:null, dueAt: dueRaw?dueRaw+' 18:00':'',
        dueDays: dueDays||null,
        participantsNeeded:needed, participants:[],
        checkpoints,
        attachments:ownerAtt,
        extensions:[], report:'', photo:null, doneAt:null, approvedAmount:null,
        history:[{at:DATA.today+' '+nowTime(), by:currentEmployeeName(), text:'Задача создана и опубликована на доске'+(ownerAtt.length?' (фото: '+ownerAtt.length+')':'')}],
      });
      window._ntPhotos=[];
      ensureTaskNums();
      closeModal(); rr(); toast('Задача опубликована','success');
    }}]);
    /* Поле дат проверок и подпись ставки — только для долгосрочных */
    const typeSel=document.getElementById('ntType');
    const syncTypeUI=()=>{
      const lt=typeSel.value==='longterm';
      document.getElementById('ntCheckpointsWrap').style.display=lt?'block':'none';
      document.getElementById('ntRewardLabel').textContent=lt?'Вознаграждение, ₽ в месяц':'Вознаграждение, ₽';
    };
    typeSel.addEventListener('change', syncTypeUI);
    syncTypeUI();
    /* Мультизагрузка фото владельца */
    window._ntPhotos=[];
    const npBox=document.getElementById('ntPhotosBox');
    const npInput=document.getElementById('ntPhotosInput');
    const npPrev=document.getElementById('ntPhotosPreview');
    npBox.addEventListener('click', ()=>npInput.click());
    npInput.addEventListener('change', ()=>{
      [...npInput.files].forEach(f=>{
        const reader=new FileReader();
        reader.onload=ev=>{
          window._ntPhotos.push(ev.target.result);
          const wrap=document.createElement('div');
          wrap.style.cssText='position:relative;';
          wrap.innerHTML='<img src="'+ev.target.result+'" class="upload-preview" style="margin:0;max-width:90px;">'+
            '<button type="button" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;border:none;background:var(--negative);color:#fff;font-size:11px;cursor:pointer;line-height:1;">✕</button>';
          wrap.querySelector('button').addEventListener('click', ()=>{
            const idx=window._ntPhotos.indexOf(ev.target.result);
            if(idx>-1) window._ntPhotos.splice(idx,1);
            wrap.remove();
          });
          npPrev.appendChild(wrap);
        };
        reader.readAsDataURL(f);
      });
      npInput.value='';
    });
    const dueModeSel=document.getElementById('ntDueMode');
    const syncDueUI=()=>{
      document.getElementById('ntDueDateWrap').style.display=dueModeSel.value==='date'?'block':'none';
      document.getElementById('ntDueDaysWrap').style.display=dueModeSel.value==='days'?'block':'none';
    };
    dueModeSel.addEventListener('change', syncDueUI);
    syncDueUI();
  });
}

function renderAnalytics(c){
  let html='';

  /* Сравнение точек — только для владельца.
     Здесь ему место: это аналитический инструмент, а не рабочий экран. */
  if(STATE.role==='owner' && STORES.length>1){
    const storeIds=STORES.map(s=>s.id).filter(id=>STORE_DATA[id]);
    if(STATE.combinedStores.size===0) storeIds.forEach(id=>STATE.combinedStores.add(id));
    const sel=storeIds.filter(id=>STATE.combinedStores.has(id));

    const revOf   = id=>STORE_DATA[id].orders.filter(o=>o.status==='done').reduce((s,o)=>s+o.items.reduce((s2,it)=>s2+it.price,0),0);
    const cashOf  = id=>(STORE_DATA[id].assets?.cashByStore||[]).reduce((s,x)=>s+x.amount,0);
    const profitOf= id=>(STORE_DATA[id].analytics?.directions||[]).reduce((s,x)=>s+x.profit,0);

    let sumRev=0,sumCash=0,sumCashless=0,sumWh=0,sumProfit=0;
    sel.forEach(id=>{
      const dd=STORE_DATA[id];
      sumRev+=revOf(id); sumCash+=cashOf(id);
      sumCashless+=dd.assets?.cashless||0;
      sumWh+=dd.assets?.storeWarehouse||0;
      sumProfit+=profitOf(id);
    });

    html+='<div class="section"><div class="section-head"><div><div class="section-eyebrow">Сеть</div><div class="section-title">Сравнение точек</div></div></div>';
    html+='<div class="card" style="margin-bottom:12px;"><div class="kpi-label" style="margin-bottom:8px;">Точки в сводке</div>'+
      '<div style="display:flex;gap:16px;flex-wrap:wrap;">'+
      storeIds.map(id=>{
        const st=STORES.find(s=>s.id===id);
        return '<label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;"><input type="checkbox" data-combine-store="'+id+'" '+(STATE.combinedStores.has(id)?'checked':'')+'> '+(st?st.shortName:id)+'</label>';
      }).join('')+'</div></div>';

    html+='<div class="grid grid-4">';
    html+=kpiPlain('Выручка (сводно)', rub(sumRev), 'finance');
    html+=kpiPlain('Чистая прибыль', rub(sumProfit), 'wallet');
    html+=kpiPlain('Наличные в кассах', rub(sumCash), 'wallet');
    html+=kpiPlain('Товар на складе', rub(sumWh), 'warehouse');
    html+='</div>';

    if(sel.length>=2){
      const rows=[
        ['Выручка (завершённые)', id=>rub(revOf(id))],
        ['Чистая прибыль',        id=>rub(profitOf(id))],
        ['Наличные в кассе',      id=>rub(cashOf(id))],
        ['Безналичные',           id=>rub(STORE_DATA[id].assets?.cashless||0)],
        ['Товар на складе (₽)',   id=>rub(STORE_DATA[id].assets?.storeWarehouse||0)],
        ['Всего заказов',         id=>STORE_DATA[id].orders.length],
        ['Активных заказов',      id=>STORE_DATA[id].orders.filter(o=>o.status!=='done'&&o.status!=='cancel').length],
        ['Заявок в сервисе',      id=>STORE_DATA[id].service.length||'—'],
        ['Позиций на складе',     id=>STORE_DATA[id].warehouse.tech.length+STORE_DATA[id].warehouse.accessories.length],
        ['Сотрудников',           id=>(STORE_DATA[id].employees||[]).length],
        ['Средний чек',           id=>{const dn=STORE_DATA[id].orders.filter(o=>o.status==='done');const s=dn.reduce((a,o)=>a+o.items.reduce((b,it)=>b+it.price,0),0);return dn.length?rub(Math.round(s/dn.length)):'—';}],
      ];
      html+='<div class="table-wrap" style="margin-top:12px;"><table><thead><tr><th>Показатель</th>'+
        sel.map(id=>{const s=STORES.find(x=>x.id===id);return '<th>'+(s?s.shortName:id)+'</th>';}).join('')+
        '</tr></thead><tbody>';
      rows.forEach(([label,fn])=>{
        html+='<tr><td class="tname">'+label+'</td>'+sel.map(id=>'<td class="mono">'+fn(id)+'</td>').join('')+'</tr>';
      });
      html+='</tbody></table></div>';
    } else {
      html+='<div class="tsub" style="margin-top:12px;">Отметьте минимум две точки, чтобы сравнить их бок о бок.</div>';
    }
    html+='</div>';
  }

  const d=DATA.analytics.directions;
  const totalTurnover=d.reduce((s,x)=>s+x.turnover,0);
  const totalRevenue=d.reduce((s,x)=>s+x.revenue,0);
  const totalProfit=d.reduce((s,x)=>s+x.profit,0);
  html+='<div class="section-title" style="margin-bottom:10px;">'+escHtml(getCurrentStore().shortName)+'</div>';
  html+='<div class="grid grid-3">';
  html+=kpiPlain('Общий оборот', rub(totalTurnover), 'analytics');
  html+=kpiPlain('Общая выручка', rub(totalRevenue), 'finance');
  html+=kpiPlain('Чистая прибыль', rub(totalProfit), 'wallet');
  html+='</div>';

  const colors=['#5e8bff','#29d6c8','#f5a623','#34d399','#a78bfa'];
  html+='<div class="section"><div class="section-title" style="margin-bottom:16px;">Прибыль по направлениям</div><div class="card">';
  const maxProfit=Math.max(...d.map(x=>x.profit));
  d.forEach((x,i)=>{
    html+='<div class="dirbar-row"><div class="dirbar-name">'+x.name+'</div><div class="dirbar-track"><div class="dirbar-fill" style="width:'+(x.profit/maxProfit*100).toFixed(0)+'%;background:'+colors[i%colors.length]+'"></div></div><div class="dirbar-val">'+rub(x.profit)+'</div></div>';
  });
  html+='</div></div>';

  html+='<div class="section"><div class="section-title" style="margin-bottom:12px;">Детализация по направлениям</div><div class="table-wrap"><table><thead><tr><th>Направление</th><th>Оборот</th><th>Выручка</th><th>Прибыль</th><th>Маржа</th></tr></thead><tbody>';
  d.forEach(x=>{
    const margin=(x.profit/x.revenue*100).toFixed(0);
    html+='<tr><td class="tname">'+x.name+'</td><td class="mono">'+rub(x.turnover)+'</td><td class="mono">'+rub(x.revenue)+'</td><td class="mono">'+rub(x.profit)+'</td><td class="mono">'+margin+'%</td></tr>';
  });
  html+='</tbody></table></div></div>';

  html+='<div class="section"><div class="section-title" style="margin-bottom:12px;">Сравнение точек</div><div class="card">';
  const unitProfits=DATA.units.map(u=>u.revenue-(u.fixedExpenses.salaries+u.fixedExpenses.rent+u.fixedExpenses.ads+u.fixedExpenses.consumables+u.fixedExpenses.other));
  const maxUnitProfit=Math.max(...unitProfits);
  DATA.units.forEach((u,i)=>{
    html+='<div class="dirbar-row"><div class="dirbar-name">'+u.name+'</div><div class="dirbar-track"><div class="dirbar-fill" style="width:'+Math.max(4,(unitProfits[i]/maxUnitProfit*100)).toFixed(0)+'%;background:'+colors[i%colors.length]+'"></div></div><div class="dirbar-val">'+rub(unitProfits[i])+'</div></div>';
  });
  html+='</div></div>';

  html+='<div class="section"><div class="section-title" style="margin-bottom:12px;">Рейтинг продавцов</div><div class="card">';
  DATA.sellerRatings.slice().sort((a,b)=>b.revenue-a.revenue).forEach((s,i)=>{
    html+='<div class="lb-row"><div class="lb-rank">'+(i+1)+'</div><div class="lb-name"><b>'+s.name+'</b><span>'+s.unit+' · '+s.sales+' продаж · рейтинг '+s.rating+'</span></div><div class="lb-stat">'+rub(s.revenue)+'</div></div>';
  });
  html+='</div></div>';

  c.innerHTML=html;

  c.querySelectorAll('[data-combine-store]').forEach(el=>el.addEventListener('change',()=>{
    const id=el.dataset.combineStore;
    if(el.checked) STATE.combinedStores.add(id); else STATE.combinedStores.delete(id);
    renderAnalytics(c);
  }));
}

/* ============================================================
   ЭКСПОРТ CSV (для рассылок и отчётов) — общий helper
============================================================ */
function csvDownload(filename, headers, rows){
  const esc=v=>'"'+String(v).replace(/"/g,'""')+'"';
  const lines=[headers.map(esc).join(';')].concat(rows.map(r=>r.map(esc).join(';')));
  const csv='\uFEFF'+lines.join('\r\n'); // BOM — чтобы Excel корректно показал кириллицу
  const blob=new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ============================================================
   КЛИЕНТЫ (только владелец) — поиск, история заказов,
   объединение по e-mail, экспорт для рассылки по согласию
============================================================ */
function customerStats(cust){
  const orders=DATA.orders.filter(o=>cust.orders.includes(o.id));
  const total=orders.reduce((s,o)=>s+o.items.reduce((s2,it)=>s2+it.price,0),0);
  return {count:orders.length, total, last: orders.length?orders[0].date:'—', orders};
}

function expenseTable(list){

    const st=CLAIM_STATUS[x.status];

    h+='<tr><td class="mono">'+x.date+'</td><td>'+x.who+'<div class="tsub">'+x.role+'</div></td>'+
      '<td><div class="tname">'+x.item+'</div>'+(x.comment?'<div class="tsub">'+x.comment+'</div>':'')+'</td>'+
      '<td class="mono">'+rub(x.amount)+'</td>'+
      '<td>'+(photoCount===2?'<span class="ok">'+ic('check')+' 2/2</span>':'<span class="bad">'+ic('alert')+' '+photoCount+'/2</span>')+'</td>'+
      '<td><span class="badge '+st[1]+'">'+st[0]+'</span>'+(x.status==='approved'?'<div class="tsub" style="margin-top:3px;">'+(x.paidOut?'выплачено':'ожидает выплаты')+'</div>':'')+'</td>'+

function wireUpload(boxId, inputId, previewId){
  document.getElementById(boxId).addEventListener('click', ()=>document.getElementById(inputId).click());
  document.getElementById(inputId).addEventListener('change', e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{ const img=document.getElementById(previewId); img.src=ev.target.result; img.style.display='block'; };
    reader.readAsDataURL(file);
  });
}

function photoBoxHTML(label, dataUrl, flag){
  if(dataUrl) return '<div class="ph-box"><label>'+label+'</label><img src="'+dataUrl+'"></div>';
  if(flag) return '<div class="ph-box"><label>'+label+'</label><div class="photo-missing">'+ic('camera')+' Приложено (демо, без сохранения на сервере)</div></div>';
  return '<div class="ph-box"><label>'+label+'</label><div class="photo-missing">'+ic('x')+' Не приложено</div></div>';
}
