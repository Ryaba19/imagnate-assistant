/* ============================================================
   БУХГАЛТЕРИЯ — полный отчёт по формуле из документации:
   Чистая прибыль = Выручка − зарплаты − расходники − аренда − реклама − прочие
============================================================ */
function unitLedger(unitId){
  if(unitId==='all'){
    const revenue=DATA.units.reduce((s,u)=>s+u.revenue,0);
    const fe={salaries:0,rent:0,ads:0,consumables:0,other:0};
    DATA.units.forEach(u=>{ for(const k in fe) fe[k]+=u.fixedExpenses[k]; });
    return {name:'Все точки', revenue, fe};
  }
  const u=DATA.units.find(x=>x.id===unitId);
  return {name:u.name, revenue:u.revenue, fe:u.fixedExpenses};
}
function compClaimsForUnit(unitId){
  return DATA.expenseClaims.filter(x=>{
    if(x.status!=='approved') return false;
    if(unitId==='all') return true;
    const emp=DATA.employees.find(e=>e.name===x.who);
    return emp && emp.unit===unitId;
  });
}
/* Премии за задачи по точке — та же логика, что и компенсации */
function taskPayoutsForUnit(unitId){
  return (DATA.taskPayouts||[]).filter(p=>{
    if(unitId==='all') return true;
    const emp=DATA.employees.find(e=>e.name===p.employee);
    return emp && emp.unit===unitId;
  });
}

/* ============================================================
   КОМАНДА — справочник сотрудников, график смен, отметки на смене
============================================================ */
const DAY_KEYS=['mon','tue','wed','thu','fri','sat','sun'];
const DAY_LABELS={mon:'Пн',tue:'Вт',wed:'Ср',thu:'Чт',fri:'Пт',sat:'Сб',sun:'Вс'};

function currentEmployee(){
  const map={seller:1, senior:3, master:4, courier:8, collector:9};
  const id=map[STATE.role];
  return id? DATA.employees.find(e=>e.id===id) : null;
}
function parseHM(s){ const p=s.split('–')[0].split(':').map(Number); return p[0]*60+p[1]; }

function attendanceStatus(emp){
  if(!emp.schedule) return {label:'Без графика (внештатно)', cls:'b-grey'};
  const todaySched=emp.schedule[DATA.todayKey];
  if(todaySched==='выходной') return {label:'Выходной сегодня', cls:'b-grey'};
  const st=DATA.shiftStatus[emp.id]||{clockedIn:false};
  if(st.clockedOut) return {label:'Смена закрыта в '+st.clockOutTime, cls:'b-done'};
  if(!st.clockedIn) return {label:'Ещё не отметился(ась)', cls:'b-cancel'};
  const diff=Math.round((parseInt(st.clockInTime.slice(0,2))*60+parseInt(st.clockInTime.slice(3,5))) - parseHM(todaySched));
  if(diff<=2) return {label:'На смене — пришёл(ла) вовремя ('+st.clockInTime+')', cls:'b-done'};
  return {label:'На смене — опоздание '+diff+' мин ('+st.clockInTime+')', cls:'b-progress'};
}

function scheduleGridHTML(emp){
  if(!emp.schedule) return '<div class="tsub">График не ведётся — внештатный сотрудник</div>';
  return '<div class="sched-grid">'+DAY_KEYS.map(k=>{
    const v=emp.schedule[k];
    const isToday=k===DATA.todayKey;
    const off=v==='выходной';
    return '<div class="sched-cell'+(isToday?' today':'')+(off?' off':'')+'"><span class="d">'+DAY_LABELS[k]+'</span><span class="v">'+(off?'вых.':v)+'</span></div>';
  }).join('')+'</div>';
}

/* ============================================================
   КАЛЕНДАРЬ СМЕН — рабочий график в виде календарного месяца.
   График у сотрудников недельный (повторяющийся), поэтому
   раскладываем его по реальным дням месяца.
============================================================ */
const MONTH_NAMES=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
/* JS: 0=Вс..6=Сб → наши ключи */
const JS_DAY_TO_KEY=['sun','mon','tue','wed','thu','fri','sat'];

/* Смена сотрудника в конкретный день месяца */
function shiftFor(emp, date){
  if(!emp.schedule) return null;                 // внештатный — без графика
  const key=JS_DAY_TO_KEY[date.getDay()];
  const v=emp.schedule[key];
  if(!v || v==='выходной') return null;
  return v;
}

function scheduleCalendarHTML(){
  const today=todayDate();
  if(!STATE.schedMonth) STATE.schedMonth={y:today.getFullYear(), m:today.getMonth()};
  const {y, m}=STATE.schedMonth;

  /* Кого показываем — только сотрудники с графиком */
  const staff=DATA.employees.filter(e=>e.schedule);
  if(!STATE.schedEmp) STATE.schedEmp='all';
  const shown = STATE.schedEmp==='all' ? staff : staff.filter(e=>String(e.id)===String(STATE.schedEmp));

  /* Сетка месяца: понедельник — первый день недели */
  const first=new Date(y, m, 1);
  const daysInMonth=new Date(y, m+1, 0).getDate();
  let lead=(first.getDay()+6)%7;   // сколько пустых клеток до 1-го числа

  let html='<div class="section-head" style="margin-bottom:10px;">'+
    '<div><div class="section-eyebrow">Рабочий график</div>'+
    '<div class="section-title">'+MONTH_NAMES[m]+' '+y+'</div></div>'+
    '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">'+
      '<select class="select-mini" id="schedEmpSel">'+
        '<option value="all"'+(STATE.schedEmp==='all'?' selected':'')+'>Все сотрудники</option>'+
        staff.map(e=>'<option value="'+e.id+'"'+(String(STATE.schedEmp)===String(e.id)?' selected':'')+'>'+escHtml(e.name)+'</option>').join('')+
      '</select>'+
      '<button class="btn btn-sm" id="schedPrev">←</button>'+
      '<button class="btn btn-sm" id="schedToday">Сегодня</button>'+
      '<button class="btn btn-sm" id="schedNext">→</button>'+
    '</div></div>';

  html+='<div class="cal-grid">';
  ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].forEach(d=>{ html+='<div class="cal-head">'+d+'</div>'; });

  for(let i=0;i<lead;i++) html+='<div class="cal-cell empty"></div>';

  for(let d=1; d<=daysInMonth; d++){
    const date=new Date(y, m, d);
    const isToday = date.getTime()===today.getTime();
    const isWeekend = date.getDay()===0 || date.getDay()===6;
    const working = shown.map(e=>({e, sh:shiftFor(e, date)})).filter(x=>x.sh);

    html+='<div class="cal-cell'+(isToday?' today':'')+(isWeekend?' weekend':'')+'">'+
      '<div class="cal-day">'+d+(isToday?'<span class="cal-today-dot"></span>':'')+'</div>';

    if(!working.length){
      html+='<div class="cal-none">никого</div>';
    } else {
      html+=working.map(x=>{
        return '<div class="cal-shift" title="'+escHtml(x.e.name)+' · '+x.e.role+' · '+x.sh+'">'+
          '<span class="cal-who">'+escHtml(x.e.name)+'</span>'+
          '<span class="cal-time">'+x.sh+'</span>'+
        '</div>';
      }).join('');
    }
    html+='</div>';
  }

  /* Добивка до полной сетки */
  const total=lead+daysInMonth;
  const tail=(7-(total%7))%7;
  for(let i=0;i<tail;i++) html+='<div class="cal-cell empty"></div>';
  html+='</div>';

  /* Сводка по месяцу */
  html+='<div class="table-wrap" style="margin-top:14px;"><table><thead><tr><th>Сотрудник</th><th>Смен в месяце</th><th>Выходных</th></tr></thead><tbody>';
  shown.forEach(e=>{
    let work=0;
    for(let d=1; d<=daysInMonth; d++){ if(shiftFor(e, new Date(y,m,d))) work++; }
    html+='<tr><td class="tname">'+escHtml(e.name)+' <span class="tsub">· '+e.role+'</span></td>'+
      '<td class="mono">'+work+'</td><td class="mono">'+(daysInMonth-work)+'</td></tr>';
  });
  html+='</tbody></table></div>';

  /* Внештатные — без графика */
  const gig=DATA.employees.filter(e=>!e.schedule);
  if(gig.length){
    html+='<div class="tsub" style="margin-top:10px;">Без графика (сдельно): '+gig.map(e=>escHtml(e.name)).join(', ')+'</div>';
  }
  return html;
}

function wireScheduleCalendar(c){
  const prev=c.querySelector('#schedPrev');
  const next=c.querySelector('#schedNext');
  const tod=c.querySelector('#schedToday');
  const sel=c.querySelector('#schedEmpSel');
  if(prev) prev.addEventListener('click',()=>{
    let {y,m}=STATE.schedMonth; m--; if(m<0){m=11;y--;}
    STATE.schedMonth={y,m}; renderTeam(c);
  });
  if(next) next.addEventListener('click',()=>{
    let {y,m}=STATE.schedMonth; m++; if(m>11){m=0;y++;}
    STATE.schedMonth={y,m}; renderTeam(c);
  });
  if(tod) tod.addEventListener('click',()=>{
    const t=todayDate();
    STATE.schedMonth={y:t.getFullYear(), m:t.getMonth()}; renderTeam(c);
  });
  if(sel) sel.addEventListener('change',()=>{ STATE.schedEmp=sel.value; renderTeam(c); });
}

function clockIn(){
  const emp=currentEmployee(); if(!emp) return;
  const now=new Date();
  const hh=String(now.getHours()).padStart(2,'0'), mm=String(now.getMinutes()).padStart(2,'0');
  DATA.shiftStatus[emp.id]={clockedIn:true, clockInTime:hh+':'+mm, clockedOut:false, clockOutTime:null};
  renderTeam(document.getElementById('pageContent'));
  toast('Отметка «на смене» сохранена — '+hh+':'+mm, 'success');
}
function clockOut(){
  const emp=currentEmployee(); if(!emp) return;
  const st=DATA.shiftStatus[emp.id]||{};
  const now=new Date();
  const hh=String(now.getHours()).padStart(2,'0'), mm=String(now.getMinutes()).padStart(2,'0');
  st.clockedOut=true; st.clockOutTime=hh+':'+mm;
  DATA.shiftStatus[emp.id]=st;
  renderTeam(document.getElementById('pageContent'));
  toast('Смена закрыта — '+hh+':'+mm, 'info');
}

        '<div><div class="tname" style="font-size:14.5px;">'+emp.name+(emp.noAccess?'<span class="merge-pill" style="background:rgba(255,255,255,.08);color:var(--text-3);">внештатно</span>':'')+(emp.courierType?'<span class="merge-pill" style="background:var(--accent-soft);color:var(--accent-2);">'+(emp.courierType==='staff'?'штатный курьер':'сдельный курьер')+'</span>':'')+'</div>'+

        '<span class="badge '+status.cls+'">'+status.label+'</span>'+
      '</div>'+
      '<div class="tsub" style="margin:10px 0;">'+emp.responsibilities+'</div>'+
      (openDebts.length? '<div class="kpi-delta down" style="margin-top:12px;">'+ic('alert')+' Долг по недостаче: '+rub(debtTotal)+' ('+openDebts.length+' случ.)'+(isOwner?' <button class="btn btn-sm" style="margin-left:10px;" data-resolve-debt="'+emp.id+'">Закрыть долг</button>':'')+'</div>' : '')+
      (isOwner && !emp.noAccess ? '<div class="toggle-row" style="margin-top:12px;flex-wrap:wrap;gap:14px;">'+
        '<span style="color:var(--text-3);">Доп. доступ:</span>'+
        '<span class="toggle-pill '+(emp.extraAccess.expensesReview?'on':'')+'" data-toggle-access="'+emp.id+'_expensesReview">Проверка расходов</span>'+
        '<span class="toggle-pill '+(emp.extraAccess.analytics?'on':'')+'" data-toggle-access="'+emp.id+'_analytics">Аналитика</span>'+
      '</div>' : '')+
    '</div>';
  });
  html+='</div>';

  c.innerHTML=html;
  wireScheduleCalendar(c);

  const btnIn=document.getElementById('btnClockIn'); if(btnIn) btnIn.addEventListener('click', clockIn);
  const btnOut=document.getElementById('btnClockOut'); if(btnOut) btnOut.addEventListener('click', clockOut);
  c.querySelectorAll('[data-toggle-access]').forEach(el=>el.addEventListener('click', ()=>{
    const [empId,accField]=el.dataset.toggleAccess.split('_');
    const emp=DATA.employees.find(e=>e.id===parseInt(empId));
    emp.extraAccess[accField]=!emp.extraAccess[accField];
    renderTeam(c);
    toast('Демо: переключатель сохранён локально — на доступ в этом прототипе пока не влияет', 'info');
  }));
  c.querySelectorAll('[data-resolve-debt]').forEach(el=>el.addEventListener('click', ()=>openResolveDebtModal(parseInt(el.dataset.resolveDebt), c)));
}

function openResolveDebtModal(courierId, pageContainer){
  const debts=DATA.courierDebts.filter(d=>d.courierId===courierId && d.status==='open');
  const total=debts.reduce((s,d)=>s+d.shortfall,0);
  const courier=DATA.employees.find(e=>e.id===courierId);
  let body='<div class="drill-block-label">Открытые недостачи — '+courier.name+'</div>';
  body+=debts.map(d=>'<div class="hist-row"><div><div class="h-main">Заказ №'+d.orderId+'</div><div class="h-sub">'+d.date+' · ожидалось '+rub(d.expected)+', получено '+rub(d.returned)+'</div></div><div class="h-val mono" style="color:var(--negative);">−'+rub(d.shortfall)+'</div></div>').join('');
  body+='<div class="total-strip" style="margin-top:14px;"><div class="t-label">Итого долг</div><div class="t-value">'+rub(total)+'</div></div>';
  body+='<div class="field" style="margin-top:14px;"><label>Способ закрытия</label><select class="select-mini" id="debtResolution" style="width:100%;"><option>Удержано из расчёта зарплаты</option><option>Курьер вернул наличными</option><option>Списано владельцем</option></select></div>';
  openModal('Закрыть долг — '+courier.name, '', body, [{label:'Закрыть долг', cls:'btn-primary', action:()=>{
    const method=document.getElementById('debtResolution').value;
    debts.forEach(d=>{ d.status='resolved'; d.resolution=method; });
    closeModal(); renderTeam(pageContainer);
    toast('Долг '+courier.name+' закрыт: '+method, 'success');
  }}]);
}

/* ============================================================
   ДОСТАВКИ — собственный профиль штатного курьера: подтверждение
   новых передач и список назначенных заказов
============================================================ */
function renderDeliveries(c){
  const isManager = STATE.role==='owner' || STATE.role==='senior';
  if(isManager){ renderDeliveriesOverview(c); return; }

  const me=currentEmployee();
  if(!me){ c.innerHTML='<div class="empty"><b>Доступно только в роли курьера</b></div>'; return; }
  renderCourierView(c, me);
}

/* ============================================================
   ОБЗОР ДОСТАВОК ДЛЯ ВЛАДЕЛЬЦА / СТАРШЕГО
   Кто из курьеров какие заказы везёт и в каком они статусе.
============================================================ */
function renderDeliveriesOverview(c){
  const couriers=DATA.employees.filter(e=>e.courierType);
  const inTransit=DATA.orders.filter(o=>o.status==='delivering');
  const pendingHandoffs=(DATA.handoffs||[]).filter(h=>h.status==='pending');

  /* Деньги, которые сейчас на руках у курьеров */
  const cashOnCouriers=inTransit
    .filter(o=>(o.payment||'').toLowerCase().includes('нал'))
    .reduce((s,o)=>s+orderPayablePrice(o),0);

  let html='<div class="grid grid-4" style="margin-bottom:16px;">'+
    kpiPlain('Заказов в доставке', inTransit.length, 'truck')+
    kpiPlain('Курьеров в работе', new Set(inTransit.map(o=>o.courierId).filter(Boolean)).size, 'hr')+
    kpiPlain('Ждут подтверждения', pendingHandoffs.length, 'alert')+
    kpiPlain('Наличные у курьеров', rub(cashOnCouriers), 'wallet')+
  '</div>';

  /* Незакрытые передачи — курьер ещё не подтвердил получение */
  if(pendingHandoffs.length){
    html+='<div class="card" style="margin-bottom:16px;border-color:var(--warning);">'+
      '<div class="kpi-label" style="color:var(--warning);">'+ic('alert')+' Передан, но курьер не подтвердил: '+pendingHandoffs.length+'</div>'+
      '<div class="table-wrap" style="margin-top:8px;"><table><thead><tr><th>Заказ</th><th>Курьер</th><th>Передал</th><th>Сумма</th></tr></thead><tbody>'+
      pendingHandoffs.map(h=>{
        const o=findOrder(h.orderId);
        const cr=DATA.employees.find(e=>e.id===h.courierId);
        if(!o) return '';
        return '<tr><td class="mono tname">№'+o.id+'</td><td>'+(cr?escHtml(cr.name):'—')+'</td>'+
          '<td class="tsub">'+escHtml(h.createdBy||'—')+'</td><td class="mono">'+rub(orderPayablePrice(o))+'</td></tr>';
      }).join('')+
      '</tbody></table></div></div>';
  }

  /* Разбивка по курьерам */
  html+='<div class="section"><div class="section-head"><div class="section-title">Курьеры и их заказы</div></div>';

  if(!couriers.length){
    html+='<div class="card"><div class="empty"><b>Курьеры не заведены</b></div></div>';
  } else {
    couriers.forEach(cr=>{
      const orders=DATA.orders.filter(o=>o.courierId===cr.id && (o.status==='delivering'||o.status==='done'));
      const active=orders.filter(o=>o.status==='delivering');
      const doneToday=orders.filter(o=>o.status==='done' && o.deliveredAt===DATA.today);
      const cash=active
        .filter(o=>(o.payment||'').toLowerCase().includes('нал'))
        .reduce((s,o)=>s+orderPayablePrice(o),0);
      const typeLbl = cr.courierType==='staff' ? 'штатный' : 'сдельный';

      html+='<div class="card" style="margin-bottom:12px;">'+
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;">'+
          '<div>'+
            '<div class="tname" style="font-size:14.5px;">'+escHtml(cr.name)+
              '<span class="merge-pill" style="background:var(--accent-soft);color:var(--accent-2);">'+typeLbl+'</span></div>'+
            '<div class="tsub">'+escHtml(cr.phone||'—')+'</div>'+
          '</div>'+
          '<div style="text-align:right;">'+
            '<div class="kpi-value" style="font-size:16px;">'+active.length+'</div>'+
            '<div class="tsub">в пути'+(cash?' · '+rub(cash)+' нал.':'')+'</div>'+
          '</div>'+
        '</div>';

      if(!active.length && !doneToday.length){
        html+='<div class="tsub" style="margin-top:10px;">Нет заказов в работе</div>';
      } else {
        html+='<div class="table-wrap" style="margin-top:10px;"><table><thead><tr>'+
          '<th>№</th><th>Клиент</th><th>Адрес</th><th>Сумма</th><th>Оплата</th><th>Статус</th><th></th>'+
        '</tr></thead><tbody>';
        [...active, ...doneToday].forEach(o=>{
          const st=STATUS_LABELS[o.status]||['—','b-grey'];
          html+='<tr>'+
            '<td class="mono tname">№'+o.id+'</td>'+
            '<td>'+escHtml(o.name)+'<div class="tsub mono">'+escHtml(o.phone||'')+'</div></td>'+
            '<td class="tsub" style="max-width:190px;">'+escHtml(o.address||o.delivery||'—')+'</td>'+
            '<td class="mono">'+rub(orderPayablePrice(o))+'</td>'+
            '<td class="tsub">'+escHtml(o.payment||'—')+'</td>'+
            '<td><span class="badge '+st[1]+'">'+st[0]+'</span></td>'+
            '<td class="row-actions">'+
              '<button class="btn btn-sm" data-open="'+o.id+'">Открыть</button>'+
              (o.status==='delivering'?'<button class="btn btn-sm btn-primary" data-reconcile="'+o.id+'">Принять от курьера</button>':'')+
            '</td>'+
          '</tr>';
        });
        html+='</tbody></table></div>';
      }
      html+='</div>';
    });
  }
  html+='</div>';

  /* Отказы — с обязательным комментарием */
  const refusals=DATA.orders.filter(o=>o.refusedAt);
  if(refusals.length){
    html+='<div class="section"><div class="section-head"><div class="section-title">Отказы клиентов</div></div>'+
      '<div class="table-wrap"><table><thead><tr><th>Заказ</th><th>Клиент</th><th>Курьер</th><th>Дата</th><th>Причина</th></tr></thead><tbody>'+
      refusals.map(o=>{
        const cr=DATA.employees.find(e=>e.id===o.courierId);
        return '<tr><td class="mono tname">№'+o.id+'</td><td>'+escHtml(o.name)+'</td>'+
          '<td>'+(cr?escHtml(cr.name):'—')+'</td><td class="mono">'+escHtml(o.refusedAt)+'</td>'+
          '<td class="tsub">'+escHtml(o.refusalReason||'<span style="color:var(--warning);">не указана</span>')+'</td></tr>';
      }).join('')+
      '</tbody></table></div></div>';
  }

  c.innerHTML=html;
  c.querySelectorAll('[data-open]').forEach(el=>el.addEventListener('click',()=>openOrderModal(parseInt(el.dataset.open), c)));
  c.querySelectorAll('[data-reconcile]').forEach(el=>el.addEventListener('click',()=>openReconcileModal(parseInt(el.dataset.reconcile))));
}

/* Личный кабинет курьера */
function renderCourierView(c, me){
  let html='';
  const pending=DATA.handoffs.filter(h=>h.type==='staff_courier' && h.courierId===me.id && h.status==='pending');
  html+='<div class="section"><div class="section-title" style="margin-bottom:12px;">Новые передачи ('+pending.length+')</div>';
  if(pending.length===0){
    html+='<div class="card"><div class="empty"><b>Нет новых передач</b><span>Здесь появятся заказы, которые продавец передаёт вам</span></div></div>';
  } else {
    pending.forEach(h=>{
      const o=findOrder(h.orderId);
      if(!o) return;
      html+='<div class="card" style="margin-bottom:12px;">'+
        '<div class="kpi-label">Заказ №'+o.id+' · от '+h.createdBy+'</div>'+
        '<div class="tname" style="font-size:14.5px;">'+o.name+'</div>'+
        '<div class="tsub">'+(o.address||o.delivery)+' · '+rub(orderPayablePrice(o))+' · '+o.payment+'</div>'+
        '<div style="display:flex;gap:10px;margin-top:12px;">'+
          '<button class="btn btn-primary btn-sm" data-confirm-handoff="'+h.id+'">'+ic('check')+' Подтвердить получение</button>'+
          '<button class="btn btn-danger btn-sm" data-decline-handoff="'+h.id+'">Отказаться</button>'+
        '</div></div>';
    });
  }
  html+='</div>';

  const mine=DATA.orders.filter(o=>o.courierId===me.id && o.status==='delivering');
  html+='<div class="section"><div class="section-title" style="margin-bottom:12px;">Мои заказы ('+mine.length+')</div>';
  if(mine.length===0){
    html+='<div class="card"><div class="empty"><b>Нет заказов в работе</b></div></div>';
  } else {
    html+='<div class="table-wrap"><table><thead><tr><th>№</th><th>Клиент</th><th>Телефон</th><th>Адрес</th><th>Сумма</th><th></th></tr></thead><tbody>';
    mine.forEach(o=>{
      html+='<tr><td class="mono tname">№'+o.id+'</td><td>'+o.name+'</td><td class="mono">'+o.phone+'</td><td>'+(o.address||'—')+'</td><td class="mono">'+rub(orderPayablePrice(o))+'</td>'+
        '<td class="row-actions"><button class="btn btn-sm" data-open="'+o.id+'">Открыть</button><button class="btn btn-sm btn-primary" data-deliver-done="'+o.id+'">Выдан</button><button class="btn btn-sm btn-danger" data-deliver-refuse="'+o.id+'">Отказ</button></td></tr>';
    });
    html+='</tbody></table></div>';
  }
  html+='</div>';

  c.innerHTML=html;
  wireCourierActions(c);
}

function wireCourierActions(c){
  c.querySelectorAll('[data-confirm-handoff]').forEach(el=>el.addEventListener('click', ()=>{
    const h=DATA.handoffs.find(x=>x.id===parseInt(el.dataset.confirmHandoff));
    const o=findOrder(h.orderId);
    h.status='confirmed'; setOrderStatus(o,'delivering');
    renderDeliveries(c);
    toast('Передача подтверждена, заказ №'+o.id+' у вас в работе', 'success');
  }));
  c.querySelectorAll('[data-decline-handoff]').forEach(el=>el.addEventListener('click', ()=>{
    const h=DATA.handoffs.find(x=>x.id===parseInt(el.dataset.declineHandoff));
    let body='<div class="field"><label>Причина отказа</label><input class="input-mini" id="declineReason" style="width:100%;" placeholder="Например: не успею забрать сегодня"></div>';
    openModal('Отказаться от передачи', '', body, [{label:'Отказаться', cls:'btn-danger', action:()=>{
      const reason=document.getElementById('declineReason').value.trim()||'Без указания причины';
      h.status='declined'; h.declineReason=reason;
      const o=findOrder(h.orderId); setOrderStatus(o,'ready'); o.courierId=null; o.courierType=null;
      closeModal(); renderDeliveries(c);
      toast('Передача отклонена, заказ вернулся продавцу', 'info');
    }}]);
  }));
  c.querySelectorAll('[data-open]').forEach(el=>el.addEventListener('click',()=>openOrderModal(parseInt(el.dataset.open))));
  c.querySelectorAll('[data-deliver-done]').forEach(el=>el.addEventListener('click', ()=>{
    const o=findOrder(parseInt(el.dataset.deliverDone));
    if(!orderFullyBound(o)){
      (o.callLog=o.callLog||[]).push({date:DATA.today, time:nowTime(), action:'blocked', comment:'Попытка выдачи отклонена: не все товары привязаны к заказу'});
      toast('Не все товары привязаны к заказу', 'error');
      return;
    }
    setOrderStatus(o,'done');
    o.deliveredAt=DATA.today;
    o.deliveredAtTime=nowTime();
    (o.callLog=o.callLog||[]).push({date:DATA.today, time:nowTime(), action:'issued', comment:'Заказ успешно выдан клиенту курьером'});
    renderDeliveries(c);
    toast('Заказ №'+o.id+' отмечен как выданный', 'success');
  }));
  c.querySelectorAll('[data-deliver-refuse]').forEach(el=>el.addEventListener('click', ()=>{
    const o=findOrder(parseInt(el.dataset.deliverRefuse));
    let body='<div class="tsub" style="margin-bottom:10px;">Курьеру доставка оплачивается в любом случае. Товар возвращается в магазин.</div>'+
      '<div class="field"><label>Причина отказа <span style="color:var(--negative);">*</span></label>'+
      '<input class="input-mini" id="courierRefReason" style="width:100%;" placeholder="Например: клиент не открыл дверь"></div>';
    openModal('Отказ по заказу №'+o.id, '', body, [{label:'Подтвердить отказ', cls:'btn-danger', action:()=>{
      const reason=document.getElementById('courierRefReason').value.trim();
      if(!reason){ toast('Причина отказа обязательна', 'error'); return; }
      setOrderStatus(o,'cancel');
      o.cancelReason=reason;
      o.refusalReason=reason;              // для обзора владельца
      o.refusedAt=DATA.today;
      releaseOrderStock(o);
      (o.callLog=o.callLog||[]).unshift({date:DATA.today, time:nowTime(), action:'note',
        comment:'Отказ клиента при доставке: '+reason});
      closeModal(); renderDeliveries(c);
      toast('Заказ №'+o.id+' отменён. Товар возвращён в магазин.', 'info');
    }}]);
  }));
}

/* ============================================================
   ПРИЁМКА — товар от сборщика: опечатанный (отв. сборщик)
   или в пакете (отв. курьер, требует проверки содержимого)
============================================================ */
function inferStoreFromPR(p){
  const m=p.createdFrom.match(/Заказ №(\d+)/);
  if(m){ const o=findOrder(parseInt(m[1])); if(o) return o.store; }
  return '—';
}
function renderReceiving(c){
  const ready=DATA.purchaseRequests.filter(p=>p.status==='confirmed');
  let html='<div class="section"><div class="section-title" style="margin-bottom:12px;">Ожидают приёмки ('+ready.length+')</div>';
  if(ready.length===0){
    html+='<div class="card"><div class="empty"><b>Нет поступлений, ожидающих приёмки</b></div></div>';
  } else {
    ready.forEach(p=>{
      const sealed=p.packaging==='sealed';
      html+='<div class="card" style="margin-bottom:12px;">'+
        '<div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;">'+
          '<div><div class="kpi-label">Заявка №'+p.id+' · '+p.reason+'</div><div class="tname" style="font-size:14.5px;">'+p.item+' × '+p.qty+'</div><div class="tsub">Ожидаемая дата: '+(p.eta||'—')+'</div></div>'+
          '<span class="badge '+(sealed?'b-done':'b-progress')+'">'+(sealed?'Опечатано':'В пакете')+'</span>'+
        '</div>'+
        '<div class="tsub" style="margin-top:8px;">Ответственный за содержимое: <b style="color:var(--text-1);">'+(sealed?'Сборщик (документация на коробку)':'Курьер — требуется проверка содержимого при приёмке')+'</b></div>'+
        '<div style="display:flex;gap:10px;margin-top:12px;">'+
          '<button class="btn btn-primary btn-sm" data-receive="'+p.id+'">'+ic('check')+' Принять на склад</button>'+
          '<button class="btn btn-danger btn-sm" data-damaged="'+p.id+'">'+ic('alert')+' Посылка повреждена</button>'+
        '</div></div>';
    });
  }
  html+='</div>';

  const hist=DATA.receivingHistory.slice().sort((a,b)=>parseRuDateTime(b.receivedDate,'00:00')-parseRuDateTime(a.receivedDate,'00:00'));
  html+='<div class="section"><div class="section-title" style="margin-bottom:12px;">История поставок</div>';
  if(hist.length===0){
    html+='<div class="card"><div class="empty"><b>Поставок пока не было</b></div></div>';
  } else {
    html+='<div class="table-wrap"><table><thead><tr><th>Дата</th><th>№</th><th>Товар</th><th>Кто принял</th><th>Магазин</th><th></th></tr></thead><tbody>';
    hist.forEach(h=>{
      html+='<tr><td class="mono">'+h.receivedDate+'</td><td class="mono">№'+h.id+'</td><td class="tname">'+h.item+' × '+h.qty+'</td><td>'+h.receivedBy+'</td><td>'+h.store+'</td><td><button class="btn btn-sm" data-receipt-open="'+h.id+'">Состав</button></td></tr>';
    });
    html+='</tbody></table></div>';
  }
  html+='</div>';

  if(DATA.incidents.length){
    html+='<div class="section"><div class="section-title" style="margin-bottom:12px;">Зафиксированные повреждения</div><div class="card">';
    html+=DATA.incidents.map(i=>'<div class="hist-row"><div><div class="h-main">'+i.text+'</div><div class="h-sub">'+i.date+' · '+i.loggedBy+'</div></div></div>').join('');
    html+='</div></div>';
  }

  c.innerHTML=html;
  c.querySelectorAll('[data-receive]').forEach(el=>el.addEventListener('click', ()=>{
    const p=DATA.purchaseRequests.find(x=>x.id===parseInt(el.dataset.receive));
    const imei=String(Date.now()).slice(-15);
    DATA.warehouse.tech.push({imei, model:p.item, purchase:p.price, price:Math.round(p.price*1.25), status:'instock', location:'Склад, после приёмки'});
    p.status='received';
    const who=currentEmployee()?.name||ROLES[STATE.role].label;
    DATA.receivingHistory.unshift({id:p.id, item:p.item, qty:p.qty, price:p.price, receivedBy:who, receivedDate:DATA.today, packaging:p.packaging||'—', store:inferStoreFromPR(p)});
    renderReceiving(c);
    toast(p.item+' принят на склад (IMEI '+imei+')', 'success');
  }));
  c.querySelectorAll('[data-receipt-open]').forEach(el=>el.addEventListener('click', ()=>{
    const h=DATA.receivingHistory.find(x=>x.id===parseInt(el.dataset.receiptOpen));

/* ============================================================
   УНИВЕРСАЛЬНЫЙ ИМПОРТЁР ДАННЫХ
   Один файл — JSON произвольного происхождения. detectImportType()
   определяет, что это за файл, по структуре (не по расширению и не
   по имени файла), затем показывается предпросмотр, и только после
   подтверждения данные попадают в ERP. Полностью обратно совместим
   с уже существующим экспортом базы знаний ({schemes, log}).
============================================================ */
const IMPORT_TYPE_LABELS={
  site_catalog:'Каталог сайта', knowledge_base:'База знаний ERP', learning_queue:'Очередь обучения',
  price_update_report:'Отчёт обновления цен', margin_schemes:'Схемы маржинальности', export_queue:'Очередь выгрузки',
};

function detectImportType(json){
  if(!json || typeof json!=='object') return 'unknown';

  // 1а. Каталог сайта, простой формат: { data: [{ id, documentId, slug, nazvanie }, ...] }
  if(Array.isArray(json.data) && json.data.length>0){
    const first=json.data[0];
    if(first && typeof first==='object' && 'id' in first && 'slug' in first && ('nazvanie' in first || 'name' in first)){
      return 'site_catalog';
    }
  }
  // 1б. Каталог сайта, обогащённый формат: { type:'STORE_CONTROL_SITE_CATALOG_IMPORT', products:[{ siteProductId, slug, siteProductName, brand, category, ... }] }
  if(json.type==='STORE_CONTROL_SITE_CATALOG_IMPORT' || (Array.isArray(json.products) && json.products.length>0)){
    const first=json.products && json.products[0];
    if(first && typeof first==='object' && ('siteProductId' in first || 'id' in first) && 'slug' in first){
      return 'site_catalog';
    }
  }
  // 2. База знаний ERP — формат уже существующего экспорта: { schemes:[...], log:[...] }
  if(Array.isArray(json.log) || (Array.isArray(json.schemes) && json.schemes[0] && Array.isArray(json.schemes[0].keywords))){
    return 'knowledge_base';
  }
  // 3. Очередь обучения
  if(json.type==='learning_queue' || Array.isArray(json.learningQueue) ||
     (Array.isArray(json.items) && json.items[0] && 'suggestedSchemeId' in json.items[0])){
    return 'learning_queue';
  }
  // 4. Отчёт обновления цен
  if(json.type==='price_update_report' || Array.isArray(json.priceUpdateLog)){
    return 'price_update_report';
  }
  // 5. Схемы маржинальности
  if(json.type==='margin_schemes' || Array.isArray(json.marginGroups)){
    return 'margin_schemes';
  }
  // 6. Очередь выгрузки
  if(json.type==='export_queue' || Array.isArray(json.batches)){
    return 'export_queue';
  }
  return 'unknown';
}

/** Преобразует каталог сайта (простой data[] или обогащённый products[])
 *  в единый внутренний формат ERP. Обогащённые поля (бренд, категория,
 *  алиасы и т.д.) сохраняются, если они есть в файле — пригодятся для
 *  более точного сопоставления строк прайса на следующем этапе. */
function normalizeSiteCatalog(json){
  const now=DATA.today+' '+nowTime();

  if(Array.isArray(json.products)){
    return json.products.map(item=>({
      siteProductId: item.siteProductId ?? item.id,
      documentId: item.siteDocumentId || item.documentId || null,
      slug: item.slug || null,
      name: item.siteProductName || item.name || ('Без названия #'+(item.siteProductId ?? item.id)),
      brand: item.brand || null,
      category: item.category || null,
      model: item.model || null,
      series: item.series || null,
      storage: item.storage || null,
      ram: item.ram || null,
      color: item.color || null,
      connectivity: item.connectivity || null,
      simType: item.simType || null,
      modelNumber: item.modelNumber || null,
      normalizedName: item.normalizedName || null,
      aliases: Array.isArray(item.aliases) ? item.aliases : [],
      isActive: item.isActive!==false,
      isHidden: !!item.isHidden,
      source: 'site_catalog',
      importedAt: now,
    }));
  }

  return (json.data||[]).map(item=>({
    siteProductId: item.id,
    documentId: item.documentId || null,
    slug: item.slug || null,
    name: item.nazvanie || item.name || ('Без названия #'+item.id),
    brand: null, category: null, model: null, series: null, storage: null, ram: null,
    color: null, connectivity: null, simType: null, modelNumber: null, normalizedName: null, aliases: [],
    isActive: true, isHidden: false,
    source: 'site_catalog',
    importedAt: now,
  }));
}

function importSiteCatalogData(normalized){
  const byId=new Map(DATA.siteCatalog.map(p=>[p.siteProductId, p]));
  normalized.forEach(p=>byId.set(p.siteProductId, p));
  DATA.siteCatalog=Array.from(byId.values());
  DATA.siteCatalogVersion=(DATA.siteCatalogVersion||0)+1;
  logPricingAction('Импорт каталога сайта', normalized.length+' позиций', '');
  return normalized.length;
}
function importKnowledgeBaseData(json){
  let count=0;
  (json.log||[]).forEach(entry=>{
    const scheme=DATA.marginSchemes.find(s=>s.id===entry.schemeId)||DATA.marginSchemes.find(s=>s.name===entry.schemeName);
    if(scheme && entry.keyword && !scheme.keywords.includes(entry.keyword)) scheme.keywords.push(entry.keyword);
    DATA.knowledgeLog.unshift({...entry, id:'kb_'+Date.now()+'_'+Math.random().toString(36).slice(2,5), status:'active'});
    count++;
  });
  return count;
}
function importLearningQueueData(json){
  const items=json.learningQueue||json.items||[];
  let count=0;
  items.forEach(it=>{
    const exists=DATA.learningQueue.some(q=>q.name===it.name && q.status==='pending');
    if(!exists){ DATA.learningQueue.unshift({...it, id:'learn_'+Date.now()+'_'+Math.random().toString(36).slice(2,6), status:it.status||'pending'}); count++; }
  });
  return count;
}
function importPriceUpdateReportData(json){
  const rows=json.priceUpdateLog||json.log||[];
  DATA.priceUpdateLog.unshift(...rows);
  return rows.length;
}
function importMarginSchemesData(json){
  // Осторожный импорт: добавляем только новые схемы по имени, существующие
  // группы/диапазоны не перезаписываем, чтобы не сломать текущие настройки.
  let count=0;
  (json.schemes||[]).forEach(s=>{
    if(!DATA.marginSchemes.some(existing=>existing.name===s.name)){
      const id='scheme_'+Date.now()+'_'+Math.random().toString(36).slice(2,5);
      DATA.marginSchemes.push({id, name:s.name, keywords:s.keywords||[]});
      DATA.marginGroups.forEach(g=>{ g.tiersBySchemeId[id]=[{max:999999999, pct:15}]; });
      count++;
    }
  });
  return count;
}
function importExportQueueData(json){
  const batches=json.batches||[];
  DATA.priceExportBatches.push(...batches);
  return batches.length;
}

/** Один общий выбор файла на вкладке «База знаний» — ERP сама определяет,
 *  каталог сайта это или база знаний, и ведёт по правильному пути.
 *  Данные при этом никогда не смешиваются: каталог сайта всегда идёт
 *  в DATA.siteCatalog, база знаний — в DATA.knowledgeLog, никогда вместе. */
function handleKnowledgeImportFileSelected(file, c){
  const reader=new FileReader();
  reader.onload=()=>{
    let json;
    try{ json=JSON.parse(String(reader.result)); }
    catch(e){ toast('Файл повреждён или не является корректным JSON', 'error'); return; }

    const type=detectImportType(json);

    }
  };
  reader.onerror=()=>toast('Не удалось прочитать файл', 'error');

}

function daysSinceRu(dateRu){

function readFileAsText(file){

/* ЗАГЛУШКА: в реальной системе сюда подключается реальный запрос к API
   поставщика через backend (см. README интеграции) — сейчас возвращает
   один и тот же демонстрационный текст. */
function mockApiFetchText(sourceName){
  return 'iPhone 15 Pro 256GB Titan Black — 94200\nSamsung Galaxy S24 Ultra 256GB - 85500\nDyson Airwrap Complete Long 43000\nGarmin Fenix 7 Sapphire Solar - 72500';

/* ----------------------- очистка мусора и парсинг строки ----------------------- */
const PRICING_NOISE_MARKERS=['faq','гарантия','условия','заказать','под запрос','доставка','оплата','реквизиты','наш канал','наш чат','подписывайтесь','акция!','скидка!'];
function stripInlineNoise(line){
  let r=line;
  r=r.replace(/https?:\/\/\S+/gi,' ');
  r=r.replace(/@[a-zA-Z0-9_]{4,}/g,' ');
  r=r.replace(/❌/g,' ');
  r=r.replace(/под\s*запрос/gi,' ');
  r=r.replace(/\bFAQ\b/gi,' ');
  return r.replace(/\s{2,}/g,' ').trim();
}
function isLikelyGarbageLine(line){
  const lower=line.toLowerCase().trim();
  if(!lower || lower.length<3) return true;
  if(PRICING_NOISE_MARKERS.some(m=>lower.includes(m))) return true;
  if(!/\d/.test(lower)) return true;
  return false;
}
/* Бизнес-правило: устройства с пометкой CPO / Актив / ASIS (восстановленные,
   с активацией, состояние "как есть") исключаются из обновления цен.
   Проверяем по ЦЕЛОМУ токену, а не по вхождению подстроки — иначе "актив"
   ложно сработает на "активации" в обычном тексте про гарантию. */
const EXCLUDED_CONDITION_MARKERS=['cpo','актив','asis'];
function hasExcludedConditionMarker(name){
  const tokens=name.toLowerCase().replace(/[^\wа-яё0-9]+/gi,' ').split(' ').filter(Boolean);
  return tokens.some(t=>EXCLUDED_CONDITION_MARKERS.includes(t));
}
function parsePriceLine(line){
  line=line.trim();
  if(!line) return null;
  // Цена — это либо обычное число, либо число с разделителем разрядов
  // (группы РОВНО по 3 цифры после первой группы). Старая регулярка
  // допускала ЛЮБОЕ количество групп цифр через пробел и поэтому иногда
  // склеивала год и цену в одно число (например, "...2026 96200" → 202696200) —
  // эта версия так не делает.
  const m=line.match(/^(.+?)[\s\-–—;:,\t]+(\d{1,3}(?:[\s.,]\d{3})+|\d{3,7})\s*(?:₽|руб\.?|р\.?)?$/i);
  if(!m) return null;
  const name=m[1].trim().replace(/[-–—;:,\s]+$/,'').trim();
  const price=parseInt(m[2].replace(/[^\d]/g,''),10);
  if(!name||!price) return null;
  return {name, price};
}

/* ----------------------- сопоставление и распознавание ----------------------- */
function normalizeForMatch(s){
  let t=(s||'').toLowerCase();
  // «512 ГБ» / «512GB» / «512гб» — один и тот же объём памяти, но разное
  // форматирование у поставщиков и в каталоге сайта. Склеиваем в один токен
  // и приводим кириллические ГБ/ТБ к латинским gb/tb, иначе сравнение текста
  // считает их совершенно разными словами.
  t=t.replace(/(\d+)\s*(гб|gb)(?![a-zа-яё])/gi, '$1gb');
  t=t.replace(/(\d+)\s*(тб|tb)(?![a-zа-яё])/gi, '$1tb');
  // Поставщики часто пишут объём памяти вовсе без единиц ("256", "4/128" —
  // 128 это память, 4 это ОЗУ), а каталог сайта — всегда явно ("256 ГБ").
  // К этому моменту цена уже отрезана parsePriceLine, так что цифры здесь —
  // это характеристики товара, не цена; для типичных объёмов памяти
  // добавляем тот же суффикс "gb", что и в каталоге, иначе токены никогда
  // не совпадут просто из-за разного форматирования.
  t=t.replace(/\b(16|32|64|128|256|512|1024|2048)\b(?!gb|tb)/g, '$1gb');
  t=t.replace(/[^\wа-яё0-9\s]/gi,' ');
  t=t.replace(/\s+/g,' ').trim();
  return t;
}
function tokenSet(s){ return new Set(normalizeForMatch(s).split(' ').filter(t=>t.length>1 || /^\d+$/.test(t))); }
function jaccardScore(a,b){
  if(!a.size||!b.size) return 0;
  let inter=0; a.forEach(t=>{ if(b.has(t)) inter++; });
  const union=a.size+b.size-inter;
  return union? inter/union : 0;
}
/* Строка прайса обычно короткая и без бренда ("17 Pro Max 512GB Blue"),
   а карточка на сайте — длинная и описательная ("Смартфон Apple iPhone 17
   Pro Max 512 ГБ Deep Blue (Sim+eSim)"). Чистый Jaccard штрафует это
   несправедливо — берём долю токенов строки прайса, найденных в карточке
   (containment), и подмешиваем Jaccard как уточняющий сигнал. */
function blendedMatchScore(queryTokens, catalogTokens){
  if(!queryTokens.size || !catalogTokens.size) return 0;
  let inter=0; queryTokens.forEach(t=>{ if(catalogTokens.has(t)) inter++; });
  const containment=inter/queryTokens.size;
  const union=queryTokens.size+catalogTokens.size-inter;
  const jaccard=union? inter/union : 0;
  return 0.65*containment + 0.35*jaccard;
}
/* Схема маржи по карточке каталога — авторитетный источник.
   Перебирает DATA.categorySchemeMap в порядке объявления, первое совпадение
   в nazvanie карточки — правильная схема. Никакого угадывания по тексту прайса. */
function detectSchemeFromCatalogCard(catalogItem){
  if(!catalogItem) return null;
  const n=(catalogItem.name||catalogItem.model||'').toLowerCase();
  for(const rule of (DATA.categorySchemeMap||[])){
    if(n.includes(rule.match)) return DATA.marginSchemes.find(s=>s.id===rule.schemeId)||null;
  }
  return null;
}
/* Запасной вариант — по тексту прайса, только когда карточка не найдена. */
function detectScheme(name){
  const n=name.toLowerCase();
  return DATA.marginSchemes.find(s=>s.keywords.some(k=>k && n.includes(k))) || null;
}
/* Определение категории/подкатегории для отображения — берётся из карточки. */
function inferCategory(catalogItem){
  if(!catalogItem) return {cat:'—', sub:'—', brand:'—'};
  const n=(catalogItem.name||'').toLowerCase();
  let cat='Электроника', sub='—', brand='—';
  if(n.includes('iphone')){ cat='Смартфоны'; sub='iPhone'; brand='Apple'; }
  else if(n.includes('ipad')){ cat='Планшеты'; sub='iPad'; brand='Apple'; }
  else if(n.includes('macbook')){ cat='Ноутбуки'; sub='MacBook'; brand='Apple'; }
  else if(n.includes('apple watch')||n.includes('watch ultra')||n.includes('watch se')||n.includes('watch series')){ cat='Умные часы'; sub='Apple Watch'; brand='Apple'; }
  else if(n.includes('airpods')){ cat='Наушники'; sub='AirPods'; brand='Apple'; }
  else if(n.includes('samsung')||n.includes('galaxy')){ cat='Смартфоны'; sub='Samsung'; brand='Samsung'; }
  else if(n.includes('xiaomi')||n.includes('redmi')){ cat='Смартфоны'; sub='Xiaomi'; brand='Xiaomi'; }
  else if(n.includes('poco')){ cat='Смартфоны'; sub='Poco'; brand='Poco'; }
  else if(n.includes('honor')){ cat='Смартфоны'; sub='Honor'; brand='Honor'; }
  else if(n.includes('huawei')){ cat='Смартфоны'; sub='Huawei'; brand='Huawei'; }
  else if(n.includes('dyson')){ cat='Техника'; sub='Dyson'; brand='Dyson'; }
  else if(n.includes('garmin')){ cat='Умные часы'; sub='Garmin'; brand='Garmin'; }
  else if(n.includes('playstation')||n.includes('ps5')){ cat='Игровые консоли'; sub='PlayStation'; brand='Sony'; }
  else if(n.includes('nintendo')){ cat='Игровые консоли'; sub='Nintendo'; brand='Nintendo'; }
  return {cat, sub, brand};
}

function matchToWarehouseAll(name){
  const all=[...DATA.warehouse.tech, ...DATA.warehouse.tradein, ...DATA.warehouse.accessories, ...DATA.warehouse.parts];
  const nameTokens=tokenSet(name);
  return all.map(w=>({item:w, score:blendedMatchScore(nameTokens, tokenSet(w.model))}))
    .filter(x=>x.score>=0.5)
    .sort((a,b)=>b.score-a.score);
}
function matchToWarehouse(name){ const m=matchToWarehouseAll(name); return m.length? m[0] : null; }

/* Каталог сайта может содержать тысячи позиций (импорт из реального
   магазина) — без индекса сопоставление каждой строки прайса перебирало
   бы ВСЕ карточки каталога на каждый вызов, и разбор большого прайса
   (тысячи строк) занимал бы секунды. Строим обратный индекс «токен →
   карточки, где он встречается» один раз и переиспользуем его, пока
   каталог не изменится (см. DATA.siteCatalogVersion). */
let SITE_CATALOG_INDEX=null, SITE_CATALOG_INDEX_VERSION=-1;
function buildSiteCatalogIndex(){
  const index=new Map();
  DATA.siteCatalog.forEach(p=>{
    if(!p._tokenVariants){
      const variants=[p.name, p.normalizedName, ...(Array.isArray(p.aliases)?p.aliases:[])].filter(Boolean);
      p._tokenVariants=variants.map(v=>tokenSet(v));
    }
    const allTokens=new Set();
    p._tokenVariants.forEach(ts=>ts.forEach(t=>allTokens.add(t)));
    allTokens.forEach(t=>{
      if(!index.has(t)) index.set(t, []);
      index.get(t).push(p);
    });
  });
  return index;
}
function matchToSiteCatalogAll(name){
  if(!DATA.siteCatalog.length) return [];
  if(SITE_CATALOG_INDEX_VERSION!==(DATA.siteCatalogVersion||0)){
    SITE_CATALOG_INDEX=buildSiteCatalogIndex();
    SITE_CATALOG_INDEX_VERSION=DATA.siteCatalogVersion||0;
  }
  const nameTokens=tokenSet(name);
  const queryGen=extractGenerationNumber(name);
  const candidates=new Set();
  nameTokens.forEach(t=>{
    const arr=SITE_CATALOG_INDEX.get(t);
    if(arr) arr.forEach(p=>candidates.add(p));
  });
  const result=[];
  candidates.forEach(p=>{
    let best=0;
    p._tokenVariants.forEach(t=>{ const s=blendedMatchScore(nameTokens, t); if(s>best) best=s; });
    if(queryGen!=null){
      const candGen=extractGenerationNumber(p.name);
      if(candGen!=null && candGen!==queryGen) best*=0.4;
    }
    if(best>=0.5) result.push({item:p, score:best});
  });
  return result.sort((a,b)=>b.score-a.score);
}
function matchToSiteCatalog(name){ const m=matchToSiteCatalogAll(name); return m.length? m[0] : null; }

/* Флаг страны в начале строки поставщика ("🇭🇰 17 Pro Max...") — частый
   способ указать регион устройства. Извлекаем региона до того, как
   normalizeForMatch сотрёт эмодзи при сопоставлении. */
const FLAG_REGION_MAP={
  '🇭🇰':'HK', '🇨🇳':'CN', '🇺🇸':'US', '🇦🇪':'AE', '🇯🇵':'JP', '🇰🇷':'KR',
  '🇪🇺':'EU', '🇷🇺':'RU', '🇸🇬':'SG', '🇮🇳':'IN', '🇬🇧':'GB',
};
function extractRegion(rawLine){
  for(const flag in FLAG_REGION_MAP){ if(rawLine.includes(flag)) return FLAG_REGION_MAP[flag]; }
  const m=rawLine.match(/\b(HK|CN|US|EU|RU|JP|KR|AE|SG|IN|GB|LL\/A|ZA\/A)\b/);
  return m? m[1] : null;
}
/* "iPhone 14 Pro" и "iPhone 16 Pro" могут совпасть почти по всем словам
   (Pro, цвет, память) — но это разные товары. Номер поколения важнее
   остальных токенов, поэтому сверяем его отдельно и штрафуем явное
   несовпадение, вместо того чтобы полагаться только на общий счёт. */
function extractGenerationNumber(text){
  const m=text.match(/iphone\s*(\d{1,2})\b/i);
  return m? parseInt(m[1],10) : null;
}
const COLOR_WORDS=['black','white','blue','green','pink','gold','silver','titanium','purple','red','yellow','gray','grey','natural','desert','starlight','midnight',
  'чёрный','черный','белый','синий','зелёный','зеленый','розовый','золотой','серебристый','фиолетовый','красный','жёлтый','желтый','серый','titan'];
/* Если в строке явно назван другой бренд — нельзя угадывать "iPhone" по
   голому номеру и слову "pro"/"max": например, в "Xiaomi 17T Pro" номер 17
   и слово Pro есть, но это не iPhone. Без этой проверки обогащение запроса
   ниже могло бы испортить сопоставление для других брендов. */
const OTHER_BRAND_MARKERS=['xiaomi','redmi','poco','samsung','galaxy','honor','huawei','realme','nintendo','playstation','xbox','nothing','oneplus','google','pixel','tecno','infinix','vivo','oppo','sony'];
function extractSupplierAttributes(rawLine, name){
  const lower=name.toLowerCase();
  const memMatch=name.match(/(\d+)\s*(GB|TB|ГБ|ТБ)/i);
  let memory=memMatch? (memMatch[1]+memMatch[2].toUpperCase().replace('ГБ','GB').replace('ТБ','TB')) : null;
  if(!memory){
    // Без явных единиц: "256" само по себе, или "4/128" (ОЗУ/память) — берём
    // последнее число из списка типичных объёмов памяти как объём хранилища.
    const bareMatches=[...name.matchAll(/\b(16|32|64|128|256|512|1024|2048)\b/g)];
    if(bareMatches.length) memory=bareMatches[bareMatches.length-1][1]+'GB';
  }
  const color=COLOR_WORDS.find(c=>lower.includes(c)) || null;
  const region=extractRegion(rawLine);
  const hasOtherBrand=OTHER_BRAND_MARKERS.some(b=>lower.includes(b));
  // "17 Pro Max" / "15 Pro" / "14" — типичный формат поставщика для iPhone без слова "iPhone".
  const iphoneModelMatch=name.match(/\b(1[1-9]|[2-9]\d)\s*(pro\s*max|pro|plus|mini)?\b/i);
  let model=null;
  if(/iphone/i.test(name)){
    model=name.match(/iphone\s*\S*(\s*\S+){0,3}/i)?.[0]?.trim() || null;
  } else if(!hasOtherBrand && iphoneModelMatch && (lower.includes('pro') || lower.includes('max') || lower.includes('plus') || lower.includes('mini') || memory)){
    model='iPhone '+iphoneModelMatch[0].trim().replace(/\s+/g,' ');
  }
  return {model, memory, color, region};
}

function classifyResult(name, minPrice, rawLine){
  const match=matchToWarehouse(name);
  const siteMatch=matchToSiteCatalog(name);

  const bestItem = siteMatch && siteMatch.score>=(match?match.score:0)
    ? siteMatch.item : (match? match.item : null);
  const bestScore=Math.max(match?match.score:0, siteMatch?siteMatch.score:0);

  // Схема — всегда из карточки каталога, не из текста прайса.
  // Если карточка найдена, но схему определить нельзя — это 'scheme_error',
  // а не просто needs_review: маржинальность неизвестна, обновлять нельзя.
  let scheme = bestItem ? detectSchemeFromCatalogCard(bestItem) : null;
  if(!scheme) scheme = detectScheme(name); // запасной вариант

  const catInfo = inferCategory(bestItem||{name});

  const kbHit = DATA.knowledgeLog.find(k=>k.status==='active' && name.toLowerCase().includes(k.keyword.toLowerCase()));
  let confidence = bestScore;
  if(kbHit) confidence = Math.min(1, confidence + 0.1);
  confidence = Math.round(confidence*100)/100;

  let status, reason;
  if(bestScore>=0.78){
    if(!scheme){
      status='scheme_error';
      reason='Карточка найдена ('+(bestItem?bestItem.name:'')+ '), но схема маржи не определена — нужна ручная настройка';
    } else {
      status='recognized';
      reason = siteMatch && siteMatch.score>=(match?match.score:0)
        ? 'Сопоставлено с каталогом: «'+siteMatch.item.name+'» ('+Math.round(siteMatch.score*100)+'%)'
        : 'Сопоставлено со складом: «'+match.item.model+'» ('+Math.round(match.score*100)+'%)';
    }
  } else if(bestScore>=0.5){
    status='needs_review';
    const ref = bestItem ? bestItem.name||(bestItem.model||'') : '';
    reason = 'Похоже на «'+ref+'», уверенность '+Math.round(confidence*100)+'% — нужна проверка';
  } else {
    status='not_found';
    reason = 'Нет подходящей карточки в каталоге сайта';
  }
  return {scheme, match, siteMatch, bestItem, confidence, status, reason, catInfo};
}

/* ----------------------- схемы маржи: расчёт цены ----------------------- */
function findMarginPct(groupId, schemeId, price){
  const group=DATA.marginGroups.find(g=>g.id===groupId);
  if(!group) return null;
  const tiers=group.tiersBySchemeId[schemeId];
  if(!tiers || !tiers.length) return null;
  for(let i=0;i<tiers.length;i++){
    if(price<=tiers[i].max){
      return {pct:tiers[i].pct, tierFrom:i>0?tiers[i-1].max+1:0, tierTo:tiers[i].max};
    }
  }
  const last=tiers[tiers.length-1];
  return {pct:last.pct, tierFrom:tiers.length>1?tiers[tiers.length-2].max+1:0, tierTo:null};
}
function computeSalePriceForGroup(groupId, schemeId, price){
  const t=findMarginPct(groupId, schemeId, price);
  if(!t) return null;
  return {pct:t.pct, tierFrom:t.tierFrom, tierTo:t.tierTo, sale:Math.round(price*(1+t.pct/100)/10)*10};
}
function recomputeResult(r){
  r.pct=null; r.salePrice=null; r.tierFrom=null; r.tierTo=null;
  r.oldSitePrice=null; r.priceDelta=null; r.priceDeltaPct=null; r.readyStatus=null;
  const noCalc = r.status==='garbage'||r.status==='excluded'||r.minPrice==null||!r.manualSchemeId;
  if(noCalc) return;

  const groupId=STATE.selectedGroupId;
  const res=computeSalePriceForGroup(groupId, r.manualSchemeId, r.minPrice);
  if(res){
    r.pct=res.pct; r.salePrice=res.sale;
    r.tierFrom=res.tierFrom; r.tierTo=res.tierTo;
  }

  // Старая цена сайта — берём из найденной карточки каталога или склада.
  const siteItem=r.siteMatchId!=null
    ? DATA.siteCatalog.find(p=>p.siteProductId===r.siteMatchId) : null;
  const whItem=r.siteMatchName && !siteItem
    ? [...DATA.warehouse.tech,...DATA.warehouse.tradein,...DATA.warehouse.accessories,...DATA.warehouse.parts].find(w=>w.model===r.siteMatchName) : null;
  r.oldSitePrice = siteItem?.currentPrice ?? whItem?.price ?? null;

  if(r.oldSitePrice!=null && r.salePrice!=null){
    r.priceDelta=r.salePrice-r.oldSitePrice;
    r.priceDeltaPct=Math.round(r.priceDelta/r.oldSitePrice*1000)/10;
  }

  // readyStatus — итоговый сигнал для очереди выгрузки.
  if(r.status==='recognized' && r.salePrice!=null){
    r.readyStatus='ready';
  } else if(r.status==='scheme_error'){
    r.readyStatus='scheme_error';
  } else if(r.status==='needs_review'||(r.status==='recognized'&&r.salePrice==null)){
    r.readyStatus='review';
  } else {
    r.readyStatus='not_found';
  }
}

/* ----------------------- основной разбор прайсов ----------------------- */
function processPriceLists(){
  const allItems=[], unparsed=[];
  let totalLineCount=0;
  PD.sources.forEach(src=>{
    src.text.split('\n').forEach(rawLine=>{
      if(!rawLine.trim()) return;
      totalLineCount++;
      const cleaned=stripInlineNoise(rawLine);
      if(!cleaned) return;
      if(isLikelyGarbageLine(cleaned)){
        allItems.push({name:cleaned, price:null, source:src.label, rawLine:cleaned, garbage:true, excluded:false});
        return;
      }
      const p=parsePriceLine(cleaned);
      if(p) allItems.push({name:p.name, price:p.price, source:src.label, rawLine, garbage:false, excluded:hasExcludedConditionMarker(p.name)});
      else unparsed.push({line:cleaned, source:src.label});
    });
  });
  PD.totalLineCount=totalLineCount;
  PD.productLineCount=allItems.filter(it=>!it.garbage).length;

  const groups={};
  allItems.forEach(it=>{
    const key=it.garbage? ('__garbage__'+it.rawLine) : it.name.toLowerCase().replace(/\s+/g,' ').trim();
    (groups[key]=groups[key]||[]).push(it);
  });

  PD.results=Object.values(groups).map(offers=>{
    offers=offers.slice().sort((a,b)=>(a.price??Infinity)-(b.price??Infinity));
    const best=offers[0];
    if(best.garbage || best.price==null){
      return {name:best.rawLine, rawLine:best.rawLine, minPrice:null, offers, offerPrices:[], manualSchemeId:null, pct:null, salePrice:null,
        status:'garbage', reason:'Похоже на служебный текст, не товарную позицию', confidence:0, manuallyConfirmed:false,
        siteMatchName:null, siteMatchId:null, attributes:null};
    }

    // Одна и та же позиция может встретиться несколько раз (разные
    // поставщики/разделы файла) по разной цене — закупочная цена
    // считается как среднее арифметическое всех предложений, а не минимум.
    const offerPrices=offers.map(o=>o.price);
    const avgPrice=Math.round(offerPrices.reduce((s,p)=>s+p,0)/offerPrices.length);

    if(best.excluded){
      return {name:best.name, rawLine:best.rawLine, minPrice:avgPrice, offers, offerPrices, manualSchemeId:null, pct:null, salePrice:null,
        status:'excluded', reason:'Исключено по правилу: пометка «CPO»/«Актив»/«ASIS» — восстановленное или активированное устройство',
        confidence:0, manuallyConfirmed:false, siteMatchName:null, siteMatchId:null, attributes:null};
    }

    const attrs=extractSupplierAttributes(best.rawLine, best.name);
    // Если бренд явно не написан, но по формату строки понятно, что это
    // iPhone ("14 Pro 256 Black" → attrs.model="iPhone 14 Pro") — добавляем
    // это слово в запрос для поиска, иначе короткие токены вроде "pro"/"256"
    // могут случайно совпасть с другим брендом в каталоге.
    const queryName = (attrs.model && /^iphone\b/i.test(attrs.model) && !/iphone/i.test(best.name))
      ? ('iPhone '+best.name) : best.name;
    const cls=classifyResult(queryName, avgPrice, best.rawLine);
    const r={
      name:best.name, rawLine:best.rawLine, minPrice:avgPrice, offers, offerPrices,
      manualSchemeId: cls.scheme?cls.scheme.id:null, pct:null, salePrice:null,
      status:cls.status, reason:cls.reason, confidence:cls.confidence, manuallyConfirmed:false,
      siteMatchName: cls.siteMatch? cls.siteMatch.item.name : null,
      siteMatchId: cls.siteMatch? cls.siteMatch.item.siteProductId : null,
      attributes:attrs,
      catInfo:cls.catInfo||{cat:'—',sub:'—',brand:'—'},
      // Текущая цена на сайте из каталога — для отображения дельты.
      currentSitePrice: cls.siteMatch?.item?.currentPrice ?? null,
    };
    recomputeResult(r);
    return r;
  });
  PD.unparsed=unparsed;

  // Требует проверки / Не найдено / Ошибка схемы уходят в Центр обучения.
  // Исключённые (CPO/Актив/ASIS) — намеренно отфильтрованы бизнес-правилом.
  PD.results.filter(r=>r.status==='needs_review'||r.status==='not_found'||r.status==='scheme_error').forEach(r=>{
    const exists=DATA.learningQueue.some(q=>q.name===r.name && q.status==='pending');
    if(!exists){
      DATA.learningQueue.unshift({
        id:'learn_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),
        name:r.name, price:r.minPrice, suggestedSchemeId:r.manualSchemeId,
        confidence:r.confidence, reason:r.reason, status:'pending', date:DATA.today,
      });
    }
  });
}

/* ----------------------- очередь выгрузки ----------------------- */
function buildExportPreview(groupId){
  const group=DATA.marginGroups.find(g=>g.id===groupId);
  const summary={totalRecognized:0,batchesCount:0,skippedNeedsReview:0,skippedUnrecognized:0,skippedGarbage:0,skippedHidden:0,skippedNoScheme:0,skippedExcluded:0};
  const items=[];
  if(!PD.results || !group) return {items, summary};
  PD.results.forEach(r=>{
    const eligible = r.status==='recognized' || (r.status==='needs_review' && r.manuallyConfirmed);
    if(!eligible){
      if(r.status==='needs_review') summary.skippedNeedsReview++;
      else if(r.status==='not_found') summary.skippedUnrecognized++;
      else if(r.status==='garbage') summary.skippedGarbage++;
      else if(r.status==='excluded') summary.skippedExcluded++;
      return;
    }
    if(!r.manualSchemeId){ summary.skippedNoScheme++; return; }
    const computed=computeSalePriceForGroup(groupId, r.manualSchemeId, r.minPrice);
    if(!computed){ summary.skippedNoScheme++; return; }
    const matches=matchToWarehouseAll(r.name);
    if(matches.length===0){ summary.skippedUnrecognized++; return; }
    const visible=matches.filter(m=>!m.item.hiddenFromSite);
    if(visible.length===0){ summary.skippedHidden++; return; }
    if(visible.length<matches.length) summary.skippedHidden += (matches.length-visible.length);
    const scheme=DATA.marginSchemes.find(s=>s.id===r.manualSchemeId);
    visible.forEach(m=>{
      items.push({
        productKey:(m.item.imei||m.item.sku), productName:m.item.model,
        oldPrice:m.item.price, newPrice:computed.sale, purchasePrice:r.minPrice,
        appliedSchemeName:scheme?scheme.name:'—', appliedGroupName:group.name,
        sourceLabel:(r.offers[0]&&r.offers[0].source)||'—',
      });
    });
  });
  summary.totalRecognized=items.length;
  summary.batchesCount=items.length? Math.ceil(items.length/DATA.settings.exportBatchMax) : 0;
  return {items, summary};
}
function createExportBatches(groupId){
  const {items}=buildExportPreview(groupId);
  if(items.length===0){ toast('Нет позиций для очереди выгрузки', 'error'); return []; }
  const group=DATA.marginGroups.find(g=>g.id===groupId);
  const existingMax=DATA.priceExportBatches.reduce((m,b)=>Math.max(m,b.batchNumber),0);
  const chunks=[];
  for(let i=0;i<items.length;i+=DATA.settings.exportBatchMax) chunks.push(items.slice(i,i+DATA.settings.exportBatchMax));
  const batches=chunks.map((chunkItems,idx)=>({
    id:'batch_'+Date.now()+'_'+idx,
    batchNumber:existingMax+idx+1,
    createdAt:DATA.today+' '+nowTime(),
    createdBy:(currentEmployee()?.name||ROLES[STATE.role].label),
    status:'awaiting_confirmation',
    marginGroupName:group.name,
    items:chunkItems.map((it,ii)=>({...it, id:'expitem_'+Date.now()+'_'+idx+'_'+ii, status:'awaiting_confirmation', errorMessage:null, uploadedAt:null})),
  }));
  DATA.priceExportBatches.push(...batches);
  logPricingAction('Создана очередь выгрузки', batches.length+' пакет(ов), '+items.length+' позиций', 'Группа маржи «'+group.name+'»');
  return batches;
}
const PRICING_STOP_FLAGS=new Set();
function delayMs(ms){ return new Promise(resolve=>setTimeout(resolve, ms)); }
async function startExportBatch(batchId){
  PRICING_STOP_FLAGS.delete(batchId);
  const batch=DATA.priceExportBatches.find(b=>b.id===batchId);
  if(!batch) return;
  batch.status='queued';
  renderPricing(document.getElementById('pageContent'));
  await runExportBatch(batchId);
}
async function runExportBatch(batchId){
  const get=()=>DATA.priceExportBatches.find(b=>b.id===batchId);
  let batch=get();
  if(!batch) return;
  batch.status='uploading';
  renderPricing(document.getElementById('pageContent'));
  let processed=0, errors=0;
  while(true){
    batch=get();
    if(!batch) return;
    const next=batch.items.find(it=>it.status!=='success' && it.status!=='rolled_back');
    if(!next) break;
    if(PRICING_STOP_FLAGS.has(batchId)){
      batch.status='paused';
      renderPricing(document.getElementById('pageContent'));
      return;
    }
    next.status='uploading';
    await delayMs(120);
    const ok=Math.random()>=0.12; // имитация сети — ~12% случайных ошибок, как при реальной выгрузке
    processed++;
    if(ok){
      const whItem=[...DATA.warehouse.tech, ...DATA.warehouse.tradein, ...DATA.warehouse.accessories, ...DATA.warehouse.parts].find(w=>(w.imei||w.sku)===next.productKey);
      if(whItem){ whItem.price=next.newPrice; whItem.purchase=next.purchasePrice; whItem.lastPriceUpdateAt=DATA.today; }
      next.status='success'; next.uploadedAt=DATA.today+' '+nowTime(); next.errorMessage=null;
      DATA.priceUpdateLog.unshift({date:DATA.today, time:nowTime(), item:next.productName, count:1, purchase:next.purchasePrice, price:next.newPrice, by:(currentEmployee()?.name||ROLES[STATE.role].label)});
    } else {
      errors++;
      next.status='error'; next.errorMessage='Сайт временно не ответил (имитация сетевой ошибки)';
    }
    if(processed>=5 && errors/processed>0.3){
      PRICING_STOP_FLAGS.add(batchId);
      batch.status='paused';
      logPricingAction('Автопауза выгрузки', 'Пакет №'+batch.batchNumber, 'Слишком много ошибок: '+errors+' из '+processed);
      renderPricing(document.getElementById('pageContent'));
      return;
    }
    renderPricing(document.getElementById('pageContent'));
  }
  batch=get();
  const hasError=batch.items.some(it=>it.status==='error');
  batch.status=hasError?'error':'success';
  renderPricing(document.getElementById('pageContent'));
}
function pauseExportBatch(batchId){ PRICING_STOP_FLAGS.add(batchId); }
async function retryExportErrors(batchId){
  const batch=DATA.priceExportBatches.find(b=>b.id===batchId);
  if(!batch) return;
  PRICING_STOP_FLAGS.delete(batchId);
  batch.items.forEach(it=>{ if(it.status==='error'){ it.status='queued'; it.errorMessage=null; } });
  batch.status='queued';
  renderPricing(document.getElementById('pageContent'));
  await runExportBatch(batchId);
}
function rollbackExportBatch(batchId){
  const batch=DATA.priceExportBatches.find(b=>b.id===batchId);
  if(!batch) return;
  const toRollback=batch.items.filter(it=>it.status==='success');
  toRollback.forEach(it=>{
    const whItem=[...DATA.warehouse.tech, ...DATA.warehouse.tradein, ...DATA.warehouse.accessories, ...DATA.warehouse.parts].find(w=>(w.imei||w.sku)===it.productKey);
    if(whItem) whItem.price=it.oldPrice;
    it.status='rolled_back';
    DATA.priceUpdateLog.unshift({date:DATA.today, time:nowTime(), item:it.productName+' (откат)', count:1, purchase:it.purchasePrice, price:it.oldPrice, by:(currentEmployee()?.name||ROLES[STATE.role].label)});
  });
  batch.status='rolled_back';
  logPricingAction('Откат пакета', 'Пакет №'+batch.batchNumber, toRollback.length+' позици(й) возвращено к прежней цене');
  renderPricing(document.getElementById('pageContent'));
  toast('Пакет №'+batch.batchNumber+' откачен', 'info');
}

/* ----------------------- контроль устаревших цен ----------------------- */
const STALE_PERIOD_DAYS={today:1,'3days':3,week:7,'3weeks':21,month:30};
const STALE_PERIOD_LABELS={today:'Сегодня','3days':'3 дня',week:'Неделя','3weeks':'3 недели',month:'Месяц',custom:'Произвольный период'};
function buildStaleEntries(period, customDays){
  const minDays = period==='custom' ? (customDays||0) : (STALE_PERIOD_DAYS[period]||0);
  return DATA.warehouse.tech.map(w=>{
    const days=daysSinceRu(w.lastPriceUpdateAt||DATA.today);
    let status;
    if(w.hiddenFromSite) status='hidden';
    else if(days>=30) status='stale';
    else if(days>=14) status='needs_review';
    else status='fresh';
    return {key:(w.imei||w.sku), item:w, days, status};
  }).filter(e=>e.item.hiddenFromSite || e.days>=minDays);
}
function setHiddenForKeys(keys, hidden){
  const all=[...DATA.warehouse.tech];
  let count=0;
  keys.forEach(k=>{
    const w=all.find(x=>(x.imei||x.sku)===k);
    if(w){ w.hiddenFromSite=hidden; count++; }
  });
  logPricingAction(hidden?'Скрыты товары':'Возвращены товары', count+' позици(й)', hidden?'Цена давно не обновлялась в прайсах':'Возврат на сайт');
  return count;
}

/* ----------------------- Центр обучения ----------------------- */
function confirmLearningCard(cardId, schemeId, keyword){
  const card=DATA.learningQueue.find(q=>q.id===cardId);
  if(!card) return;
  const scheme=DATA.marginSchemes.find(s=>s.id===schemeId);
  if(!scheme){ toast('Выберите схему', 'error'); return; }
  const kw=(keyword||'').trim().toLowerCase();
  if(!kw){ toast('Укажите ключевое слово для обучения', 'error'); return; }
  if(!scheme.keywords.includes(kw)) scheme.keywords.push(kw);
  DATA.knowledgeLog.unshift({id:'kb_'+Date.now(), schemeId:scheme.id, schemeName:scheme.name, keyword:kw, cardName:card.name, confirmedBy:(currentEmployee()?.name||ROLES[STATE.role].label), date:DATA.today, status:'active'});
  card.status='confirmed';
  // если эта же позиция ещё видна в текущих результатах разбора — пересчитываем её статус сразу
  if(PD.results){
    PD.results.filter(r=>r.name===card.name).forEach(r=>{
      const match=matchToWarehouse(r.name);
      const siteMatch=matchToSiteCatalog(r.name);
      r.manualSchemeId=scheme.id;
      r.manuallyConfirmed=true;
      if(match || siteMatch){
        r.status='recognized';
        r.siteMatchName=siteMatch? siteMatch.item.name : r.siteMatchName;
        r.siteMatchId=siteMatch? siteMatch.item.siteProductId : r.siteMatchId;
        r.reason = siteMatch
          ? 'Подтверждено в Центре обучения, сопоставлено с каталогом сайта: «'+siteMatch.item.name+'»'
          : 'Подтверждено в Центре обучения, сопоставлено со складом: «'+match.item.model+'»';
      } else {
        r.status='not_found';
        r.reason='Подтверждено в Центре обучения, но подходящей карточки нет в каталоге сайта';
      }
      recomputeResult(r);
    });
  }
  toast('Правило сохранено: «'+kw+'» → '+scheme.name, 'success');
}
function markLearningCardNotAProduct(cardId){
  const card=DATA.learningQueue.find(q=>q.id===cardId);
  if(card) card.status='not_a_product';
}
function skipLearningCard(cardId){
  const card=DATA.learningQueue.find(q=>q.id===cardId);
  if(card) card.status='skipped';
}

/* ----------------------- база знаний ----------------------- */
function archiveKnowledgeEntry(entryId){
  const entry=DATA.knowledgeLog.find(k=>k.id===entryId);
  if(!entry || entry.status!=='active') return;
  const scheme=DATA.marginSchemes.find(s=>s.id===entry.schemeId);
  if(scheme) scheme.keywords=scheme.keywords.filter(k=>k!==entry.keyword);
  entry.status='archived';
  DATA.knowledgeArchive.unshift(entry);
}
function restoreKnowledgeEntry(entryId){
  const entry=DATA.knowledgeArchive.find(k=>k.id===entryId);
  if(!entry) return;
  const scheme=DATA.marginSchemes.find(s=>s.id===entry.schemeId);
  if(scheme && !scheme.keywords.includes(entry.keyword)) scheme.keywords.push(entry.keyword);
  entry.status='active';
  DATA.knowledgeArchive=DATA.knowledgeArchive.filter(k=>k.id!==entryId);
}
function clearKnowledgeBase(confirmationText){
  if(confirmationText!=='УДАЛИТЬ'){ toast('Для очистки введите слово «УДАЛИТЬ» без ошибок', 'error'); return; }
  DATA.knowledgeLog.filter(k=>k.status==='active').forEach(k=>archiveKnowledgeEntry(k.id));
  logPricingAction('Очистка базы знаний', 'Все активные правила архивированы', '');
  toast('База знаний очищена (архивирована, не удалена)', 'success');
}

function openResultModal(){
  STATE.resultFilter='all';
  openModal('Результат разбора прайсов', '', '<div id="resultModalBody">'+resultModalBody('all')+'</div>', []);
  wireResultModal();
}
function wireResultModal(){
  document.querySelectorAll('[data-rf]').forEach(el=>el.addEventListener('click',()=>{
    STATE.resultFilter=el.dataset.rf;
    document.getElementById('resultModalBody').innerHTML=resultModalBody(STATE.resultFilter);
    wireResultModal();
  }));
  document.querySelectorAll('[data-res-scheme]').forEach(el=>el.addEventListener('change',()=>{
    const idx=parseInt(el.dataset.resScheme);
    const r=PD.results[idx];
    const newSchemeId=el.value||null;
    r.manualSchemeId=newSchemeId;
    r.manuallyConfirmed=true;

    // Запоминаем правило: если у найденной карточки есть имя — сохраняем
    // связь «название карточки → схема» в categorySchemeMap, чтобы
    // аналогичные позиции в следующий раз сразу получали правильную схему.
    if(newSchemeId && r.siteMatchName){
      const keyword=r.siteMatchName.toLowerCase().split(/\s+/).slice(0,3).join(' ');
      const alreadyMapped=DATA.categorySchemeMap.some(m=>m.match===keyword && m.schemeId===newSchemeId);
      if(!alreadyMapped){
        DATA.categorySchemeMap.push({match:keyword, schemeId:newSchemeId, learnedAt:DATA.today, learnedFrom:r.siteMatchName});
        const scheme=DATA.marginSchemes.find(s=>s.id===newSchemeId);
        DATA.knowledgeLog.unshift({id:'kb_'+Date.now(),schemeId:newSchemeId,schemeName:scheme?scheme.name:newSchemeId,keyword,cardName:r.siteMatchName,confirmedBy:(currentEmployee()?.name||ROLES[STATE.role].label),date:DATA.today,status:'active'});
        toast('Правило запомнено: «'+r.siteMatchName.slice(0,30)+'…» → схема «'+(scheme?scheme.name:newSchemeId)+'»', 'success');
      }
    }

    recomputeResult(r);
    document.getElementById('resultModalBody').innerHTML=resultModalBody(STATE.resultFilter||'all');
    wireResultModal();
  }));
  document.querySelectorAll('[data-res-confirm]').forEach(el=>el.addEventListener('click',()=>{
    const idx=parseInt(el.dataset.resConfirm);
    const r=PD.results[idx];
    r.manuallyConfirmed=true;
    r.status='recognized';
    r.readyStatus=r.manualSchemeId?'ready':'scheme_error';
    recomputeResult(r);
    document.getElementById('resultModalBody').innerHTML=resultModalBody(STATE.resultFilter||'all');
    wireResultModal();
    toast('Позиция подтверждена вручную', 'success');
  }));
}

    '<span class="tsub" style="align-self:center;">'+STATE.staleSelected.size+' выбрано</span>'+
    '<button class="btn btn-sm btn-danger" id="staleHideBtn" '+(STATE.staleSelected.size===0?'disabled':'')+'>Скрыть выбранные</button>'+
    '<button class="btn btn-sm btn-primary" id="staleRestoreBtn" '+(STATE.staleSelected.size===0?'disabled':'')+'>Вернуть выбранные</button>'+
  '</div></div></div>';

  h+='<div class="section"><div class="table-wrap"><table><thead><tr><th></th><th>Товар</th><th>Текущая цена</th><th>Последнее обновление</th><th>Дней без обновления</th><th>Статус</th><th></th></tr></thead><tbody>';
  const STALE_LABEL={fresh:['Свежая','b-done'], needs_review:['Нужна проверка','b-progress'], stale:['Цена устарела','b-cancel'], hidden:['Скрыт','b-grey']};
  entries.forEach(e=>{
    const st=STALE_LABEL[e.status];
    h+='<tr class="'+(e.item.hiddenFromSite?'row-hidden-site':'')+'">'+
      '<td><input type="checkbox" '+(STATE.staleSelected.has(e.key)?'checked':'')+' data-stale-check="'+e.key+'"></td>'+
      '<td class="tname">'+e.item.model+'</td><td class="mono">'+rub(e.item.price)+'</td><td class="mono">'+e.item.lastPriceUpdateAt+'</td>'+
      '<td class="mono">'+e.days+'</td><td><span class="badge '+st[1]+'">'+st[0]+'</span></td>'+
      '<td>'+(e.item.hiddenFromSite?'<button class="btn btn-sm btn-primary" data-stale-restore-one="'+e.key+'">Вернуть</button>':'<button class="btn btn-sm btn-danger" data-stale-hide-one="'+e.key+'">Скрыть</button>')+'</td>'+
    '</tr>';
  });
  if(entries.length===0) h+='<tr><td colspan="7" class="empty"><b>Нет товаров под выбранный фильтр</b></td></tr>';
  h+='</tbody></table></div></div>';

  h+='<div class="section"><div class="section-title" style="margin-bottom:10px;">'+ic('warehouse')+' Скрытые товары ('+hidden.length+')</div>';
  h+='<p class="tsub">Скрытые товары нельзя удалить — только вернуть на сайт.</p>';
  if(hidden.length===0){ h+='<div class="empty"><b>Сейчас ничего не скрыто</b></div>'; }
  else {
    h+='<div class="card">'+hidden.map(w=>'<div class="hist-row"><div><div class="h-main">'+w.model+'</div><div class="h-sub">'+rub(w.price)+' · не обновлялась с '+w.lastPriceUpdateAt+'</div></div><button class="btn btn-sm btn-primary" data-stale-restore-one="'+(w.imei||w.sku)+'">Вернуть на сайт</button></div>').join('')+'</div>';
  }
  h+='</div>';
  return h;
}
