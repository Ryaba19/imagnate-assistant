/* ============================================================
   Диспетчер вкладок и обработчики событий
============================================================ */
function wirePricingBody(c){
  if(STATE.pricingTab==='upload'){
    document.querySelectorAll('[data-pst]').forEach(el=>el.addEventListener('click', ()=>{ STATE.priceSourceTab=el.dataset.pst; renderPricing(c); }));
    const addBtn=document.getElementById('addSourceBtn');
    if(addBtn) addBtn.addEventListener('click', ()=>{ PD.sources.push({id:'src_'+Date.now(), type:'text', label:'Прайс '+(PD.sources.filter(s=>s.type==='text').length+1), text:''}); renderPricing(c); });
    document.querySelectorAll('[data-src-remove]').forEach(el=>el.addEventListener('click', ()=>{ PD.sources.splice(parseInt(el.dataset.srcRemove),1); renderPricing(c); }));
    document.querySelectorAll('[data-src-label]').forEach(el=>el.addEventListener('change', ()=>{ PD.sources[parseInt(el.dataset.srcLabel)].label=el.value; }));
    document.querySelectorAll('[data-src-text]').forEach(el=>el.addEventListener('change', ()=>{ PD.sources[parseInt(el.dataset.srcText)].text=el.value; }));

    // --- файлы: клик и drag&drop, можно добавлять постепенно ---
    const dropZone=document.getElementById('priceFileDropZone');
    const fileInput=document.getElementById('priceFileInput');
    if(dropZone && fileInput){
      dropZone.addEventListener('click', ()=>fileInput.click());
      dropZone.addEventListener('dragover', e=>{ e.preventDefault(); dropZone.classList.add('file-drop-active'); });
      dropZone.addEventListener('dragleave', ()=>dropZone.classList.remove('file-drop-active'));
      dropZone.addEventListener('drop', e=>{
        e.preventDefault(); dropZone.classList.remove('file-drop-active');
        addPriceFiles(Array.from(e.dataTransfer.files||[]), c);
      });
      fileInput.addEventListener('change', ()=>{
        addPriceFiles(Array.from(fileInput.files||[]), c);
        fileInput.value='';
      });
    }

    // --- API поставщиков ---
    document.querySelectorAll('[data-api-toggle]').forEach(el=>el.addEventListener('click', ()=>{
      const cfg=PD.apiConfigs.find(a=>a.id===el.dataset.apiToggle);
      cfg.isActive=!cfg.isActive;
      renderPricing(c);
    }));
    document.querySelectorAll('[data-api-check]').forEach(el=>el.addEventListener('click', ()=>{
      const cfg=PD.apiConfigs.find(a=>a.id===el.dataset.apiCheck);
      cfg.connectionStatus = cfg.isActive ? 'connected' : 'error';
      renderPricing(c);
      toast(cfg.isActive? 'Соединение установлено' : 'Источник неактивен — включите его', cfg.isActive?'success':'error');
    }));
    document.querySelectorAll('[data-api-remove]').forEach(el=>el.addEventListener('click', ()=>{
      PD.apiConfigs=PD.apiConfigs.filter(a=>a.id!==el.dataset.apiRemove);
      renderPricing(c);
    }));
    const apiAddBtn=document.getElementById('apiAddBtn');
    if(apiAddBtn) apiAddBtn.addEventListener('click', ()=>{
      const body='<div class="field" style="margin-bottom:10px;"><label>Название</label><input class="input-mini" id="newApiName" style="width:100%;" placeholder="Поставщик «...»"></div>'+
        '<div class="field"><label>URL</label><input class="input-mini" id="newApiUrl" style="width:100%;" placeholder="https://..."></div>';
      openModal('Новый API-источник', '', body, [{label:'Добавить', cls:'btn-primary', action:()=>{
        const name=document.getElementById('newApiName').value.trim();
        const url=document.getElementById('newApiUrl').value.trim();
        if(!name||!url){ toast('Заполните название и URL', 'error'); return; }
        PD.apiConfigs.push({id:'api_'+Date.now(), name, url, isActive:true, connectionStatus:'unknown'});
        closeModal(); renderPricing(c);
        toast('Источник добавлен', 'success');
      }}]);
    });
    const fetchSelBtn=document.getElementById('apiFetchSelectedBtn');
    if(fetchSelBtn) fetchSelBtn.addEventListener('click', ()=>{
      const selected=Array.from(document.querySelectorAll('[data-api-select]:checked')).map(el=>el.dataset.apiSelect);
      if(selected.length===0){ toast('Выберите хотя бы один источник', 'error'); return; }
      let added=0;
      selected.forEach(id=>{
        const cfg=PD.apiConfigs.find(a=>a.id===id);
        if(!cfg || !cfg.isActive) return;
        PD.sources.push({id:'src_'+Date.now()+'_'+added, type:'api', label:cfg.name, text:mockApiFetchText(cfg.name)});
        cfg.connectionStatus='connected';
        added++;
      });
      STATE.priceSourceTab='text';
      renderPricing(c);
      toast(added? 'Получены данные из '+added+' источник(ов) — добавлены как текстовые источники' : 'Ни один из выбранных источников не активен', added?'success':'error');
    });

    const procBtn=document.getElementById('processPricesBtn');
    if(procBtn) procBtn.addEventListener('click', ()=>{
      document.querySelectorAll('[data-src-text]').forEach(el=>{ PD.sources[parseInt(el.dataset.srcText)].text=el.value; });
      const hasAnyText=PD.sources.some(s=>s.text && s.text.trim());
      if(!hasAnyText){ toast('Сначала вставьте текст прайса или загрузите файл', 'error'); return; }
      processPriceLists();
      renderPricing(c);
      openResultModal();
    });
    const clearBtn=document.getElementById('clearPricesBtn');
    if(clearBtn) clearBtn.addEventListener('click', ()=>{ PD.results=null; PD.unparsed=[]; renderPricing(c); });
    const showBtn=document.getElementById('showResultBtn');
    if(showBtn) showBtn.addEventListener('click', openResultModal);
    const goQueueBtn=document.getElementById('goToQueueBtn');
    if(goQueueBtn) goQueueBtn.addEventListener('click', ()=>{ STATE.pricingTab='queue'; renderPricing(c); });
  } else if(STATE.pricingTab==='schemes'){
    document.querySelectorAll('[data-grp]').forEach(el=>el.addEventListener('click', ()=>{ STATE.selectedGroupId=el.dataset.grp; renderPricing(c); }));
    const addGroupBtn=document.getElementById('addGroupBtn');
    if(addGroupBtn) addGroupBtn.addEventListener('click', ()=>openAddGroupModal(c));
    const removeGroupBtn=document.getElementById('removeGroupBtn');
    if(removeGroupBtn) removeGroupBtn.addEventListener('click', ()=>{
      DATA.marginGroups=DATA.marginGroups.filter(g=>g.id!==STATE.selectedGroupId);
      STATE.selectedGroupId=DATA.marginGroups.find(g=>g.isDefault).id;
      renderPricing(c);
      toast('Группа удалена', 'info');
    });
    const addSchemeBtn=document.getElementById('addSchemeBtn');
    if(addSchemeBtn) addSchemeBtn.addEventListener('click', ()=>openAddSchemeModal(c));
    document.querySelectorAll('[data-scheme-toggle]').forEach(el=>el.addEventListener('click', ()=>{
      const id=el.dataset.schemeToggle;
      if(STATE.expandedSchemeIds.has(id)) STATE.expandedSchemeIds.delete(id); else STATE.expandedSchemeIds.add(id);
      renderPricing(c);
    }));
    document.querySelectorAll('[data-scheme-remove]').forEach(el=>el.addEventListener('click', ()=>{
      if(DATA.marginSchemes.length<=1){ toast('Нужна хотя бы одна схема', 'error'); return; }
      const id=el.dataset.schemeRemove;
      DATA.marginSchemes=DATA.marginSchemes.filter(s=>s.id!==id);
      DATA.marginGroups.forEach(g=>{ delete g.tiersBySchemeId[id]; });
      renderPricing(c);
      toast('Схема удалена', 'info');
    }));
    document.querySelectorAll('[data-scheme-keywords]').forEach(el=>el.addEventListener('change', ()=>{
      const scheme=DATA.marginSchemes.find(s=>s.id===el.dataset.schemeKeywords);
      scheme.keywords=el.value.split(',').map(s=>s.trim().toLowerCase()).filter(Boolean);
      toast('Ключевые слова обновлены', 'success');
    }));
    document.querySelectorAll('[data-tier-max]').forEach(el=>el.addEventListener('change', ()=>{
      const [schemeId,ti]=el.dataset.tierMax.split('_'); const tiIdx=parseInt(ti);
      const v=parseFloat(el.value);
      const group=DATA.marginGroups.find(g=>g.id===STATE.selectedGroupId);
      const tiers=group.tiersBySchemeId[schemeId];
      if(isNaN(v)){ toast('Некорректное значение', 'error'); return; }
      if(tiIdx>0 && v<=tiers[tiIdx-1].max){ toast('Граница должна быть больше предыдущей', 'error'); renderPricing(c); return; }
      if(tiIdx<tiers.length-1 && v>=tiers[tiIdx+1].max){ toast('Граница должна быть меньше следующей', 'error'); renderPricing(c); return; }
      tiers[tiIdx].max=v;
      toast('Диапазон обновлён', 'success');
    }));
    document.querySelectorAll('[data-tier-pct]').forEach(el=>el.addEventListener('change', ()=>{
      const [schemeId,ti]=el.dataset.tierPct.split('_');
      const v=parseFloat(el.value);
      if(isNaN(v)){ toast('Некорректное значение', 'error'); return; }
      DATA.marginGroups.find(g=>g.id===STATE.selectedGroupId).tiersBySchemeId[schemeId][parseInt(ti)].pct=v;
      toast('Наценка обновлена', 'success');
    }));
    document.querySelectorAll('[data-tier-remove]').forEach(el=>el.addEventListener('click', ()=>{
      const [schemeId,ti]=el.dataset.tierRemove.split('_');
      const tiers=DATA.marginGroups.find(g=>g.id===STATE.selectedGroupId).tiersBySchemeId[schemeId];
      if(tiers.length<=1){ toast('Нужен хотя бы один диапазон', 'error'); return; }
      tiers.splice(parseInt(ti),1);
      renderPricing(c);
    }));
    document.querySelectorAll('[data-tier-add]').forEach(el=>el.addEventListener('click', ()=>{
      const schemeId=el.dataset.tierAdd;
      const tiers=DATA.marginGroups.find(g=>g.id===STATE.selectedGroupId).tiersBySchemeId[schemeId];
      const lastMax=tiers.length?tiers[tiers.length-1].max:0;
      tiers.push({max:lastMax+10000, pct:10});
      renderPricing(c);
    }));
  } else if(STATE.pricingTab==='queue'){
    const createBtn=document.getElementById('createQueueBtn');
    if(createBtn) createBtn.addEventListener('click', ()=>{
      const group=DATA.marginGroups.find(g=>g.id===STATE.selectedGroupId)||DATA.marginGroups[0];
      const batches=createExportBatches(group.id);
      renderPricing(c);
      if(batches.length) toast('Создано пакетов: '+batches.length, 'success');
    });
    document.querySelectorAll('[data-batch-open]').forEach(el=>el.addEventListener('click', ()=>openBatchDetailModal(el.dataset.batchOpen)));
    document.querySelectorAll('[data-batch-start]').forEach(el=>el.addEventListener('click', ()=>void startExportBatch(el.dataset.batchStart)));
    document.querySelectorAll('[data-batch-pause]').forEach(el=>el.addEventListener('click', ()=>{ pauseExportBatch(el.dataset.batchPause); }));
    document.querySelectorAll('[data-batch-retry]').forEach(el=>el.addEventListener('click', ()=>void retryExportErrors(el.dataset.batchRetry)));
    document.querySelectorAll('[data-batch-rollback]').forEach(el=>el.addEventListener('click', ()=>rollbackExportBatch(el.dataset.batchRollback)));
  } else if(STATE.pricingTab==='stale'){
    document.querySelectorAll('[data-stp]').forEach(el=>el.addEventListener('click', ()=>{ STATE.stalePeriod=el.dataset.stp; renderPricing(c); }));
    const customInput=document.getElementById('staleCustomDaysInput');
    if(customInput) customInput.addEventListener('change', ()=>{ STATE.staleCustomDays=parseInt(customInput.value)||0; renderPricing(c); });
    document.querySelectorAll('[data-stale-check]').forEach(el=>el.addEventListener('change', ()=>{
      const k=el.dataset.staleCheck;
      if(STATE.staleSelected.has(k)) STATE.staleSelected.delete(k); else STATE.staleSelected.add(k);
      renderPricing(c);
    }));
    const selAll=document.getElementById('staleSelectAll');
    if(selAll) selAll.addEventListener('click', ()=>{ buildStaleEntries(STATE.stalePeriod, STATE.staleCustomDays).forEach(e=>STATE.staleSelected.add(e.key)); renderPricing(c); });
    const selHidden=document.getElementById('staleSelectHidden');
    if(selHidden) selHidden.addEventListener('click', ()=>{ buildStaleEntries(STATE.stalePeriod, STATE.staleCustomDays).filter(e=>e.item.hiddenFromSite).forEach(e=>STATE.staleSelected.add(e.key)); renderPricing(c); });
    const sel30=document.getElementById('staleSelect30');
    if(sel30) sel30.addEventListener('click', ()=>{ buildStaleEntries(STATE.stalePeriod, STATE.staleCustomDays).filter(e=>e.days>=30).forEach(e=>STATE.staleSelected.add(e.key)); renderPricing(c); });
    const clearSel=document.getElementById('staleClearSel');
    if(clearSel) clearSel.addEventListener('click', ()=>{ STATE.staleSelected.clear(); renderPricing(c); });
    const hideBtn=document.getElementById('staleHideBtn');
    if(hideBtn) hideBtn.addEventListener('click', ()=>{ const n=setHiddenForKeys(Array.from(STATE.staleSelected), true); STATE.staleSelected.clear(); renderPricing(c); toast(n+' товар(ов) скрыто', 'success'); });
    const restoreBtn=document.getElementById('staleRestoreBtn');
    if(restoreBtn) restoreBtn.addEventListener('click', ()=>{ const n=setHiddenForKeys(Array.from(STATE.staleSelected), false); STATE.staleSelected.clear(); renderPricing(c); toast(n+' товар(ов) возвращено', 'success'); });
    document.querySelectorAll('[data-stale-hide-one]').forEach(el=>el.addEventListener('click', ()=>{ setHiddenForKeys([el.dataset.staleHideOne], true); renderPricing(c); toast('Товар скрыт', 'success'); }));
    document.querySelectorAll('[data-stale-restore-one]').forEach(el=>el.addEventListener('click', ()=>{ setHiddenForKeys([el.dataset.staleRestoreOne], false); renderPricing(c); toast('Товар возвращён', 'success'); }));
  } else if(STATE.pricingTab==='learning'){
    document.querySelectorAll('[data-learn-confirm]').forEach(el=>el.addEventListener('click', ()=>{
      const id=el.dataset.learnConfirm;
      const schemeId=document.getElementById('learnScheme_'+id).value;
      const keyword=document.getElementById('learnKeyword_'+id).value;
      confirmLearningCard(id, schemeId, keyword);
      renderPricing(c);
    }));
    document.querySelectorAll('[data-learn-notproduct]').forEach(el=>el.addEventListener('click', ()=>{ markLearningCardNotAProduct(el.dataset.learnNotproduct); renderPricing(c); toast('Помечено как «не товар»', 'info'); }));
    document.querySelectorAll('[data-learn-skip]').forEach(el=>el.addEventListener('click', ()=>{ skipLearningCard(el.dataset.learnSkip); renderPricing(c); }));
  } else if(STATE.pricingTab==='knowledge'){
    const exportBtn=document.getElementById('kbExportBtn');
    if(exportBtn) exportBtn.addEventListener('click', ()=>{ jsonDownload('baza-znaniy.json', {schemes:DATA.marginSchemes, log:DATA.knowledgeLog}); toast('База знаний скачана', 'success'); });
    const importBtn=document.getElementById('kbImportBtn');
    const importFile=document.getElementById('kbImportFile');
    if(importBtn) importBtn.addEventListener('click', ()=>importFile.click());
    if(importFile) importFile.addEventListener('change', ()=>{
      const file=importFile.files[0]; if(!file) return;
      handleKnowledgeImportFileSelected(file, c);
      importFile.value='';
    });
    const clearBtn=document.getElementById('kbClearBtn');
    if(clearBtn) clearBtn.addEventListener('click', ()=>{
      let body='<div class="field"><label>Для подтверждения введите «УДАЛИТЬ»</label><input class="input-mini" id="kbClearConfirm" style="width:100%;"></div>'+
        '<p class="tsub">Это архивирует все активные правила — физического удаления нет, можно будет восстановить.</p>';
      openModal('Очистить базу знаний', '', body, [{label:'Очистить', cls:'btn-danger', action:()=>{
        const v=document.getElementById('kbClearConfirm').value.trim();
        clearKnowledgeBase(v);
        closeModal(); renderPricing(c);
      }}]);
    });

/* ============================================================
   ЗАДАЧИ — доска объявлений: сотрудник берёт задачу себе,
   через 3 дня система спрашивает «продолжаете?», через 7 дней —
   срок истекает. Вознаграждение за подтверждённую задачу уходит
   в Бухгалтерию (ЗП и выплаты) тем же механизмом, что компенсации.
============================================================ */
function addDaysRu(dateStr, timeStr, days){
  const dp=dateStr.split('.').map(Number);
  const tp=(timeStr||'00:00').split(':').map(Number);
  const dt=new Date(dp[2], dp[1]-1, dp[0], tp[0], tp[1]);
  dt.setDate(dt.getDate()+days);
  const dd=String(dt.getDate()).padStart(2,'0'), mm=String(dt.getMonth()+1).padStart(2,'0');
  return dd+'.'+mm+'.'+dt.getFullYear()+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');
}
function nextId(arr){ return (arr.length? Math.max(...arr.map(x=>x.id)):0)+1; }
function pushNotif(to, text){
  DATA.notifications.unshift({id:nextId(DATA.notifications), from:'Владелец', to, text, date:DATA.today, read:false});
  updateBellBadge();
}
function checkExpiredTasks(){
  const now=Date.now();
  DATA.tasks.forEach(t=>{
    if(t.status==='claimed' && t.dueAt && parseRuDateTime(t.dueAt.split(' ')[0], t.dueAt.split(' ')[1])<now){
      const emp=DATA.employees.find(e=>e.id===t.claimedBy);
      t.progressLog.push({date:DATA.today, time:nowTime(), comment:'Истёк срок 7 дней — задача автоматически возвращена на доску'+(emp?(' (была у '+emp.name+')'):'')});
      t.status='open'; t.claimedBy=null; t.claimedAt=null; t.deadlineCheckAt=null; t.dueAt=null; t.continuePrompted=false;
    }
  });
}
function checkTaskContinuations(){
  const me=currentEmployee();
  if(!me) return [];
  const now=Date.now();
  return DATA.tasks.filter(t=>t.status==='claimed' && t.claimedBy===me.id && !t.continuePrompted && t.deadlineCheckAt && parseRuDateTime(t.deadlineCheckAt.split(' ')[0], t.deadlineCheckAt.split(' ')[1])<=now);
}

/* ============================================================
   УВЕДОМЛЕНИЯ — владелец отправляет всем или одному сотруднику,
   колокольчик в шапке показывает непрочитанные
============================================================ */
function notifForCurrentRole(){
  if(STATE.role==='owner') return DATA.notifications.slice();
  const me=currentEmployee();
  return DATA.notifications.filter(n=> n.to==='all' || (me && n.to===me.name));
}
function unreadCount(){ return notifForCurrentRole().filter(n=>!n.read).length; }
function updateBellBadge(){
  const badge=document.getElementById('bellBadge');
  const bell=document.getElementById('bellBtn');
  let acts=[];
  try{ acts=actionNotifications(); }catch(e){}
  /* Срочное: у исполнителя — сдачи СЕГОДНЯ; у владельца — запросы продления и приёмка */
  const urgent=acts.some(a=>a.badge==='СЕГОДНЯ' || a.go==='ext' || a.go==='review');
  if(badge) badge.style.display = (unreadCount()>0 || acts.length>0) ? 'block' : 'none';
  if(bell) bell.classList.toggle('urgent', urgent);
}
/* «Требуют действия» — динамические уведомления по роли */
function actionNotifications(){
  const out=[];
  if(STATE.role==='owner'||STATE.role==='senior'){
    const rev=(DATA.tasks||[]).filter(t=>t.status==='review').length;
    if(rev) out.push({title:'Ждут вашей приёмки: '+rev, sub:'Сданные работы сотрудников', badge:'приёмка', cls:'b-progress', go:'review'});
    if(STATE.role==='owner'){
      const ext=pendingExtensionRequests().length;
      if(ext) out.push({title:'Запросы на продление: '+ext, sub:'Сотрудники не успели — нужно решение', badge:'решение', cls:'b-cancel', go:'ext'});
      const refN=(DATA.taskRefusals||[]).filter(r=>!r.seen).length;
      if(refN) out.push({title:'Отказы от долгосрочных: '+refN, sub:'Задачи вернулись на доску объявлений', badge:'отказ', cls:'b-cancel', go:'refusals'});
      const mrLead2=(DATA.settings && DATA.settings.monthlyReviewLeadDays!=null)?DATA.settings.monthlyReviewLeadDays:2;
      if(daysToMonthEnd()<=mrLead2 && longtermForMonthlyReview().length){
        out.push({title:'Месячная проверка долгосрочных: '+longtermForMonthlyReview().length, sub:'Конец месяца — начислите премии', badge:'проверка', cls:'b-new', go:'monthly'});
      }
    }
  } else {
    dueTaskNotifications(taskMe()).forEach(d=>{
      const today=(d.kind==='checkpoint'||d.kind==='due');
      out.push({title:d.task.title, sub:(d.kind.indexOf('checkpoint')===0?'Проверка':'Срок сдачи')+' — '+d.date,
        badge: today?'СЕГОДНЯ':'ЗАВТРА', cls: today?'b-cancel':'b-progress', go:'task', taskId:d.task.id});
    });
  }
  return out;
}
function openNotificationsModal(){
  closeCornerPush();   // открыт центр — угловой сигнал больше не нужен
  const list=notifForCurrentRole().slice().sort((a,b)=> a.date<b.date?1:-1);
  const acts=actionNotifications();
  let body='';
  if(acts.length){
    body+='<div class="drill-block-label">Требуют действия ('+acts.length+')</div>';
    body+=acts.map((a,i)=>'<div class="hist-row" data-nc-act="'+i+'" style="cursor:pointer;" title="Открыть">'+
      '<div><div class="h-main">'+escHtml(a.title)+' <span class="hist-caret">▸</span></div><div class="h-sub">'+escHtml(a.sub)+'</div></div>'+
      '<span class="badge '+a.cls+'">'+a.badge+'</span></div>').join('');
    body+='<div class="drill-divider"></div>';
  }
  body+='<div class="drill-block-label">'+(STATE.role==='owner'?'Отправленные уведомления':'Ваши уведомления')+'</div>';
  body+= list.length? list.map(n=>'<div class="hist-row"><div><div class="h-main">'+(!n.read?'<span style="color:var(--accent-2);">● </span>':'')+n.text+'</div><div class="h-sub">'+n.date+' · кому: '+(n.to==='all'?'все':n.to)+'</div></div></div>').join('') : '<div class="empty"><b>Уведомлений нет</b></div>';
  /* Форма отправки — внизу, отдельной плашкой, чтобы не сливалась со списком */
  if(STATE.role==='owner'){
    body+='<div class="drill-divider" style="margin-top:18px;"></div>'+
      '<div style="background:var(--glass-2);border:1px solid var(--glass-border-soft);border-radius:14px;padding:16px 18px;margin-top:4px;">'+
      '<div class="drill-block-label" style="margin-bottom:10px;">'+ic('plus')+' Новое уведомление</div>'+
      '<div class="field" style="margin-bottom:10px;"><label>Кому</label><select class="select-mini" id="notifTarget" style="width:100%;"><option value="all">Все сотрудники</option>'+
      DATA.employees.filter(e=>!e.noAccess).map(e=>'<option value="'+e.name+'">'+e.name+'</option>').join('')+
      '</select></div>'+
      '<div class="field" style="margin-bottom:12px;"><label>Сообщение</label><input class="input-mini" id="notifText" style="width:100%;" placeholder="Например: завтра меняем расписание смен"></div>'+
      '<button class="btn btn-primary" id="sendNotif">'+ic('plus')+' Отправить</button>'+
      '</div>';
  }

  openModal('Уведомления', acts.length?('Требуют действия: '+acts.length):'', body);
  document.querySelectorAll('[data-nc-act]').forEach(el=>el.addEventListener('click',()=>{
    const a=acts[parseInt(el.dataset.ncAct)];
    closeModal();
    if(a.go==='review') openReviewListModal();
    else if(a.go==='ext') openExtensionRequestsModal();
    else if(a.go==='monthly') openMonthlyReviewModal();
    else if(a.go==='refusals') openTaskRefusalsModal();
    else if(a.go==='task'){
      if(!STATE.expandedTaskIds) STATE.expandedTaskIds=new Set();
      STATE.expandedTaskIds.add(a.taskId);
      STATE.taskBoard='mine';
      if(ROLES[STATE.role].menu.includes('tasks')) navigate('tasks');
      setTimeout(()=>{
        const btn=document.querySelector('[data-texpand="'+a.taskId+'"], [data-view-task="'+a.taskId+'"]');
        if(btn) btn.closest('.card').scrollIntoView({behavior:'smooth', block:'center'});
      }, 80);
    }
  }));
  if(STATE.role==='owner'){
    document.getElementById('sendNotif').addEventListener('click', ()=>{
      const target=document.getElementById('notifTarget').value;
      const text=document.getElementById('notifText').value.trim();
      if(!text){ toast('Введите текст сообщения', 'error'); return; }
      DATA.notifications.unshift({id:Math.max(...DATA.notifications.map(x=>x.id))+1, from:'Владелец', to:target, text, date:new Date().toLocaleDateString('ru-RU'), read:false});
      closeModal(); toast('Уведомление отправлено', 'success'); updateBellBadge();
    });
  } else {
    DATA.notifications.forEach(n=>{ if(n.to==='all'||(currentEmployee()&&n.to===currentEmployee().name)) n.read=true; });
    updateBellBadge();
  }
}

const THEME_KEY='store_control_theme';
function applyTheme(theme){
  document.body.classList.toggle('light', theme==='light');
  const btn=document.getElementById('themeBtn');
  if(btn) btn.innerHTML=ic(theme==='light'?'moon':'sun');
  STATE.theme=theme;
  try{ localStorage.setItem(THEME_KEY, theme); }catch(e){}
}
document.getElementById('hamburger').innerHTML=ic('menu');
document.getElementById('bellBtn').innerHTML=ic('bell')+'<span class="dot-badge" id="bellBadge" style="display:none;"></span>';
document.getElementById('bellBtn').addEventListener('click', openNotificationsModal);
document.getElementById('themeBtn').addEventListener('click', ()=>{
  applyTheme(document.body.classList.contains('light')?'dark':'light');
});
applyTheme((()=>{ try{ return localStorage.getItem(THEME_KEY)||'dark'; }catch(e){ return 'dark'; } })());
document.getElementById('hamburger').addEventListener('click', ()=>{
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('scrim').classList.toggle('show');
});
document.getElementById('scrim').addEventListener('click', closeSidebarMobile);
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ closeModal(); closeOverlay(); } });

/* ============================================================
   ЛОКАЛЬНОЕ ХРАНИЛИЩЕ — автосохранение данных между сессиями.
   Сохраняются: каталог сайта, база знаний, схемы маржи с
   диапазонами, журнал действий. Прайсы и результаты разбора
   не сохраняются — их каждый раз загружают заново.
============================================================ */
const LS_KEY='store_control_erp_v1';
function lsSave(){
  try{
    const payload={
      siteCatalog: DATA.siteCatalog,
      siteCatalogVersion: DATA.siteCatalogVersion,
      knowledgeLog: DATA.knowledgeLog,
      knowledgeArchive: DATA.knowledgeArchive,
      crmAiQuestions: DATA.crmAiQuestions,
      crmAiKnowledge: DATA.crmAiKnowledge,
      categorySchemeMap: DATA.categorySchemeMap,
      marginSchemes: DATA.marginSchemes,
      marginGroups: DATA.marginGroups,
      priceUpdateLog: DATA.priceUpdateLog.slice(0,200),
      pricingAuditLog: DATA.pricingAuditLog.slice(0,200),
      learningQueue: DATA.learningQueue,
      warehouse: DATA.warehouse,
      warehouseLedger: DATA.warehouseLedger,
      scannerStock: DATA.scannerStock,
      scanLog: (DATA.scanLog||[]).slice(0,50),
      coreDb: DATA.coreDb,
      savedAt: new Date().toISOString(),
    };
    localStorage.setItem(LS_KEY, JSON.stringify(payload));
  }catch(e){ console.warn('localStorage save error:', e); }
}
function lsLoad(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const payload=JSON.parse(raw);
    if(payload.siteCatalog?.length){
      DATA.siteCatalog=payload.siteCatalog;
      DATA.siteCatalogVersion=payload.siteCatalogVersion||1;
      SITE_CATALOG_INDEX=null; // сбросить индекс, пересчитается при первом использовании
    }
    if(payload.knowledgeLog?.length) DATA.knowledgeLog=payload.knowledgeLog;
    if(payload.knowledgeArchive?.length) DATA.knowledgeArchive=payload.knowledgeArchive;
    if(payload.crmAiQuestions?.length) DATA.crmAiQuestions=payload.crmAiQuestions;
    if(payload.crmAiKnowledge?.length) DATA.crmAiKnowledge=payload.crmAiKnowledge;
    const beforeAiSize=(DATA.crmAiQuestions||[]).length+(DATA.crmAiKnowledge||[]).length;
    crmAgentPruneMemory();
    const afterAiSize=(DATA.crmAiQuestions||[]).length+(DATA.crmAiKnowledge||[]).length;
    if(afterAiSize!==beforeAiSize) setTimeout(lsSave, 0);
    if(payload.categorySchemeMap?.length) DATA.categorySchemeMap=payload.categorySchemeMap;
    if(payload.marginSchemes?.length) DATA.marginSchemes=payload.marginSchemes;
    if(payload.marginGroups?.length) DATA.marginGroups=payload.marginGroups;
    if(payload.priceUpdateLog?.length) DATA.priceUpdateLog=payload.priceUpdateLog;
    if(payload.pricingAuditLog?.length) DATA.pricingAuditLog=payload.pricingAuditLog;
    if(payload.learningQueue?.length) DATA.learningQueue=payload.learningQueue;
    if(payload.warehouse) DATA.warehouse=payload.warehouse;
    if(payload.warehouseLedger) DATA.warehouseLedger=payload.warehouseLedger;
    if(payload.scannerStock) DATA.scannerStock=payload.scannerStock;
    if(payload.scanLog) DATA.scanLog=payload.scanLog;
    if(payload.coreDb) DATA.coreDb=payload.coreDb;
    return true;
  }catch(e){ console.warn('localStorage load error:', e); return false; }
}
/* Автосохранение при импорте каталога */
const _origImportCatalog=importSiteCatalogData;
window.importSiteCatalogData=function(normalized){
  const n=_origImportCatalog(normalized);
  lsSave();
  return n;
};
importSiteCatalogData=window.importSiteCatalogData;
/* Автосохранение при изменении базы знаний */
const _origImportKB=importKnowledgeBaseData;
window.importKnowledgeBaseData=function(json){
  const n=_origImportKB(json);
  lsSave();
  return n;
};
importKnowledgeBaseData=window.importKnowledgeBaseData;
/* Автосохранение при подтверждении карточки обучения */
const _origConfirmCard=confirmLearningCard;
window.confirmLearningCard=function(id,schemeId,keyword){
  _origConfirmCard(id,schemeId,keyword);
  lsSave();
};
confirmLearningCard=window.confirmLearningCard;
/* Загружаем при старте */
const loaded=lsLoad();

/* Инициализация точек */
initStoreData();
updateStoreSelector();
document.getElementById('storeSelectorSelect').addEventListener('change', function(){
  switchStore(this.value);
});

/* Кнопка сброса localStorage */
window._erp_clearStorage=function(){ localStorage.removeItem(LS_KEY); location.reload(); };

renderSidebar();
renderPage();
renderMobileTabBar();
updateBellBadge();
/* Напоминания при входе: исполнителю — сдачи, владельцу — запросы на продление */
showDueTaskPush();
showOwnerDecisionPush();
if(loaded && DATA.siteCatalog.length){
  toast('Восстановлено: '+DATA.siteCatalog.length+' товаров каталога', 'success');
}
</script>
