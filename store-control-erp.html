<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store Control ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================= TOKENS ============================= */
:root{
  --bg:#0a0b0f;
  --bg-soft:#0d0f15;
  --bg-elevated:#11141b;
  --glass:rgba(255,255,255,.045);
  --glass-2:rgba(255,255,255,.065);
  --glass-border:rgba(255,255,255,.09);
  --glass-border-soft:rgba(255,255,255,.06);
  --hairline:rgba(255,255,255,.08);
  --text-0:#f4f6f8;
  --text-1:#c7ccd4;
  --text-2:#8b92a0;
  --text-3:#5b6170;
  --accent:#5e8bff;
  --accent-2:#7aa2ff;
  --accent-soft:rgba(94,139,255,.14);
  --accent-soft-2:rgba(94,139,255,.28);
  --teal:#29d6c8;
  --teal-soft:rgba(41,214,200,.14);
  --positive:#34d399;
  --positive-soft:rgba(52,211,153,.14);
  --warning:#f5a623;
  --warning-soft:rgba(245,166,35,.14);
  --negative:#fb6b6b;
  --negative-soft:rgba(251,107,107,.14);
  --radius-lg:20px;
  --radius-md:14px;
  --radius-sm:10px;
  --sidebar-w:248px;
  --sidebar-w-collapsed:76px;
  --topbar-h:68px;
  --ease:cubic-bezier(.22,1,.36,1);
  --font-ui:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-display:'Inter Tight','Inter',sans-serif;
  --font-mono:'IBM Plex Mono',ui-monospace,monospace;
}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms!important;transition-duration:.001ms!important;}
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(900px 600px at 85% -10%, rgba(94,139,255,.10), transparent 60%),
    radial-gradient(700px 500px at -5% 110%, rgba(41,214,200,.07), transparent 60%),
    var(--bg);
  color:var(--text-0);
  font-family:var(--font-ui);
  font-size:14px;
  line-height:1.45;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
::selection{background:var(--accent-soft-2);}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:10px;}
::-webkit-scrollbar-track{background:transparent;}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px;}

/* numeric / data tabular figures */
.mono{font-family:var(--font-mono);font-feature-settings:"tnum" 1;letter-spacing:-.01em;}
.display{font-family:var(--font-display);letter-spacing:-.015em;}

/* ============================= LAYOUT ============================= */
#app{display:flex;min-height:100vh;}

.sidebar{
  width:var(--sidebar-w);
  flex:0 0 auto;
  position:fixed;top:0;left:0;bottom:0;
  background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
  border-right:1px solid var(--hairline);
  backdrop-filter:blur(20px);
  display:flex;flex-direction:column;
  padding:18px 14px;
  z-index:40;
  transition:transform .3s var(--ease), width .25s var(--ease);
}
.sidebar-brand{
  display:flex;align-items:center;gap:10px;
  padding:8px 8px 18px 8px;
  border-bottom:1px solid var(--hairline);
  margin-bottom:14px;
}
.brand-mark{
  width:34px;height:34px;border-radius:10px;flex:0 0 auto;
  background:linear-gradient(135deg,var(--accent),var(--teal));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:800;font-size:15px;color:#06080d;
  box-shadow:0 6px 18px rgba(94,139,255,.35);
}
.brand-text{display:flex;flex-direction:column;min-width:0;}
.brand-text b{font-family:var(--font-display);font-weight:700;font-size:14.5px;color:var(--text-0);}
.brand-text span{font-size:11px;color:var(--text-3);}

.nav-section-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);padding:14px 12px 6px;}
.nav{display:flex;flex-direction:column;gap:2px;}
.nav-item{
  display:flex;align-items:center;gap:11px;
  padding:9px 12px;border-radius:11px;
  color:var(--text-2);cursor:pointer;
  font-size:13.5px;font-weight:500;
  transition:background .15s var(--ease), color .15s var(--ease);
  position:relative;
  border:1px solid transparent;
}
.nav-item svg{flex:0 0 auto;opacity:.85;}
.nav-item:hover{background:var(--glass);color:var(--text-0);}
.nav-item.active{background:var(--accent-soft);color:#dbe6ff;border-color:rgba(94,139,255,.25);}
.nav-item.active svg{color:var(--accent-2);opacity:1;}
.nav-item .label{flex:1;white-space:nowrap;overflow:hidden;}
.nav-item .lock{color:var(--text-3);}

.sidebar-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--hairline);}
.role-block{padding:10px 8px;}
.role-current{display:flex;align-items:center;gap:9px;padding:8px;border-radius:12px;background:var(--glass);border:1px solid var(--glass-border-soft);margin-bottom:8px;}
.role-avatar{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--teal),var(--accent));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#06080d;flex:0 0 auto;}
.role-meta b{display:block;font-size:12.5px;color:var(--text-0);}
.role-meta span{font-size:10.5px;color:var(--text-3);}
.role-select{width:100%;background:var(--bg-elevated);border:1px solid var(--glass-border);color:var(--text-1);font-size:11.5px;border-radius:9px;padding:7px 8px;font-family:inherit;}
.role-hint{font-size:10px;color:var(--text-3);margin-top:6px;line-height:1.4;}

.main{margin-left:var(--sidebar-w);flex:1;min-width:0;display:flex;flex-direction:column;transition:margin-left .25s var(--ease);}
.topbar{
  height:var(--topbar-h);flex:0 0 auto;
  display:flex;align-items:center;gap:14px;
  padding:0 28px;
  border-bottom:1px solid var(--hairline);
  background:rgba(10,11,15,.55);backdrop-filter:blur(16px);
  position:sticky;top:0;z-index:30;
}
.hamburger{display:none;width:36px;height:36px;border-radius:10px;background:var(--glass);border:1px solid var(--glass-border-soft);align-items:center;justify-content:center;color:var(--text-1);cursor:pointer;flex:0 0 auto;}
.page-title{font-family:var(--font-display);font-weight:700;font-size:18px;letter-spacing:-.01em;}
.page-sub{font-size:12px;color:var(--text-3);margin-top:1px;}
.topbar-spacer{flex:1;}
.store-selector{display:flex;align-items:center;margin-left:12px;}
.search-box{display:flex;align-items:center;gap:8px;background:var(--glass);border:1px solid var(--glass-border-soft);border-radius:10px;padding:7px 12px;color:var(--text-3);font-size:12.5px;min-width:200px;}
.search-box input{background:none;border:none;outline:none;color:var(--text-1);font-size:12.5px;width:100%;font-family:inherit;}
.topbar-icon-btn{width:36px;height:36px;border-radius:10px;background:var(--glass);border:1px solid var(--glass-border-soft);display:flex;align-items:center;justify-content:center;color:var(--text-2);cursor:pointer;position:relative;}
.topbar-icon-btn:hover{color:var(--text-0);background:var(--glass-2);}
.dot-badge{position:absolute;top:-3px;right:-3px;width:8px;height:8px;border-radius:50%;background:var(--warning);border:2px solid var(--bg);}

.content{padding:26px 28px 60px;max-width:1500px;width:100%;margin:0 auto;}

.page-fade{animation:pageIn .35s var(--ease);}
@keyframes pageIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* ============================= COMPONENTS ============================= */
.card{
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-lg);
  padding:20px;
  backdrop-filter:blur(14px);
  transition:border-color .2s var(--ease), transform .2s var(--ease), background .2s var(--ease);
}
.card.clickable{cursor:pointer;}
.card.clickable:hover{border-color:rgba(94,139,255,.35);background:var(--glass-2);transform:translateY(-2px);}
.card.clickable:active{transform:translateY(0px);}

.section{margin-bottom:34px;}
.section-head{display:flex;align-items:baseline;justify-content:space-between;gap:14px;margin-bottom:14px;flex-wrap:wrap;}
.section-eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--accent-2);font-weight:600;margin-bottom:4px;}
.section-title{font-family:var(--font-display);font-weight:700;font-size:19px;letter-spacing:-.01em;}
.section-link{font-size:12.5px;color:var(--text-2);display:flex;align-items:center;gap:5px;cursor:pointer;}
.section-link:hover{color:var(--accent-2);}

.grid{display:grid;gap:16px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
.grid-12{grid-template-columns:repeat(12,1fr);}
@media (max-width:1180px){.grid-4{grid-template-columns:repeat(2,1fr);}.grid-3{grid-template-columns:repeat(2,1fr);}}
@media (max-width:760px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr;}}

.kpi-label{font-size:12px;color:var(--text-2);display:flex;align-items:center;gap:7px;margin-bottom:10px;}
.kpi-icon{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.kpi-value{font-family:var(--font-mono);font-weight:600;font-size:23px;letter-spacing:-.01em;color:var(--text-0);}
.kpi-value small{font-size:13px;color:var(--text-3);font-weight:500;margin-left:3px;}
.kpi-delta{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;margin-top:8px;padding:3px 7px;border-radius:7px;}
.kpi-delta.up{color:var(--positive);background:var(--positive-soft);}
.kpi-delta.down{color:var(--negative);background:var(--negative-soft);}
.kpi-delta.warn{color:var(--warning);background:var(--warning-soft);}
.kpi-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;}
.kpi-spark{flex:0 0 auto;}

.total-strip{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:14px;padding:16px 20px;border-radius:var(--radius-md);
  background:linear-gradient(90deg, var(--accent-soft), rgba(41,214,200,.08));
  border:1px solid rgba(94,139,255,.22);
}
.total-strip .t-label{font-size:12.5px;color:var(--text-1);}
.total-strip .t-value{font-family:var(--font-mono);font-weight:700;font-size:24px;color:var(--text-0);}

.attn-list{display:flex;flex-direction:column;gap:8px;}
.attn-row{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:12px;background:rgba(255,255,255,.025);border:1px solid var(--glass-border-soft);cursor:pointer;transition:background .15s,border-color .15s;}
.attn-row:hover{background:var(--glass-2);border-color:var(--glass-border);}
.attn-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;}
.attn-row b{font-size:13px;font-weight:600;color:var(--text-0);}
.attn-row span{font-size:11.5px;color:var(--text-3);display:block;}
.attn-count{margin-left:auto;font-family:var(--font-mono);font-weight:700;font-size:14px;padding:3px 9px;border-radius:8px;}

.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:7px;white-space:nowrap;}
.badge.b-new{background:var(--accent-soft);color:#bcd0ff;}
.badge.b-progress{background:var(--warning-soft);color:#ffd596;}
.badge.b-ready{background:var(--teal-soft);color:#9af2eb;}
.badge.b-done{background:var(--positive-soft);color:#a4f3d3;}
.badge.b-cancel{background:var(--negative-soft);color:#ffc1c1;}
.badge.b-grey{background:rgba(255,255,255,.07);color:var(--text-2);}

.btn{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:10px;border:1px solid var(--glass-border);background:var(--glass);color:var(--text-1);cursor:pointer;transition:all .15s var(--ease);font-family:inherit;}
.btn:hover{background:var(--glass-2);color:var(--text-0);}
.btn-primary{background:linear-gradient(135deg,var(--accent),#3f6fe0);border-color:transparent;color:#fff;box-shadow:0 6px 18px rgba(94,139,255,.28);}
.btn-primary:hover{filter:brightness(1.08);}
.btn-primary:disabled,.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-sm{padding:6px 11px;font-size:11.5px;}
.btn-ghost{background:transparent;border-color:transparent;}
.btn-danger{background:var(--negative-soft);color:#ffb3b3;border-color:rgba(251,107,107,.25);}

.table-wrap{border:1px solid var(--glass-border);border-radius:var(--radius-md);overflow:hidden;background:var(--glass);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);font-weight:600;padding:12px 16px;border-bottom:1px solid var(--hairline);background:rgba(255,255,255,.02);white-space:nowrap;}
tbody td{padding:12px 16px;border-bottom:1px solid var(--glass-border-soft);color:var(--text-1);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr{transition:background .12s;}
tbody tr:hover{background:rgba(255,255,255,.025);}
.tname{color:var(--text-0);font-weight:600;}
.tsub{color:var(--text-3);font-size:11.5px;}
.row-actions{display:flex;gap:6px;}

.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.chip-tabs{display:flex;gap:6px;background:var(--glass);border:1px solid var(--glass-border-soft);border-radius:11px;padding:4px;}
.chip-tab{padding:7px 13px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--text-2);cursor:pointer;white-space:nowrap;}
.chip-tab.active{background:var(--accent-soft);color:#dbe6ff;}
.select-mini, .input-mini, .textarea-mini{background:var(--bg-elevated);border:1px solid var(--glass-border);color:var(--text-1);font-size:12.5px;border-radius:9px;padding:8px 11px;font-family:inherit;}
.textarea-mini{font-family:var(--font-mono);resize:vertical;min-height:120px;line-height:1.5;width:100%;}
.input-mini::placeholder{color:var(--text-3);}

.empty{display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;padding:50px 20px;color:var(--text-3);}
.empty b{color:var(--text-1);font-size:14px;}

/* drill-over panel (signature: цепочка происхождения) */
.overlay-bg{position:fixed;inset:0;background:rgba(5,6,9,.6);backdrop-filter:blur(2px);z-index:90;opacity:0;pointer-events:none;transition:opacity .25s var(--ease);}
.overlay-bg.show{opacity:1;pointer-events:auto;}
.drillover{
  position:fixed;top:0;right:0;bottom:0;width:min(480px,92vw);
  background:linear-gradient(180deg, rgba(17,20,27,.97), rgba(13,15,21,.99));
  border-left:1px solid var(--glass-border);
  z-index:91;transform:translateX(100%);transition:transform .32s var(--ease);
  display:flex;flex-direction:column;
  box-shadow:-30px 0 60px rgba(0,0,0,.5);
}
.drillover.show{transform:none;}
.drill-head{padding:22px 24px 16px;border-bottom:1px solid var(--hairline);display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.drill-head h3{font-family:var(--font-display);font-size:18px;margin:0 0 4px;}
.drill-head p{font-size:12px;color:var(--text-3);margin:0;}
.drill-close{width:32px;height:32px;border-radius:9px;background:var(--glass);border:1px solid var(--glass-border-soft);color:var(--text-2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 auto;}
.drill-body{padding:22px 24px;overflow-y:auto;flex:1;}

.chain-label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--accent-2);font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.chain{display:flex;flex-direction:column;position:relative;padding-left:6px;}
.chain-node{display:flex;align-items:flex-start;gap:12px;position:relative;padding-bottom:22px;}
.chain-node:last-child{padding-bottom:0;}
.chain-node::before{content:'';position:absolute;left:13px;top:30px;bottom:0;width:1.5px;background:repeating-linear-gradient(to bottom, rgba(94,139,255,.45) 0 4px, transparent 4px 8px);}
.chain-node:last-child::before{display:none;}
.chain-dot{width:27px;height:27px;border-radius:50%;background:var(--accent-soft);border:1.5px solid rgba(94,139,255,.4);display:flex;align-items:center;justify-content:center;flex:0 0 auto;color:var(--accent-2);z-index:1;}
.chain-node:first-child .chain-dot{background:linear-gradient(135deg,var(--accent),var(--teal));border-color:transparent;color:#06080d;}
.chain-text{padding-top:2px;}
.chain-text b{display:block;font-size:13px;color:var(--text-0);}
.chain-text span{font-size:11.5px;color:var(--text-3);}
.chain-text .val{font-family:var(--font-mono);color:var(--accent-2);font-size:12.5px;}

.drill-divider{height:1px;background:var(--hairline);margin:22px 0;}
.drill-block-label{font-size:11.5px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--glass-border-soft);font-size:12.5px;}
.hist-row:last-child{border-bottom:none;}
.hist-row .h-main{color:var(--text-0);font-weight:500;}
.hist-row .h-sub{color:var(--text-3);font-size:11px;}
.hist-row .h-val{font-family:var(--font-mono);font-weight:600;}
.hist-date-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin:16px 0 6px;padding-top:4px;border-top:1px solid var(--glass-border-soft);}
.hist-date-label:first-of-type{border-top:none;margin-top:0;}
.hist-row.pending{background:rgba(52,211,153,.07);border-radius:9px;padding-left:9px;padding-right:9px;margin:0 -9px;}
.hist-row .h-val.pending{color:var(--positive);}
.h-time{color:var(--text-3);font-size:10.5px;margin-left:5px;font-weight:500;}
.hist-caret{display:inline-block;color:var(--accent-2);font-size:10px;width:10px;}
.scheme-toggle{background:none;border:none;cursor:pointer;display:flex;align-items:center;padding:0;text-align:left;}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(5,6,9,.65);backdrop-filter:blur(3px);z-index:95;display:none;align-items:center;justify-content:center;padding:24px;}
.modal-overlay.show{display:flex;}
.modal{background:linear-gradient(180deg, rgba(19,22,29,.98), rgba(14,16,22,.99));border:1px solid var(--glass-border);border-radius:var(--radius-lg);width:min(640px,100%);max-height:88vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.55);animation:modalIn .25s var(--ease);}
.modal-wide{width:min(980px,96%);}
.table-scroll-x{overflow-x:auto;}
.floating-result-btn{position:fixed;bottom:26px;right:26px;z-index:80;box-shadow:0 14px 36px rgba(0,0,0,.45);display:flex;align-items:center;gap:8px;padding:12px 18px;border-radius:999px;}
.floating-result-count{background:rgba(255,255,255,.25);border-radius:999px;padding:1px 8px;font-size:11px;}
.stats-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.stat-card{flex:1;min-width:110px;border-radius:12px;padding:12px 14px;}
.stat-card .stat-value{display:block;font-family:var(--font-mono);font-size:21px;font-weight:700;}
.stat-card .stat-label{font-size:11px;color:var(--text-3);}
.row-hidden-site{opacity:.5;background:rgba(245,166,35,.05);}
@keyframes modalIn{from{opacity:0;transform:scale(.97) translateY(6px);}to{opacity:1;transform:none;}}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--hairline);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:rgba(19,22,29,.98);backdrop-filter:blur(10px);z-index:2;}
.modal-head h3{font-family:var(--font-display);font-size:17px;margin:0 0 3px;}
.modal-head p{font-size:11.5px;color:var(--text-3);margin:0;}
.modal-body{padding:22px 24px;}
.modal-foot{padding:16px 24px;border-top:1px solid var(--hairline);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:rgba(19,22,29,.98);}

.field-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:8px;}
.field{margin-bottom:4px;}
.field label{display:block;font-size:11px;color:var(--text-3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
.field .v{font-size:13.5px;color:var(--text-0);font-weight:500;}
.field .v.mono{font-family:var(--font-mono);}

.check-row{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-radius:10px;background:rgba(255,255,255,.025);border:1px solid var(--glass-border-soft);margin-bottom:7px;font-size:12.5px;}
.check-row .ok{color:var(--positive);display:flex;align-items:center;gap:5px;font-weight:600;}
.check-row .bad{color:var(--negative);display:flex;align-items:center;gap:5px;font-weight:600;}
.check-row .wait{color:var(--text-3);display:flex;align-items:center;gap:5px;}

.toast-root{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:8px;z-index:200;}
.toast{display:flex;align-items:center;gap:10px;background:rgba(20,23,30,.97);border:1px solid var(--glass-border);border-radius:12px;padding:12px 16px;font-size:12.5px;color:var(--text-0);box-shadow:0 14px 36px rgba(0,0,0,.4);animation:toastIn .25s var(--ease);max-width:320px;}
@keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.toast .ic{flex:0 0 auto;}
.toast.success .ic{color:var(--positive);}
.toast.error .ic{color:var(--negative);}
.toast.info .ic{color:var(--accent-2);}

.lockwrap{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-3);}

/* analytics direction bars */
.dirbar-row{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.dirbar-name{width:108px;flex:0 0 auto;font-size:12.5px;color:var(--text-1);font-weight:500;}
.dirbar-track{flex:1;height:10px;border-radius:6px;background:rgba(255,255,255,.06);overflow:hidden;position:relative;}
.dirbar-fill{height:100%;border-radius:6px;}
.dirbar-val{width:96px;flex:0 0 auto;text-align:right;font-family:var(--font-mono);font-size:12.5px;color:var(--text-0);font-weight:600;}

.svg-chart{display:block;width:100%;height:auto;}
.legend{display:flex;gap:16px;align-items:center;font-size:11.5px;color:var(--text-2);margin-top:8px;}
.legend span{display:flex;align-items:center;gap:6px;}
.legend i{width:9px;height:9px;border-radius:3px;display:inline-block;}

.device-strip{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:11px;background:rgba(255,255,255,.025);border:1px solid var(--glass-border-soft);margin-bottom:8px;}
.device-ico{width:36px;height:36px;border-radius:9px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;color:var(--accent-2);flex:0 0 auto;}

.placeholder-card{display:flex;flex-direction:column;align-items:flex-start;gap:10px;padding:34px;border-radius:var(--radius-lg);border:1px dashed var(--glass-border);background:rgba(255,255,255,.02);}
.placeholder-card b{font-family:var(--font-display);font-size:16px;}
.placeholder-card p{color:var(--text-2);font-size:13px;max-width:520px;}

/* customers / consent */
.merge-pill{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:999px;background:var(--teal-soft);color:#9af2eb;margin-left:8px;}
.toggle-switch{position:relative;width:38px;height:22px;border-radius:999px;background:rgba(255,255,255,.12);cursor:pointer;flex:0 0 auto;transition:background .2s;}
.toggle-switch::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s var(--ease);}
.toggle-switch.on{background:var(--accent);}
.toggle-switch.on::after{transform:translateX(16px);}
.toggle-row{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--text-2);}
.consent-yes{color:var(--positive);}
.consent-no{color:var(--text-3);}
.cust-card{display:flex;align-items:center;gap:13px;padding:13px 16px;border-radius:13px;background:rgba(255,255,255,.025);border:1px solid var(--glass-border-soft);cursor:pointer;transition:background .15s,border-color .15s;margin-bottom:8px;}
.cust-card:hover{background:var(--glass-2);border-color:var(--glass-border);}
.cust-avatar{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--accent-soft),var(--teal-soft));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--accent-2);flex:0 0 auto;}
.cust-meta{flex:1;min-width:0;}
.cust-meta .nm{font-size:13.5px;font-weight:600;color:var(--text-0);display:flex;align-items:center;}
.cust-meta .sub{font-size:11.5px;color:var(--text-3);display:flex;gap:14px;margin-top:2px;flex-wrap:wrap;}
.cust-stat{text-align:right;flex:0 0 auto;}
.cust-stat b{display:block;font-family:var(--font-mono);font-size:13.5px;color:var(--text-0);}
.cust-stat span{font-size:10.5px;color:var(--text-3);}

/* file / photo upload */
.upload-box{border:1.5px dashed var(--glass-border);border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px;cursor:pointer;background:rgba(255,255,255,.02);transition:border-color .15s,background .15s;}
.upload-box:hover{border-color:rgba(94,139,255,.4);background:var(--glass);}
.upload-box .upload-ico{width:38px;height:38px;border-radius:10px;background:var(--accent-soft);color:var(--accent-2);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.upload-box .upload-txt b{display:block;font-size:12.5px;color:var(--text-0);}
.upload-box .upload-txt span{font-size:11px;color:var(--text-3);}
.upload-box.file-drop-active{border-color:var(--accent);background:var(--accent-soft);}
.upload-preview{margin-top:10px;border-radius:10px;max-width:160px;display:block;border:1px solid var(--glass-border);}

/* accounting ledger */
.ledger-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--glass-border-soft);font-size:13px;}
.ledger-row:last-child{border-bottom:none;}
.ledger-row.total{padding-top:14px;margin-top:4px;border-top:1.5px solid var(--hairline);border-bottom:none;}
.ledger-row .l-name{color:var(--text-1);}
.ledger-row.total .l-name{color:var(--text-0);font-weight:700;font-family:var(--font-display);}
.ledger-row .l-val{font-family:var(--font-mono);font-weight:600;}
.ledger-row .l-val.neg{color:var(--negative);}
.ledger-row .l-val.pos{color:var(--positive);}

/* team / schedule / leaderboard */
.sched-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}

/* --- Диалоги: единый входящий --- */
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:800;padding:1px 6px;border-radius:20px;flex-shrink:0;}
.inbox{display:grid;grid-template-columns:280px 1fr;gap:12px;height:calc(100vh - 260px);min-height:440px;}
.inbox-list{background:var(--bg-soft);border:1px solid var(--glass-border-soft);border-radius:12px;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;}
.inbox-list::-webkit-scrollbar{width:6px;}
.inbox-list::-webkit-scrollbar-thumb{background:var(--glass-border);border-radius:3px;}
.inbox-item{padding:9px 10px;border-radius:9px;cursor:pointer;border:1px solid transparent;transition:background .15s,border-color .15s;}
.inbox-item:hover{background:var(--glass);}
.inbox-item.active{background:var(--glass);border-color:var(--accent);}
.inbox-item.unread .inbox-name{color:var(--text-0);}
.inbox-item.unread .inbox-preview{color:var(--text-1);font-weight:600;}
.inbox-item-top{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.inbox-name{font-size:12.5px;font-weight:700;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.inbox-badge{background:var(--accent);color:#fff;font-size:10px;font-weight:800;padding:1px 6px;border-radius:20px;flex-shrink:0;}
.inbox-preview{font-size:11px;color:var(--text-3);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.inbox-meta{font-size:10px;color:var(--text-3);opacity:.7;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.inbox-chat{background:var(--bg-soft);border:1px solid var(--glass-border-soft);border-radius:12px;display:flex;flex-direction:column;overflow:hidden;}
.chat-head{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--glass-border-soft);flex-wrap:wrap;}
.chat-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:9px;}
.chat-body::-webkit-scrollbar{width:6px;}
.chat-body::-webkit-scrollbar-thumb{background:var(--glass-border);border-radius:3px;}
.msg{display:flex;}
.msg.out{justify-content:flex-end;}
.msg-bubble{max-width:74%;background:var(--glass);border:1px solid var(--glass-border);border-radius:12px 12px 12px 4px;padding:8px 11px;font-size:12.5px;line-height:1.45;color:var(--text-1);white-space:pre-wrap;}
.msg.out .msg-bubble{background:var(--accent-soft);border-color:var(--accent);border-radius:12px 12px 4px 12px;}
.msg-bubble.pending{opacity:.7;border-style:dashed;}
.msg-bubble.failed{border-color:var(--negative);}
.msg-meta{font-size:9.5px;color:var(--text-3);margin-top:4px;font-variant-numeric:tabular-nums;}
.chat-quick{display:flex;gap:6px;padding:8px 12px;border-top:1px solid var(--glass-border-soft);flex-wrap:wrap;}
.chat-composer{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--glass-border-soft);align-items:flex-end;}
.agent-strip{display:flex;align-items:center;gap:10px;padding:9px 12px;border-top:1px solid var(--glass-border-soft);background:rgba(94,139,255,.055);font-size:11.5px;color:var(--text-2);flex-wrap:wrap;}
.agent-mark{width:24px;height:24px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--teal));display:flex;align-items:center;justify-content:center;color:#06080d;font-weight:800;font-size:10px;flex:0 0 auto;}
.agent-strip b{color:var(--text-0);font-size:12px;}
.agent-chip{padding:3px 7px;border-radius:999px;border:1px solid var(--glass-border-soft);background:rgba(255,255,255,.035);color:var(--text-2);}
@media(max-width:900px){
  .inbox{grid-template-columns:1fr;height:auto;}
  .inbox-list{max-height:200px;}
  .inbox-chat{min-height:420px;}
}

/* --- CRM: канбан воронки --- */
.kanban{display:grid;grid-template-columns:repeat(4,minmax(210px,1fr));gap:12px;overflow-x:auto;padding-bottom:8px;}
.kan-col{background:var(--bg-soft);border:1px solid var(--glass-border-soft);border-radius:12px;display:flex;flex-direction:column;max-height:64vh;min-width:210px;}
.kan-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:10px 11px 8px;border-bottom:1px solid var(--glass-border-soft);position:sticky;top:0;background:var(--bg-soft);border-radius:12px 12px 0 0;z-index:2;}
.kan-title{font-size:12.5px;font-weight:700;color:var(--text-1);}
.kan-hint{font-size:10px;color:var(--text-3);opacity:.7;margin-top:1px;}
.kan-count{font-size:11px;font-weight:700;color:var(--text-2);background:var(--glass-2);padding:2px 8px;border-radius:20px;flex-shrink:0;}
.kan-body{overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:7px;flex:1;}
.kan-body::-webkit-scrollbar{width:6px;}
.kan-body::-webkit-scrollbar-thumb{background:var(--glass-border);border-radius:3px;}
.kan-empty{font-size:11px;color:var(--text-3);opacity:.5;text-align:center;padding:16px 0;}
.kan-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:9px;padding:9px;cursor:pointer;transition:border-color .15s,transform .12s;flex-shrink:0;}
.kan-card:hover{border-color:var(--accent);transform:translateY(-1px);}
.kan-card.stale{border-color:var(--warning);}
.kan-card-top{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.kan-name{font-size:12.5px;font-weight:700;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.kan-item{font-size:11.5px;color:var(--text-2);line-height:1.35;}
.kan-meta{font-size:10.5px;color:var(--text-3);margin-top:4px;}
.ch-badge{font-size:9px;font-weight:800;padding:2px 5px;border-radius:4px;border:1px solid;letter-spacing:.03em;flex-shrink:0;}
@media(max-width:768px){
  .kanban{grid-template-columns:repeat(4,minmax(190px,1fr));}
  .kan-col{max-height:56vh;}
}

/* --- Календарь смен --- */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);text-align:center;padding:6px 0;}
.cal-cell{min-height:104px;border:1px solid var(--glass-border);border-radius:10px;padding:7px;background:var(--glass);display:flex;flex-direction:column;gap:4px;}
.cal-cell.empty{background:transparent;border-color:transparent;}
.cal-cell.weekend{background:var(--bg-soft);}
.cal-cell.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset;background:var(--accent-soft);}
.cal-day{font-size:12.5px;font-weight:700;color:var(--text-1);display:flex;align-items:center;gap:5px;margin-bottom:2px;}
.cal-today-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);display:inline-block;}
.cal-none{font-size:10.5px;color:var(--text-3);opacity:.5;}
.cal-shift{display:flex;flex-direction:column;background:var(--glass-2);border-left:2.5px solid var(--accent);border-radius:5px;padding:3px 6px;}
.cal-shift.off{border-left-color:var(--text-3);opacity:.5;}
.cal-who{font-size:11px;font-weight:700;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-time{font-size:10px;color:var(--text-3);font-variant-numeric:tabular-nums;}
@media(max-width:900px){
  .cal-cell{min-height:76px;padding:5px;}
  .cal-time{display:none;}
  .cal-shift{padding:2px 4px;}
  .cal-who{font-size:10px;}
}
@media(max-width:560px){
  .cal-grid{gap:3px;}
  .cal-cell{min-height:62px;padding:3px;border-radius:7px;}
  .cal-head{font-size:9.5px;}
  .cal-day{font-size:11px;}
  .cal-who{font-size:9px;}
}
.sched-cell{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 2px;border-radius:9px;background:rgba(255,255,255,.025);border:1px solid var(--glass-border-soft);}
.sched-cell .d{font-size:10px;color:var(--text-3);text-transform:uppercase;}
.sched-cell .v{font-size:10.5px;color:var(--text-1);font-family:var(--font-mono);text-align:center;}
.sched-cell.off .v{color:var(--text-3);}
.sched-cell.today{border-color:rgba(94,139,255,.45);background:var(--accent-soft);}
.sched-cell.today .d{color:var(--accent-2);font-weight:700;}
.toggle-pill{font-size:11px;font-weight:600;padding:5px 11px;border-radius:999px;background:rgba(255,255,255,.06);color:var(--text-3);cursor:pointer;border:1px solid var(--glass-border-soft);}
.toggle-pill.on{background:var(--positive-soft);color:#a4f3d3;border-color:rgba(52,211,153,.3);}
.lb-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--glass-border-soft);}
.lb-row:last-child{border-bottom:none;}
.lb-rank{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;font-size:12px;background:rgba(255,255,255,.06);color:var(--text-2);flex:0 0 auto;}
.lb-row:nth-child(1) .lb-rank{background:linear-gradient(135deg,#f5d76e,#f5a623);color:#1a1300;}
.lb-row:nth-child(2) .lb-rank{background:linear-gradient(135deg,#d8dde6,#9aa3b3);color:#1a1300;}
.lb-row:nth-child(3) .lb-rank{background:linear-gradient(135deg,#e0a878,#b97a4a);color:#1a1300;}
.lb-name{flex:1;}
.lb-name b{display:block;font-size:13px;color:var(--text-0);}
.lb-name span{font-size:11px;color:var(--text-3);}
.lb-stat{text-align:right;font-family:var(--font-mono);font-size:13px;color:var(--text-0);font-weight:600;}
.photo-pair{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
.photo-pair .ph-box{flex:1;min-width:130px;}
.photo-pair .ph-box label{display:block;font-size:10.5px;color:var(--text-3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
.photo-pair img{width:100%;border-radius:10px;border:1px solid var(--glass-border);display:block;}
.photo-missing{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text-3);padding:14px;border:1px dashed var(--glass-border);border-radius:10px;justify-content:center;}
.collapsible-head{display:flex;align-items:center;justify-content:space-between;cursor:pointer;}

.msg-sidebar{width:280px;flex:0 0 auto;border-right:1px solid var(--hairline);display:flex;flex-direction:column;}
.msg-conv-list{overflow-y:auto;max-height:560px;padding:8px;}
.msg-conv-item{display:flex;align-items:flex-start;gap:10px;padding:10px;border-radius:11px;cursor:pointer;margin-bottom:4px;}
.msg-conv-item:hover{background:var(--glass);}
.msg-conv-item.active{background:var(--accent-soft);}
.msg-channel-badge{width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex:0 0 auto;}
.msg-thread{flex:1;display:flex;flex-direction:column;min-width:0;}
.msg-bubbles{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:10px;max-height:480px;}
.msg-bubble{max-width:68%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.45;}
.msg-bubble.client{align-self:flex-start;background:rgba(255,255,255,.06);border:1px solid var(--glass-border-soft);color:var(--text-1);border-bottom-left-radius:4px;}
.msg-bubble.us{align-self:flex-end;background:var(--accent-soft);border:1px solid rgba(94,139,255,.25);color:var(--text-0);border-bottom-right-radius:4px;}
.msg-composer{display:flex;gap:10px;padding:14px;border-top:1px solid var(--hairline);}

/* responsive sidebar */
@media (max-width:1180px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:none;box-shadow:30px 0 60px rgba(0,0,0,.5);}
  .main{margin-left:0;}
  .hamburger{display:flex;}
  .search-box{display:none;}
}
@media (max-width:560px){
  .content{padding:18px 14px 50px;}
  .topbar{padding:0 14px;}
  .field-grid{grid-template-columns:1fr;}
}
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:39;display:none;}
.scrim.show{display:block;}

/* =====================================================================
   МОБИЛЬНАЯ АДАПТАЦИЯ — полная система от 320px до 768px
   Принципы:
   1. Нижняя панель навигации на телефоне (tab bar) вместо боковой
   2. Таблицы — горизонтальный скролл, не ломаем колонки
   3. Модальные окна — полноэкранные снизу (bottom sheet)
   4. Тулбары — вертикальный стек вместо строки
   5. Все кнопки ≥ 44px касание (Apple HIG)
   6. Шрифты не мельче 13px, не превышаем 100vw
===================================================================== */

/* --- Общий фикс overflow на мобильных --- */
@media (max-width:768px){
  html,body{overflow-x:hidden;-webkit-overflow-scrolling:touch;}
  * {-webkit-tap-highlight-color:transparent;}

  /* --- Топбар --- */
  .topbar{padding:0 12px;height:52px;}
  .page-title{font-size:15px;}
  .page-sub{display:none;}
  .search-box{display:none;}

  /* --- Сайдбар становится боковым drawer, не виден по умолчанию --- */
  .sidebar{transform:translateX(-100%);z-index:40;}
  .sidebar.open{transform:none;box-shadow:32px 0 80px rgba(0,0,0,.6);}
  .main{margin-left:0;}
  .hamburger{display:flex;}

  /* --- Контент --- */
  .content{padding:16px 12px 96px;} /* 96px — место для tab bar */
  .section{margin-bottom:22px;}
  .section-title{font-size:16px;}

  /* --- Гриды --- */
  .grid-4,.grid-3,.grid-2{grid-template-columns:1fr;}
  .grid{display:flex;flex-direction:column;gap:10px;}

  /* --- Карточки --- */
  .card{padding:14px;}

  /* --- Тулбар с кнопками --- */
  .toolbar{flex-direction:column;align-items:stretch;gap:8px;}
  .toolbar .btn{justify-content:center;}
  .topbar-spacer{display:none;}

  /* --- Chip-вкладки — горизонтальный скролл --- */
  .chip-tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;padding:4px;scrollbar-width:none;}
  .chip-tabs::-webkit-scrollbar{display:none;}
  .chip-tab{white-space:nowrap;flex-shrink:0;padding:7px 12px;font-size:12px;}

  /* --- Таблицы --- */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px;}
  .table-scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table{min-width:600px;}
  th,td{font-size:12px;padding:8px 10px;}

  /* --- hist-row: при узком экране стек вместо строки --- */
  .hist-row{flex-direction:column;align-items:flex-start;gap:4px;}
  .hist-row .h-val{font-size:14px;}
  .row-actions{flex-wrap:wrap;gap:6px;margin-top:6px;}

  /* --- ledger-row --- */
  .ledger-row{flex-direction:column;align-items:flex-start;gap:4px;}
  .ledger-row .l-name{font-size:12px;color:var(--text-3);}

  /* --- Кнопки: минимальный размер для пальца --- */
  .btn{min-height:40px;font-size:13px;}
  .btn.btn-sm{min-height:36px;font-size:12px;}

  /* --- Модальные окна: bottom sheet --- */
  .modal-overlay{align-items:flex-end;padding:0;}
  .modal{
    width:100%;max-width:100%;
    border-radius:20px 20px 0 0;
    max-height:90vh;
    animation:sheetIn .3s var(--ease);
  }
  .modal-wide{width:100%;max-width:100%;}
  @keyframes sheetIn{
    from{transform:translateY(100%);}
    to{transform:translateY(0);}
  }
  .modal-body{padding:18px 16px;}

  /* --- field-grid всегда одна колонка --- */
  .field-grid{grid-template-columns:1fr;}
  .field .input-mini,.field .select-mini,.field .textarea-mini{width:100%;}

  /* --- KPI-карточки компактнее --- */
  .kpi-value{font-size:20px;}
  .total-strip .t-value{font-size:20px;}

  /* --- Плавающая кнопка результата --- */
  .floating-result-btn{
    bottom:76px; /* выше tab bar */
    right:16px;
    left:16px;
    width:calc(100% - 32px);
    justify-content:center;
    border-radius:14px;
    padding:14px;
    font-size:14px;
  }

  /* --- stat-card в статистике прайсов --- */
  .stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
  .stat-card{min-width:0;}

  /* --- Скрытие второстепенных колонок в таблицах --- */
  .col-hide-mobile{display:none;}

  /* --- Форма поиска клиента --- */
  .cust-search-row{flex-direction:column;}

  /* --- Диаграммы/дрил --- */
  .drill-block{padding:12px;}

  /* --- Загрузка прайсов --- */
  .source-type-tabs{flex-wrap:wrap;gap:6px;}

  /* --- Схемы маржи --- */
  .selector-row{flex-direction:column;gap:10px;}
}

/* --- Нижняя навигация (tab bar) только на телефоне --- */
.mobile-tab-bar{
  display:none;
  position:fixed;
  bottom:0;left:0;right:0;
  height:64px;
  background:rgba(13,15,20,.96);
  border-top:1px solid var(--glass-border);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  z-index:50;
  padding:0 4px;
  padding-bottom:env(safe-area-inset-bottom, 0px);
}
.mobile-tab-bar-inner{
  display:flex;
  justify-content:space-around;
  align-items:center;
  height:100%;
}
.mobile-tab-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 8px;border-radius:10px;cursor:pointer;
  color:var(--text-3);font-size:10px;font-weight:500;
  border:none;background:none;flex:1;min-width:0;
  transition:color .15s;
  -webkit-tap-highlight-color:transparent;
}
.mobile-tab-item.active{color:var(--accent-2);}
.mobile-tab-item svg{width:22px;height:22px;flex-shrink:0;}
.mobile-tab-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:56px;}

@media (max-width:768px){
  .mobile-tab-bar{display:block;}
}

/* --- Ориентация: landscape на телефоне --- */
@media (max-width:768px) and (orientation:landscape){
  .content{padding-bottom:60px;}
  .mobile-tab-bar{height:48px;}
  .mobile-tab-item svg{width:18px;height:18px;}
  .mobile-tab-item{font-size:9px;}
}

/* --- Очень маленькие экраны (320px) --- */
@media (max-width:360px){
  .card{padding:12px;}
  .btn{padding:8px 10px;}
  .chip-tab{padding:6px 8px;}
  .page-title{font-size:14px;}
}


/* ============= ЗАКРЕПЛЁННЫЙ БАР ОПОВЕЩЕНИЙ НА ДОСКЕ ЗАДАЧ ============= */
.task-alert-bar{
  position:sticky; top:calc(var(--topbar-h) + 10px); z-index:26;
  display:flex; gap:10px; flex-wrap:wrap; align-items:center;
  margin-bottom:20px; padding:10px 12px;
  background:rgba(13,15,21,.88);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  border:1px solid var(--glass-border); border-radius:16px;
  box-shadow:0 8px 28px rgba(0,0,0,.35);
}
body.light .task-alert-bar{background:rgba(255,255,255,.9);box-shadow:0 8px 28px rgba(15,23,42,.12);}
.task-pill{
  display:inline-flex; align-items:center; gap:9px;
  padding:10px 16px; border-radius:11px;
  font-family:inherit; font-size:13px; font-weight:600; cursor:pointer;
  border:1px solid transparent; transition:filter .15s var(--ease), transform .15s var(--ease);
}
.task-pill:hover{filter:brightness(1.15);transform:translateY(-1px);}
.task-pill .tp-count{font-family:var(--font-mono);font-weight:800;font-size:14.5px;padding:1px 9px;border-radius:8px;background:rgba(0,0,0,.25);}
body.light .task-pill .tp-count{background:rgba(15,23,42,.12);}
body.light .tp-warn{background:rgba(154,100,0,.13);border-color:rgba(154,100,0,.45);color:#7a5000;}
body.light .tp-danger{background:rgba(192,57,43,.12);border-color:rgba(192,57,43,.5);color:#b03427;}
body.light .tp-accent{background:rgba(41,83,201,.12);border-color:rgba(41,83,201,.45);color:#2953c9;}
.task-pill .tp-go{font-size:11.5px;opacity:.8;font-weight:500;}
.tp-warn{background:var(--warning-soft);border-color:rgba(245,166,35,.4);color:var(--warning);}
.tp-danger{background:var(--negative-soft);border-color:rgba(251,107,107,.4);color:var(--negative);}
.tp-accent{background:var(--accent-soft);border-color:rgba(94,139,255,.4);color:var(--accent-2);}
@media (max-width:768px){
  .task-alert-bar{top:58px;padding:8px;}
  .task-pill{padding:9px 12px;font-size:12px;flex:1;justify-content:center;}
}

/* ============= КОЛОКОЛЬЧИК: красный при срочных невыполненных ============= */
#bellBtn.urgent{color:var(--negative);background:var(--negative-soft);border-color:rgba(251,107,107,.55);animation:bellUrgent 1.6s ease-in-out infinite;}
#bellBtn.urgent .dot-badge{background:var(--negative);}
@keyframes bellUrgent{
  0%,100%{box-shadow:0 0 0 0 rgba(251,107,107,0);}
  50%{box-shadow:0 0 12px 3px rgba(251,107,107,.4);}
}
body.light #bellBtn.urgent{color:#c0392b;background:rgba(192,57,43,.14);border-color:rgba(192,57,43,.55);animation-name:bellUrgentLight;}
body.light #bellBtn.urgent .dot-badge{background:#c0392b;}
@keyframes bellUrgentLight{
  0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,0);}
  50%{box-shadow:0 0 12px 3px rgba(192,57,43,.5);}
}

/* ============= ЛЕНТА ИСТОРИИ ЗАДАЧИ — читабельный таймлайн ============= */
.task-hist{margin-top:4px;}
.task-hist-item{position:relative;padding:0 0 14px 22px;}
.task-hist-item::before{content:'';position:absolute;left:4px;top:14px;bottom:-2px;width:2px;background:var(--glass-border-soft);}
.task-hist-item:last-child{padding-bottom:2px;}
.task-hist-item:last-child::before{display:none;}
.task-hist-item::after{content:'';position:absolute;left:0;top:5px;width:10px;height:10px;border-radius:50%;background:var(--accent-soft);border:2px solid var(--accent-2);}
.task-hist .th-meta{font-family:var(--font-mono);font-size:10.5px;color:var(--text-3);letter-spacing:.02em;}
.task-hist .th-text{font-size:12.5px;color:var(--text-1);line-height:1.5;margin-top:2px;word-break:break-word;}
.task-hist .th-text b{color:var(--text-0);}

/* ============= УГЛОВОЙ ПУШ — правый верхний угол, без блокировки фона ============= */
.corner-push{
  position:fixed; top:84px; right:22px;
  width:min(410px, calc(100vw - 32px));
  z-index:220;
  background:var(--bg-elevated);
  border:1.5px solid var(--warning);
  border-radius:16px;
  padding:16px 18px;
  box-shadow:0 18px 50px rgba(0,0,0,.5);
  animation:cpSlideIn .45s var(--ease), cpGlow 2.2s ease-in-out infinite;
}
@keyframes cpSlideIn{from{opacity:0;transform:translateX(60px);}to{opacity:1;transform:none;}}
@keyframes cpGlow{
  0%,100%{box-shadow:0 18px 50px rgba(0,0,0,.5), 0 0 0 0 rgba(245,166,35,.35);}
  50%{box-shadow:0 18px 50px rgba(0,0,0,.5), 0 0 22px 4px rgba(245,166,35,.28);}
}
.corner-push.cp-danger{border-color:var(--negative);}
.corner-push.cp-danger{animation-name:cpSlideIn, cpGlowRed;}
@keyframes cpGlowRed{
  0%,100%{box-shadow:0 18px 50px rgba(0,0,0,.5), 0 0 0 0 rgba(251,107,107,.35);}
  50%{box-shadow:0 18px 50px rgba(0,0,0,.5), 0 0 22px 4px rgba(251,107,107,.3);}
}
.corner-push .cp-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:4px;}
.corner-push .cp-title{font-family:var(--font-display);font-weight:700;font-size:14.5px;color:var(--text-0);}
.corner-push .cp-sub{font-size:11.5px;color:var(--text-3);margin-top:2px;}
.corner-push .cp-close{width:26px;height:26px;border-radius:8px;background:var(--glass);border:1px solid var(--glass-border-soft);color:var(--text-2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 auto;}
.corner-push .cp-body{max-height:280px;overflow-y:auto;margin-top:8px;}
.corner-push .cp-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
body.light .corner-push{box-shadow:0 18px 50px rgba(15,23,42,.25);}
@media (max-width:768px){ .corner-push{top:64px;right:12px;} }

/* ============================= СВЕТЛАЯ ТЕМА ============================= */
body.light{

function wave(base,amp,len,seed=0,trend=0){
  const out=[];
  for(let i=0;i<len;i++){
    out.push(Math.max(0, Math.round(base + amp*Math.sin((i+seed)/3.1) + amp*0.35*Math.sin((i+seed)/1.3) + trend*i)));
  }
  return out;
}

function switchStore(storeId){
  if(!STORE_DATA[storeId]) return;
  STATE.activeStoreId=storeId;
  DATA=STORE_DATA[storeId];
  // Если текущая страница недоступна для типа новой точки — на главную
  const excluded=getStoreExcludedPages();
  if(excluded.includes(STATE.page)) STATE.page='dashboard';
  updateStoreSelector();
  renderSidebar();
  renderPage();
  renderMobileTabBar();
  updateBellBadge();
  const store=STORES.find(s=>s.id===storeId);
  toast('Переключено на: '+(store?store.shortName:storeId), 'info');
}

/* Агрегация для «Общего вида» — объединяет склад и аналитику */
function getAggregatedWarehouse(){
  const result={tech:[], tradein:[], accessories:[], parts:[]};
  Object.values(STORE_DATA).forEach(d=>{
    ['tech','tradein','accessories','parts'].forEach(cat=>{
      d.warehouse[cat].forEach(item=>{
        result[cat].push({...item, _store:d.storeName||'—'});
      });
    });
  });
  return result;
}

function getAggregatedKPIs(){
  let totalRevenue=0, totalOrders=0, totalService=0, totalStock=0;
  Object.entries(STORE_DATA).forEach(([sid,d])=>{
    totalOrders+=d.orders.length;
    totalService+=d.service.length;
    totalStock+=d.warehouse.tech.length+d.warehouse.accessories.length;
    d.orders.forEach(o=>{ if(o.status==='done') totalRevenue+=o.items.reduce((s,it)=>s+it.price,0); });
  });
  return {totalRevenue, totalOrders, totalService, totalStock, storeCount:Object.keys(STORE_DATA).length};
}

function updateStoreSelector(){
  const sel=document.getElementById('storeSelectorSelect');
  const wrap=document.getElementById('storeSelector');

  wrap.style.display='flex';
  // Только реальные магазины — без «Все магазины». Общая статистика — отдельно.
  sel.innerHTML=STORES.filter(s=>s.id!=='all').map(s=>'<option value="'+s.id+'"'+(STATE.activeStoreId===s.id?' selected':'')+'>'+s.shortName+'</option>').join('');
}

/* ------------------------------ TOAST ------------------------------ */
function toast(msg, type='info'){
  const root=document.getElementById('toastRoot');
  const el=document.createElement('div');
  el.className='toast '+type;
  const i = type==='success'?ic('check'):type==='error'?ic('x'):ic('bell');
  el.innerHTML='<span class="ic">'+i+'</span><span>'+msg+'</span>';
  root.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transform='translateY(8px)';el.style.transition='all .25s';setTimeout(()=>el.remove(),260);},3200);
}

/* --------------------------- SVG CHARTS --------------------------- */
function sparkline(values, w=110, h=34, color='var(--accent-2)'){
  const max=Math.max(...values), min=Math.min(...values);
  const range=(max-min)||1;
  const step=w/(values.length-1);
  const pts=values.map((v,i)=>[i*step, h-((v-min)/range)*h*0.85 - h*0.08]);
  const d=pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const areaD = d + ' L'+w+','+h+' L0,'+h+' Z';
  const id='sp'+Math.random().toString(36).slice(2,8);
  return '<svg class="svg-chart" width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">'
    +'<defs><linearGradient id="'+id+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity="0.35"/><stop offset="100%" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs>'
    +'<path d="'+areaD+'" fill="url(#'+id+')" stroke="none"/>'
    +'<path d="'+d+'" fill="none" stroke="'+color+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>'
    +'</svg>';
}

function lineChartBig(values, w=420, h=170, color='#5e8bff'){
  const max=Math.max(...values), min=Math.min(...values);
  const range=(max-min)||1;
  const padL=4, padR=4, padT=14, padB=14;
  const iw=w-padL-padR, ih=h-padT-padB;
  const step=iw/(values.length-1);
  const pts=values.map((v,i)=>[padL+i*step, padT+ih-((v-min)/range)*ih]);
  const d=pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const areaD=d+' L'+pts[pts.length-1][0].toFixed(1)+','+(h-padB)+' L'+padL+','+(h-padB)+' Z';
  const id='lg'+Math.random().toString(36).slice(2,8);
  let grid='';
  for(let i=1;i<4;i++){const y=padT+ih*i/4; grid+='<line x1="'+padL+'" y1="'+y+'" x2="'+(w-padR)+'" y2="'+y+'" stroke="rgba(255,255,255,.06)" stroke-width="1"/>';}
  return '<svg class="svg-chart" width="100%" height="'+h+'" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">'
    +'<defs><linearGradient id="'+id+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity="0.32"/><stop offset="100%" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs>'
    +grid
    +'<path d="'+areaD+'" fill="url(#'+id+')" stroke="none"/>'
    +'<path d="'+d+'" fill="none" stroke="'+color+'" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>'
    +'<circle cx="'+pts[pts.length-1][0]+'" cy="'+pts[pts.length-1][1]+'" r="3.6" fill="'+color+'"/>'
    +'</svg>';
}

function dualBarChart(seriesA, seriesB, w=900, h=190){
  const n=seriesA.length;
  const max=Math.max(...seriesA, ...seriesB, 1);
  const padB=20, padT=8;
  const ih=h-padB-padT;
  const groupW=w/n;
  const barW=Math.max(2, groupW*0.32);
  let bars='';
  for(let i=0;i<n;i++){
    const xA=i*groupW + groupW*0.18;
    const xB=i*groupW + groupW*0.52;
    const hA=(seriesA[i]/max)*ih;
    const hB=(seriesB[i]/max)*ih;
    bars+='<rect x="'+xA.toFixed(1)+'" y="'+(padT+ih-hA).toFixed(1)+'" width="'+barW.toFixed(1)+'" height="'+Math.max(1,hA).toFixed(1)+'" rx="2" fill="#5e8bff" opacity="0.92"/>';
    bars+='<rect x="'+xB.toFixed(1)+'" y="'+(padT+ih-hB).toFixed(1)+'" width="'+barW.toFixed(1)+'" height="'+Math.max(1,hB).toFixed(1)+'" rx="2" fill="#29d6c8" opacity="0.85"/>';
    if((i+1)%5===0 || i===0){
      bars+='<text x="'+(i*groupW+groupW/2).toFixed(1)+'" y="'+(h-4)+'" font-size="9.5" fill="rgba(255,255,255,.35)" text-anchor="middle" font-family="IBM Plex Mono, monospace">'+(i+1)+'</text>';
    }
  }
  return '<svg class="svg-chart" width="100%" height="'+h+'" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">'+bars+'</svg>';
}

/* --------------------------- SIDEBAR / NAV --------------------------- */

function closeSidebarMobile(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('scrim').classList.remove('show');
}

/* Нижняя навигация — первые 5 пунктов меню текущей роли.
   «Задачи» и «Документация» всегда добавляются в конец если есть место. */
function renderMobileTabBar(){
  const container=document.getElementById('mobileTabBarInner');
  if(!container) return;
  const role=ROLES[STATE.role];
  const excluded=getStoreExcludedPages();
  const menu=role.menu.filter(k=>!excluded.includes(k));
  // приоритетные страницы — первые 4 раздела меню + "tasks" если есть
  const priority=[...menu.slice(0,5)];
  const slots=priority.slice(0,5);
  container.innerHTML=slots.map(key=>{
    const p=PAGES[key];
    if(!p) return '';
    const active=STATE.page===key;
    const tb=(key==='tasks')?taskBadgeText():'';
    const badge=tb?'<span style="position:absolute;top:-4px;right:-6px;background:var(--accent);color:#fff;font-size:9px;font-weight:800;min-width:14px;height:14px;line-height:14px;text-align:center;border-radius:20px;padding:0 3px;">'+tb+'</span>':'';
    return '<button class="mobile-tab-item'+(active?' active':'')+'" data-mpage="'+key+'" aria-label="'+p.label+'">'+
      '<span style="position:relative;display:inline-flex;">'+ic(p.icon)+badge+'</span><span>'+p.label+'</span>'+
    '</button>';
  }).join('');
  container.querySelectorAll('[data-mpage]').forEach(el=>{
    el.addEventListener('click', ()=>navigate(el.dataset.mpage));
  });
}

function setRole(role){
  STATE.role=role;
  if(!ROLES[role].menu.includes(STATE.page)){
    STATE.page=ROLES[role].menu[0];
  }
  renderSidebar();
  renderPage();
  renderMobileTabBar();
  updateBellBadge();
  toast('Роль изменена: '+ROLES[role].label, 'info');
  /* «Вход в систему»: исполнителю — напоминание о сдаче, владельцу — запросы на продление */
  showDueTaskPush();
  showOwnerDecisionPush();
}

function navigate(page){
  if(!ROLES[STATE.role].menu.includes(page)){ toast('Эта роль не имеет доступа к разделу', 'error'); return; }
  STATE.page=page;
  renderSidebar();
  renderPage();
  renderMobileTabBar();
  closeSidebarMobile();
}

/* --------------------------- TOPBAR / PAGE SWITCH --------------------------- */
function renderPage(){
  const p=PAGES[STATE.page];
  const activeStore=STORES.find(s=>s.id===STATE.activeStoreId);
  document.getElementById('pageTitle').textContent=p.label;
  document.getElementById('pageSub').textContent=activeStore? activeStore.shortName : 'Store Control ERP';
  const c=document.getElementById('pageContent');
  c.innerHTML='';

      '<div><div class="tname" style="font-size:17px;">'+escHtml(me.name)+'</div>'+
      '<div class="tsub" style="font-size:12.5px;">'+me.role+(unit?' · '+unit.name:'')+'</div></div>'+
    '</div>'+
    '<span class="badge '+status.cls+'" style="font-size:12px;padding:6px 12px;">'+status.label+'</span>'+
  '</div>';

  /* Успеваемость и деньги */
  const rating=DATA.sellerRatings.find(x=>x.name===me.name);
  let perfVal, perfSub;
  if(rating){ perfVal=rating.sales+' продаж'; perfSub=rub(rating.revenue)+' выручки · рейтинг '+rating.rating; }
  else if(me.role==='Мастер'){
    const done=DATA.service.filter(x=>x.master===me.name && (x.status==='done'||x.status==='archive')).length;
    const inwork=DATA.service.filter(x=>x.master===me.name && x.status==='progress').length;
    perfVal=done+' ремонтов сдано'; perfSub=inwork+' сейчас в работе';

  const compDue=DATA.expenseClaims.filter(x=>x.who===me.name&&x.status==='approved'&&!x.paidOut).reduce((s2,x)=>s2+x.amount,0);

  const premDue=premAll.filter(p=>!p.paid).reduce((s2,p)=>s2+p.amount,0);
  const myTasksActive=(DATA.tasks||[]).filter(t=>t.claimedBy===me.name&&TASK_ACTIVE_STATUSES.includes(t.status)).length;

  html+='<div class="grid grid-4" style="margin-bottom:18px;">'+

    kpiPlain('Премии за задачи', rub(premDue), 'check').replace('<div class="card"','<div class="card clickable" id="premHistoryCard" title="История начислений"').replace('</div></div>','<div style="font-size:11px;color:var(--text-3);margin-top:6px;">'+(premAll.length?premAll.length+' начислени(й) — нажмите, чтобы посмотреть':'пока нет')+'</div></div></div>')+

  const openTasks=(DATA.tasks||[]).filter(t=>t.status==='open');
