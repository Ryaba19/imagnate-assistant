/* ============================================================
   ЗАКАЗЫ
============================================================ */

/* ============================================================
   МОДЕЛЬ ЦЕНЫ — ядро системы заказов.

   Цена — это СВОЙСТВО заказа, а не статус. Она живёт параллельно
   с движением товара.

   Окно фиксации привязано к ДАТЕ ВЫДАЧИ, а не к дате заказа:
     - выдача дальше окна → цена плавающая, обязательств нет
     - выдача входит в окно → задача продавцу согласовать цену
     - клиент подтвердил → цена зафиксирована, тикает дедлайн
     - клиент не забрал → цена истекла, запускается прозвон

   КРИТИЧНО: зафиксированная цена НЕПРИКОСНОВЕННА. Прайс-модуль
   обновляет цены на сайте, но заказы с активной фиксацией НЕ
   пересчитываются. Клиент заказал по 114 000 — забирает по 114 000.
============================================================ */

const PRICE_SETTINGS={
  lockWindowDays: 2,      // «до конца послезавтра» — настраиваемо
  lockDurationDays: 2,    // сколько цена держится после подтверждения
};

const PRICE_STATUS={
  unconfirmed:['Заказ не подтверждён',  'b-grey'],
  floating:   ['Цена не зафиксирована', 'b-grey'],
  pending:    ['Требует согласования',  'b-progress'],
  locked:     ['Цена зафиксирована',    'b-ready'],
  expired:    ['Цена истекла',          'b-cancel'],
  paid:       ['Оплачено',              'b-done'],
};

/* Парсинг дат вида «27.06.2026» */
function parseRuDate(s){
  if(!s) return null;
  const m=String(s).match(/^(\d{2})\.(\d{2})\.(\d{4})/);
  if(!m) return null;
  return new Date(+m[3], +m[2]-1, +m[1]);
}
function fmtRuDate(d){
  if(!d) return '—';
  const p=n=>String(n).padStart(2,'0');
  return p(d.getDate())+'.'+p(d.getMonth()+1)+'.'+d.getFullYear();
}
function daysBetween(a,b){
  if(!a||!b) return null;
  return Math.round((b-a)/(1000*60*60*24));
}
function todayDate(){ return parseRuDate(DATA.today)||new Date(); }

/* Инициализация фиксации цены на заказе.
   Вызывается при создании заказа и при изменении даты выдачи.

   ИНВАРИАНТ: цена может быть «плавающей» или «требует согласования»
   ТОЛЬКО у заказов в статусе «Новый» или «В ожидании». Как только заказ
   ушёл в работу (Ждём товар / Готов / У курьера / Выдан) — цена уже
   согласована с клиентом по определению, иначе мы бы не начали закуп. */
function initPriceLock(o){
  if(!o.priceLock) o.priceLock={};
  const pl=o.priceLock;
  if(pl.status==='paid') return pl;                        // оплачено — трогать нельзя
  if(pl.status==='locked' || pl.status==='expired') return pl;  // уже согласовано

  const sum=o.items.reduce((s,it)=>s+it.price,0);

  /* Заказ уже в работе, но цена почему-то не зафиксирована
     (старые данные / импорт). Фиксируем по факту — иначе система
     будет требовать согласовать цену на том, что уже едет от поставщика. */
  const inProgress=['awaiting_stock','ready','delivering','done'].includes(o.status);
  if(inProgress){
    const today=todayDate();
    const exp=new Date(today);
    exp.setDate(exp.getDate()+PRICE_SETTINGS.lockDurationDays);
    pl.status='locked';
    pl.price=sum;
    pl.lockedAt=o.date||DATA.today;
    pl.expiresAt=fmtRuDate(exp);
    pl.lockedBy=pl.lockedBy||'—';
    return pl;
  }

  /* Отменённый заказ — цена уже не важна */
  if(o.status==='cancel'){ pl.status='floating'; pl.price=null; return pl; }

  /* Предзаказ — товара нет нигде, цену назовём при поступлении */
  if(o.status==='preorder'){ pl.status='floating'; pl.price=null; pl.willLockAt=null; return pl; }

  /* Заказ ещё не подтверждён продавцом — цены пока нет вообще.
     Сначала звоним, подтверждаем заказ и узнаём дату выдачи. */
  if(o.status==='new' && !o.confirmedAt){
    pl.status='unconfirmed';
    pl.price=null;
    pl.quotedPrice=sum;   // что клиент видел на сайте
    return pl;
  }

  /* Остаются подтверждённые «Новый» и «В ожидании» — тут решает дата выдачи */
  const pickup=parseRuDate(o.desiredDate)||todayDate();
  const today=todayDate();
  const daysToPickup=daysBetween(today,pickup);

  if(daysToPickup!=null && daysToPickup>PRICE_SETTINGS.lockWindowDays){
    // Выдача далеко — цена плавающая, обязательств нет, товар НЕ заказываем
    pl.status='floating';
    pl.price=null;
    pl.quotedPrice=sum;
    const lockDate=new Date(pickup);
    lockDate.setDate(lockDate.getDate()-PRICE_SETTINGS.lockWindowDays);
    pl.willLockAt=fmtRuDate(lockDate);
    if(o.status==='new') setOrderStatus(o,'deferred');
  } else {
    // Выдача в окне — нужно согласовать цену с клиентом
    pl.status='pending';
    pl.quotedPrice=pl.quotedPrice ?? sum;
    pl.currentPrice=sum;
    pl.willLockAt=null;
    // Заказ из ожидания «дозрел» — пора звонить
    if(o.status==='deferred'){
      setOrderStatus(o,'new');
      o.callLog.unshift({date:DATA.today, time:nowTime(), action:'note',
        comment:'Подошёл срок выдачи — требуется согласовать цену с клиентом'});
    }
  }
  return pl;
}

/* Клиент подтвердил цену по телефону → фиксируем.
   С этого момента снимок цены неприкосновенен. */
function confirmPriceLock(o, employee){
  const pl=o.priceLock||initPriceLock(o);
  const sum=o.items.reduce((s,it)=>s+it.price,0);
  const today=todayDate();
  const expires=new Date(today);
  expires.setDate(expires.getDate()+PRICE_SETTINGS.lockDurationDays);

  pl.status='locked';
  pl.price=sum;                 // СНИМОК — больше не меняется
  pl.lockedAt=DATA.today;
  pl.expiresAt=fmtRuDate(expires);
  pl.lockedBy=employee||'—';
  o.callLog.unshift({date:DATA.today, time:nowTime(), action:'call',
    comment:'Цена согласована с клиентом: '+rub(sum)+'. Действует до '+pl.expiresAt});
  return pl;
}

/* Клиент оплатил → цена окончательная навсегда */
function markOrderPaid(o){
  const pl=o.priceLock||initPriceLock(o);
  const sum=pl.price ?? o.items.reduce((s,it)=>s+it.price,0);
  pl.status='paid';
  pl.price=sum;
  pl.paidAt=DATA.today;
  o.callLog.unshift({date:DATA.today, time:nowTime(), action:'note',
    comment:'Заказ оплачен: '+rub(sum)+'. Цена окончательная.'});
  return pl;
}

/* Проверка истечения — вызывается при рендере списка заказов */
function checkPriceExpiry(o){
  const pl=o.priceLock;
  if(!pl || pl.status!=='locked') return;
  const exp=parseRuDate(pl.expiresAt);
  const today=todayDate();
  if(exp && today>exp){
    pl.status='expired';
    pl.expiredAt=DATA.today;
    if(!pl.chaseStarted){
      pl.chaseStarted=DATA.today;
      pl.chaseStep=0;   // 0=утро, 1=вечер, 2=письмо, 3=отмена
      o.callLog.unshift({date:DATA.today, time:nowTime(), action:'note',
        comment:'Цена истекла. Запущен прозвон клиента.'});
    }
  }
}

/* ЗАЩИТА ЦЕНЫ ОТ ПРАЙС-МОДУЛЯ.
   Возвращает цену, по которой клиент реально забирает товар.
   Если цена зафиксирована — берём снимок, а не текущую цену сайта. */
function orderPayablePrice(o){
  const pl=o.priceLock;
  if(pl && (pl.status==='locked'||pl.status==='paid'||pl.status==='expired') && pl.price!=null){
    return pl.price;   // снимок — неприкосновенен
  }
  return o.items.reduce((s,it)=>s+it.price,0);  // текущая цена сайта
}

/* Дельта между ценой при заказе и текущей — что говорить клиенту */
function priceDelta(o){
  const pl=o.priceLock;
  if(!pl || pl.status!=='pending') return null;
  const quoted=pl.quotedPrice ?? 0;
  const current=pl.currentPrice ?? 0;
  const diff=current-quoted;
  if(!quoted || diff===0) return {diff:0, pct:0, changed:false};
  return {diff, pct:(diff/quoted*100), changed:true};
}

/* Бейдж цены для таблицы и модалки */
function priceLockBadge(o){
  const pl=o.priceLock;
  if(!pl) return '';
  const st=PRICE_STATUS[pl.status];
  if(!st) return '';
  let sub='';
  if(pl.status==='unconfirmed') sub='сначала подтвердите заказ';
  else if(pl.status==='floating' && pl.willLockAt) sub='зафиксируется '+pl.willLockAt;
  else if(pl.status==='locked' && pl.expiresAt){
    const left=daysBetween(todayDate(), parseRuDate(pl.expiresAt));
    sub='до '+pl.expiresAt+(left!=null&&left>=0?' · осталось '+left+' дн.':'');
  }
  else if(pl.status==='pending') sub='позвонить клиенту';
  else if(pl.status==='paid' && pl.paidAt) sub='оплачено '+pl.paidAt;
  return '<span class="badge '+st[1]+'">'+st[0]+'</span>'+(sub?'<div class="tsub" style="margin-top:2px;">'+sub+'</div>':'');
}

/* ============================================================
   СТАТУСЫ ЗАКАЗА — отвечают ТОЛЬКО на вопрос «где товар».
   Цена живёт отдельно (см. выше).

   ГЛАВНЫЙ ИНВАРИАНТ: попасть в «Ждём товар» можно ТОЛЬКО после
   подтверждения цены клиентом. Мы не тратим деньги на закуп, пока
   клиент не сказал «да». Отказался — мы ничего не потеряли.

   Путь заказа:
     Новый (подтвердить + уточнить дату)
       ├─ дата в окне  → согласовать цену → Ждём товар / Готов
       └─ дата далеко  → В ожидании (ничего не делаем)
                          └─ окно открылось → согласовать цену → в оборот
============================================================ */
const STATUS_LABELS={
  new:              ['Новый',           'b-new'],
  deferred:         ['В ожидании',     'b-grey'],
  preorder:         ['Предзаказ',       'b-progress'],
  awaiting_stock:   ['Ждём товар',      'b-progress'],
  ready:            ['Готов к выдаче',  'b-ready'],
  delivering:       ['У курьера',       'b-progress'],
  done:             ['Выдан',           'b-done'],
  cancel:           ['Отменён',         'b-cancel'],
};
const ORDER_TABS=['new','deferred','awaiting_stock','ready','delivering','done','cancel','preorder','all'];

/* Можно ли пускать заказ в оборот (заказывать товар)?
   Только если цена зафиксирована или оплачена. */
function canProcureFor(o){
  const pl=o.priceLock;
  return !!pl && (pl.status==='locked' || pl.status==='paid');
}


function renderOrders(c){
  /* Пересчёт состояния цены на всех заказах.
     Заказы в ожидании «дозревают» сами, когда подходит срок. */
  DATA.orders.forEach(o=>{
    if(!o.callLog) o.callLog=[];
    initPriceLock(o);
    checkPriceExpiry(o);
  });

  const cnt=s=>s==='all'?DATA.orders.length:DATA.orders.filter(o=>o.status===s).length;

  let html='<div class="toolbar">';
  html+='<div class="chip-tabs" id="orderTabs">'+
    ORDER_TABS.map(s=>{
      const lbl=s==='all'?'Все':STATUS_LABELS[s][0];
      const n=cnt(s);
      return '<div class="chip-tab '+(STATE.ordersFilter===s?'active':'')+'" data-f="'+s+'">'+lbl+(n?' ('+n+')':'')+'</div>';
    }).join('')+
  '</div><div class="topbar-spacer"></div>'+
  (STATE.role==='owner'?'<button class="btn btn-sm" id="orderSettingsBtn" title="Настройки заказов">'+ic('gear')+'</button>':'')+
  '<button class="btn btn-primary" id="newOrderBtn">'+ic('plus')+' Создать заказ</button></div>';

  /* Что требует звонка прямо сейчас */
  const needCall=DATA.orders.filter(o=>{
    const pl=o.priceLock||{};
    if(pl.status==='expired') return true;
    if(o.status==='new' && !o.confirmedAt) return true;
    return pl.status==='pending' && (o.status==='new'||o.status==='deferred');
  });
  if(needCall.length && STATE.ordersFilter==='all'){
    html+='<div class="card" style="margin-bottom:12px;border-color:var(--warning);">'+
      '<div class="kpi-label" style="color:var(--warning);">'+ic('phone')+' Требуют звонка: '+needCall.length+'</div>'+
      '<div class="tsub" style="margin-top:4px;">Подтвердить заказ, согласовать цену или прозвонить по истёкшей цене.</div>'+
    '</div>';
  }

  const list=DATA.orders.filter(o=>STATE.ordersFilter==='all'||o.status===STATE.ordersFilter);

  html+='<div class="table-wrap"><table><thead><tr>'+
    '<th>№</th><th>Клиент</th><th>Товар</th><th>Выдача</th><th>Сумма</th><th>Цена</th><th>Статус</th><th>Закрыт</th><th></th>'+
  '</tr></thead><tbody>';

  if(list.length===0){
    html+='<tr><td colspan="9" class="empty"><b>Нет заказов</b></td></tr>';
  } else {
    list.forEach(o=>{
      const pl=o.priceLock||{};
      const payable=orderPayablePrice(o);
      const st=STATUS_LABELS[o.status]||['—','b-grey'];

      /* ДЕЙСТВИЯ — ровно одно приоритетное на каждом этапе.
         Порядок важен: сначала подтвердить заказ (узнать дату),
         только потом согласовывать цену. */
      const notConfirmed  = o.status==='new' && !o.confirmedAt;
      const awaitingPrice = pl.status==='pending' && (o.status==='new'||o.status==='deferred');
      let actions='<button class="btn btn-sm" data-open="'+o.id+'">Открыть</button>';
      if(pl.status==='expired'){
        actions+='<button class="btn btn-sm btn-primary" data-chase="'+o.id+'">Прозвон</button>';
      } else if(notConfirmed){
        actions+='<button class="btn btn-sm btn-primary" data-confirm-order="'+o.id+'">'+ic('phone')+' Подтвердить заказ</button>';
      } else if(awaitingPrice){
        actions+='<button class="btn btn-sm btn-primary" data-confirm-price="'+o.id+'">'+ic('phone')+' Согласовать цену</button>';
      } else if(o.status==='deferred'){
        actions+='<button class="btn btn-sm" data-edit-date="'+o.id+'">Изменить дату</button>';
      } else if(o.status==='awaiting_stock'){
        actions+='<button class="btn btn-sm btn-primary" data-arrived="'+o.id+'">Товар пришёл</button>';
      } else if(o.status==='ready'){
        actions+='<button class="btn btn-sm btn-primary" data-issue="'+o.id+'">Выдать</button>'+
                 '<button class="btn btn-sm" data-handoff="'+o.id+'">Курьеру</button>';
      } else if(o.status==='delivering'){
        actions+='<button class="btn btn-sm btn-primary" data-reconcile="'+o.id+'">Принять от курьера</button>';
      }

      /* ЦЕНА — бейдж состояния + дельта, если требует согласования */
      let priceCell=priceLockBadge(o);
      if(awaitingPrice){
        const d=priceDelta(o);
        if(d && d.changed){
          const up=d.diff>0;
          priceCell+='<div class="tsub" style="margin-top:2px;color:'+(up?'var(--negative)':'var(--positive)')+';font-weight:600;">'+
            (up?'▲ +':'▼ ')+rub(Math.abs(d.diff))+' ('+(up?'+':'')+d.pct.toFixed(1)+'%)</div>';
        }
      }

      /* СТАТУС — с пояснением, почему заказ в этом состоянии */
      let statusCell='<span class="badge '+st[1]+'">'+st[0]+'</span>';
      let hint='';
      if(notConfirmed)                  hint='Позвонить, уточнить дату выдачи';
      else if(awaitingPrice)            hint='Позвонить, согласовать цену';
      else if(o.status==='deferred')    hint='Товар не заказываем — рано';
      else if(o.status==='preorder')    hint='Сборщик ищет каждый день';
      else if(o.status==='awaiting_stock') hint='Заявка у поставщика';
      if(hint) statusCell+='<div class="tsub" style="margin-top:3px;'+((notConfirmed||awaitingPrice)?'color:var(--warning);':'')+'">'+hint+'</div>';

      const goods=o.items.map(it=>it.name).join(', ');
      html+='<tr>'+
        '<td class="mono tname">№'+o.id+'</td>'+
        '<td><div class="tname">'+o.name+'</div><div class="tsub">'+o.phone+'</div></td>'+
        '<td class="tsub" style="max-width:200px;">'+goods+'</td>'+
        '<td class="mono">'+(o.desiredDate||'—')+'</td>'+
        '<td class="mono">'+rub(payable)+'</td>'+
        '<td>'+priceCell+'</td>'+
        '<td>'+statusCell+'</td>'+
        '<td class="mono tsub">'+(o.closedAt||'—')+'</td>'+
        '<td class="row-actions">'+actions+'</td>'+
      '</tr>';
    });
  }
  html+='</tbody></table></div>';
  c.innerHTML=html;

  const rerender=()=>renderOrders(c);
  c.querySelectorAll('[data-f]').forEach(el=>el.addEventListener('click',()=>{STATE.ordersFilter=el.dataset.f; rerender();}));
  c.querySelectorAll('[data-open]').forEach(el=>el.addEventListener('click',()=>openOrderModal(parseInt(el.dataset.open), c)));
  c.querySelectorAll('[data-confirm-order]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation(); openConfirmOrderModal(parseInt(el.dataset.confirmOrder), c);}));
  c.querySelectorAll('[data-confirm-price]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation(); openPriceConfirmModal(parseInt(el.dataset.confirmPrice), c);}));
  c.querySelectorAll('[data-chase]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation(); openChaseModal(parseInt(el.dataset.chase), c);}));
  c.querySelectorAll('[data-edit-date]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation(); openEditDateModal(parseInt(el.dataset.editDate), c);}));
  c.querySelectorAll('[data-arrived]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation(); openGoodsArrivedModal(parseInt(el.dataset.arrived), c);}));
  c.querySelectorAll('[data-issue]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation(); openIssueModal(parseInt(el.dataset.issue), c);}));
  c.querySelectorAll('[data-handoff]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation(); openHandoffModal(parseInt(el.dataset.handoff), c);}));
  c.querySelectorAll('[data-reconcile]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation(); openReconcileModal(parseInt(el.dataset.reconcile), c);}));

  document.getElementById('newOrderBtn').addEventListener('click', openNewOrderModal);
  const setBtn=document.getElementById('orderSettingsBtn');
  if(setBtn) setBtn.addEventListener('click', openOrderSettingsModal);
}

/* ============================================================
   НАЛИЧИЕ И ПРИВЯЗКА ТОВАРА — поверх существующей модели заказа.
   Логика добавлена аккуратно, не меняя текущие статусы/историю/роли.
   it.imei: '—' = без серийного учёта (как раньше); 'нет в наличии' = под
   закуп (как раньше); null = серийный товар, ещё не привязан (новое);
   любое другое значение = привязан к конкретному серийнику.
============================================================ */
function itemRequiresSerial(it){ return it.imei !== '—'; }
function itemIsBound(it){ return itemRequiresSerial(it) && !!it.imei && it.imei !== 'нет в наличии'; }
function orderFullyBound(o){ return o.items.every(it=>!itemRequiresSerial(it) || itemIsBound(it)); }

function checkItemAvailability(it, o){
  if(!itemRequiresSerial(it)) return {status:'no_serial'};
  if(itemIsBound(it)){
    const wh=[...DATA.warehouse.tech, ...DATA.warehouse.tradein].find(x=>x.imei===it.imei);
    return {status:'bound', location: wh?wh.location:'—'};
  }
  const pool=[...DATA.warehouse.tech, ...DATA.warehouse.tradein].filter(w=>w.model===it.name && (w.status==='free'||w.status==='instock'));
  const here=pool.filter(w=>w.location.includes(o.store));
  if(here.length) return {status:'here', candidates:here};
  if(pool.length) return {status:'elsewhere', candidates:pool};
  const pr=DATA.purchaseRequests.find(p=>p.item===it.name && ['sent','priced','confirmed'].includes(p.status));
  if(pr) return {status:'collector', pr};
  return {status:'none'};
}

function logAvailabilityCheck(o, it, av){
  const labels={here:'Есть в выбранном магазине («'+o.store+'»)', elsewhere:'Есть в другом магазине', collector:'Есть у сборщика / на точке сбора', none:'Нет в наличии'};
  (o.callLog=o.callLog||[]).push({date:DATA.today, time:nowTime(), action:'availability', comment:'Проверка наличия «'+it.name+'»: '+(labels[av.status]||av.status)});
  if(av.status==='none'){
    const exists=DATA.purchaseRequests.some(p=>p.createdFrom==='Заказ №'+o.id && p.item===it.name);
    if(!exists){
      const prId=(DATA.purchaseRequests.length?Math.max(...DATA.purchaseRequests.map(p=>p.id)):5000)+1;
      DATA.purchaseRequests.push({id:prId, reason:'Под заказ клиента', item:it.name, qty:1, status:'new', createdFrom:'Заказ №'+o.id});
      DATA.attention.forOrders.push({title:it.name, sub:'Нужен для заказа №'+o.id+', '+o.name, count:1});
      (o.callLog=o.callLog||[]).push({date:DATA.today, time:nowTime(), action:'purchase_request', comment:'Создана заявка на закупку «'+it.name+'» (заявка №'+prId+')'});
    }
  }
}

/* Запускается при открытии карточки заказа в статусах «В ожидании» /
   «Ждём поступление» — проверяет наличие, ведёт историю, и переводит
   заказ между этими статусами или в «Готов к выдаче»/«Доставка»,
   когда все товары привязаны. Для остальных статусов — no-op. */
function recomputeOrderFulfillment(o){
  if(!['deferred','awaiting_stock'].includes(o.status)) return;
  let anyUnavailable=false;
  o.items.forEach(it=>{
    if(!itemRequiresSerial(it) || itemIsBound(it)) return;
    const av=checkItemAvailability(it,o);
    if(it.availabilityCache!==av.status){
      it.availabilityCache=av.status;
      logAvailabilityCheck(o,it,av);
    }
    if(av.status!=='here') anyUnavailable=true;
  });
  const stillNeedsBinding=o.items.some(it=>itemRequiresSerial(it) && !itemIsBound(it));
  if(anyUnavailable && o.status==='deferred'){
    setOrderStatus(o,'awaiting_stock');
    (o.callLog=o.callLog||[]).push({date:DATA.today, time:nowTime(), action:'status', comment:'Не все товары в наличии в выбранном магазине — заказ переведён в «Ждём поступление»'});
  } else if(!anyUnavailable && stillNeedsBinding && o.status==='awaiting_stock'){
    setOrderStatus(o,'waiting');
    (o.callLog=o.callLog||[]).push({date:DATA.today, time:nowTime(), action:'status', comment:'Товар появился в наличии — заказ переведён в «В ожидании», ожидает привязки серийника'});
  } else if(!stillNeedsBinding){
    const newStatus='ready';
    if(o.status!==newStatus){
      setOrderStatus(o,newStatus);
      (o.callLog=o.callLog||[]).push({date:DATA.today, time:nowTime(), action:'status', comment:'Все товары привязаны — заказ переведён в «'+STATUS_LABELS[newStatus][0]+'»'});
    }
  }
}

function openBindModal(orderId, itemIndex){
  const o=findOrder(orderId);
  const it=o.items[itemIndex];
  const av=checkItemAvailability(it,o);
  let body='<p class="tsub" style="margin-top:0;">«'+it.name+'» — товар считается готовым к выдаче только после привязки конкретного серийного номера.</p>';
  body+='<div class="field"><label>IMEI / серийный номер</label><input class="input-mini" id="bindImeiInput" style="width:100%;" placeholder="Введите или отсканируйте код"></div>';
  if(av.candidates && av.candidates.length){
    body+='<div class="drill-block-label" style="margin-top:14px;">Свободные серийники в наличии</div>';
    body+=av.candidates.map(w=>'<div class="hist-row" style="cursor:pointer;" data-bind-pick="'+w.imei+'"><div><div class="h-main mono">'+w.imei+'</div><div class="h-sub">'+w.location+'</div></div></div>').join('');
  }
  openModal('Пикнуть серийник', it.name, body, [{label:'Привязать', cls:'btn-primary', action:()=>{
    const val=document.getElementById('bindImeiInput').value.trim();
    if(!val){ toast('Введите или выберите серийный номер', 'error'); return; }
    const wh=[...DATA.warehouse.tech, ...DATA.warehouse.tradein].find(x=>x.imei===val);
    if(wh && wh.status!=='free' && wh.status!=='instock'){ toast('Этот серийник уже занят другим заказом', 'error'); return; }
    it.imei=val;
    if(wh) wh.status='reserved';
    (o.callLog=o.callLog||[]).push({date:DATA.today, time:nowTime(), action:'bind', comment:'Привязан серийник '+val+' к «'+it.name+'»'});
    closeModal();
    recomputeOrderFulfillment(o);
    openOrderModal(o.id);
    toast('Серийник привязан к заказу', 'success');
  }}]);
  document.querySelectorAll('[data-bind-pick]').forEach(el=>el.addEventListener('click',()=>{
    document.getElementById('bindImeiInput').value=el.dataset.bindPick;
  }));
}

function requestTransfer(orderId, itemIndex){
  const o=findOrder(orderId);
  const it=o.items[itemIndex];
  it.transferRequested=true;
  (o.callLog=o.callLog||[]).push({date:DATA.today, time:nowTime(), action:'transfer', comment:'Запрошено перемещение «'+it.name+'» в магазин «'+o.store+'»'});
  openOrderModal(o.id);
  toast('Перемещение запрошено', 'info');
}

/* Единая точка смены статуса заказа. Любой переход фиксируется в
   o.statusHistory: {откуда, куда, когда (дата+время), кто}. Момент
   закрытия (Выдан/Отменён) дополнительно пишется в o.closedAt — для
   отслеживания. Если статус не меняется — ничего не пишем (защита от
   повторной записи при перерисовке). Вызывать вместо o.status='...'. */
function setOrderStatus(o, newStatus){
  if(!o) return newStatus;
  if(!Array.isArray(o.statusHistory)) o.statusHistory=[];
  if(o.status===newStatus) return newStatus;
  const from=o.status;
  o.status=newStatus;
  const at=DATA.today+' '+nowTime();
  o.statusHistory.push({from, to:newStatus, at, by:currentEmployeeName()});
  if(newStatus==='done'||newStatus==='cancel'){ o.closedAt=at; }
  else { o.closedAt=null; }   // заказ вернулся в работу — метку закрытия снимаем
  return newStatus;
}

function formatDateRu(iso){ if(!iso) return ''; const p=iso.split('-'); return p[2]+'.'+p[1]+'.'+p[0]; }
function formatDateIso(ru){ if(!ru) return ''; const p=ru.split('.'); return p[2]+'-'+p[1]+'-'+p[0]; }
function daysUntilRu(dateRu){
  const p=dateRu.split('.').map(Number);
  const target=new Date(p[2],p[1]-1,p[0]).getTime();
  const today=new Date(); today.setHours(0,0,0,0);
  return Math.round((target-today.getTime())/86400000);
}

  syncDraftFromDOM();
  document.getElementById('orderFormBody').innerHTML=orderFormBodyHTML();

    const el=document.getElementById('ofPickerQuery');

function wireOrderFormEvents(){
  const root=document.getElementById('orderFormBody');
  root.querySelector('#ofConsent').addEventListener('click', ()=>{ OF.consent=!OF.consent; refreshOrderForm(); });
  root.querySelector('#ofMethod').addEventListener('change', refreshOrderForm);
  root.querySelectorAll('[data-pick]').forEach(btn=>btn.addEventListener('click', ()=>{
    OF.pickerMode = OF.pickerMode===btn.dataset.pick? null : btn.dataset.pick;
    refreshOrderForm();
  }));
  root.querySelectorAll('[data-add-stock]').forEach(el=>el.addEventListener('click', ()=>{
    const item=[...DATA.warehouse.tech, ...DATA.warehouse.tradein].find(x=>x.imei===el.dataset.addStock);
    OF.items.push({name:item.model, imei:item.imei, price:item.price, sourceType:'stock', sourceRef:item.imei});
    OF.pickerMode=null; OF.pickerQuery='';
    refreshOrderForm();
  }));
  root.querySelectorAll('[data-add-service]').forEach(el=>el.addEventListener('click', ()=>{
    const svc=DATA.services.find(s=>s.id===el.dataset.addService);
    OF.items.push({name:svc.name, imei:'—', price:svc.price, sourceType:'service'});
    OF.pickerMode=null;
    refreshOrderForm();
  }));
  const addCustomBtn=root.querySelector('#ofAddCustom');
  if(addCustomBtn) addCustomBtn.addEventListener('click', ()=>{
    const name=document.getElementById('ofCustomName').value.trim();
    const price=parseFloat(document.getElementById('ofCustomPrice').value);
    if(!name||!price){ toast('Укажите название и цену', 'error'); return; }
    OF.items.push({name, imei:'нет в наличии', price, sourceType:'missing'});
    OF.pickerMode=null; OF.customName=''; OF.customPrice='';
    refreshOrderForm();
  });

    OF.items.splice(parseInt(el.dataset.rmItem),1);
    refreshOrderForm();
  }));
}

function createOrder(){
  syncDraftFromDOM();
  if(!OF.name.trim() || !OF.phone.trim()){ toast('Укажите ФИО и телефон клиента', 'error'); return; }
  if(OF.items.length===0){ toast('Добавьте хотя бы одну позицию', 'error'); return; }

  const newId=Math.max(...DATA.orders.map(o=>o.id))+1;
  const order={
    id:newId, name:OF.name.trim(), phone:OF.phone.trim(), email:OF.email.trim()||'-',
    date:DATA.today, method:OF.method, store:OF.store,
    delivery: OF.method==='Доставка' ? (OF.courier.trim()||'Курьер не назначен') : '—',
    clientComment:OF.comment.trim(), sellerComment:'',
    items:OF.items.map(it=>({name:it.name, imei:it.imei, price:it.price})),
    discount:OF.discount.trim()||'—', promo:OF.promo.trim()||'—', payment:OF.payment, status:'new',
    statusHistory:[{from:null, to:'new', at:DATA.today+' '+nowTime(), by:currentEmployeeName()}], closedAt:null
  };
  DATA.orders.unshift(order);

  let missingCount=0;
  OF.items.forEach(it=>{
    /* По новому жизненному циклу заказа товар НЕ резервируется на складе
       ни при создании, ни при подтверждении («В ожидании») — это сознательное
       изменение бизнес-логики. Резервирование появится позже, когда будет
       описан этап «Готов к выдаче» / «Ждём поступление». */
    if(it.sourceType==='missing'){
      missingCount++;
      const prId=(DATA.purchaseRequests.length? Math.max(...DATA.purchaseRequests.map(p=>p.id)) : 5000)+1;
      DATA.purchaseRequests.push({id:prId, reason:'Под заказ клиента', item:it.name, qty:1, status:'new', createdFrom:'Заказ №'+newId});
      DATA.attention.forOrders.push({title:it.name, sub:'Нужен для заказа №'+newId+', '+OF.name.trim(), count:1});
    }
  });

  /* Привязка клиента — приоритет e-mail (один клиент может писать с разных телефонов) */
  const emailKey=OF.email.trim().toLowerCase();
  let cust = emailKey ? DATA.customers.find(x=>x.email && x.email.toLowerCase()===emailKey) : null;
  if(!cust && OF.phone.trim()) cust = DATA.customers.find(x=>x.phones.some(p=>p.replace(/\D/g,'')===OF.phone.replace(/\D/g,'')));
  if(cust){
    if(OF.phone.trim() && !cust.phones.includes(OF.phone.trim())){ cust.phones.push(OF.phone.trim()); cust.merged=true; }
    if(OF.consent) cust.consent=true;
    cust.orders.unshift(newId);
  } else {
    DATA.customers.unshift({id:(DATA.customers.length?Math.max(...DATA.customers.map(x=>x.id)):0)+1, name:OF.name.trim(), email:OF.email.trim()||null, phones: OF.phone.trim()?[OF.phone.trim()]:[], consent:OF.consent, source:'Магазин (вручную)', orders:[newId]});
  }

  closeModal();
  renderOrders(document.getElementById('pageContent'));
  toast('Заказ №'+newId+' создан'+(missingCount? ' · '+missingCount+' позици'+(missingCount===1?'я':'и')+' ушла в Закуп' : ''), 'success');
}

  const body='<div id="orderFormBody">'+orderFormBodyHTML()+'</div>';

/* Подтверждение заказа — первое действие продавца.
   Тут уточняется ДАТА ВЫДАЧИ, и она определяет всю дальнейшую судьбу заказа. */
function openConfirmOrderModal(id, c){
  const o=findOrder(id);
  if(!o) return;
  const sum=o.items.reduce((s,it)=>s+it.price,0);
  const today=todayDate();
  const suggest=new Date(today);
  suggest.setDate(suggest.getDate()+1);

  const body='<div class="field-grid">'+
      field('Клиент', o.name)+field('Телефон', o.phone)+
      field('Товар', o.items.map(it=>it.name).join(', '))+
      field('Цена сайта сейчас', rub(sum))+
    '</div>'+
    '<div class="drill-divider"></div><div class="drill-block-label">Когда клиент заберёт?</div>'+
    '<div class="field"><label>Дата выдачи</label><input class="input-mini" id="coDate" style="width:100%;" placeholder="ДД.ММ.ГГГГ" value="'+(o.desiredDate||fmtRuDate(suggest))+'"></div>'+
    '<div class="card" style="margin-top:10px;background:var(--surface-2);">'+
      '<div class="tsub"><b>Если в ближайшие '+PRICE_SETTINGS.lockWindowDays+' дн.</b> — согласуем цену и пускаем в оборот.</div>'+
      '<div class="tsub" style="margin-top:4px;"><b>Если позже</b> — заказ уйдёт в ожидание. Цену пока не фиксируем, товар не заказываем. Позвоним, когда подойдёт срок.</div>'+
    '</div>';

  openModal('Подтвердить заказ №'+o.id, '', body, [
    {label:'Подтвердить', cls:'btn-primary', action:()=>{
      const dateStr=document.getElementById('coDate').value.trim();
      const pickup=parseRuDate(dateStr);
      if(!pickup){ toast('Введите дату в формате ДД.ММ.ГГГГ', 'error'); return; }
      o.desiredDate=dateStr;
      o.confirmedAt=DATA.today;   // заказ подтверждён — теперь работает логика цены
      o.callLog.unshift({date:DATA.today, time:nowTime(), action:'call',
        comment:'Заказ подтверждён с клиентом. Дата выдачи: '+dateStr});

      const days=daysBetween(todayDate(), pickup);
      if(days>PRICE_SETTINGS.lockWindowDays){
        // Далёкая дата → откладываем, ничего не тратим
        setOrderStatus(o,'deferred');
        o.priceLock=null;
        initPriceLock(o);
        closeModal(); renderOrders(c||document.getElementById('pageContent'));
        toast('Заказ в ожидании до '+o.priceLock.willLockAt+'. Товар не заказываем.', 'info');
      } else {
        // В окне → сразу согласовываем цену
        o.priceLock=null;
        initPriceLock(o);
        closeModal(); renderOrders(c||document.getElementById('pageContent'));
        openPriceConfirmModal(o.id, c);
      }
    }},
    {label:'Клиент отказался', cls:'btn-danger', action:()=>{
      setOrderStatus(o,'cancel');
      o.callLog.unshift({date:DATA.today, time:nowTime(), action:'call', comment:'Клиент отказался от заказа'});
      releaseOrderItems(o);
      closeModal(); renderOrders(c||document.getElementById('pageContent'));
      toast('Заказ отменён', 'info');
    }},
  ]);
}

/* Модалка согласования цены — продавец звонит клиенту.
   Звоним ВСЕГДА, даже если цена не изменилась. */
function openPriceConfirmModal(id, c){
  const o=findOrder(id);
  if(!o) return;
  const pl=o.priceLock||initPriceLock(o);
  const d=priceDelta(o);
  const current=pl.currentPrice ?? o.items.reduce((s,it)=>s+it.price,0);

  let body='<div class="field-grid">'+
    field('Клиент', o.name)+
    field('Телефон', o.phone)+
    field('Товар', o.items.map(it=>it.name).join(', '))+
    field('Желаемая выдача', o.desiredDate||'—')+
  '</div>';

  body+='<div class="drill-divider"></div><div class="drill-block-label">Что сказать клиенту</div>';
  body+='<div class="card" style="margin-bottom:8px;">'+
    '<div style="display:flex;justify-content:space-between;padding:4px 0;"><span class="tsub">Цена при заказе</span><span class="mono">'+rub(pl.quotedPrice||0)+'</span></div>'+
    '<div style="display:flex;justify-content:space-between;padding:4px 0;"><span class="tsub">Цена сейчас</span><span class="mono" style="font-weight:700;font-size:15px;">'+rub(current)+'</span></div>';
  if(d && d.changed){
    const up=d.diff>0;
    body+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid var(--glass-border-soft);margin-top:4px;">'+
      '<span class="tsub" style="font-weight:600;">Изменение</span>'+
      '<span class="mono" style="font-weight:700;color:'+(up?'var(--negative)':'var(--positive)')+';">'+(up?'▲ +':'▼ ')+rub(Math.abs(d.diff))+' ('+(up?'+':'')+d.pct.toFixed(1)+'%)</span></div>';
  } else {
    body+='<div class="tsub" style="padding-top:6px;border-top:1px solid var(--glass-border-soft);margin-top:4px;">Цена не изменилась — просто подтвердите с клиентом.</div>';
  }
  body+='</div>';
  body+='<div class="tsub">После подтверждения цена фиксируется на '+PRICE_SETTINGS.lockDurationDays+' дн. и больше не меняется, даже если цены на сайте обновятся.</div>';

  openModal('Согласовать цену — заказ №'+o.id, priceLockBadge(o), body, [
    {label:'Клиент подтвердил', cls:'btn-primary', action:()=>{
      confirmPriceLock(o, currentEmployeeName());
      // ТОЛЬКО ТЕПЕРЬ можно пускать в оборот — клиент сказал «да»
      if(orderFullyBound(o)){
        setOrderStatus(o,'ready');
        closeModal(); renderOrders(c||document.getElementById('pageContent'));
        toast('Цена зафиксирована. Товар в наличии — заказ готов к выдаче.', 'success');
      } else {
        setOrderStatus(o,'awaiting_stock');
        // Автоматически создаём заявку поставщику

/* Освобождение товара при отмене заказа */
/* ============================================================
   ПОСТАВЩИКИ — вспомогательные функции
============================================================ */
function getSupplier(id){ return (DATA.suppliers||[]).find(s=>s.id===id); }
function activeSuppliers(){ return (DATA.suppliers||[]).filter(s=>s.active); }
function defaultSupplier(){ return activeSuppliers()[0]||null; }
function collectionPointSupplier(){ return (DATA.suppliers||[]).find(s=>s.isCollectionPoint && s.active); }

/* Категория товара для расчёта сдельной ставки сборщику */
function payoutCategoryFor(itemName){
  const n=(itemName||'').toLowerCase();
  if(/iphone/.test(n)) return 'iPhone';
  if(/macbook|imac|mac\s|mac mini/.test(n)) return 'Mac';
  if(/dyson/.test(n)) return 'Dyson';
  if(/apple watch|watch\s/.test(n)) return 'Apple Watch';
  if(/airpods/.test(n)) return 'AirPods';
  return 'Прочее';
}
function payoutRateFor(supplierId, itemName){
  const s=getSupplier(supplierId);
  if(!s||!s.payoutRates) return 0;
  const cat=payoutCategoryFor(itemName);
  const r=s.payoutRates.find(x=>x.category===cat);
  return r?r.rate:0;
}
/* Начисления сборщику за период — сдельно по категориям */
function supplierPayout(supplierId){
  const s=getSupplier(supplierId);
  if(!s) return {total:0, lines:[]};
  const lines={};
  (DATA.purchaseRequests||[]).forEach(r=>{
    if(r.supplierId!==supplierId) return;
    if(r.status!=='received' && r.status!=='confirmed') return;
    const cat=payoutCategoryFor(r.item);
    const rate=payoutRateFor(supplierId, r.item);
    if(!lines[cat]) lines[cat]={category:cat, rate, qty:0, sum:0};
    lines[cat].qty+=r.qty||1;
    lines[cat].sum+=(r.qty||1)*rate;
  });
  const arr=Object.values(lines);
  return {total:arr.reduce((s2,l)=>s2+l.sum,0), lines:arr};
}

/* ПРЕДЗАКАЗ — товара нет ни у нас, ни у сборщика.
   Автоматически попадает в список поиска сборщика.
   НЕ попадает в заявки на пополнение — это разные потоки. */
function createPreorder(orderId, itemName, qty){
  const sup=defaultSupplier();
  const newId=Math.max(0, ...(DATA.purchaseRequests||[]).map(r=>r.id))+1;
  DATA.purchaseRequests.push({
    id:newId,
    supplierId:sup?sup.id:null,
    reason:'Предзаказ',
    item:itemName, qty:qty||1,
    status:'searching',          // сборщик ищет
    createdFrom:'Заказ №'+orderId,
    linkedOrderId:orderId,
    purchasePrice:null, invoiceNo:'', waybillNo:'',
    searchStartedAt:DATA.today,
    lastCheckedAt:null,
  });
  return newId;
}
/* Список для сборщика: что искать сегодня */
function collectorSearchList(){
  return (DATA.purchaseRequests||[]).filter(r=>r.status==='searching');
}
/* Список для сборщика: что купить сегодня (подтверждённые заявки) */
function collectorBuyList(){
  return (DATA.purchaseRequests||[]).filter(r=>r.status==='new'||r.status==='sent'||r.status==='priced');
}
/* Позиции без указанной закупочной — дыра в юнит-экономике */
function missingPurchasePrices(){
  return (DATA.purchaseRequests||[]).filter(r=>
    (r.status==='received'||r.status==='confirmed') && (r.purchasePrice==null||r.purchasePrice===0)
  );
}

  let body='<div class="tsub" style="margin-bottom:10px;">Укажите IMEI пришедших устройств. После привязки заказ перейдёт в «Готов к выдаче».</div>';

function openIssueModal(id){
  const o=findOrder(id);
  if(!orderFullyBound(o)){
    (o.callLog=o.callLog||[]).push({date:DATA.today, time:nowTime(), action:'blocked', comment:'Попытка выдачи отклонена: не все товары привязаны к заказу'});
    toast('Не все товары привязаны к заказу', 'error');
    return;
  }
  let scanState=o.items.map(it=>({matched:null}));
  let body='<p style="color:var(--text-2);font-size:13px;margin-top:0;">Перед выдачей каждая позиция должна быть отсканирована и сверена по модели, памяти, цвету, SIM и серийному номеру. При несовпадении выдача невозможна.</p>';
  body+='<div id="scanItems">';
  o.items.forEach((it,i)=>{
    body+='<div class="check-row" id="scanRow'+i+'" style="flex-direction:column;align-items:stretch;gap:8px;">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;">'+
        '<div><b style="color:var(--text-0);">'+it.name+'</b><div class="tsub mono">Ожидаемый код: '+it.imei+'</div></div>'+
        '<span class="wait" id="scanStatus'+i+'">'+ic('alert')+' Не отсканировано</span>'+
      '</div>'+
      (it.imei!=='—' ?
        '<input class="input-mini" id="scanInput'+i+'" data-scan-target="'+i+'" placeholder="Наведите Bluetooth-сканер на код — поле подтвердится само" style="width:100%;">'
        : '<div class="tsub">Без серийного учёта — подтверждается визуально</div>')+
    '</div>';
  });
  body+='</div>';
  body+='<div class="tsub" style="margin-top:6px;">Сканер должен быть подключён как Bluetooth-клавиатура (HID) в настройках устройства — после этого поле заполняется само, без касаний экрана. Демо: код можно ввести и вручную, подтверждение — по Enter.</div>';

  const footActions=[{label:'Подтвердить выдачу', id:'confirmIssue', cls:'btn-primary', disabled:true, action:()=>{
    /* В реальной системе здесь должен быть запрос на сервер, который ещё раз
       проверяет статус заказа перед записью (оптимистичная блокировка) —
       это и защищает от ситуации "два продавца выдают один товар одновременно". */
    setOrderStatus(o,'done');
    (o.callLog=o.callLog||[]).push({date:DATA.today, time:nowTime(), action:'issued', comment:'Заказ успешно выдан клиенту'});
    closeModal();
    renderOrders(document.getElementById('pageContent'));
    toast('Заказ №'+o.id+' выдан. Автоархивация через 24 часа.', 'success');
  }}];

  openModal('Выдача заказа №'+o.id, 'Сканирование и проверка перед выдачей', body, footActions);

  /* --- готовность к Bluetooth-сканеру (выбранное оборудование) ---
     Bluetooth-сканеры штрих-кодов в режиме HID подключаются к устройству
     так же, как Bluetooth-клавиатура: после сопряжения они печатают
     отсканированный код в активное поле и сами нажимают Enter.
     Поэтому здесь: (1) автофокус на первое несканированное поле,
     (2) Enter подтверждает текущую позицию и переводит фокус на следующую.
     Никакого дополнительного кода для самого сканера не требуется —
     важно только при покупке уточнить у поставщика, что устройство
     работает в режиме HID (а не Bluetooth SPP/"последовательный порт" —
     это другой протокол, для него понадобится отдельная интеграция). */
  function focusNextUnscanned(){
    for(let i=0;i<o.items.length;i++){
      if(o.items[i].imei!=='—' && scanState[i].matched!==true){
        const el=document.getElementById('scanInput'+i);
        if(el){ el.focus(); }
        return;
      }
    }
  }

  o.items.forEach((it,i)=>{
    if(it.imei==='—'){ scanState[i].matched=true; return; }
    const input=document.getElementById('scanInput'+i);
    const evaluate=()=>{
      const statusEl=document.getElementById('scanStatus'+i);
      if(input.value.trim()===''){ statusEl.className='wait'; statusEl.innerHTML=ic('alert')+' Не отсканировано'; scanState[i].matched=null; }
      else if(input.value.trim()===it.imei){ statusEl.className='ok'; statusEl.innerHTML=ic('check')+' Совпадает'; scanState[i].matched=true; }
      else { statusEl.className='bad'; statusEl.innerHTML=ic('x')+' Не совпадает'; scanState[i].matched=false; }
      updateConfirmState();
    };
    input.addEventListener('input', evaluate);
    input.addEventListener('keydown', e=>{
      if(e.key==='Enter'){
        e.preventDefault();
        evaluate();
        if(scanState[i].matched===true) focusNextUnscanned();
      }
    });
  });
  focusNextUnscanned();

  function updateConfirmState(){
    const allOk = scanState.every(s=>s.matched===true);
    const btn=document.getElementById('confirmIssue');
    if(btn) btn.disabled=!allOk;
  }
}

function nowTime(){ const d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function releaseOrderStock(o){
  o.items.forEach(it=>{
    if(it.imei && it.imei!=='—' && it.imei!=='нет в наличии'){
      const wh=[...DATA.warehouse.tech, ...DATA.warehouse.tradein].find(x=>x.imei===it.imei);
      if(wh && wh.status==='reserved') wh.status='instock';
    }
  });
}

function handoffBodyHTML(o, couriers){
  let h='<div class="field"><label>Курьер</label><select class="select-mini" id="hfCourier" style="width:100%;"><option value="">— выбрать —</option>'+
    couriers.map(c=>'<option value="'+c.id+'" '+(HF.courierId===c.id?'selected':'')+'>'+c.name+' — '+(c.courierType==='staff'?'штатный':'сдельный')+'</option>').join('')+
    '</select></div>';
  if(HF.courierId){
    const courier=couriers.find(c=>c.id===HF.courierId);
    const total=o.items.reduce((s,it)=>s+it.price,0);
    if(courier.courierType==='gig'){
      h+='<p class="tsub" style="margin-top:10px;">Сдельный курьер — статус сразу меняется на «Доставляется», товар считается у курьера до возврата денег в магазин.</p>';
      if(o.payment==='Наличные'){
        h+='<div class="kpi-delta down" style="margin-top:6px;">'+ic('alert')+' Оплата наличными при получении — после доставки потребуется принять '+rub(total)+' от курьера</div>';
      }
      h+='<button class="btn btn-primary" id="hfConfirmGig" style="margin-top:14px;">'+ic('truck')+' Передать '+courier.name+'</button>';
    } else {
      h+='<p class="tsub" style="margin-top:10px;">Штатный курьер — соберите и отсканируйте товар, затем передача уйдёт ему на подтверждение в приложении.</p>';
      h+='<div style="margin-top:10px;">'+o.items.map((it,i)=>{
        if(!it.imei || it.imei==='—'){ HF.scan[i]=true; return '<div class="check-row"><span>'+it.name+'</span><span class="ok">'+ic('check')+' Без серийного учёта</span></div>'; }
        const matched=HF.scan[i]===true;
        return '<div class="check-row" style="flex-direction:column;align-items:stretch;gap:8px;">'+
          '<div style="display:flex;justify-content:space-between;"><b style="color:var(--text-0);">'+it.name+'</b>'+(matched?'<span class="ok">'+ic('check')+' Собрано</span>':'<span class="wait">'+ic('alert')+' Не собрано</span>')+'</div>'+
          (matched?'':'<input class="input-mini" data-hf-scan="'+i+'" placeholder="Отсканируйте: '+it.imei+'" style="width:100%;">')+
        '</div>';
      }).join('')+'</div>';
      const allMatched=o.items.every((it,i)=>HF.scan[i]===true);
      h+='<button class="btn btn-primary" id="hfConfirmStaff" style="margin-top:14px;" '+(allMatched?'':'disabled')+'>'+ic('plus')+' Отправить на подтверждение курьеру</button>';
    }
  }
  return h;
}
function refreshHandoff(o, couriers){
  document.getElementById('handoffBody').innerHTML=handoffBodyHTML(o, couriers);
  wireHandoffEvents(o);
}
function wireHandoffEvents(o){
  const couriers=DATA.employees.filter(e=>e.role==='Курьер');
  const root=document.getElementById('handoffBody');
  root.querySelector('#hfCourier').addEventListener('change', e=>{ HF.courierId=parseInt(e.target.value)||null; HF.scan={}; refreshHandoff(o, couriers); });
  root.querySelectorAll('[data-hf-scan]').forEach(input=>{
    const i=parseInt(input.dataset.hfScan);
    input.addEventListener('keydown', e=>{
      if(e.key==='Enter'){
        e.preventDefault();
        if(input.value.trim()===o.items[i].imei){ HF.scan[i]=true; refreshHandoff(o, couriers); }
        else toast('Код не совпадает', 'error');
      }
    });
  });
  const gigBtn=root.querySelector('#hfConfirmGig');
  if(gigBtn) gigBtn.addEventListener('click', ()=>{
    const courier=couriers.find(c=>c.id===HF.courierId);
    setOrderStatus(o,'delivering'); o.courierId=courier.id; o.courierType='gig'; o.handoffTime=DATA.today+' '+nowTime();
    const expected = o.payment==='Наличные' ? o.items.reduce((s,it)=>s+it.price,0) : 0;
    DATA.handoffs.push({id:(DATA.handoffs.length?Math.max(...DATA.handoffs.map(h=>h.id)):0)+1, type:'gig', orderId:o.id, courierId:courier.id, courierName:courier.name, status:'in_transit', expectedCash:expected, returnedCash:null, createdBy:(currentEmployee()?.name||ROLES[STATE.role].label), createdAt:o.handoffTime});
    closeModal(); renderOrders(document.getElementById('pageContent'));
    toast('Заказ №'+o.id+' передан курьеру '+courier.name, 'success');
  });
  const staffBtn=root.querySelector('#hfConfirmStaff');
  if(staffBtn) staffBtn.addEventListener('click', ()=>{
    const courier=couriers.find(c=>c.id===HF.courierId);
    setOrderStatus(o,'delivering'); o.courierId=courier.id; o.courierType='staff';
    DATA.handoffs.push({id:(DATA.handoffs.length?Math.max(...DATA.handoffs.map(h=>h.id)):0)+1, type:'staff_courier', orderId:o.id, courierId:courier.id, courierName:courier.name, status:'pending', createdBy:(currentEmployee()?.name||ROLES[STATE.role].label), createdAt:DATA.today+' '+nowTime(), declineReason:null});
    DATA.notifications.unshift({id:(DATA.notifications.length?Math.max(...DATA.notifications.map(n=>n.id)):0)+1, from:(currentEmployee()?.name||ROLES[STATE.role].label), to:courier.name, text:'Вам назначена передача: заказ №'+o.id+' ('+o.name+') — подтвердите получение.', date:DATA.today, read:false});
    closeModal(); renderOrders(document.getElementById('pageContent')); updateBellBadge();
    toast('Передача отправлена курьеру '+courier.name+' на подтверждение', 'success');
  });
}
function openHandoffModal(orderId){
  const o=findOrder(orderId);
  const couriers=DATA.employees.filter(e=>e.role==='Курьер');
  HF={orderId, courierId:null, scan:{}};
  const body='<div id="handoffBody">'+handoffBodyHTML(o, couriers)+'</div>';
  openModal('Передать курьеру — заказ №'+o.id, o.name+' · '+rub(o.items.reduce((s,it)=>s+it.price,0)), body, []);
  wireHandoffEvents(o);
}

function openRefuseModal(orderId){
  const o=findOrder(orderId);
  const body='<div class="field"><label>Причина отказа</label><input class="input-mini" id="refReason" style="width:100%;" placeholder="Например: клиент передумал, нет нужной комплектации"></div>';
  openModal('Отказ по заказу №'+o.id, o.name, body, [{label:'Подтвердить отказ', cls:'btn-danger', action:()=>{
    const reason=document.getElementById('refReason').value.trim();
    if(!reason){ toast('Укажите причину отказа', 'error'); return; }
    setOrderStatus(o,'cancel'); o.cancelReason=reason;
    releaseOrderStock(o);
    closeModal(); renderOrders(document.getElementById('pageContent'));
    toast('Заказ №'+o.id+' отменён', 'info');
  }}]);
}

/* Приём от сдельного курьера — здесь и решается вопрос «а если вернул не всё»:
   заказ закрывается (товар уже у клиента, это необратимо), а недостача уходит
   отдельным долгом курьера до решения владельца — см. «Команда». */
function openReconcileModal(orderId){
  const o=findOrder(orderId);
  if(!orderFullyBound(o)){
    (o.callLog=o.callLog||[]).push({date:DATA.today, time:nowTime(), action:'blocked', comment:'Попытка выдачи отклонена: не все товары привязаны к заказу'});
    toast('Не все товары привязаны к заказу', 'error');
    return;
  }
  const h=DATA.handoffs.find(x=>x.orderId===o.id && x.status==='in_transit');
  const expected=h? h.expectedCash : 0;
  let body='<div class="field-grid">'+field('Курьер', o.courierId? DATA.employees.find(e=>e.id===o.courierId).name:'—')+field('Ожидается', rub(expected), true)+'</div>';
  body+='<div class="field" style="margin-bottom:14px;"><label>Фактически получено от курьера</label><input class="input-mini" id="rcAmount" type="number" style="width:100%;" value="'+expected+'"></div>';
  body+='<div class="toggle-row" style="margin-bottom:14px;"><div class="toggle-switch" id="rcRefused"></div>Клиент отказался, товар возвращён в магазин</div>';
  body+='<div class="field"><label>Комментарий (опционально)</label><input class="input-mini" id="rcNote" style="width:100%;" placeholder="Например: курьер сказал, что не досчитал"></div>';

  openModal('Приём от курьера — заказ №'+o.id, o.name, body, [{label:'Подтвердить', cls:'btn-primary', action:()=>{
    const refused=document.getElementById('rcRefused').classList.contains('on');
    const note=document.getElementById('rcNote').value.trim();
    if(refused){
      setOrderStatus(o,'cancel'); o.cancelReason='Клиент отказался при получении — товар возвращён курьером'+(note?(' · '+note):'');
      releaseOrderStock(o);
      if(h){ h.status='refused'; h.returnedCash=0; }
      closeModal(); renderOrders(document.getElementById('pageContent'));
      toast('Заказ №'+o.id+' отменён, товар возвращён на склад', 'info');
      return;
    }
    const returned=parseFloat(document.getElementById('rcAmount').value);
    if(isNaN(returned) || returned<0){ toast('Укажите сумму', 'error'); return; }
    setOrderStatus(o,'done');
    if(h) h.returnedCash=returned;
    if(expected>0 && returned<expected){
      const shortfall=expected-returned;
      DATA.courierDebts.push({id:(DATA.courierDebts.length?Math.max(...DATA.courierDebts.map(d=>d.id)):0)+1, courierId:o.courierId, courierName:DATA.employees.find(e=>e.id===o.courierId).name, orderId:o.id, expected, returned, shortfall, date:DATA.today, loggedBy:(currentEmployee()?.name||ROLES[STATE.role].label), status:'open', note});
      if(h) h.status='discrepancy';
      closeModal(); renderOrders(document.getElementById('pageContent'));
      toast('Заказ №'+o.id+' закрыт, но открыт долг курьера на '+rub(shortfall)+' — см. «Команда»', 'error');
    } else {
      if(h) h.status='reconciled';
      closeModal(); renderOrders(document.getElementById('pageContent'));
      toast('Заказ №'+o.id+' выдан, расчёт с курьером сошёлся', 'success');
    }
  }}]);
  document.getElementById('rcRefused').addEventListener('click', e=>{
    e.target.classList.toggle('on');
    document.getElementById('rcAmount').disabled=e.target.classList.contains('on');
  });
}

============================================================ */
function openModal(title, subHtml, bodyHtml, actions=[]){
  document.getElementById('modalBox').innerHTML =
    '<div class="modal-head"><div><h3>'+title+'</h3><p>'+(subHtml||'')+'</p></div><div class="drill-close" id="modalClose">'+ic('close')+'</div></div>'+
    '<div class="modal-body">'+bodyHtml+'</div>'+
    (actions.length? '<div class="modal-foot">'+actions.map((a,i)=>'<button class="btn '+(a.cls||'')+'" id="modalAction'+i+'" '+(a.disabled?'disabled':'')+'>'+a.label+'</button>').join('')+'</div>' : '');
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('modalClose').addEventListener('click', closeModal);
  actions.forEach((a,i)=>document.getElementById('modalAction'+i).addEventListener('click', a.action));
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('show'); }
document.getElementById('modalOverlay').addEventListener('click', e=>{ if(e.target.id==='modalOverlay') closeModal(); });

/* ============================================================
   СЕРВИС
============================================================ */
const SERVICE_STATUS={
  new:         ['Новая заявка',        'b-new'],
  progress:    ['В работе',            'b-progress'],
  wait_client: ['Ожидание клиента',    'b-progress'],
  wait_payment:['Ожидание оплаты',     'b-cancel'],
  done:        ['Выдано',              'b-done'],
  archive:     ['Архив',               'b-grey'],
};
const SERVICE_URGENCY={
  high:   ['Срочно',   'color:var(--negative);'],
  normal: ['',         ''],
  low:    ['Не срочно','color:var(--text-3);'],
};
const SVC_FILTER_TABS=[
  {id:'new',          label:'Новые заявки'},
  {id:'progress',     label:'В работе'},
  {id:'waiting',      label:'В ожидании'},
  {id:'done',         label:'Выдано'},
  {id:'archive',      label:'Архив'},
  {id:'all',          label:'Все'},
];

function renderService(c){
  if(!STATE.svcFilter) STATE.svcFilter='all';

  // Счётчики для шапки
  const cnt={};
  DATA.service.forEach(t=>{ cnt[t.status]=(cnt[t.status]||0)+1; });
  const waitCount=(cnt.wait_client||0)+(cnt.wait_payment||0);

  let html='<div class="toolbar">'+
    '<div class="chip-tabs">'+
    SVC_FILTER_TABS.map(f=>{
      let badge='';
      if(f.id==='new' && cnt.new)        badge=' ('+cnt.new+')';
      if(f.id==='waiting' && waitCount)  badge=' ('+waitCount+')';
      if(f.id==='progress' && cnt.progress) badge=' ('+cnt.progress+')';
      return '<div class="chip-tab '+(STATE.svcFilter===f.id?'active':'')+'" data-sf="'+f.id+'">'+f.label+badge+'</div>';
    }).join('')+
    '</div>'+
    '<div class="topbar-spacer"></div>'+
    '<button class="btn btn-primary" id="newSvcBtn">'+ic('plus')+' Новая заявка</button>'+
  '</div>';

  // Уведомления о передаче ответственности — «личный кабинет» мастера.
  // В прототипе показываем все ожидающие запросы; в реальной системе —
  // только адресованные текущему сотруднику.
  const pendingHandoffs=DATA.serviceHandoffs.filter(h=>h.status==='pending');
  if(pendingHandoffs.length){
    html+='<div class="card" style="margin-bottom:14px;border-color:var(--warning);">'+
      '<div class="drill-block-label">'+ic('bell')+' Запросы на передачу ремонта (требуют согласия мастера)</div>'+
      pendingHandoffs.map(h=>{
        const t=DATA.service.find(x=>x.id===h.ticketId);
        return '<div class="hist-row"><div class="h-main">Ремонт №'+h.ticketId+(t?' · '+t.device:'')+' → передаётся мастеру <b>'+h.toMaster+'</b> (от '+(h.fromMaster||'—')+')</div>'+
          '<div style="display:flex;gap:6px;"><button class="btn btn-sm btn-primary" data-ho-accept="'+h.id+'">Принять</button><button class="btn btn-sm btn-danger" data-ho-decline="'+h.id+'">Отклонить</button></div></div>';
      }).join('')+
    '</div>';
  }

  let list=DATA.service.filter(t=>{
    if(STATE.svcFilter==='all') return true;
    if(STATE.svcFilter==='waiting') return t.status==='wait_client'||t.status==='wait_payment';
    return t.status===STATE.svcFilter;
  });

  // Сортировка: срочные наверх, потом по дате (новее выше)
  list=list.slice().sort((a,b)=>{
    const urgOrd={high:0,normal:1,low:2};
    if(urgOrd[a.urgency]!==urgOrd[b.urgency]) return urgOrd[a.urgency]-urgOrd[b.urgency];
    return b.id-a.id;
  });

  html+='<div class="table-wrap"><table><thead><tr>'+
    '<th>№</th><th>Клиент</th><th>Устройство</th><th>Проблема</th>'+
    '<th>Ответственный</th><th>Принято</th><th>Стоимость</th><th>Статус</th><th></th>'+
  '</tr></thead><tbody>';

  if(list.length===0){
    html+='<tr><td colspan="9" class="empty"><b>Нет заявок</b></td></tr>';
  } else {
    list.forEach(t=>{
      const st=SERVICE_STATUS[t.status];
      const urg=SERVICE_URGENCY[t.urgency||'normal'];
      const missingParts=t.parts.filter(p=>!p.inStock).length;

      let statusCell='<span class="badge '+st[1]+'">'+st[0]+'</span>';
      if(missingParts>0) statusCell+='<div class="tsub" style="margin-top:3px;color:var(--warning);">'+ic('alert')+' Ждём запчасть</div>';

      const pendingHO=DATA.serviceHandoffs.find(h=>h.ticketId===t.id && h.status==='pending');
      const masterCell = t.master
        ? '<div class="tname">'+t.master+'</div>'+(pendingHO?'<div class="tsub" style="color:var(--warning);">→ '+pendingHO.toMaster+' (ждёт согласия)</div>':'')
        : '<div class="tsub" style="color:var(--text-3);">не назначен</div>';

      let actions='<button class="btn btn-sm" data-svc-open="'+t.id+'">Открыть</button>';
      if(t.status==='new'){
        actions+='<button class="btn btn-sm btn-primary" data-svc-take="'+t.id+'">Принять в работу</button>';
      } else if(t.status==='progress'){
        actions+='<button class="btn btn-sm btn-primary" data-svc-ready="'+t.id+'">Готово — ждём клиента</button>';
      } else if(t.status==='wait_client'||t.status==='wait_payment'){
        actions+='<button class="btn btn-sm btn-primary" data-svc-issue="'+t.id+'">Выдать устройство</button>';
      }

      html+='<tr>'+
        '<td class="mono tname" style="'+(urg[1])+'">'+ic('service')+' №'+t.id+(urg[0]?' <span style="font-size:10px;font-weight:700;">'+urg[0]+'</span>':'')+'</td>'+
        '<td><div class="tname">'+t.client+'</div><div class="tsub">'+t.phone+'</div></td>'+
        '<td class="tname">'+t.device+'</td>'+
        '<td class="tsub" style="max-width:180px;">'+t.issue+'</td>'+
        '<td>'+masterCell+'</td>'+
        '<td class="mono">'+t.accepted+'</td>'+
        '<td class="mono">'+(t.cost!=null?rub(t.cost):'—')+'</td>'+
        '<td>'+statusCell+'</td>'+
        '<td class="row-actions">'+actions+'</td>'+
      '</tr>';
    });
  }
  html+='</tbody></table></div>';
  c.innerHTML=html;

  c.querySelectorAll('[data-sf]').forEach(el=>el.addEventListener('click',()=>{ STATE.svcFilter=el.dataset.sf; renderService(c); }));

  document.getElementById('newSvcBtn').addEventListener('click', ()=>openNewServiceModal(c));
  c.querySelectorAll('[data-svc-open]').forEach(el=>el.addEventListener('click', e=>{ e.stopPropagation(); openServiceModal(parseInt(el.dataset.svcOpen), c); }));
  c.querySelectorAll('[data-svc-take]').forEach(el=>el.addEventListener('click', e=>{
    e.stopPropagation();
    openTakeServiceModal(parseInt(el.dataset.svcTake), c);
  }));
  c.querySelectorAll('[data-svc-ready]').forEach(el=>el.addEventListener('click', e=>{
    e.stopPropagation();
    const t=DATA.service.find(x=>x.id===parseInt(el.dataset.svcReady));
    const needsPayment = t.cost!=null && t.cost>0;
    t.status=needsPayment?'wait_payment':'wait_client';
    t.history.push({date:DATA.today+' '+nowTime(), text:'Ремонт завершён. '+( needsPayment?'Ожидание оплаты '+rub(t.cost):' Ожидание клиента')});
    renderService(c); toast('Заявка №'+t.id+' — '+(needsPayment?'ожидание оплаты':'ожидание клиента'), 'success');
  }));
  c.querySelectorAll('[data-svc-issue]').forEach(el=>el.addEventListener('click', e=>{
    e.stopPropagation();
    const t=DATA.service.find(x=>x.id===parseInt(el.dataset.svcIssue));
    t.status='done';
    t.history.push({date:DATA.today+' '+nowTime(), text:'Устройство выдано клиенту, оплата получена'});
    renderService(c); toast('Устройство выдано', 'success');
  }));
  c.querySelectorAll('[data-ho-accept]').forEach(el=>el.addEventListener('click', e=>{
    e.stopPropagation();
    const h=DATA.serviceHandoffs.find(x=>x.id===el.dataset.hoAccept);
    if(!h) return;
    const t=DATA.service.find(x=>x.id===h.ticketId);
    h.status='accepted';
    if(t){
      const oldMaster=t.master;
      t.master=h.toMaster;
      t.history.push({date:DATA.today+' '+nowTime(), text:'Мастер '+h.toMaster+' принял передачу ответственности (был '+(oldMaster||'—')+')'});
    }
    renderService(c);
    toast('Передача принята: ответственный теперь '+h.toMaster, 'success');
  }));
  c.querySelectorAll('[data-ho-decline]').forEach(el=>el.addEventListener('click', e=>{
    e.stopPropagation();
    const h=DATA.serviceHandoffs.find(x=>x.id===el.dataset.hoDecline);
    if(!h) return;
    h.status='declined';
    const t=DATA.service.find(x=>x.id===h.ticketId);
    if(t) t.history.push({date:DATA.today+' '+nowTime(), text:'Мастер '+h.toMaster+' отклонил передачу — ответственный остаётся '+(t.master||'—')});
    renderService(c);
    toast('Передача отклонена', 'info');
  }));
}

function openNewServiceModal(c){
  /* Чек-лист состояния устройства при приёме — ровно по образцу iMagnate */
  function chk(group,id,label){ return '<label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;"><input type="checkbox" data-chk="'+group+'_'+id+'"> '+label+'</label>'; }

  const body='<div class="drill-block-label">1. Данные клиента</div>'+
    '<div class="field-grid">'+
      '<div class="field"><label>ФИО</label><input class="input-mini" id="svcNewClient" placeholder="Иванов Иван Иванович"></div>'+
      '<div class="field"><label>Телефон</label><input class="input-mini" id="svcNewPhone" placeholder="+7 916 000-00-00"></div>'+
    '</div>'+

    '<div class="drill-block-label" style="margin-top:14px;">2. Данные устройства</div>'+
    '<div class="field-grid">'+
      '<div class="field"><label>Наименование / модель</label><input class="input-mini" id="svcNewDevice" placeholder="iPhone 16 Pro Max 256GB"></div>'+
      '<div class="field"><label>IMEI / S/N</label><input class="input-mini" id="svcNewImei" placeholder="IMEI или серийный номер"></div>'+
      '<div class="field"><label>Пароль устройства (при наличии)</label><input class="input-mini" id="svcNewPassword" placeholder="PIN, графический ключ..."></div>'+
      '<div class="field"><label>Аккаунт снят с устройства?</label><select class="select-mini" id="svcNewAccountRemoved" style="width:100%;"><option value="yes">Да</option><option value="no" selected>Нет</option><option value="na">Не применимо</option></select></div>'+

    '</div>'+

    '<div class="drill-block-label" style="margin-top:14px;">6. Состояние устройства при приёме</div>'+
    '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin:6px 0;">'+
      '<div><div class="tsub" style="font-weight:700;margin-bottom:4px;">Корпус</div>'+
        chk('body','ok','Без повреждений')+chk('body','scratches','Царапины')+chk('body','scuffs','Потёртости')+chk('body','chips','Сколы')+chk('body','cracks','Трещины')+chk('body','deform','Деформация')+
      '</div>'+
      '<div><div class="tsub" style="font-weight:700;margin-bottom:4px;">Дисплей</div>'+
        chk('display','ok','Исправен')+chk('display','scratches','Царапины')+chk('display','cracks','Трещины')+chk('display','broken','Разбит')+chk('display','noimage','Нет изображения')+chk('display','nosensor','Не работает сенсор')+
      '</div>'+
      '<div><div class="tsub" style="font-weight:700;margin-bottom:4px;">Устройство</div>'+
        chk('power','on','Включается')+chk('power','off','Не включается')+chk('power','reboot','Цикл. перезагрузка')+chk('power','diag','Требуется диагностика')+
      '</div>'+
      '<div><div class="tsub" style="font-weight:700;margin-bottom:4px;">Wi-Fi</div>'+
        chk('wifi','ok','Работает')+chk('wifi','bad','Не работает')+chk('wifi','na','Проверка невозможна')+
      '</div>'+
      '<div><div class="tsub" style="font-weight:700;margin-bottom:4px;">Bluetooth</div>'+
        chk('bt','ok','Работает')+chk('bt','bad','Не работает')+chk('bt','na','Проверка невозможна')+
      '</div>'+
    '</div>'+
    '<div class="field" style="margin-top:6px;"><label>Дополнительные особенности (следы вскрытия, залитие и т.д.)</label><input class="input-mini" id="svcNewExtras" style="width:100%;" placeholder=""></div>'+

    '<div class="tsub" style="margin-top:12px;">Ответственный мастер назначается после нажатия «Принять в работу».</div>';

  openModal('Заказ-наряд на ремонт', '', body, [{label:'Создать заявку', cls:'btn-primary', action:()=>{

    const device=document.getElementById('svcNewDevice').value.trim();

    const costParts=parseFloat(document.getElementById('svcNewCostParts').value)||0;
    const costTotal=(costLabor+costParts)||null;

    // Собираем чек-лист
    const condition={body:[],display:[],power:[],wifi:[],bt:[]};
    document.querySelectorAll('[data-chk]').forEach(el=>{

      condition,

/* Диалог «Принять в работу» — здесь выбирается ответственный мастер.
   Только после этого шага заявка получает мастера и переходит в статус «В работе». */
function openTakeServiceModal(id, c){
  const t=DATA.service.find(x=>x.id===id);
  if(!t) return;
  const masters=DATA.employees ? DATA.employees.filter(e=>e.role==='master').map(e=>e.name) : [];
  const fallback=['Виктор Н.','Олег П.'];
  const list=masters.length?masters:fallback;
  const body='<div class="field"><label>Назначить ответственного мастера</label>'+
    '<select class="select-mini" id="svcTakeMaster" style="width:100%;">'+list.map(m=>'<option>'+m+'</option>').join('')+'</select></div>'+
    '<div class="tsub" style="margin-top:8px;">Мастер станет ответственным за ремонт №'+t.id+' и увидит заявку в своём списке.</div>';
  openModal('Принять в работу — №'+t.id, '', body, [{label:'Принять и назначить', cls:'btn-primary', action:()=>{
    t.master=document.getElementById('svcTakeMaster').value;
    t.status='progress';
    t.history.push({date:DATA.today+' '+nowTime(), text:'Заявка принята в работу, ответственный: '+t.master});
    closeModal(); renderService(c);
    toast('Заявка №'+t.id+' в работе, мастер: '+t.master, 'success');
  }}]);
}

/* Диалог смены ответственного — требует согласия нового мастера.
   Отправляет уведомление, мастер принимает через ЛК (см. serviceHandoffs). */
function openReassignServiceModal(id, c){
  const t=DATA.service.find(x=>x.id===id);
  if(!t) return;
  const masters=DATA.employees ? DATA.employees.filter(e=>e.role==='master').map(e=>e.name) : [];
  const fallback=['Виктор Н.','Олег П.'];
  const list=(masters.length?masters:fallback).filter(m=>m!==t.master);
  if(list.length===0){ toast('Нет других мастеров для передачи', 'error'); return; }
  const pending=DATA.serviceHandoffs.find(h=>h.ticketId===t.id && h.status==='pending');
  let body='';
  if(pending){
    body='<div class="tsub">Уже отправлен запрос на передачу мастеру <b>'+pending.toMaster+'</b>. Ожидается его согласие.</div>'+
      '<div style="margin-top:10px;display:flex;gap:8px;"><button class="btn btn-sm btn-danger" id="svcCancelHandoff">Отменить запрос</button></div>';
    openModal('Передача ремонта №'+t.id, '', body);
    document.getElementById('svcCancelHandoff').addEventListener('click', ()=>{
      pending.status='cancelled';
      closeModal(); toast('Запрос на передачу отменён', 'info');
    });
    return;
  }
  body='<div class="field"><label>Передать ответственность мастеру</label>'+
    '<select class="select-mini" id="svcReassignMaster" style="width:100%;">'+list.map(m=>'<option>'+m+'</option>').join('')+'</select></div>'+
    '<div class="tsub" style="margin-top:8px;">Текущий ответственный: <b>'+(t.master||'не назначен')+'</b>. Новому мастеру придёт уведомление — он должен принять передачу в своём личном кабинете.</div>';
  openModal('Сменить ответственного — №'+t.id, '', body, [{label:'Отправить запрос', cls:'btn-primary', action:()=>{
    const toMaster=document.getElementById('svcReassignMaster').value;
    DATA.serviceHandoffs.push({id:'svho_'+Date.now(), ticketId:t.id, fromMaster:t.master, toMaster, status:'pending', date:DATA.today+' '+nowTime()});
    t.history.push({date:DATA.today+' '+nowTime(), text:'Запрос на передачу ответственности мастеру '+toMaster+' (ожидает согласия)'});
    closeModal(); renderService(c);
    toast('Запрос отправлен мастеру '+toMaster+' — ожидает принятия', 'success');
  }}]);
}

function openServiceModal(id, c){
  const t=DATA.service.find(x=>x.id===id);
  if(!t) return;
  const st=SERVICE_STATUS[t.status];

  let body='<div class="field-grid">'+
    field('Клиент', t.client+(t.phone?' · '+t.phone:''))+
    field('Устройство', t.device)+
    field('Мастер (ответственный)', t.master)+
    field('Принято', t.accepted)+
    field('Стоимость', t.cost!=null?rub(t.cost):'не указана')+
    field('Статус', st[0])+
  '</div>';
  body+='<div class="field" style="margin-top:6px;"><label>Слова клиента</label><div class="v" style="font-style:italic;">'+t.clientWords+'</div></div>';

  // Ответственный: в режиме просмотра статус менять нельзя, но можно
  // инициировать смену ответственного мастера (по согласию нового).
  body+='<div class="drill-divider"></div><div class="drill-block-label">Ответственный мастер</div>';
  const pendingHO=DATA.serviceHandoffs.find(h=>h.ticketId===t.id && h.status==='pending');
  body+='<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">'+
    '<div class="tname">'+(t.master||'Не назначен')+'</div>'+
    (pendingHO?'<span class="badge b-progress">Ждёт согласия: '+pendingHO.toMaster+'</span>':'')+
    (t.master && t.status!=='done' && t.status!=='archive'?'<button class="btn btn-sm" id="svcReassignBtn">Сменить ответственного</button>':'')+
  '</div>';

  body+='<div class="drill-divider"></div><div class="drill-block-label">История</div>';
  body+=t.history.slice().reverse().map(h=>'<div class="hist-row"><div class="h-main">'+h.text+'</div><div class="h-sub mono">'+h.date+'</div></div>').join('');

  body+='<div class="drill-divider"></div><div class="drill-block-label">Запчасти</div>';
  body+='<div id="svcPartsList">';
  if(t.parts.length===0){
    body+='<div class="tsub">Запчасти не указаны</div>';
  } else {
    body+=t.parts.map((p,i)=>'<div class="check-row" id="svcpart'+t.id+'_'+i+'">'+
      '<span>'+p.name+'</span>'+
      (p.inStock?'<span class="ok">'+ic('check')+' В наличии</span>':
        '<span class="bad" style="gap:10px;">'+ic('x')+' Нет в наличии <button class="btn btn-sm btn-primary" data-svc-createreq="'+t.id+'_'+i+'">Создать заявку на закупку</button></span>')+
    '</div>').join('');
  }
  body+='</div>';

  body+='<div class="drill-divider"></div><div class="drill-block-label">Добавить запись в историю</div>';
  body+='<div style="display:flex;gap:8px;"><input class="input-mini" id="svcHistText" style="flex:1;" placeholder="Что сделано..."><button class="btn btn-sm btn-primary" id="svcHistAdd">Добавить</button></div>';

  body+='<div class="drill-divider"></div><div class="drill-block-label">Бланк заказа</div>';
  body+='<div class="tsub" style="margin-bottom:8px;">Форма заполнена электронно. Сформируйте печатный бланк для подписи клиентом.</div>';
  body+='<div style="display:flex;gap:8px;flex-wrap:wrap;"><button class="btn btn-sm btn-primary" id="svcPrintBlank">'+ic('docs')+' Сформировать бланк заказа</button><button class="btn btn-sm">Акт выдачи устройства</button></div>';

  openModal('Ремонт №'+t.id+' · '+t.device, '<span class="badge '+st[1]+'">'+st[0]+'</span>', body);

  // Смена ответственного (по согласию)
  const reassignBtn=document.getElementById('svcReassignBtn');
  if(reassignBtn) reassignBtn.addEventListener('click', ()=>{ closeModal(); openReassignServiceModal(t.id, c||document.getElementById('pageContent')); });

  // Печатный бланк заказа
  document.getElementById('svcPrintBlank').addEventListener('click', ()=>openServiceBlank(t.id));

  // Добавить запись в историю
  document.getElementById('svcHistAdd').addEventListener('click', ()=>{
    const txt=document.getElementById('svcHistText').value.trim();
    if(!txt){ toast('Введите текст записи', 'error'); return; }
    t.history.push({date:DATA.today+' '+nowTime(), text:txt});
    document.getElementById('svcHistText').value='';
    toast('Запись добавлена', 'success');
  });

  // Заявка на закупку запчасти
  t.parts.forEach((p,i)=>{
    if(p.inStock) return;
    const btn=document.getElementById('svcpart'+t.id+'_'+i)?.querySelector('[data-svc-createreq]');
    if(!btn) return;
    btn.addEventListener('click', ()=>{
      const exists=DATA.purchaseRequests.find(r=>r.createdFrom==='Ремонт №'+t.id+' ('+p.name+')');
      if(!exists) DATA.purchaseRequests.push({id:Math.max(...DATA.purchaseRequests.map(r=>r.id))+1, reason:'Для ремонта', item:p.name, qty:1, status:'new', createdFrom:'Ремонт №'+t.id+' ('+p.name+')'});
      btn.outerHTML='<span class="ok">'+ic('check')+' Заявка создана</span>';
      toast('Заявка на закупку «'+p.name+'» добавлена в «Закуп»', 'success');
    });
  });
}

  const con=t.condition||{body:[],display:[],power:[],wifi:[],bt:[]};

    const arr=con[group]||[];

    '.header .addr{text-align:right;font-size:10.5px;color:#444;line-height:1.4;}'+

];
const SCANNER_TAB_LABELS={tech:'Техника', tradein:'Trade-in', accessories:'Аксессуары', parts:'Запчасти'};
function escAttr(s){return escHtml(String(s||'')).replace(/"/g,'&quot;');}
function scannerNormalize(code){return String(code||'').trim().replace(/\s+/g,'').toUpperCase();}
function scannerDigits(code){return String(code||'').replace(/\D/g,'');}
function scannerImeiLuhnValid(code){
  const digits=String(code||'');
  if(!/^\d{15}$/.test(digits)) return false;
  let sum=0;
  for(let i=0;i<14;i++){
    let n=parseInt(digits[i],10);
    if(i%2===1){
      n*=2;
      if(n>9) n-=9;
    }
    sum+=n;
  }
  return ((sum+parseInt(digits[14],10))%10)===0;
}
function scannerExtractImei(raw){
  const text=String(raw||'');
  const chunks=text.match(/\d{15}/g)||[];
  const valid=chunks.find(scannerImeiLuhnValid);
  if(valid) return valid;
  const digits=scannerDigits(text);
  for(let i=0;i<=digits.length-15;i++){
    const candidate=digits.slice(i,i+15);
    if(scannerImeiLuhnValid(candidate)) return candidate;
  }
  if(/^\d{15}$/.test(digits)) return digits;
  return '';
}
function scannerAnalyzeCode(raw){
  const original=String(raw||'').trim();
  const normalized=scannerNormalize(raw);
  const digits=scannerDigits(raw);
  const imei=scannerExtractImei(raw);
  const weird=/[^\dA-Za-zА-Яа-яЁё\-_.:/?=&+%]/.test(original);
  const nonAscii=/[^\x20-\x7E]/.test(original);
  const looksLikeQuery=/[?=&]/.test(original) && digits.length>8;

  if(!normalized){
    return {type:'empty', label:'Нет кода', canonical:'', tab:'accessories', canCreate:false, severity:'warn', hint:'Поставьте курсор в поле и пикните код.'};
  }
  if(/^01\d{14}21/.test(digits) || /^02\d{14}/.test(digits)){
    return {
      type:'gs1',
      label:'GS1 / служебный код коробки',
      canonical:normalized,
      tab:'tech',
      canCreate:false,
      severity:'warn',
      hint:'Это не чистый IMEI. Такой код может содержать GTIN, серийник и служебные данные. Для телефона лучше пикнуть именно строку IMEI из 15 цифр.'
    };
  }
  if(/^\d{15}$/.test(digits) && normalized===digits){
    const valid=scannerImeiLuhnValid(digits);
    return {
      type:'imei',
      label:valid?'IMEI устройства':'15 цифр, похоже на IMEI',
      canonical:digits,
      tab:'tech',
      canCreate:true,
      severity:valid?'ok':'warn',
      hint:valid?'Это индивидуальный IMEI. Его можно вносить как единицу техники.':'Формат похож на IMEI, но контрольная сумма не сходится. Перед записью лучше сверить цифры на коробке.'
    };
  }
  if(weird || nonAscii || looksLikeQuery){
    return {type:'service', label:'Служебный или нечитаемый код', canonical:normalized, tab:'accessories', canCreate:false, severity:'bad', hint:'Сканер прочитал служебную строку или бинарный QR. Такой код не используем для склада.'};
  }
  if(imei){
    return {
      type:'imei_embedded',
      label:'IMEI внутри длинного скана',
      canonical:imei,
      tab:'tech',
      canCreate:true,
      severity:'ok',
      hint:'В длинной строке найден валидный IMEI. В базу пойдет только IMEI, лишний хвост отброшен.'
    };
  }
  if(/^\d{13}$/.test(digits) && normalized===digits){
    return {type:'ean13', label:'EAN-13 товарный штрихкод', canonical:digits, tab:'accessories', canCreate:true, severity:'warn', hint:'Это общий товарный штрихкод. Для аксессуаров можно вести остаток партией; для телефона нужен IMEI.'};
  }
  if(/^\d{12}$/.test(digits) && normalized===digits){
    return {type:'upc', label:'UPC товарный штрихкод', canonical:digits, tab:'accessories', canCreate:true, severity:'warn', hint:'Это общий товарный штрихкод. Для аксессуаров можно вести остаток партией; для телефона нужен IMEI.'};
  }
  if(/^\d{14}$/.test(digits) && normalized===digits){
    return {type:'gtin14', label:'GTIN-14 товарный код', canonical:digits, tab:'accessories', canCreate:true, severity:'warn', hint:'Это код модели/товара, а не индивидуальный IMEI. Для аксессуаров подходит, для техники лучше сканировать IMEI.'};
  }
  if(/^\d{16,30}$/.test(digits) && normalized===digits){
    return {type:'long_digits', label:'Длинная цифровая строка', canonical:digits, tab:'tech', canCreate:false, severity:'bad', hint:'В строке слишком много цифр и валидный IMEI не найден. Не пишем это в базу, лучше пикнуть другой штрихкод.'};
  }
  if(/^(PRT|PART|BAT|DISPLAY|MOD)/.test(normalized)) return {type:'part_sku', label:'SKU запчасти', canonical:normalized, tab:'parts', canCreate:true, severity:'ok', hint:'Похоже на внутренний код запчасти. Можно внести в склад запчастей.'};
  if(/^(ACC|CASE|GLASS|CABLE|CHG)/.test(normalized)) return {type:'accessory_sku', label:'SKU аксессуара', canonical:normalized, tab:'accessories', canCreate:true, severity:'ok', hint:'Похоже на внутренний код аксессуара. Можно внести в склад аксессуаров.'};
  if(/^TRD/.test(normalized)) return {type:'tradein_sku', label:'Trade-in код', canonical:normalized, tab:'tradein', canCreate:true, severity:'ok', hint:'Похоже на внутренний код trade-in. Можно внести в базу после проверки устройства.'};
  return {type:'sku', label:'Внутренний SKU / серийник', canonical:normalized, tab:'accessories', canCreate:true, severity:'warn', hint:'Код можно внести вручную, но сначала убедитесь, что это именно нужная этикетка товара.'};
}

function coreDbEmpty(){return {version:1, products:[], stockUnits:[], stockBatches:[], stockMovements:[], updatedAt:null};}

function coreDbId(prefix){
