function coreDbProductKind(tab){
  if(tab==='tech'||tab==='tradein') return 'unit';
  return 'batch';
}
function coreDbProductKey(model, tab){
  return scannerNormalize(tab+'|'+String(model||'').toLowerCase());
}
function coreDbEnsureProduct({model, tab, purchase, price, minStock, metadata}){
  const db=coreDbEnsure();
  const key=coreDbProductKey(model, tab);
  let product=db.products.find(p=>p.key===key);
  const now=DATA.today+' '+nowTime();
  const productMetadata=metadata||{};
  if(!product){
    product={
      id:coreDbId('prd'),
      key,
      name:model,
      category:tab,
      categoryLabel:SCANNER_TAB_LABELS[tab]||tab,
      stockMode:coreDbProductKind(tab),
      defaultPurchasePrice:purchase||0,
      defaultSalePrice:price||0,
      minStock:Math.max(0, parseInt(minStock,10)||((tab==='accessories'||tab==='parts')?2:1)),
      source:'scanner',
      metadata:productMetadata,
      createdAt:now,
      updatedAt:now
    };
    db.products.push(product);
  } else {
    product.defaultPurchasePrice=purchase||product.defaultPurchasePrice||0;
    product.defaultSalePrice=price||product.defaultSalePrice||0;
    product.minStock=Math.max(0, parseInt(minStock,10)||product.minStock||((tab==='accessories'||tab==='parts')?2:1));
    product.metadata=Object.assign({}, product.metadata||{}, productMetadata);
    product.updatedAt=now;
  }
  return product;
}
function coreDbReceiveFromScan(tab, item, code, options={}){
  const db=coreDbEnsure();
  const normalizedCode=scannerNormalize(code);
  const now=DATA.today+' '+nowTime();
  const qty=(tab==='tech'||tab==='tradein')?1:Math.max(1, item.qty||1);
  const metadata=Object.assign({}, item.metadata||{}, {
    memory:item.memory||'',
    color:item.color||'',
    condition:item.condition||'',
    kit:item.kit||'',
    warrantyDays:item.warrantyDays||'',
    batteryPercent:item.batteryPercent||'',
    comment:item.comment||'',
    minStock:item.minStock||''
  });
  const product=coreDbEnsureProduct({model:item.model, tab, purchase:item.purchase, price:item.price, minStock:item.minStock, metadata});
  let row, rowType;
  if(product.stockMode==='unit'){
    row=db.stockUnits.find(u=>scannerNormalize(u.unitCode)===normalizedCode || scannerNormalize(u.imei)===normalizedCode || scannerNormalize(u.serialNumber)===normalizedCode);
    if(!row){
      row={
        id:coreDbId('unit'),
        productId:product.id,
        unitCode:normalizedCode,
        imei:normalizedCode,
        serialNumber:'',
        category:tab,
        status:item.status||'instock',
        purchasePrice:item.purchase||0,
        salePrice:item.price||0,
        location:item.location||'Склад',
        scannedAt:now,
        scannedBy:currentEmployeeName(),
        source:'scanner',
        metadata
      };
      db.stockUnits.push(row);
    } else {
      row.productId=product.id;
      row.status=item.status||row.status;
      row.purchasePrice=item.purchase||row.purchasePrice||0;
      row.salePrice=item.price||row.salePrice||0;
      row.location=item.location||row.location||'Склад';
      row.metadata=Object.assign({}, row.metadata||{}, metadata);
      row.updatedAt=now;
    }
    item.dbUnitId=row.id;
    rowType='unit';
  } else {
    row=db.stockBatches.find(b=>scannerNormalize(b.barcode)===normalizedCode || scannerNormalize(b.sku)===normalizedCode);
    if(!row){
      row={
        id:coreDbId('batch'),
        productId:product.id,
        sku:normalizedCode,
        barcode:normalizedCode,
        category:tab,
        qty,
        status:item.status||'instock',
        purchasePrice:item.purchase||0,
        salePrice:item.price||0,
        location:item.location||'Склад',
        scannedAt:now,
        scannedBy:currentEmployeeName(),
        source:'scanner',
        metadata
      };
      db.stockBatches.push(row);
    } else {
      row.productId=product.id;
      row.qty=Math.max(row.qty||0, qty);
      row.status=item.status||row.status;
      row.purchasePrice=item.purchase||row.purchasePrice||0;
      row.salePrice=item.price||row.salePrice||0;
      row.location=item.location||row.location||'Склад';
      row.metadata=Object.assign({}, row.metadata||{}, metadata);
      row.updatedAt=now;
    }
    item.dbBatchId=row.id;
    rowType='batch';
  }
  item.dbProductId=product.id;
  const movementExists=db.stockMovements.some(m=>m.code===normalizedCode && m.type==='scan_receive' && (m.unitId===item.dbUnitId || m.batchId===item.dbBatchId));
  if(!movementExists){
    db.stockMovements.unshift({
      id:coreDbId('mov'),
      type:options.type||'scan_receive',
      productId:product.id,
      unitId:item.dbUnitId||null,
      batchId:item.dbBatchId||null,
      code:normalizedCode,
      model:item.model,
      category:tab,
      qty,
      amount:(item.purchase||0)*qty,
      location:item.location||'Склад',
      by:currentEmployeeName(),
      at:now,
      note:options.note||'Добавление товара через сканер',
      metadata
    });
  }
  db.updatedAt=now;
  return {product,row,rowType};
}

function scannerEntries(){
  scannerEnsureBarcodes();
  const entries=[];
  const seen=new Set();
  const addEntry=(tab,item)=>{
    const aliases=[item.imei,item.sku,item.barcode,item.labelCode].filter(Boolean).map(scannerNormalize);
    const key=aliases[0]||scannerNormalize(scannerCodeForItem(item));
    if(!key || seen.has(key)) return;
    seen.add(key);
    entries.push({tab,item,aliases,primary:scannerPrimaryCode(item),barcode:scannerCodeForItem(item)});
  };
  Object.keys(SCANNER_TAB_LABELS).forEach(tab=>{
    (DATA.scannerStock[tab]||[]).forEach(item=>addEntry(tab,item));
  });
  Object.keys(SCANNER_TAB_LABELS).forEach(tab=>{
    (DATA.warehouse?.[tab]||[]).filter(item=>item.scannerTracked).forEach(item=>addEntry(tab,item));
  });
  return entries;
}
function scannerFind(raw){
  const code=scannerNormalize(raw);
  if(!code) return null;
  const analysis=scannerAnalyzeCode(raw);
  const candidates=[code, scannerNormalize(analysis.canonical), scannerNormalize(scannerExtractImei(raw))]
    .filter(Boolean);
  return scannerEntries().find(entry=>candidates.some(candidate=>entry.aliases.includes(candidate)))||null;
}

function scannerBarcodeSvg(value, height=62){
  const clean=String(value||'').replace(/[^\x20-\x7E]/g,'').slice(0,48);
  if(!clean) return '';
  const codes=[104];
  let checksum=104;
  clean.split('').forEach((ch,i)=>{
    const v=ch.charCodeAt(0)-32;
    codes.push(v);
    checksum+=v*(i+1);
  });
  codes.push(checksum%103,106);
  const module=2, quiet=14;
  let x=quiet, rects='';
  codes.forEach(code=>{
    const pattern=CODE128_PATTERNS[code];
    for(let i=0;i<pattern.length;i++){
      const w=parseInt(pattern[i],10)*module;
      if(i%2===0) rects+='<rect x="'+x+'" y="0" width="'+w+'" height="'+height+'" fill="#000"/>';
      x+=w;
    }
  });
  const width=x+quiet;
  return '<svg class="barcode-svg" viewBox="0 0 '+width+' '+height+'" width="100%" height="'+height+'" preserveAspectRatio="xMinYMin meet">'+rects+'</svg>';
}

  if(st==='reserved'){ text='товар найден, но он уже в резерве. Перед выдачей проверьте заказ.'; cls=''; }

function scannerPushLog(raw, entry, action){
  const analysis=scannerAnalyzeCode(raw);
  DATA.scanLog=DATA.scanLog||[];
  DATA.scanLog.unshift({
    code:analysis.canonical||scannerNormalize(raw),
    model:entry?.item?.model||'Не найдено',
    tab:entry?.tab||analysis.tab||scannerGuessTab(raw),
    action,
    at:DATA.today+' '+nowTime()
  });
  DATA.scanLog=DATA.scanLog.slice(0,12);
  if(typeof lsSave==='function') lsSave();
}
function scannerRenderResult(raw, host, options={}){
  const result=host.querySelector('#scannerResult');

function saveScannerCreatedItem(){
  const tab=document.getElementById('scanNewTab').value;
  let code=scannerNormalize(document.getElementById('scanNewCode').value);
  const model=document.getElementById('scanNewModel').value.trim();
  const scanCheck=scannerAnalyzeCode(code);
  if(scanCheck.canonical) code=scannerNormalize(scanCheck.canonical);
  const purchase=parseInt(document.getElementById('scanNewPurchase').value,10)||0;
  const price=parseInt(document.getElementById('scanNewPrice').value,10)||0;
  const qty=Math.max(1, parseInt(document.getElementById('scanNewQty').value,10)||1);
  const location=document.getElementById('scanNewLocation').value.trim()||'Склад';
  const memory=document.getElementById('scanNewMemory').value.trim();
  const color=document.getElementById('scanNewColor').value.trim();
  const condition=document.getElementById('scanNewCondition').value;
  const minStock=Math.max(0, parseInt(document.getElementById('scanNewMinStock').value,10)||0);
  const warrantyDays=Math.max(0, parseInt(document.getElementById('scanNewWarranty').value,10)||0);
  const batteryPercentRaw=document.getElementById('scanNewBattery').value;
  const batteryPercent=batteryPercentRaw===''?'':Math.max(0, Math.min(100, parseInt(batteryPercentRaw,10)||0));
  const kit=document.getElementById('scanNewKit').value.trim();
  const comment=document.getElementById('scanNewComment').value.trim();
  const catalogSlug=document.getElementById('scanNewCatalogSlug')?.value.trim()||'';
  const catalogUrl=document.getElementById('scanNewCatalogUrl')?.value.trim()||'';
  const catalogImage=document.getElementById('scanNewCatalogImage')?.value.trim()||'';
  const catalogBrand=document.getElementById('scanNewCatalogBrand')?.value.trim()||'';
  if(!code || !model){ toast('Заполните код и название товара', 'error'); return; }
  if(!scanCheck.canCreate){ toast('Этот код не подходит для записи в базу. Пикните IMEI, серийник или товарный штрихкод.', 'error'); return; }
  if((tab==='tech'||tab==='tradein') && ['ean13','upc','gtin14','gs1','long_digits'].includes(scanCheck.type)){
    toast('Для техники нужен IMEI или серийный номер, а не общий товарный штрихкод.', 'error');
    return;
  }
  if(scannerFind(code)){ toast('Такой код уже есть в базе', 'error'); return; }
  const metadata={memory,color,condition,kit,warrantyDays,batteryPercent,comment,minStock,catalogSlug,catalogUrl,catalogImage,catalogBrand,source:catalogSlug?'imagnate_catalog':'manual'};
  const status=(condition==='check'||condition==='defect'||tab==='tradein')?'check':'instock';
  let item;
  if(tab==='tech'||tab==='tradein'){
    item={imei:code, model, purchase, price, status, location, lastPriceUpdateAt:DATA.today, hiddenFromSite:false, scannerTracked:true, scannedAt:DATA.today+' '+nowTime(), scannedBy:currentEmployeeName(), memory,color,condition,kit,warrantyDays,batteryPercent,comment,minStock,catalogSlug,catalogUrl,catalogImage,catalogBrand, metadata};
  } else {
    item={sku:code, model, purchase, price, status, location, qty, scannerTracked:true, scannedAt:DATA.today+' '+nowTime(), scannedBy:currentEmployeeName(), memory,color,condition,kit,warrantyDays,batteryPercent,comment,minStock,catalogSlug,catalogUrl,catalogImage,catalogBrand, metadata};
  }
  coreDbReceiveFromScan(tab, item, code);
  DATA.scannerStock[tab].push(item);
  const warehouseExists=(DATA.warehouse[tab]||[]).some(existing=>{
    const aliases=[existing.imei,existing.sku,existing.barcode,existing.labelCode].filter(Boolean).map(scannerNormalize);
    return aliases.includes(code);
  });
  if(!warehouseExists) DATA.warehouse[tab].push({...item});
  DATA.warehouseLedger=DATA.warehouseLedger||{};
  DATA.warehouseLedger[tab]=DATA.warehouseLedger[tab]||[];
  DATA.warehouseLedger[tab].unshift({date:DATA.today, main:'Скан-приёмка: '+model, val:purchase*(item.qty||1), by:currentEmployeeName()});
  const entry={tab,item,primary:scannerPrimaryCode(item),barcode:scannerCodeForItem(item)};
  scannerPushLog(code, entry, 'Товар внесён в базу');
  if(typeof lsSave==='function') lsSave();
  scannerSyncPostgres(tab, item, code).then(result=>{
    if(result?.ok) toast('Товар также сохранён в PostgreSQL', 'success');
  });
  closeModal();
  STATE.scannerLastCode=code;
  if(STATE.page==='scanner') renderPage();
  toast('Товар внесён в базу по коду: '+code, 'success');
}

            (r.lastCheckedAt?' · последняя проверка: '+r.lastCheckedAt:'')+'</div>'+
            '<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;">'+
              '<button class="btn btn-sm btn-primary" data-pre-found="'+r.id+'">Найден — указать цену</button>'+
              '<button class="btn btn-sm" data-pre-checked="'+r.id+'">Проверил сегодня, нет</button>'+
            '</div>';
        } else {
          html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;flex-wrap:wrap;gap:10px;">'+
            '<div>'+
              (r.price? '<div class="mono tname">Цена за ед.: '+rub(r.price)+'</div>' : '')+
              (noPrice? '<div class="tsub" style="color:var(--warning);">'+ic('alert')+' Закупочная не указана</div>'
                      : (r.purchasePrice? '<div class="tsub">Закупка: '+rub(r.purchasePrice)+'</div>':''))+
            '</div>'+
            purchaseActions(r)+
          '</div>'+
          (r.eta? '<div class="kpi-delta up" style="margin-top:10px;">'+ic('truck')+' Ожидаемое поступление: '+r.eta+'</div>' : '');
          if(noPrice && (STATE.role==='owner'||STATE.role==='senior')){
            html+='<div style="margin-top:8px;"><button class="btn btn-sm" data-set-cost="'+r.id+'">Указать закупочную цену</button></div>';
          }
        }
        html+='</div>';
      });
      html+='</div>';
    }
  }

  c.innerHTML=html;

  c.querySelectorAll('[data-pt]').forEach(el=>el.addEventListener('click',()=>{ STATE.purchaseTab=el.dataset.pt; renderPurchase(c); }));
  c.querySelectorAll('[data-pre-checked]').forEach(el=>el.addEventListener('click',()=>{
    const r=DATA.purchaseRequests.find(x=>x.id===parseInt(el.dataset.preChecked));
    if(r){ r.lastCheckedAt=DATA.today; toast('Отмечено: проверено '+DATA.today, 'info'); renderPurchase(c); }
  }));
  c.querySelectorAll('[data-pre-found]').forEach(el=>el.addEventListener('click',()=>openPreorderFoundModal(parseInt(el.dataset.preFound), c)));
  c.querySelectorAll('[data-set-cost]').forEach(el=>el.addEventListener('click',()=>openSetPurchasePriceModal(parseInt(el.dataset.setCost), c)));
  wireSuppliersTab(c);
  c.querySelectorAll('[data-pr-action]').forEach(el=>el.addEventListener('click',()=>handlePurchaseAction(el.dataset.prAction, parseInt(el.dataset.prId))));
}

function wireSuppliersTab(c){
  c.querySelectorAll('[data-toggle-sup]').forEach(el=>el.addEventListener('click',()=>{

    if(s){ s.active=!s.active; toast(s.name+(s.active?' включён':' отключён'),'info'); renderPurchase(c); }
  }));
  c.querySelectorAll('[data-edit-rates]').forEach(el=>el.addEventListener('click',()=>openPayoutRatesModal(el.dataset.editRates, c)));

      '<div class="field"><label>Ставка, ₽</label><input class="input-mini" type="number" data-rate-idx="'+i+'" value="'+pr.rate+'"></div>'+

function purchaseActions(r){
  const role=ROLES[STATE.role];
  if(r.status==='new') return '<button class="btn btn-sm btn-primary" data-pr-action="send" data-pr-id="'+r.id+'">Отправить в точку сбора</button>';
  if(r.status==='sent') return role.canPriceCollection? '<button class="btn btn-sm btn-primary" data-pr-action="price" data-pr-id="'+r.id+'">Указать закупочную цену</button>' : '<span class="tsub">'+ic('alert')+' Ожидает цену от сборщика</span>';
  if(r.status==='priced') return role.canConfirmPurchase? '<button class="btn btn-sm btn-primary" data-pr-action="confirm" data-pr-id="'+r.id+'">Подтвердить закуп</button>' : '<span class="tsub">'+ic('alert')+' Ожидает подтверждения магазина</span>';
  return '<span class="tsub">'+ic('check')+' Закуп подтверждён</span>';
}

function handlePurchaseAction(action, id){
  const r=DATA.purchaseRequests.find(x=>x.id===id);
  if(action==='send'){ r.status='sent'; toast('Заявка №'+id+' отправлена в точку сбора', 'info'); renderPurchase(document.getElementById('pageContent')); }
  else if(action==='price'){
    let body='<div class="field"><label>Закупочная цена за единицу</label><input class="input-mini" id="priceInput" style="width:100%;" type="number" placeholder="Например, 84000"></div>';
    openModal('Заявка №'+id, r.item, body, [{label:'Сохранить цену', cls:'btn-primary', action:()=>{
      const v=parseFloat(document.getElementById('priceInput').value);
      if(!v||v<=0){ toast('Укажите корректную цену', 'error'); return; }
      r.price=v; r.status='priced'; closeModal(); renderPurchase(document.getElementById('pageContent')); toast('Цена сохранена', 'success');
    }}]);
  } else if(action==='confirm'){
    r.status='confirmed';
    const d=new Date(); d.setDate(d.getDate()+3);
    r.eta=d.toLocaleDateString('ru-RU');
    renderPurchase(document.getElementById('pageContent'));
    toast('Закуп подтверждён. Ожидаемое поступление: '+r.eta, 'success');
  }
}

function collectionByStore(){
  const map={};
  DATA.financeOps.filter(f=>f.type==='Магазин → Точка сбора').forEach(f=>{
    const empName=f.who.split(' (')[0].trim();
    const emp=DATA.employees.find(e=>e.name===empName);
    const unit=emp? DATA.units.find(u=>u.id===emp.unit) : null;
    const store=unit? unit.name : 'Не определено';
    map[store]=(map[store]||0)+f.amount;
  });
  return map;
}
function renderCollection(c){
  const k=DATA.collection;
  const role=ROLES[STATE.role];
  let html='<div class="grid grid-4">';
  html+=kpiPlain('Денежные средства', rub(k.cash), 'wallet');
  html+=kpiPlain('Товарный остаток', rub(k.goods), 'box');
  html+=kpiPlain('Купленных устройств', num(k.devicesBought)+' шт.', 'purchase');
  html+=kpiPlain('Общая сумма закупок', rub(k.totalPurchases), 'analytics');
  html+='</div>';

  if(role.canPriceCollection){
    const byStore=collectionByStore();
    html+='<div class="section"><div class="section-title" style="margin-bottom:12px;">По магазинам — сколько прислали на закуп</div><div class="card">';
    Object.keys(byStore).forEach(store=>{
      html+='<div class="hist-row"><div class="h-main">'+store+'</div><div class="h-val mono">'+rub(byStore[store])+'</div></div>';
    });
    html+='</div></div>';
    const pending=DATA.purchaseRequests.filter(p=>p.status==='sent');
    if(pending.length){
      html+='<div class="section"><div class="section-title" style="margin-bottom:12px;">Что нужно собрать (ожидает цены)</div><div class="card">';
      pending.forEach(p=>{ html+='<div class="hist-row"><div><div class="h-main">'+p.item+' × '+p.qty+'</div><div class="h-sub">'+p.createdFrom+'</div></div></div>'; });
      html+='</div></div>';
    }
  }

  html+='<div class="section"><div class="section-title" style="margin-bottom:12px;">Движение денег и товара</div><div class="card">';
  k.history.forEach(h=>{
    html+='<div class="hist-row"><div><div class="h-main">'+h.text+'</div><div class="h-sub">'+h.date+'</div></div><div class="h-val mono" style="color:'+(h.dir==='in'?'var(--positive)':'var(--text-1)')+'">'+(h.dir==='in'?'+':'−')+rub(h.amount)+'</div></div>';
  });
  html+='</div></div>';
  c.innerHTML=html;
}

const ALL_STAGES=[...LEAD_STAGES, ...ARCHIVE_STAGES];
function stageById(id){ return ALL_STAGES.find(s=>s.id===id); }
function isArchived(l){ return l.stage==='won' || l.stage==='lost'; }

function channelBadge(ch){
  const c=CHANNELS[ch]||CHANNELS.phone;

function daysIdle(lead){
  const d=daysBetween(parseRuDate(lead.lastTouch), todayDate());
  return d==null?0:d;
}

/* ============================================================
   СИНХРОНИЗАЦИЯ С САЙТОМ — реальная (fetch), не демо.
   Сайт (форма) -> POST /api/lead -> сервер хранит.
   ERP -> GET /api/leads?since=N (+токен) -> новые лиды в воронку.
============================================================ */
const SITE_TOPICS={buy:'Покупка', tradein:'Трейд-ин', repair:'Ремонт', question:'Вопрос'};
const SITE_POLL_MS=60000;

function importSiteLeads(arr){
  let added=0;
  (arr||[]).forEach(s=>{
    if(s==null || s.id==null) return;
    const ext='site_'+s.id;
    if((DATA.leads||[]).some(l=>l.externalId===ext)) return;   // защита от дублей
    const topic=s.topic?(SITE_TOPICS[s.topic]||String(s.topic)):'';
    DATA.leads.unshift({
      id:Math.max(7000,...DATA.leads.map(l=>l.id))+1,
      channel:'site', externalId:ext, sourceUrl:'', source:'sync',
      name:String(s.name||'Без имени').slice(0,80),
      contact:String(s.phone||s.contact||'').slice(0,60),
      item:(topic+(s.item?(topic?': ':'')+String(s.item).slice(0,90):''))||'Заявка с сайта',
      stage:'new', owner:null,
      createdAt:DATA.today, lastTouch:DATA.today,
      msgs:s.comment?[{id:1,dir:'in',text:String(s.comment).slice(0,1000),at:DATA.today+' '+nowTime(),status:'sent'}]:[],
      unread:s.comment?1:0, notes:[],
    });
    const nid=parseInt(s.id);
    if(nid>(DATA.siteLastLeadId||0)) DATA.siteLastLeadId=nid;
    added++;
  });
  if(added){
    const int=integrationFor('site');
    if(int) int.synced=(int.synced||0)+added;
  }
  return added;
}

async function siteSyncNow(quiet){
  const int=integrationFor('site');
  if(!int || int.status==='disconnected' || !int.creds || !int.creds.apiUrl) return 0;
  try{
    const base=int.creds.apiUrl.replace(/\/+$/,'');
    /* Node-вариант: /leads?since=N ; PHP-вариант (api.php): ?action=leads&since=N */
    const url=/\.php$/i.test(base) ? base+'?action=leads&since='+(DATA.siteLastLeadId||0)
                                    : base+'/leads?since='+(DATA.siteLastLeadId||0);
    const r=await fetch(url,{headers:{'Authorization':'Bearer '+(int.creds.apiToken||'')}});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j=await r.json();
    int.status='connected'; int.error=null; int.lastSync=DATA.today+' '+nowTime();
    const added=importSiteLeads(Array.isArray(j)?j:(j.leads||[]));
    if(added){
      updateBellBadge();
      toast('Сайт: новых заявок — '+added,'success');
      if(STATE.page==='crm') renderPage();
    } else if(!quiet){
      toast('Сайт: новых заявок нет','info');
    }
    return added;
  }catch(e){
    int.status='error';
    int.error='Не удалось получить заявки ('+(e&&e.message?e.message:'ошибка сети')+'). Проверьте адрес API и токен.';
    if(!quiet){ toast('Сайт: ошибка синхронизации','error'); if(STATE.page==='crm') renderPage(); }
    return 0;
  }
}
/* Автоопрос раз в минуту, пока канал подключён */
setInterval(()=>{ try{ siteSyncNow(true); }catch(e){} }, SITE_POLL_MS);

    const leadsCount=(DATA.leads||[]).filter(l=>l.channel===ch).length;

    openModal('Отключить '+meta.label,'',body,[{label:'Отключить', cls:'btn-danger', action:()=>{
      const int=integrationFor(ch);
      if(int){ int.status='disconnected'; int.error=null; int.lastSync=null; int.account=null; int.creds=null; }
      closeModal(); renderCrm(c); toast(meta.label+' отключён','info');
    }}]);
  }));
  c.querySelectorAll('[data-sync-ch]').forEach(el=>el.addEventListener('click',()=>{

    toast(CHANNELS[ch].label+': синхронизировано','success');
  }));
}

function crmAiNormalize(s){ return String(s||'').toLowerCase().replace(/ё/g,'е').replace(/[^\wа-я0-9]+/g,' ').trim(); }
function crmAiProductTokens(s){ return crmAiNormalize(s).split(' ').filter(t=>t.length>1 && !CRM_AI_PRODUCT_STOP.has(t)); }
function crmAiProductRows(){
  const rows=[];
  const wh=DATA.warehouse||{};
  ['tech','tradein','accessories','parts'].forEach(kind=>(wh[kind]||[]).forEach(item=>{
    const name=item.model||item.name||item.title||'';
    if(name) rows.push({kind,name,price:item.price||0,qty:item.qty==null?1:item.qty,status:item.status||''});
  }));
  (DATA.siteCatalog||[]).forEach(item=>{
    const name=item.name||item.siteProductName||item.nazvanie||'';
    if(name) rows.push({kind:item.category||'catalog',name,price:item.price||0,qty:item.isHidden?0:1,status:item.isActive===false?'hidden':'catalog'});
  });
  return rows;
}
function crmAiFindProduct(text, allowedTabs){
  const qTokens=new Set(crmAiProductTokens(text));
  let best=null;
  crmAiProductRows().forEach(row=>{
    if(Array.isArray(allowedTabs) && !allowedTabs.includes(row.kind)) return;
    if(crmAgentModelMismatch(text,row.name)) return;
    const n=crmAiNormalize(row.name);
    const overlap=crmAiProductTokens(row.name).filter(w=>qTokens.has(w));
    const strong=overlap.filter(w=>w.length>=5 && /[a-zа-я]/i.test(w) && !/^\d+(gb|гб|tb|тб)?$/i.test(w));
    let score=overlap.length*18+strong.length*14;
    if(n.length>8 && crmAiNormalize(text).includes(n)) score+=100;
    if(!strong.length && overlap.length<2) score=0;
    if(score && (!best || score>best.score)) best={...row,score};
  });
  return best;
}
function crmAiKnowledgeRows(){
  const stored=Array.isArray(DATA.crmAiKnowledge)?DATA.crmAiKnowledge:[];
  /* Ответы Лёни из будущей таблицы должны иметь приоритет над базовым продавцом iMagnate. */
  return stored.concat(IMAGNATE_AGENT_PLAYBOOK, IMAGNATE_BASE_KNOWLEDGE);
}
function crmAiKnowledgeMatch(question,item){
  const hay=crmAiNormalize((question||'')+' '+(item||''));
  const weak=new Set(['и','а','в','во','на','по','для','или','с','со','мне','нам','вы','мы','же','ли','это']);
  const hayTokens=new Set(hay.split(' ').filter(t=>t.length>1 && !weak.has(t)));
  const detectedIntent=crmAgentIntent(question||'');
  let best=null;
  crmAiKnowledgeRows().forEach(k=>{
    if(k.status && k.status!=='active') return;
    const parts=[k.keyword,k.topic,k.item,k.question,k.intent,k.match,k.condition].concat(Array.isArray(k.tags)?k.tags:[], Array.isArray(k.keywords)?k.keywords:[]);
    let score=0;
    parts.forEach(part=>{
      const key=crmAiNormalize(part||'');
      if(!key) return;
      if(key.length>3 && hay.includes(key)) score+=45;
      key.split(' ').filter(t=>t.length>1 && !weak.has(t)).forEach(t=>{ if(hayTokens.has(t)) score+=t.length>=5?12:6; });
    });
    if(k.item && item && crmAiNormalize(item).includes(crmAiNormalize(k.item))) score+=20;
    const entryIntent=crmAiNormalize(k.intent||'');
    if(score>0 && entryIntent){
      if(entryIntent===detectedIntent.id) score+=40;
      else if(k.source==='imagnate_playbook') score=0;
      else score-=35;
    }
    if(score>0){
      score+=Number(k.priority||0);
      if(k.source && !['imagnate_base','imagnate_playbook'].includes(k.source)) score+=70;
    }
    if(score>0 && (!best || score>best.score)) best={entry:k,score};
  });
  return best && best.score>=18 ? best.entry : null;
}
function crmAiRenderAnswer(answer,item,question,pack){
  const product=pack?.product || crmAiFindProduct((item||'')+' '+(question||''), pack?.allowedTabs);
  const name=product?product.name:(item||'интересующая позиция');
  const price=product&&product.price?rub(product.price):'уточним по базе';
  const pricePhrase=product&&product.price?'Цена сейчас '+rub(product.price)+'.':'Точную цену уточним по базе.';
  const availability=pack?.availability;
  const stock=availability
    ? (availability.level==='ok'?'есть в наличии: '+availability.detail:availability.label+' — '+availability.detail)
    : (product&&product.qty>0&&product.status!=='hidden'?'есть в базе магазина':'нужно проверить по наличию');
  const next=pack?.decision?.level==='safe'
    ? 'Можем проверить конкретную единицу, комплектацию и поставить в резерв.'
    : 'Уточню детали по базе и вернусь с точным ответом.';
  const address=(typeof getCurrentStore==='function'&&getCurrentStore())?getCurrentStore().name:'магазин iMagnate';
  const card=pack?.card || crmAgentProductCard(product||{name});
  const storeList=(typeof STORES!=='undefined'&&Array.isArray(STORES))?STORES.map(s=>s.shortName||s.name).join(', '):address;
  return String(answer||'')
    .replaceAll('{товар}',name)
    .replaceAll('{товар_вид}',card.kind||'товар')
    .replaceAll('{комплект}',card.kit||'комплектацию нужно сверить по карточке')
    .replaceAll('{цена}',price)
    .replaceAll('{цена_фраза}',pricePhrase)
    .replaceAll('{наличие}',stock)
    .replaceAll('{остаток}',stock)
    .replaceAll('{адрес}',address)
    .replaceAll('{магазины}',storeList)
    .replaceAll('{оплата}','наличные, карта, перевод или другой доступный способ по конкретной покупке')
    .replaceAll('{получение}','самовывоз из магазина или доставка по согласованным условиям')
    .replaceAll('{следующий_шаг}',next)
    .replaceAll('{тон}',IMAGNATE_SELLER_AGENT.tone);
}
function crmAiDraftAnswer(question,item,lead){

  const allowedTabs=crmAgentAllowedTabsForQuery(question,item,intent);
  const product=crmAiFindProduct((item||'')+' '+question, allowedTabs);

function crmAgentIntent(text){
  const q=crmAiNormalize(text);
  if(/сканер|штрих|barcode|imei|серийн|пропик|внести в баз|маркиров/.test(q)) return {id:'internal', label:'Склад', step:'проверить код и внести товар в базу'};

  if(/авито|объявлен|витрин|модерац|публикац/.test(q)) return {id:'avito', label:'Авито', step:'сверить объявление и карточку товара'};
  if(/сравн|выбрат|посовет|лучше|отлич/.test(q)) return {id:'compare', label:'Подбор', step:'уточнить бюджет и приоритеты клиента'};
  if(/trade|трейд|обмен|выкуп|сдать/.test(q)) return {id:'tradein', label:'Trade-in', step:'оценить устройство клиента'};
  if(/ремонт|почин|замен|диагност|сервис/.test(q)) return {id:'repair', label:'Ремонт', step:'передать в сервис'};
  if(/вернуть|возврат|обменять|не понрав|проблема после/.test(q)) return {id:'trust', label:'Гарантия', step:'проверить условия гарантии'};
  if(/оплат|карт|наличн|перевод|рассроч|кредит/.test(q)) return {id:'payment', label:'Оплата', step:'подсказать доступные способы оплаты'};
  if(/скид|дешев|торг|акци|уступ/.test(q)) return {id:'discount', label:'Цена', step:'проверить актуальные условия'};
  if(/резерв|отлож|заброни/.test(q)) return {id:'reserve', label:'Резерв', step:'проверить свободный остаток'};
  if(/описан|характер|комплект|состояни|фото/.test(q)) return {id:'card', label:'Карточка', step:'дать описание и комплектацию'};
  if(/гарант|оригинал|провер/.test(q)) return {id:'trust', label:'Проверка', step:'подтвердить гарантию и проверку'};
  if(/достав|самовывоз|курьер|адрес/.test(q)) return {id:'delivery', label:'Выдача', step:'уточнить способ получения'};
  if(/цен|сколько|налич|есть|купить|заказ|резерв/.test(q)) return {id:'buy', label:'Покупка', step:'проверить наличие и цену'};
  return {id:'question', label:'Вопрос', step:'ответить и уточнить детали'};
}

function crmAgentIphoneSignature(text){
  const n=crmAiNormalize(text);
  const m=n.match(/\biphone\s*(se|xr|xs|\d{1,2})\b/);
  if(!m) return null;
  let tier='base';
  if(/\bpro\s*max\b/.test(n)) tier='pro_max';
  else if(/\bpro\b/.test(n)) tier='pro';
  else if(/\bplus\b/.test(n)) tier='plus';
  else if(/\bmini\b/.test(n)) tier='mini';
  return {family:'iphone', gen:m[1], tier};
}
function crmAgentSamsungSignature(text){
  const n=crmAiNormalize(text);
  const m=n.match(/\b(?:samsung|galaxy)\s*(s\d{2}|a\d{2}|z\s*fold\s*\d|z\s*flip\s*\d)\b/);
  if(!m) return null;
  const model=m[1].replace(/\s+/g,'');
  const ultra=/\bultra\b/.test(n);
  const plus=/\bplus\b|\+\b/.test(n);
  return {family:'samsung', gen:model, tier:ultra?'ultra':(plus?'plus':'base')};
}
function crmAgentSimpleSignature(text){
  const n=crmAiNormalize(text);
  let m=n.match(/\b(?:playstation|ps)\s*([45])\b/);
  if(m) return {family:'playstation', gen:m[1], tier:/\bslim\b/.test(n)?'slim':(/pro\b/.test(n)?'pro':'base')};
  m=n.match(/\bxbox\s*(series\s*[sx]|one|360)?\b/);
  if(m && m[0].trim()!=='xbox') return {family:'xbox', gen:(m[1]||'base').replace(/\s+/g,''), tier:'base'};
  m=n.match(/\bairpods\s*(pro)?\s*(\d|2|3|4)?\b/);
  if(m && m[0].trim()!=='airpods') return {family:'airpods', gen:m[2]||'base', tier:m[1]?'pro':'base'};
  m=n.match(/\bapple\s*watch\s*(ultra|se|series)?\s*(\d+)?\b/);
  if(m && m[0].trim()!=='apple watch') return {family:'apple_watch', gen:m[2]||m[1]||'base', tier:m[1]||'base'};
  m=n.match(/\bmacbook\s*(air|pro)?\s*(m\d)?\b/);
  if(m && m[0].trim()!=='macbook') return {family:'macbook', gen:m[2]||'base', tier:m[1]||'base'};
  m=n.match(/\bipad\s*(air|pro|mini)?\s*(m\d|\d+)?\b/);
  if(m && m[0].trim()!=='ipad') return {family:'ipad', gen:m[2]||'base', tier:m[1]||'base'};
  m=n.match(/\b(?:xiaomi|redmi)\s*(note\s*\d+\s*pro|note\s*\d+|\d+\s*pro|\d+)?\b/);
  if(m && !['xiaomi','redmi'].includes(m[0].trim())) return {family:'xiaomi', gen:(m[1]||'base').replace(/\s+/g,''), tier:/pro\b/.test(n)?'pro':'base'};
  m=n.match(/\bdyson\s*(airwrap|supersonic|corrale|v\d+)?\b/);
  if(m && m[0].trim()!=='dyson') return {family:'dyson', gen:m[1]||'base', tier:'base'};
  return null;
}
function crmAgentProductSignature(text){
  return crmAgentIphoneSignature(text) || crmAgentSamsungSignature(text) || crmAgentSimpleSignature(text);
}
function crmAgentModelMismatch(seed,name){
  const a=crmAgentProductSignature(seed);
  const b=crmAgentProductSignature(name);
  if(!a||!b||a.family!==b.family) return false;
  if(a.gen!==b.gen) return true;
  if(a.tier!==b.tier && (a.tier!=='base'||b.tier!=='base')) return true;
  return false;
}
function crmAgentScore(seed,name){
  if(crmAgentModelMismatch(seed,name)) return 0;
  const qTokens=new Set(crmAiProductTokens(seed));
  const nTokens=crmAiProductTokens(name);
  const overlap=nTokens.filter(w=>qTokens.has(w));
  const strong=overlap.filter(w=>w.length>=4 && !/^\d+(gb|гб|tb|тб)?$/i.test(w));
  let score=overlap.length*16+strong.length*18;
  const q=crmAiNormalize(seed), n=crmAiNormalize(name);
  if(n.length>6 && q.includes(n)) score+=120;
  if(!strong.length && overlap.length<2) score=0;
  return score;
}
function crmAgentAllowedTabsForQuery(text,itemText,intent){
  const q=crmAiNormalize(((itemText||'')+' '+(text||'')).trim());
  const hasPartWords=/запчаст|дисплей|модул|экран|аккумулят|батаре|шлейф|разъ[её]м|камера|динамик|микрофон|плата|корпус|тач|кнопк/.test(q);
  const hasAccessoryWords=/чехол|кабель|заряд|адаптер|magsafe|ремеш|защитн|стекло|пленк/.test(q);
  const hasRepairWords=/ремонт|почин|замен|диагност|сервис|разбит|не работает|не включ/.test(q);
  const hasDevice=!!crmAgentProductSignature(q);
  const asksWholeDevice=hasDevice && /оригинал|работа|работает|true tone|face id|состояни|царап|скол|емкост|износ|комплект|гарант|провер/.test(q);
  if(hasPartWords && !asksWholeDevice) return ['parts'];
  if(hasAccessoryWords && !hasRepairWords) return ['accessories','catalog'];
  return ['tech','tradein','catalog'];
}
function crmAgentResolveProduct(text,itemText,intent){
  const seed=((itemText||'')+' '+(text||'')).trim();
  const q=crmAiNormalize(seed);
  if(intent?.id==='tradein' && !(itemText||'').trim() && /сдать|свой|мой|мо[её]|выкуп|оцен/.test(q)) return null;
  const allowedTabs=crmAgentAllowedTabsForQuery(text,itemText,intent);
  const rows=crmAgentStockRows()
    .filter(row=>allowedTabs.includes(row.tab))
    .map(row=>({...row,allowedTabs,score:crmAgentScore(seed,row.name)}))
    .filter(row=>row.score>0)
    .sort((a,b)=>b.score-a.score);
  if(rows.length) return rows[0];
  const p=crmAiFindProduct(seed, allowedTabs);
  if(p) return {tab:p.kind||'catalog', tabLabel:WH_TABS[p.kind]||'Каталог', item:p, name:p.name, code:'', price:p.price||0, qty:p.qty||0, status:p.status||'', location:'', allowedTabs};
  return null;
}
function crmAgentAvailability(product){
  if(!product) return {level:'unknown', label:'товар не распознан', detail:'нужно уточнить модель'};
  const seed=product.name;
  const allowedTabs = product.allowedTabs || (product.tab==='tech' ? ['tech','tradein'] : (WH_TABS[product.tab] ? [product.tab] : null));
  const sourceRows=crmAgentStockRows().filter(row=>!allowedTabs || allowedTabs.includes(row.tab));
  const seedNorm=crmAiNormalize(seed);
  const matches=sourceRows.map(row=>({...row,score:crmAgentScore(seed,row.name)}))
    .filter(row=>{
      const rowNorm=crmAiNormalize(row.name);
      const sameCode=product.code && row.code && product.code===row.code;
      const sameName=rowNorm===seedNorm || rowNorm.includes(seedNorm) || seedNorm.includes(rowNorm);
      return sameCode || sameName || row.score>=72;
    });
  const available=matches.filter(row=>['free','instock','low','catalog'].includes(row.status) && row.qty>0);
  const reserved=matches.filter(row=>row.status==='reserved');
  const checking=matches.filter(row=>row.status==='check');
  if(available.length){
    const qty=available.reduce((s,row)=>s+(row.qty||1),0);
    const loc=[...new Set(available.map(row=>row.location).filter(Boolean))].slice(0,2).join(', ');
    return {level:'ok', label:'есть', detail:(qty>1?qty+' шт.':'1 шт.')+(loc?' · '+loc:''), rows:available};
  }
  if(checking.length) return {level:'warn', label:'на проверке', detail:'нужно дождаться диагностики', rows:checking};
  if(reserved.length) return {level:'warn', label:'занят резервом', detail:'есть в базе, но не свободен', rows:reserved};
  return {level:'bad', label:'нет свободного остатка', detail:'можно оформить под заказ или закуп', rows:matches};
}
function crmAgentProductCard(product){
  const name=product?.name||'товар';
  const n=crmAiNormalize(name);
  let kind='устройство';
  if(/запчаст|дисплей|модул|аккумулятор|шлейф|разъем|разъём|плата|тач/.test(n)) kind='запчасть';
  else if(/airpods|наушник/.test(n)) kind='наушники';
  else if(/playstation|xbox|ps5/.test(n)) kind='игровая приставка';
  else if(/dyson/.test(n)) kind='техника Dyson';
  else if(/macbook|imac|mac mini|mac studio/.test(n)) kind='компьютер Apple';
  else if(/iphone|samsung|xiaomi|redmi|galaxy/.test(n)) kind='смартфон';
  else if(/чехол|стекло|кабель|заряд/.test(n)) kind='аксессуар';
  const kit=/запчаст|дисплей|модул|аккумулятор|шлейф|разъем|разъём|плата|тач/.test(n)?'SKU, совместимость, состояние и партия':(/чехол|стекло|кабель|заряд/.test(n)?'упаковка / SKU / совместимость':'коробка, комплект, гарантия, проверка перед выдачей');
  return {
    kind,
    kit,
    text:name+' — '+kind+'. Перед выдачей важно сверить модель, комплектацию, состояние и код товара.'
  };
}
function crmAgentReply(pack, lead){
  const product=pack.product;
  const name=product?.name || (lead?.item||'эту позицию');
  const price=product?.price ? ' Цена сейчас '+rub(product.price)+'.' : '';
  const known=crmAiKnowledgeMatch(pack.question, name);
  if(known&&known.answer) return crmAiRenderAnswer(known.answer, name, pack.question, pack);
  if(pack.intent.id==='internal') return 'Для сотрудника: по этому вопросу нужно сверить раздел в системе и не отправлять ответ клиенту без проверки. Если это склад — сканируем код и сохраняем позицию. Если смена — сверяем кассу, расходы, инкассацию и фактический остаток.';
  if(pack.intent.id==='avito') return 'Здравствуйте! По объявлению на Авито сначала сверим актуальность карточки, наличие, цену и фото по конкретной позиции.'+price+' Если товар свободен, можем подсказать, как удобнее оформить покупку.';
  if(pack.intent.id==='compare') return 'Здравствуйте! Поможем выбрать. Напишите, пожалуйста, бюджет и что важнее: камера, батарея, память, состояние или цена. Тогда сравним конкретные варианты по базе и подберём лучший.';
  if(pack.intent.id==='tradein') return 'Здравствуйте! Можем рассмотреть trade-in или выкуп. Пришлите, пожалуйста, модель, память, состояние, процент аккумулятора, комплект и несколько фото — после этого сориентируем по оценке.';
  if(pack.intent.id==='repair') return 'Здравствуйте! По ремонту нужно понять модель устройства и неисправность. Напишите, пожалуйста, что именно случилось, включается ли устройство и был ли уже ремонт — передам мастеру на оценку.';
  if(pack.intent.id==='payment') return 'Здравствуйте! По оплате подскажем доступные варианты при оформлении: наличные, карта, перевод или другие условия, если они доступны по конкретной покупке.';
  if(pack.intent.id==='discount') return 'Здравствуйте! По '+name+' можем проверить актуальную цену и условия.'+price+' Если доступна акция или резерв по текущей цене, продавец сразу подскажет.';
  if(pack.intent.id==='card') return 'Здравствуйте! '+pack.card.text+' Комплектация: '+pack.card.kit+'.'+price+' Могу дополнительно уточнить наличие и подготовить фото.';
  if(pack.availability.level==='ok') return 'Здравствуйте! '+name+' есть в базе магазина: '+pack.availability.detail+'.'+price+' Можем проверить конкретную единицу, комплектацию и поставить в резерв.';
  if(pack.availability.level==='warn') return 'Здравствуйте! '+name+' сейчас '+pack.availability.label+' — '+pack.availability.detail+'.'+price+' Я уточню по базе и подскажу, можно ли выдать или нужно подобрать другой вариант.';
  if(pack.availability.level==='bad') return 'Здравствуйте! По '+name+' свободного остатка сейчас не вижу. Можем уточнить поступление, оформить под заказ или подобрать ближайший вариант.';
  return 'Здравствуйте! Подскажу по '+name+'. Чтобы ответ был точным, нужно сверить карточку, наличие, цену, состояние и комплект. Если вопрос срочный, продавец проверит базу и вернётся с подтверждением.';
}
function crmAgentDecision(pack){
  if(!pack.product && pack.intent.id==='payment') return {level:'safe', label:'можно ответить', hint:'общий вопрос без привязки к товару'};
  if(pack.intent.id==='internal') return {level:'manual', label:'внутренний вопрос', hint:'не отправлять клиенту без проверки'};
  if(!pack.product) return {level:'manual', label:'уточнить товар', hint:'агент не понял конкретную позицию'};
  if(pack.intent.id==='tradein') return {level:'manual', label:'нужна оценка', hint:'попросить фото и параметры устройства'};
  if(pack.intent.id==='repair') return {level:'manual', label:'нужен мастер', hint:'передать описание неисправности'};
  if(pack.availability.level==='ok') return {level:'safe', label:'можно ответить', hint:'но перед отправкой продавец проверяет текст'};
  if(pack.availability.level==='warn') return {level:'check', label:'проверить вручную', hint:'товар есть, но не свободен'};
  if(pack.availability.level==='bad') return {level:'check', label:'предложить альтернативу', hint:'свободного остатка не видно'};
  return {level:'manual', label:'проверить вручную', hint:'нужно уточнить детали'};
}
function crmAgentAnalyzeLead(lead){
  const question=crmAiLastIncomingQuestion(lead);
  const intent=crmAgentIntent(question+' '+(lead?.item||''));
  const allowedTabs=crmAgentAllowedTabsForQuery(question, lead?.item, intent);
  const resolvedProduct=crmAgentResolveProduct(question, lead?.item, intent);
  const leadItem=(lead?.item||'').trim();
  const product=resolvedProduct || (leadItem?{name:leadItem, price:0, qty:0, status:'lead_item', allowedTabs}:null);
  const availability=resolvedProduct
    ? crmAgentAvailability(resolvedProduct)
    : (leadItem?{level:'unknown', label:'по заявке', detail:'нужно сверить с базой', rows:[]}:crmAgentAvailability(null));
  const card=crmAgentProductCard(product);
  const pack={question,intent,product,availability,card,next:intent.step,allowedTabs};
  pack.reply=crmAgentReply(pack, lead);
  pack.decision=crmAgentDecision(pack);
  return pack;
}
function crmAgentCanAutoDraft(lead){
  const msgs=lead?.msgs||[];
  if(!msgs.length) return false;
  return msgs[msgs.length-1].dir==='in';
}
function crmAgentAutoDraftForLead(lead){
  if(!crmAgentCanAutoDraft(lead)) return {text:'', pack:null, active:false};
  const pack=crmAgentAnalyzeLead(lead);
  lead.ai=lead.ai||{};
  const real=lead.ai.lastRealDraft;
  if(real && real.question===pack.question && real.text){
    lead.ai.lastDraft={
      source:'OpenAI iMagnate Agent',
      mode:'openai',
      intent:pack.intent.id,
      product:pack.product?.name||'',
      availability:pack.availability.label,
      decision:pack.decision.label,
      text:real.text,
      at:real.at||DATA.today+' '+nowTime()
    };
    return {text:real.text, pack, active:true};
  }
  lead.ai.lastDraft={
    source:IMAGNATE_SELLER_AGENT.name,
    mode:'auto',
    intent:pack.intent.id,
    product:pack.product?.name||'',
    availability:pack.availability.label,
    decision:pack.decision.label,
    text:pack.reply,
    at:DATA.today+' '+nowTime()
  };
  return {text:pack.reply, pack, active:true};
}

const CRM_REAL_AI_ENDPOINT_LOCAL='http://127.0.0.1:3000/api/ai/reply';
const CRM_REAL_AI_STATE={pending:new Map(),disabledUntil:0};

function crmAgentDefaultAiEndpoint(){
  if(typeof location==='undefined') return CRM_REAL_AI_ENDPOINT_LOCAL;
  const isHttp=location.protocol==='http:'||location.protocol==='https:';
  if(!isHttp) return CRM_REAL_AI_ENDPOINT_LOCAL;
  const isLocal=location.hostname==='127.0.0.1'||location.hostname==='localhost';
  if(isLocal) return location.protocol+'//'+location.hostname+':3000/api/ai/reply';
  return location.origin+'/api/ai/reply';
}
function crmAgentRealAiEndpoint(){
  try{
    const fallback=crmAgentDefaultAiEndpoint();
    return (localStorage.getItem('storeControlAiEndpoint')||fallback).trim()||fallback;
  }catch(e){
    return crmAgentDefaultAiEndpoint();
  }
}
function crmAgentKnowledgeForApi(pack,lead){
  const seed=crmAiNormalize((pack?.question||'')+' '+(lead?.item||'')+' '+(pack?.product?.name||''));
  const tokens=new Set(seed.split(' ').filter(t=>t.length>2));
  return crmAiKnowledgeRows().map(k=>{
    const key=crmAiNormalize([k.topic,k.intent,k.keyword,k.question,k.item,(k.tags||[]).join(' ')].join(' '));
    let score=0;
    key.split(' ').forEach(t=>{ if(tokens.has(t)) score+=t.length>=5?2:1; });
    if(k.intent && pack?.intent?.id && k.intent===pack.intent.id) score+=8;
    if(k.source && !['imagnate_base','imagnate_playbook'].includes(k.source)) score+=12;
    return {k,score};
  }).filter(x=>x.score>0)
    .sort((a,b)=>b.score-a.score)
    .slice(0,24)
    .map(x=>({
      topic:x.k.topic||x.k.intent||x.k.question||'правило',
      intent:x.k.intent||'',
      item:x.k.item||'',
      answer:x.k.answer||''
    }));
}
function crmAgentStockForApi(){
  return crmAgentStockRows().slice(0,90).map(row=>({
    name:row.name,
    tab:row.tabLabel||row.tab,
    price:row.price||0,
    qty:row.qty==null?1:row.qty,
    status:row.status||'',
    location:row.location||''
  }));
}
function crmAgentBuildApiPayload(lead,localDraft){
  const pack=crmAgentAnalyzeLead(lead);
  const product=pack.product||{};
  return {
    question:pack.question,
    item:lead?.item||product.name||'',
    channel:lead?.channel||'crm',
    customer:lead?.name||'Клиент',
    localDraft:localDraft||pack.reply||'',
    intent:pack.intent,
    lead:{
      id:lead?.id||null,
      name:lead?.name||'Клиент',
      channel:lead?.channel||'crm',
      item:lead?.item||''
    },
    product:{
      name:product.name||lead?.item||'',
      price:product.price||0,
      qty:product.qty||0,
      status:product.status||'',
      tab:product.tabLabel||product.tab||''
    },
    availability:{
      level:pack.availability?.level||'unknown',
      label:pack.availability?.label||'',
      detail:pack.availability?.detail||''
    },
    stock:crmAgentStockForApi(),
    knowledge:crmAgentKnowledgeForApi(pack,lead)
  };
}
async function crmAgentFetchRealAi(lead,localDraft){
  if(Date.now()<CRM_REAL_AI_STATE.disabledUntil) return null;
  const payload=crmAgentBuildApiPayload(lead,localDraft);
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(),18000);
  try{
    const response=await fetch(crmAgentRealAiEndpoint(),{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload),
      signal:controller.signal
    });
    const data=await response.json().catch(()=>({ok:false,error:'Пустой ответ AI-сервера'}));
    if(response.ok && data.ok && data.text) return String(data.text).trim();
    if(response.status===503) CRM_REAL_AI_STATE.disabledUntil=Date.now()+60000;
    throw new Error(data.error||'AI-сервер не ответил');
  }finally{
    clearTimeout(timer);
  }
}
function crmAgentHydrateRealAi(lead){
  if(!lead||!crmAgentCanAutoDraft(lead)||typeof fetch!=='function') return;
  const input=document.getElementById('msgInput');
  if(!input) return;
  const question=crmAiLastIncomingQuestion(lead);
  if(lead.ai?.lastRealDraft?.question===question && lead.ai.lastRealDraft.text){
    input.value=lead.ai.lastRealDraft.text;
    return;
  }
  const fallback=input.value;
  if(!fallback) return;
  const requestKey=[lead.id||'lead',question,fallback].join('|');
  if(lead.ai?.lastRealDraft?.key===requestKey){
    input.value=lead.ai.lastRealDraft.text;
    return;
  }
  if(CRM_REAL_AI_STATE.pending.get(lead.id)===requestKey) return;
  CRM_REAL_AI_STATE.pending.set(lead.id,requestKey);
  crmAgentFetchRealAi(lead,fallback).then(text=>{
    if(!text) return;
    if(STATE.inboxLead!==lead.id) return;
    const current=document.getElementById('msgInput');
    if(!current) return;
    if(current.value!==fallback) return;
    lead.ai=lead.ai||{};
    lead.ai.lastRealDraft={
      key:requestKey,
      question,
      text,
      at:DATA.today+' '+nowTime()
    };
    lead.ai.lastDraft={
      source:'OpenAI iMagnate Agent',
      mode:'openai',
      text,
      at:DATA.today+' '+nowTime()
    };
    current.value=text;
    if(typeof lsSave==='function') lsSave();
  }).catch(e=>{
    console.warn('AI agent fallback:', e.message||e);
  }).finally(()=>{
    if(CRM_REAL_AI_STATE.pending.get(lead.id)===requestKey) CRM_REAL_AI_STATE.pending.delete(lead.id);
  });
}

function totalUnread(){ return (DATA.leads||[]).reduce((s,l)=>s+leadUnread(l),0); }
function lastMsg(l){

function renderInbox(c, html){
  const all=(DATA.leads||[]).filter(l=>!['lost'].includes(l.stage));
  if(!STATE.inboxQuery) STATE.inboxQuery='';
  const q=STATE.inboxQuery.toLowerCase().trim();

  let convs=all.filter(l=>(l.msgs||[]).length || l.stage==='new');
  if(STATE.inboxUnreadOnly) convs=convs.filter(l=>leadUnread(l)>0);
  if(q) convs=convs.filter(l=>(l.name||'').toLowerCase().includes(q)||(l.item||'').toLowerCase().includes(q));

  /* Непрочитанные сверху, потом по свежести */
  convs.sort((a,b)=>{
    const ua=leadUnread(a)>0?1:0, ub=leadUnread(b)>0?1:0;
    if(ua!==ub) return ub-ua;
    return daysIdle(a)-daysIdle(b);
  });

  if(!STATE.inboxLead && convs.length) STATE.inboxLead=convs[0].id;
  const active=(DATA.leads||[]).find(l=>l.id===STATE.inboxLead);

  html+='<div class="toolbar" style="gap:10px;flex-wrap:wrap;">'+
    '<button class="btn btn-sm '+(STATE.inboxUnreadOnly?'btn-primary':'')+'" id="inboxUnread">'+
      'Только непрочитанные'+(totalUnread()?' ('+totalUnread()+')':'')+'</button>'+
    '<input class="input-mini" id="inboxSearch" placeholder="Поиск по диалогам" value="'+escAttr(STATE.inboxQuery)+'" style="width:220px;">'+
    '<div class="topbar-spacer"></div>'+
    '<span class="tsub">'+convs.length+' диалогов</span>'+
  '</div>';

  html+='<div class="inbox">';

  /* Левая панель — список диалогов */
  html+='<div class="inbox-list">';
  if(!convs.length){
    html+='<div class="kan-empty">Диалогов нет</div>';
  } else {
    convs.forEach(l=>{
      const lm=lastMsg(l);
      const un=leadUnread(l);
      const isActive=l.id===STATE.inboxLead;
      html+='<div class="inbox-item'+(isActive?' active':'')+(un?' unread':'')+'" data-conv="'+l.id+'">'+
        '<div class="inbox-item-top">'+
          channelBadge(l.channel)+
          '<span class="inbox-name">'+escHtml(l.name)+'</span>'+
          (un?'<span class="inbox-badge">'+un+'</span>':'')+
        '</div>'+
        '<div class="inbox-preview">'+escHtml(lm?(lm.dir==='out'?'Вы: ':'')+lm.text.slice(0,52):'— нет сообщений —')+'</div>'+
        '<div class="inbox-meta">'+escHtml(l.item||'')+'</div>'+
      '</div>';
    });
  }
  html+='</div>';

  /* Правая панель — переписка */
  html+='<div class="inbox-chat">';
  if(!active){
    html+='<div class="kan-empty" style="margin:auto;">Выберите диалог</div>';
  } else {
    const ch=CHANNELS[active.channel]||CHANNELS.phone;
    const stage=stageById(active.stage);

    html+='<div class="chat-head">'+
      '<div>'+
        '<div class="tname" style="font-size:14.5px;">'+escHtml(active.name)+'</div>'+
        '<div class="tsub">'+channelBadge(active.channel)+' '+ch.label+' · '+escHtml(active.contact||'')+
          ' · <span class="badge b-grey">'+(stage?stage.label:'')+'</span></div>'+
      '</div>'+
      '<div style="display:flex;gap:6px;">'+
        '<button class="btn btn-sm" data-open-lead="'+active.id+'">Карточка</button>'+
        (active.sourceUrl?'<a class="btn btn-sm" href="'+escAttr(active.sourceUrl)+'" target="_blank" rel="noopener">В '+ch.label+'</a>':'')+
      '</div>'+
    '</div>';

    html+='<div class="chat-body" id="chatBody">';
    const msgs=active.msgs||[];
    if(!msgs.length){
      html+='<div class="kan-empty">Переписки пока нет</div>';
    } else {
      msgs.forEach(m=>{
        const out=m.dir==='out';
        html+='<div class="msg'+(out?' out':'')+'">'+
          '<div class="msg-bubble'+(m.status==='pending'?' pending':'')+(m.status==='failed'?' failed':'')+'">'+
            escHtml(m.text)+
            '<div class="msg-meta">'+m.at+
              (out&&m.author?' · '+escHtml(m.author):'')+
              (m.status==='pending'?' · <span style="color:var(--warning);">отправляется…</span>':'')+
              (m.status==='failed'?' · <span style="color:var(--negative);">не отправлено</span>':'')+
            '</div>'+
          '</div></div>';
      });
    }
    html+='</div>';

    /* Быстрые ответы */
    html+='<div class="chat-quick">'+
      QUICK_REPLIES.map((r,i)=>'<button class="btn btn-sm" data-quick="'+i+'">'+r.label+'</button>').join('')+
    '</div>';

    /* Композер */
    const autoDraft=crmAgentAutoDraftForLead(active);
    html+='<div class="chat-composer">'+
      '<textarea id="msgInput" class="textarea-mini" rows="2" placeholder="Написать в '+ch.label+'…" style="flex:1;font-family:inherit;resize:none;">'+escHtml(autoDraft.text)+'</textarea>'+
      '<div style="display:flex;flex-direction:column;gap:8px;min-width:130px;">'+
        '<button class="btn btn-primary" id="msgSend">Отправить</button>'+
      '</div>'+
    '</div>';

    const int=integrationFor(active.channel);
    if(active.channel!=='phone' && active.channel!=='store' && (!int||int.status!=='connected')){
      html+='<div class="tsub" style="padding:6px 12px;color:var(--warning);">'+ic('alert')+
        ' Канал '+ch.label+' не подключён — сообщение не уйдёт клиенту.</div>';
    }
  }
  html+='</div></div>';

  c.innerHTML=html;

  c.querySelectorAll('[data-crmtab]').forEach(el=>el.addEventListener('click',()=>{ STATE.crmTab=el.dataset.crmtab; renderCrm(c); }));
  wireCrmQuickAiOrderButton(c);
  c.querySelectorAll('[data-conv]').forEach(el=>el.addEventListener('click',()=>{
    const l=(DATA.leads||[]).find(x=>x.id===parseInt(el.dataset.conv));
    if(l) l.unread=0;                 // открыли — прочитано
    STATE.inboxLead=parseInt(el.dataset.conv);
    renderCrm(c);
  }));
  c.querySelectorAll('[data-open-lead]').forEach(el=>el.addEventListener('click',()=>openLeadModal(parseInt(el.dataset.openLead), c)));

  const unBtn=document.getElementById('inboxUnread');
  if(unBtn) unBtn.addEventListener('click',()=>{ STATE.inboxUnreadOnly=!STATE.inboxUnreadOnly; renderCrm(c); });

  const isr=document.getElementById('inboxSearch');
  if(isr) isr.addEventListener('input',()=>{
    STATE.inboxQuery=isr.value; renderCrm(c);
    const s=document.getElementById('inboxSearch');
    if(s){ s.focus(); s.setSelectionRange(s.value.length, s.value.length); }
  });

  /* Быстрые ответы подставляются в поле */
  c.querySelectorAll('[data-quick]').forEach(el=>el.addEventListener('click',()=>{
    const inp=document.getElementById('msgInput');
    if(!inp||!active) return;
    let t=QUICK_REPLIES[parseInt(el.dataset.quick)].text;
    t=t.replace('{адрес}', getCurrentStore().name).replace('{цена}', '—');
    inp.value=t; inp.focus();
  }));

  const send=document.getElementById('msgSend');
  if(send) send.addEventListener('click',()=>sendMessage(active, c));
  const inp=document.getElementById('msgInput');
  if(inp) inp.addEventListener('keydown',e=>{
    if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(active, c); }
  });
  if(inp && active) crmAgentHydrateRealAi(active);

  /* Прокрутка вниз */
  const body=document.getElementById('chatBody');
  if(body) body.scrollTop=body.scrollHeight;
}

function sendMessage(lead, c){
  if(!lead) return;
  const inp=document.getElementById('msgInput');
  const text=inp.value.trim();
  if(!text) return;

  const int=integrationFor(lead.channel);
  const canDeliver = ['phone','store'].includes(lead.channel) || (int && int.status==='connected');

  lead.msgs=lead.msgs||[];
  lead.msgs.push({
    id:(lead.msgs.length?Math.max(...lead.msgs.map(m=>m.id)):0)+1,
    dir:'out', text,
    at:DATA.today+' '+nowTime(),
    author:currentEmployeeName(),
    /* Без бэкенда сообщение остаётся в очереди — честно показываем это */
    status: canDeliver ? 'pending' : 'failed',
  });
  lead.lastTouch=DATA.today;
  if(!lead.owner) lead.owner=currentEmployeeName();
  if(lead.stage==='new') lead.stage='working';
  crmAiLearnFromSentAnswer(lead, text);

  renderCrm(c);
  toast(canDeliver?'Сообщение в очереди на отправку':'Канал не подключён — не отправлено',
        canDeliver?'info':'error');
}

function crmQuickAiProductNames(){
  const known=[];
  crmAgentStockRows().forEach(row=>{
    if(row.name) known.push({title:row.name, hint:[row.tabLabel, row.price?rub(row.price):''].filter(Boolean).join(' · ')});
  });
  imagnateCatalogItems().slice(0,700).forEach(item=>{
    if(item.title) known.push({title:item.title, hint:[item.category, item.price?rub(item.price):''].filter(Boolean).join(' · ')});
  });
  const seen=new Set();
  return known.filter(item=>{
    const key=crmAiNormalize(item.title);
    if(!key||seen.has(key)) return false;
    seen.add(key);
    return true;
  }).slice(0,260);
}
function crmQuickAiFillProducts(query=''){
  const list=document.getElementById('quickAiProductOptions');
  if(!list) return;
  const q=String(query||'').trim().toLowerCase();
  const rows=crmQuickAiProductNames().filter(item=>!q||String(item.title+' '+item.hint).toLowerCase().includes(q)).slice(0,180);
  list.innerHTML=rows.map(item=>'<option value="'+escAttr(item.title)+'" label="'+escAttr(item.hint)+'"></option>').join('');
}

async function crmQuickAiGenerateAnswer(){
  const result=document.getElementById('quickAiResult');
  const status=document.getElementById('quickAiStatus');
  const btn=document.getElementById('modalAction0');
  const lead=crmQuickAiLeadFromForm();
  const question=crmAiLastIncomingQuestion(lead);
  if(!question||question==='Подскажите по товару'){
    toast('Введите вопрос клиента', 'error');
    return '';
  }
  const fallback=crmAgentGenerateReplyForLead(lead);
  if(result) result.value=fallback;
  if(status) status.textContent='Локальный черновик готов. Проверяю реальный AI...';
  if(btn) btn.disabled=true;
  try{
    const real=await crmAgentFetchRealAi(lead, fallback);
    if(real && result) result.value=real;
    if(status) status.textContent=real?'Ответ получен от AI-сервера':'AI временно недоступен, показан локальный черновик.';
    return real||fallback;
  }catch(e){
    if(status) status.textContent='AI-сервер не ответил: '+(e.message||e)+'. Показан локальный черновик.';
    return fallback;
  }finally{
    if(btn) btn.disabled=false;
  }
}
function crmQuickAiCreateDialog(c){
  const lead=crmQuickAiLeadFromForm();
  const question=crmAiLastIncomingQuestion(lead);
  if(!question||question==='Подскажите по товару'){
    toast('Введите вопрос клиента', 'error');
    return;
  }
  const answer=(document.getElementById('quickAiResult')?.value||'').trim();
  const nextId=Math.max(7000,...(DATA.leads||[]).map(l=>Number(l.id)||0).filter(Boolean))+1;
  lead.id=nextId;
  lead.externalId='quick_ai_'+Date.now();
  lead.sourceUrl='';
  lead.source='ai_quick_test';
  if(answer){
    lead.ai={
      lastRealDraft:{question, text:answer, at:DATA.today+' '+nowTime()},
      lastDraft:{source:'AI-проверка заказа', mode:'quick_test', text:answer, at:DATA.today+' '+nowTime()}
    };
  }
  DATA.leads=DATA.leads||[];
  DATA.leads.unshift(lead);
  if(typeof lsSave==='function') lsSave();
  closeModal();
  STATE.crmTab='inbox';
  STATE.inboxLead=lead.id;
  STATE.inboxUnreadOnly=false;
  renderCrm(c);
  toast('Тестовый диалог создан в CRM', 'success');
}

function renderCrm(c){
  if(!STATE.crmTab) STATE.crmTab='funnel';
  if(!STATE.crmChannel) STATE.crmChannel='all';
  ensureCrmAiTrainingDataset();
  crmAgentPruneMemory();

  /* Вкладки */
  const broken=(DATA.integrations||[]).filter(i=>i.status==='error').length;
  const unread=totalUnread();
  let html='<div class="toolbar"><div class="chip-tabs">'+
    '<div class="chip-tab '+(STATE.crmTab==='inbox'?'active':'')+'" data-crmtab="inbox">Диалоги'+
      (unread?' <span style="color:var(--accent);font-weight:800;">('+unread+')</span>':'')+'</div>'+
    '<div class="chip-tab '+(STATE.crmTab==='funnel'?'active':'')+'" data-crmtab="funnel">Воронка</div>'+
    '<div class="chip-tab '+(STATE.crmTab==='integrations'?'active':'')+'" data-crmtab="integrations">Интеграции'+
      (broken?' <span style="color:var(--negative);">('+broken+')</span>':' ('+connectedChannels().length+')')+'</div>'+
  '</div><div class="topbar-spacer"></div><button class="btn btn-sm" id="crmQuickAiTestBtn">'+ic('chat')+' AI-проверка заказа</button></div>';

  if(STATE.crmTab==='inbox'){
    renderInbox(c, html);
    return;
  }

  if(STATE.crmTab==='integrations'){
    html+=renderIntegrationsTab();
    c.innerHTML=html;
    c.querySelectorAll('[data-crmtab]').forEach(el=>el.addEventListener('click',()=>{ STATE.crmTab=el.dataset.crmtab; renderCrm(c); }));
    wireCrmQuickAiOrderButton(c);
    wireIntegrations(c);
    return;
  }

  const all=DATA.leads||[];
  const activeLeads=all.filter(l=>!isArchived(l));
  const archived=all.filter(isArchived);

  if(!STATE.crmView) STATE.crmView='kanban';
  if(!STATE.crmQuery) STATE.crmQuery='';

  /* Архив — отдельный вид, на доске его нет */
  const pool = STATE.crmView==='archive' ? archived : activeLeads;

  const q=STATE.crmQuery.toLowerCase().trim();
  let list = STATE.crmChannel==='all' ? pool : pool.filter(l=>l.channel===STATE.crmChannel);
  if(q){
    list=list.filter(l=>
      (l.name||'').toLowerCase().includes(q) ||
      (l.item||'').toLowerCase().includes(q) ||
      (l.contact||'').toLowerCase().includes(q) ||
      (l.owner||'').toLowerCase().includes(q)
    );
  }
  if(STATE.crmStaleOnly) list=list.filter(l=>!isArchived(l) && daysIdle(l)>=2);

  const stale=activeLeads.filter(l=>daysIdle(l)>=2);
  const won=archived.filter(l=>l.stage==='won').length;
  const lost=archived.filter(l=>l.stage==='lost').length;
  const conv = (won+lost) ? Math.round(won/(won+lost)*100) : 0;

  html+='<div class="grid grid-4" style="margin-bottom:14px;">'+
    kpiPlain('Новых запросов', activeLeads.filter(l=>l.stage==='new').length, 'chat')+
    kpiPlain('В работе', activeLeads.length, 'orders')+
    kpiPlain('Без ответа 2+ дн.', stale.length, 'alert')+
    kpiPlain('Конверсия', conv+'%', 'check')+
  '</div>';

  /* Сломанные интеграции — заявки не приходят */
  if(broken){
    const errs=(DATA.integrations||[]).filter(i=>i.status==='error');
    html+='<div class="card" style="margin-bottom:14px;border-color:var(--negative);">'+
      '<div class="kpi-label" style="color:var(--negative);">'+ic('alert')+' Канал не работает — заявки не поступают</div>'+
      errs.map(i=>'<div class="tsub" style="margin-top:4px;"><b>'+CHANNELS[i.channel].label+'</b>: '+escHtml(i.error)+'</div>').join('')+
      (STATE.role==='owner'?'<div style="margin-top:8px;"><button class="btn btn-sm btn-primary" id="goFixInt">Перейти к интеграциям</button></div>':'')+
    '</div>';
  }

  if(stale.length && !STATE.crmStaleOnly && STATE.crmView!=='archive'){
    html+='<div class="card" style="margin-bottom:14px;border-color:var(--warning);cursor:pointer;" id="showStale">'+
      '<div class="kpi-label" style="color:var(--warning);">'+ic('alert')+' Висят без движения: '+stale.length+'</div>'+
      '<div class="tsub" style="margin-top:4px;">Нажмите, чтобы показать только их</div>'+
    '</div>';
  }
  if(STATE.crmStaleOnly){
    html+='<div class="card" style="margin-bottom:14px;border-color:var(--warning);">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;">'+
      '<div class="kpi-label" style="color:var(--warning);">Показаны только зависшие заявки</div>'+
      '<button class="btn btn-sm" id="clearStale">Показать все</button></div></div>';
  }

  /* Панель управления */
  html+='<div class="toolbar" style="gap:10px;flex-wrap:wrap;">'+
    '<div class="chip-tabs">'+
      '<div class="chip-tab '+(STATE.crmView==='kanban'?'active':'')+'" data-view="kanban">Доска</div>'+
      '<div class="chip-tab '+(STATE.crmView==='table'?'active':'')+'" data-view="table">Список</div>'+
      '<div class="chip-tab '+(STATE.crmView==='archive'?'active':'')+'" data-view="archive">Архив ('+archived.length+')</div>'+
    '</div>'+
    '<select class="select-mini" id="crmChSel" style="min-width:150px;">'+
      '<option value="all"'+(STATE.crmChannel==='all'?' selected':'')+'>Все каналы</option>'+
      Object.entries(CHANNELS).map(([k,v])=>{
        const n=pool.filter(l=>l.channel===k).length;
        if(!n) return '';
        return '<option value="'+k+'"'+(STATE.crmChannel===k?' selected':'')+'>'+v.label+' ('+n+')</option>';
      }).join('')+
    '</select>'+
    '<input class="input-mini" id="crmSearch" placeholder="Поиск: имя, товар, контакт" value="'+escAttr(STATE.crmQuery)+'" style="width:220px;">'+
    '<div class="topbar-spacer"></div>'+
    '<span class="tsub">'+list.length+' из '+pool.length+'</span>'+
    (STATE.crmView!=='archive'?'<button class="btn btn-primary" id="newLeadBtn">'+ic('plus')+' Заявка вручную</button>':'')+
  '</div>';

  if(STATE.crmView==='archive'){
    html+=crmArchiveHTML(list, won, lost);
  } else if(STATE.crmView==='table'){
    html+=crmTableHTML(list);
  } else {
    html+=crmKanbanHTML(list);
  }

  c.innerHTML=html;
  c.querySelectorAll('[data-crmtab]').forEach(el=>el.addEventListener('click',()=>{ STATE.crmTab=el.dataset.crmtab; renderCrm(c); }));
  wireCrmQuickAiOrderButton(c);
  c.querySelectorAll('[data-view]').forEach(el=>el.addEventListener('click',()=>{
    STATE.crmView=el.dataset.view; STATE.crmStaleOnly=false; renderCrm(c);
  }));
  c.querySelectorAll('[data-lead]').forEach(el=>el.addEventListener('click',()=>openLeadModal(parseInt(el.dataset.lead), c)));

  const chSel=document.getElementById('crmChSel');
  if(chSel) chSel.addEventListener('change',()=>{ STATE.crmChannel=chSel.value; renderCrm(c); });

  const search=document.getElementById('crmSearch');
  if(search) search.addEventListener('input',()=>{
    STATE.crmQuery=search.value;
    renderCrm(c);
    const s=document.getElementById('crmSearch');
    if(s){ s.focus(); s.setSelectionRange(s.value.length, s.value.length); }
  });

  const stl=document.getElementById('showStale');
  if(stl) stl.addEventListener('click',()=>{ STATE.crmStaleOnly=true; STATE.crmView='table'; renderCrm(c); });
  const cls=document.getElementById('clearStale');
  if(cls) cls.addEventListener('click',()=>{ STATE.crmStaleOnly=false; renderCrm(c); });

  const nlb=document.getElementById('newLeadBtn');
  if(nlb) nlb.addEventListener('click',()=>openNewLeadModal(c));
  const fix=document.getElementById('goFixInt');
  if(fix) fix.addEventListener('click',()=>{ STATE.crmTab='integrations'; renderCrm(c); });
}

/* Архив — заказавшие и отказавшиеся. Просмотр, не работа. */
function crmArchiveHTML(list, won, lost){
  let html='<div class="grid grid-3" style="margin-bottom:12px;">'+
    kpiPlain('Заказали', won, 'check')+
    kpiPlain('Отказались', lost, 'x')+
    kpiPlain('Конверсия', ((won+lost)?Math.round(won/(won+lost)*100):0)+'%', 'analytics')+
  '</div>';

  if(!list.length) return html+'<div class="card"><div class="empty"><b>Архив пуст</b></div></div>';

  const sorted=[...list].sort((a,b)=>{
    if(a.stage!==b.stage) return a.stage==='won'?-1:1;
    return (parseRuDate(b.lastTouch)||0)-(parseRuDate(a.lastTouch)||0);
  });

  html+='<div class="table-wrap"><table><thead><tr>'+
    '<th>Канал</th><th>Клиент</th><th>Интересовало</th><th>Итог</th><th>Ответственный</th><th>Дата</th><th></th>'+
  '</tr></thead><tbody>';
  sorted.forEach(l=>{
    const won_=l.stage==='won';
    html+='<tr>'+
      '<td>'+channelBadge(l.channel)+'</td>'+
      '<td><div class="tname">'+escHtml(l.name)+'</div><div class="tsub mono">'+escHtml(l.contact||'')+'</div></td>'+
      '<td class="tsub">'+escHtml(l.item||'—')+'</td>'+
      '<td>'+(won_
        ? '<span class="badge b-done">Заказал</span>'+(l.orderId?'<div class="tsub mono">Заказ №'+l.orderId+'</div>':'')
        : '<span class="badge b-cancel">Отказ</span>'+(l.lostReason?'<div class="tsub">'+escHtml(l.lostReason)+'</div>':''))+
      '</td>'+
      '<td class="tsub">'+escHtml(l.owner||'—')+'</td>'+
      '<td class="mono">'+escHtml(l.lastTouch||'—')+'</td>'+
      '<td class="row-actions"><button class="btn btn-sm" data-lead="'+l.id+'">Открыть</button></td>'+
    '</tr>';
  });
  html+='</tbody></table></div>';
  return html;
}

/* Доска — колонки с внутренней прокруткой, чтобы 50 заявок не ломали страницу */
function crmKanbanHTML(list){
  let html='<div class="kanban">';
  LEAD_STAGES.forEach(stage=>{
    const items=list.filter(l=>l.stage===stage.id);
    html+='<div class="kan-col">'+
      '<div class="kan-head">'+
        '<div><div class="kan-title">'+stage.label+'</div>'+
        '<div class="kan-hint">'+stage.hint+'</div></div>'+
        '<span class="kan-count">'+items.length+'</span>'+
      '</div>'+
      '<div class="kan-body">';
    if(!items.length){
      html+='<div class="kan-empty">пусто</div>';
    } else {
      items.forEach(l=>{
        const idle=daysIdle(l);
        const isStale=!['won','lost'].includes(l.stage) && idle>=2;
        html+='<div class="kan-card'+(isStale?' stale':'')+'" data-lead="'+l.id+'">'+
          '<div class="kan-card-top">'+channelBadge(l.channel)+
            '<span class="kan-name">'+escHtml(l.name)+'</span></div>'+
          '<div class="kan-item">'+escHtml(l.item||'—')+'</div>'+
          '<div class="kan-meta">'+
            (l.owner?escHtml(l.owner):'<span style="color:var(--warning);">не взят</span>')+
            (isStale?' · <span style="color:var(--warning);font-weight:600;">'+idle+' дн.</span>':'')+
          '</div>'+
          (l.stage==='won'&&l.orderId?'<div class="kan-meta mono">Заказ №'+l.orderId+'</div>':'')+
          (l.stage==='lost'&&l.lostReason?'<div class="kan-meta">'+escHtml(l.lostReason)+'</div>':'')+
        '</div>';
      });
    }
    html+='</div></div>';
  });
  html+='</div>';
  return html;
}

/* Список — для большого объёма удобнее доски */
function crmTableHTML(list){
  const sorted=[...list].sort((a,b)=>{
    const sa=ALL_STAGES.findIndex(s=>s.id===a.stage);
    const sb=ALL_STAGES.findIndex(s=>s.id===b.stage);
    if(sa!==sb) return sa-sb;
    return daysIdle(b)-daysIdle(a);
  });
  if(!sorted.length) return '<div class="card"><div class="empty"><b>Ничего не найдено</b></div></div>';

  let html='<div class="table-wrap"><table><thead><tr>'+
    '<th>Канал</th><th>Клиент</th><th>Интересует</th><th>Этап</th><th>Ответственный</th><th>Без движения</th><th></th>'+
  '</tr></thead><tbody>';
  sorted.forEach(l=>{
    const idle=daysIdle(l);
    const isStale=!['won','lost'].includes(l.stage) && idle>=2;
    const stage=stageById(l.stage);
    const stageCls={new:'b-new', working:'b-progress', thinking:'b-ready', waiting:'b-progress', won:'b-done', lost:'b-cancel'}[l.stage]||'b-grey';
    html+='<tr'+(isStale?' style="background:rgba(245,166,35,.05);"':'')+'>'+
      '<td>'+channelBadge(l.channel)+'</td>'+
      '<td><div class="tname">'+escHtml(l.name)+'</div><div class="tsub mono">'+escHtml(l.contact||'')+'</div></td>'+
      '<td class="tsub">'+escHtml(l.item||'—')+'</td>'+
      '<td><span class="badge '+stageCls+'">'+(stage?stage.label:'—')+'</span>'+
        (l.stage==='won'&&l.orderId?'<div class="tsub mono">№'+l.orderId+'</div>':'')+
        (l.stage==='lost'&&l.lostReason?'<div class="tsub">'+escHtml(l.lostReason)+'</div>':'')+
      '</td>'+
      '<td class="tsub">'+(l.owner?escHtml(l.owner):'<span style="color:var(--warning);">не взят</span>')+'</td>'+
      '<td class="mono"'+(isStale?' style="color:var(--warning);font-weight:600;"':'')+'>'+
        (['won','lost'].includes(l.stage)?'—':idle+' дн.')+'</td>'+
      '<td class="row-actions"><button class="btn btn-sm" data-lead="'+l.id+'">Открыть</button></td>'+
    '</tr>';
  });
  html+='</tbody></table></div>';
  return html;
}

/* ============================================================
   ЗАДАЧИ С ВОЗНАГРАЖДЕНИЕМ
   Владелец создаёт → сотрудник забирает → выполняет и отчитывается →
   владелец принимает → сумма падает в зарплату этому сотруднику.
============================================================ */
const TASK_STATUS={
  open:     ['Свободна',    'b-new'],
  claimed:  ['В работе',    'b-progress'],
  review:   ['На проверке', 'b-ready'],
  approved: ['Принята',     'b-done'],
  rejected: ['Отклонена',   'b-cancel'],
  cancelled:['Отменена',    'b-cancel'],
};
const TASK_TYPES={oneoff:'Одноразовая', longterm:'Долгосрочная'};
/* Статусы «в исполнении» — задача у кого-то на руках */
const TASK_ACTIVE_STATUSES=['claimed','review','rejected'];
/* Статусы архива — работа окончена */
const TASK_ARCHIVE_STATUSES=['approved','cancelled'];

/* ============================================================
   УЧАСТНИКИ ЗАДАЧИ. Задача может требовать нескольких исполнителей
   (participantsNeeded). Пока набор не полный — задача остаётся на
   доске объявлений. Вознаграждение делится на ФАКТИЧЕСКИХ участников.
============================================================ */
function taskParticipants(t){
  if(Array.isArray(t.participants)) return t.participants;
  return t.claimedBy? [{name:t.claimedBy, at:t.claimedAt||''}] : [];
}
function taskNeeded(t){ return t.participantsNeeded||1; }
function isTaskParticipant(t, name){ return taskParticipants(t).some(p=>p.name===name); }
function syncTaskClaimedBy(t){
  const ps=taskParticipants(t);
  t.claimedBy=ps.length? ps[0].name : null;
  if(!ps.length) t.claimedAt=null;
}
function taskParticipantsLabel(t){
  const ps=taskParticipants(t);
  if(taskNeeded(t)<=1) return ps.length? '<b>'+escHtml(ps[0].name)+'</b>' : '';
  return ps.map(p=>'<b>'+escHtml(p.name)+'</b>').join(', ')+
    ' <span class="badge '+(ps.length>=taskNeeded(t)?'b-done':'b-progress')+'" style="margin-left:4px;">'+ps.length+' из '+taskNeeded(t)+'</span>';
}

/* Вступление в задачу (забрать/присоединиться) — общая логика для доски и модалки */
function joinTask(taskId){
  const t=(DATA.tasks||[]).find(x=>x.id===taskId);
  if(!t || t.status!=='open') return;
  const me=taskMe();
  if(!Array.isArray(t.participants)) t.participants=taskParticipants(t).slice();
  if(isTaskParticipant(t, me)){ toast('Вы уже участвуете в этой задаче','info'); return; }
  if(!t.claimedBy){ t.claimedBy=me; }
  t.participants.push({name:me, at:DATA.today+' '+nowTime()});
  const needed=taskNeeded(t);
  if(t.participants.length>=needed){
    logTask(t, needed>1?('Состав собран ('+t.participants.map(p=>p.name).join(', ')+') — задача в работе'):'Задача взята в работу');
    t.status='claimed'; if(!t.claimedAt) t.claimedAt=DATA.today+' '+nowTime();
    t.joinDeadline=null;
    /* Срок «N дней с момента взятия» — считается от этого момента */
    if(t.dueDays && !t.dueAt){
      t.dueAt=addDaysToNow(t.dueDays);
      logTask(t,'Срок исполнения: '+t.dueDays+' дн. — до '+t.dueAt);
    }
  } else {
    logTask(t,'Присоединился(ась) '+me+' ('+t.participants.length+' из '+needed+')');
    /* Первый участник запускает окно набора: не наберутся — стартует текущим составом */
    if(t.participants.length===1){
      const hrs=(DATA.settings && DATA.settings.teamJoinHours)||24;
      t.joinDeadline=addHoursToNow(hrs);
      logTask(t,'Открыто окно набора команды до '+t.joinDeadline+' ('+hrs+' ч)');
    }
  }
  syncTaskClaimedBy(t);
  STATE.taskBoard='mine';
  refreshTasksPage();
  toast(needed>1
    ? (t.participants.length>=needed? 'Состав собран — задача в работе. Вознаграждение делится на '+t.participants.length
                                     : 'Вы присоединились ('+t.participants.length+'/'+needed+'). Набор открыт до '+(t.joinDeadline||'—')+' — не наберутся, начнёте текущим составом')
    : 'Задача ваша. Вознаграждение (ориентир): '+rub(t.reward), 'success');
}
/* Отказ от долгосрочной задачи — владелец видит это в закрепе сверху */
function recordTaskRefusal(t, who, note){
  if(!Array.isArray(DATA.taskRefusals)) DATA.taskRefusals=[];
  DATA.taskRefusals.unshift({
    id:(DATA.taskRefusals.length?Math.max(...DATA.taskRefusals.map(r=>r.id)):0)+1,
    taskId:t.id, title:t.title, by:who, at:DATA.today+' '+nowTime(), note:note||'', seen:false,
  });
}
/* Отказ от долгосрочной — с обязательным комментарием сотрудника */
function refuseLongtermTask(t, me, afterFn){
  const body='<div class="field-grid">'+field('Задача', t.title)+field('Ставка', rub(t.reward)+' / мес')+'</div>'+
    '<div class="field"><label>Почему отказываетесь <span style="color:var(--negative);">*</span> <span class="tsub">— владелец увидит комментарий</span></label>'+
    '<textarea class="textarea-mini" id="refuseNote" rows="3" style="width:100%;font-family:inherit;" placeholder="Например: не хватает времени из-за смен"></textarea></div>'+
    '<div class="tsub">Задача вернётся на доску объявлений.</div>';
  openModal('Отказаться от задачи','',body,[{label:'Отказаться', cls:'btn-danger', action:()=>{
    const note=document.getElementById('refuseNote').value.trim();
    if(!note){ toast('Напишите, почему отказываетесь','error'); return; }

  }}]);
}
